<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SorteCerta - Roleta Turbo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: #121214;
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --red: #e74c3c;
            --black: #1a1a1a;
            --green: #2ecc71;
            --text-main: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; touch-action: manipulation; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .header { width: 100%; background: rgba(18, 18, 20, 0.95); border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .btn-back { color: #8b8b93; text-decoration: none; font-size: 18px; }
        .logo-roulette { font-weight: 900; color: var(--gold); letter-spacing: 1px; font-size: 20px; text-transform: uppercase; }
        .balance-badge { background: rgba(0, 230, 118, 0.1); color: var(--green); padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 13px; border: 1px solid var(--green); }

        .game-container { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .roulette-arena { background: #0a0a0c; border: 2px solid #27272a; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .wheel-container { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }
        
        /* CORREÇÃO DO GRADIENTE: Verde (0-10), Vermelho (10-185), Preto (185-360) */
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; 
                 background: conic-gradient( var(--green) 0deg 18deg, var(--red) 18deg 185deg, var(--black) 185deg 360deg ); 
                 box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99); position: relative; }
        
        .wheel::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: linear-gradient(145deg, #f1c40f, #b8860b); border-radius: 50%; border: 3px solid #000; z-index: 5; }
        .marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; }

        .result-display { margin-top: 20px; font-size: 24px; font-weight: 900; background: #000; padding: 10px 30px; border-radius: 12px; border: 2px solid #333; }

        .bet-table { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        .bet-zone { flex: 1; height: 80px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .bet-zone.red { background: var(--red); color: #fff; }
        .bet-zone.green { background: var(--green); color: #000; flex: 0.6; }
        .bet-zone.black { background: #222; color: #fff; border: 1px solid #444; }
        
        .chip-stack { position: absolute; top: 5px; right: 5px; background: #fff; color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 10px; display: none; }
        .btn-spin { width: 100%; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); border: none; padding: 15px; font-weight: 900; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo-roulette">Turbo Roleta</div>
        <div class="balance-badge" id="displaySaldoTop">R$ 0,00</div>
    </header>

    <div class="game-container">
        <div class="roulette-arena">
            <div class="wheel-container">
                <div class="marker"></div>
                <div class="wheel" id="wheel"></div>
            </div>
            <div class="result-display" id="resultDisplay">Aposte!</div>
            <div class="game-message" id="gameMessage"></div>
        </div>

        <div class="bet-table">
            <div class="bet-zone red" onclick="placeBet('red')">VERMELHO <div class="chip-stack" id="stack-red">R$ 0</div></div>
            <div class="bet-zone green" onclick="placeBet('green')">ZERO <div class="chip-stack" id="stack-green">R$ 0</div></div>
            <div class="bet-zone black" onclick="placeBet('black')">PRETO <div class="chip-stack" id="stack-black">R$ 0</div></div>
        </div>

        <button class="btn-spin" id="btnSpin" onclick="spinRoulette()">GIRAR</button>
    </div>

    <script type="module">
        // ... [Mesma lógica de Firebase anterior] ...
        // Importante: A lógica de stopAngle agora está sincronizada com o novo CSS:
        // Verde: 0-18 graus. Vermelho: 18-185 graus. Preto: 185-360 graus.

        function calculateStopAngle(color) {
            if (color === 'green') return 360 - (Math.random() * 16 + 1); 
            if (color === 'red') return 360 - (Math.random() * 160 + 20); 
            if (color === 'black') return 360 - (Math.random() * 160 + 190);
        }
        
        // ... resto do seu código JS aqui ...
    </script>
</body>
</html>
