            --panel-bg: #14051c;
            --gold: #f1c40f; --gold-dark: #b8860b;
            --red: #e74c3c; --red-dark: #c0392b;
            --black: #1a1a1a; --black-light: #2c3e50;
            --green: #00e676; --green-dark: #00b359;
            --text-light: #ffffff;

        body {

        .game-area { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; width: 100%; max-width: 450px; margin: 0 auto; gap: 10px; position: relative; }

        /* HISTÓRICO DE CORES */
        .history-bar { width: 100%; display: flex; gap: 6px; overflow-x: auto; padding: 8px 12px; background: rgba(0,0,0,0.25); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); align-items: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }

        .history-dot.green { background: linear-gradient(135deg, var(--green), var(--green-dark)); border-color: #fff; }

        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }

            box-shadow: 0 5px 10px rgba(0,0,0,0.8), inset 0 0 5px rgba(255,255,255,0.8); 
            display: none; align-items: center; justify-content: center; z-index: 5; 
        }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.5); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .bet-label { font-size: 10px; color: #888; font-weight: 800; padding-left: 15px; text-transform: uppercase; pointer-events: none; letter-spacing: 1px; }
        .bet-display { font-size: 15px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 4px 0; border-radius: 10px; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: linear-gradient(180deg, #1c3a76, #0d214a); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 14px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 0 #071229; cursor: pointer; transition: 0.1s; border-bottom: none; }
        .bet-adjust:active { transform: translateY(4px); box-shadow: none; }

        /* BOTÕES DE AÇÃO: APOSTAR E GIRAR */
        .roll-actions { display: flex; gap: 8px; }
        .btn-clear { background: linear-gradient(180deg, #555, #222); border: none; color: #fff; padding: 0 20px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: inset 0 2px 2px rgba(255,255,255,0.2), 0 5px 0 #111; cursor: pointer; border-bottom: none; }
        
        .bet-button { flex: 1; border: none; border-radius: 12px; padding: 15px 5px; color: #fff; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-apostar { background: linear-gradient(180deg, #3498db, #2980b9); box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), 0 5px 0 #154360, 0 8px 15px rgba(52, 152, 219, 0.4); border-bottom: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; padding: 0 2px; }
        .game-name { font-size: 10px; color: #888; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }

        .balance-info { font-size: 16px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 8px; background: #0c0c0c; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .balance-info i { color: var(--gold); font-size: 16px; }

        /* POP-UP COMPACTO DE VITÓRIA */
        .win-toast { position: fixed; top: 80px; left: 50%; transform: translate(-50%, -20px) scale(0.9); background: linear-gradient(135deg, #00e676, #00b359); color: #000; padding: 12px 30px; border-radius: 30px; border: 2px solid #fff; box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5), inset 0 2px 5px rgba(255,255,255,0.5); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 1px; }
        .win-toast #winAmount { font-size: 18px; font-weight: 900; color: #000; }

        .system-toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 90px; }
    </style>
</head>

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (tipo === 'sfxLose') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        };

        function mostrarToast(msg) {
            const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        const numSegments = 15; const degPerSegment = 360 / numSegments;
        function drawWheel() {
            let gradientStr = 'conic-gradient(';
            for(let i=0; i<numSegments; i++) {
                let color = i === 0 ? 'var(--green)' : (i % 2 !== 0 ? 'var(--red)' : 'var(--black)');
                gradientStr += `${color} ${i * degPerSegment}deg ${(i + 1) * degPerSegment}deg${i < numSegments - 1 ? ', ' : ''}`;
            }
            wheelElement.style.background = gradientStr + ')';
        }
        drawWheel();

        function updateHistoryBar() {
            const bar = document.getElementById('historyBar');
            bar.innerHTML = '<span class="history-label"><i class="fa-solid fa-clock-rotate-left"></i> Últimos:</span>';
            resultHistory.forEach(color => { bar.innerHTML += `<div class="history-dot ${color}"></div>`; });
        }
        updateHistoryBar();

        startScreen.addEventListener('click', function() {
            this.style.opacity = '0'; setTimeout(() => { this.style.display = 'none'; }, 300);
            audioLigado = true; btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btnAudio.style.color = '#fff';
            let docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen().catch(e => {}); }
            iniciarAudio(); tocarSom('sfxClick');
        });

        // O JOGO NÃO REEMBOLSA SE FECHAR A TELA
        async function lidarComSaidaAbrupta() {
            if (isSpinning) { isSpinning = false; }
        }

        document.getElementById('btnBack').addEventListener('click', async () => {
            iniciarAudio(); tocarSom('sfxClick'); await lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        });
        
        window.addEventListener('pagehide', lidarComSaidaAbrupta);
        
        // Remove a ação no visibilitychange para não bugar o iOS. O áudio acorda no toque na tela.
        window.addEventListener('visibilitychange', function() { 
            // Vazio de propósito para não travar o AudioContext do celular.
        });

        btnAudio.addEventListener('click', () => {
            iniciarAudio(); audioLigado = !audioLigado; 
            if(audioLigado) { btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btnAudio.style.color = '#fff'; tocarSom('sfxClick'); } 
            else { btnAudio.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btnAudio.style.color = '#888'; }
        });

        document.querySelectorAll('.btn-choice').forEach(btn => {
            btn.addEventListener('click', function() {
                if(isSpinning) return; iniciarAudio(); tocarSom('sfxClick');
                selectedColor = this.dataset.color;
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('displayAposta').addEventListener('click', () => {
            if(isSpinning) return; iniciarAudio();
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    tocarSom('sfxClick');
                } else { mostrarToast("Valor inválido."); }
            }
        });

        function mudarAposta(direcao) {
            if(isSpinning) return; iniciarAudio(); tocarSom('sfxClick');
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        }
        document.getElementById('btnMinus').addEventListener('click', () => mudarAposta(-1));
        document.getElementById('btnPlus').addEventListener('click', () => mudarAposta(1));

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isSpinning) {
                bancaAtual = parseFloat(dados.saldo || 0);
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                modoJogo = String(dados.modo || "normal").toLowerCase();
            }
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        function updateBetTable() {
            ['red', 'green', 'black'].forEach(color => {
                const stack = document.getElementById(`stack-${color}`);
                const valInner = document.getElementById(`val-${color}`);
                if(bets[color] > 0) { 
                    stack.style.display = 'flex'; 
                    valInner.innerText = bets[color] >= 1000 ? (bets[color]/1000).toFixed(1) + 'k' : bets[color]; 
                } else { stack.style.display = 'none'; }
            });
        }

        // LÓGICA DE APOSTA: DESCONTA NO ATO E CALCULA O REAL
        document.getElementById('btnPlaceBet').addEventListener('click', async () => {
            if (isSpinning) return; iniciarAudio();
            
            if (apostaAtual > bancaAtual) { mostrarToast("Saldo insuficiente para esta aposta."); return; }
            if (bets[selectedColor] + apostaAtual > 500) { mostrarToast("O limite de aposta por cor é R$ 500,00!"); return; }

            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;

            bets[selectedColor] += apostaAtual;
            
            bancaAtual -= apostaAtual;
            saldoRealAtual -= (apostaAtual * proporcaoRealNaMesa);
            
            await update(ref(db, `usuarios/${idDispositivo}`), {
                saldo: parseFloat(bancaAtual.toFixed(2)),
                saldo_real: parseFloat(saldoRealAtual.toFixed(2))
            });
            
            tocarSom('sfxClick');
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            updateBetTable();
        });

        // LÓGICA DE LIMPEZA: REEMBOLSA NO ATO
        document.getElementById('btnClear').addEventListener('click', async () => {
            if (isSpinning) return; iniciarAudio(); tocarSom('sfxClick');
            
            let totalMesa = bets.red + bets.green + bets.black;
            if (totalMesa > 0) {
                bancaAtual += totalMesa;
                saldoRealAtual += (totalMesa * proporcaoRealNaMesa);
                
                await update(ref(db, `usuarios/${idDispositivo}`), {
                    saldo: parseFloat(bancaAtual.toFixed(2)),
                    saldo_real: parseFloat(saldoRealAtual.toFixed(2))
                });
                
                bets = { red: 0, green: 0, black: 0 };
                document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                updateBetTable();
            }
        });

        document.getElementById('btnSpin').addEventListener('click', async () => {
            if (isSpinning) return; iniciarAudio(); tocarSom('sfxClick');

            let totalBet = bets.red + bets.green + bets.black;
            let apostaRealTodaMesa = totalBet * proporcaoRealNaMesa;

            if (totalBet === 0) { mostrarToast("Coloque uma aposta na mesa antes de girar!"); return; }

            isSpinning = true;
            document.getElementById('btnPlaceBet').classList.add('disabled');
            document.getElementById('btnSpin').classList.add('disabled');
            document.getElementById('btnClear').classList.add('disabled');
            document.getElementById('btnMinus').style.opacity = '0.5';
            document.getElementById('btnPlus').style.opacity = '0.5';
            msgPanel.classList.remove('show');

            // SE NÃO FOR ADMIN, REGISTRA ROLLOVER E PROTEGE O CAIXA GLOBAL
            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                await set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa + apostaRealTodaMesa).toFixed(2)));
                
                get(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual')).then(snap => {
                    set(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual'), parseFloat((snap.val() || 0)) + totalBet);
                });
            }

            let targetColor = determineRiggedOutcome(totalBet);

            let targetIndex = 0;
            if(targetColor === 'red') { const reds = [1, 3, 5, 7, 9, 11, 13]; targetIndex = reds[Math.floor(Math.random() * reds.length)]; } 
            else if(targetColor === 'black') { const blacks = [2, 4, 6, 8, 10, 12, 14]; targetIndex = blacks[Math.floor(Math.random() * blacks.length)]; }

            const baseStopAngle = 360 - (targetIndex * degPerSegment) - (degPerSegment / 2);
            const extraSpins = 360 * 5; 
            const randomOffset = (Math.random() * 16) - 8; 

            currentRotation += extraSpins + baseStopAngle - (currentRotation % 360) + randomOffset;

            let lastSegment = -1;
            function trackRotation() {
                if (!isSpinning) return;
                const style = window.getComputedStyle(wheelElement);
                const matrix = new DOMMatrix(style.transform);
                let angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
                if (angle < 0) angle += 360;
                let currentSegment = Math.floor(angle / degPerSegment);
                if (currentSegment !== lastSegment) { tocarSom('sfxTick'); lastSegment = currentSegment; }
                requestAnimationFrame(trackRotation);
            }

            setTimeout(() => {
                requestAnimationFrame(trackRotation);
                wheelElement.style.transform = `rotate(${currentRotation}deg)`;
            }, 50);

            setTimeout(() => { isSpinning = false; processPayout(targetColor); }, 4200);
        });

        function determineRiggedOutcome(totalBet) {
            let pR = bets.red * 2; let pB = bets.black * 2; let pG = bets.green * 14;

            if (modoJogo === 'admin' || modoJogo === 'live') {
                if (pG > 0) return 'green'; if (pR > pB) return 'red'; if (pB > pR) return 'black';
                return Math.random() > 0.5 ? 'red' : 'black';
            }

            let availableFunds = caixaDaCasa * CONFIG_RTP;
            let roll = Math.random();
            let color = 'red';
            if (roll > 0.475 && roll <= 0.95) color = 'black'; else if (roll > 0.95) color = 'green';

            let payoutTotal = color === 'red' ? pR : (color === 'black' ? pB : pG);
            let payoutReal = payoutTotal * proporcaoRealNaMesa;

            if (payoutReal > availableFunds) { return getWorstOutcome(pR, pB, pG); }
            return color;
        }

        function getWorstOutcome(pR, pB, pG) {
            if (pR === 0 && pB === 0) return Math.random() > 0.5 ? 'red' : 'black';
            if (pR === 0) return 'red'; if (pB === 0) return 'black'; if (pG === 0) return 'green';
            if (pR <= pB && pR <= pG) return 'red'; if (pB <= pR && pB <= pG) return 'black'; return 'green';
        }

        async function processPayout(color) {
            resultHistory.unshift(color);
            if(resultHistory.length > MAX_HISTORY) resultHistory.pop();
            updateHistoryBar();

            let isWin = false; let winAmount = 0;

            if (color === 'red' && bets.red > 0) { winAmount = bets.red * 2; isWin = true; }
            else if (color === 'black' && bets.black > 0) { winAmount = bets.black * 2; isWin = true; }
            else if (color === 'green' && bets.green > 0) { winAmount = bets.green * 14; isWin = true; }

            if (isWin) {
                let winReal = winAmount * proporcaoRealNaMesa;
                
                bancaAtual += winAmount;
                saldoRealAtual += winReal;

                let snapU = await get(ref(db, `usuarios/${idDispositivo}`));
                let u = snapU.val() || {};
                let metaRo = parseFloat(u.rollover_meta || 0);
                let atualRo = parseFloat(u.rollover_atual || 0);
                
                if (metaRo > 0 && atualRo >= metaRo) {
                    saldoRealAtual = bancaAtual;
                }

                await update(ref(db, `usuarios/${idDispositivo}`), {
                    saldo: parseFloat(bancaAtual.toFixed(2)),
                    saldo_real: parseFloat(saldoRealAtual.toFixed(2))
                });

                if (modoJogo !== 'admin' && modoJogo !== 'live') {
                    get(ref(db, 'sistema/caixa_global')).then(async snap => {
                        let dbCaixa = parseFloat(snap.val() || 0);
                        await set(ref(db, 'sistema/caixa_global'), parseFloat((dbCaixa - winReal).toFixed(2)));
                    });
                }

                tocarSom('sfxWin');
                document.getElementById('winAmount').innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('winToast').classList.add('show');
                setTimeout(() => document.getElementById('winToast').classList.remove('show'), 2500);
            } else {
                tocarSom('sfxLose');
                document.getElementById('msgTitle').innerText = "NÃO FOI DESTA VEZ";
                document.getElementById('msgValue').innerText = "Tente Novamente";
                msgPanel.style.borderColor = "var(--red)";
                document.getElementById('msgValue').style.color = "var(--red)";
                msgPanel.classList.add('show');
                setTimeout(() => msgPanel.classList.remove('show'), 2500);
            }

            bets = { red: 0, green: 0, black: 0 };
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            updateBetTable();

            document.getElementById('btnPlaceBet').classList.remove('disabled');
            document.getElementById('btnSpin').classList.remove('disabled');
            document.getElementById('btnClear').classList.remove('disabled');
            document.getElementById('btnMinus').style.opacity = '1';
            document.getElementById('btnPlus').style.opacity = '1';
        }
    </script>
</body>
</html>
