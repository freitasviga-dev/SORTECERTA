        }
        document.getElementById('btnMinus').addEventListener('click', () => mudarAposta(-1));
        document.getElementById('btnPlus').addEventListener('click', () => mudarAposta(1));

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isRolling) {
                bancaAtual = parseFloat(dados.saldo || 0);
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                modoJogo = String(dados.modo || "normal").toLowerCase();
            }
        });
        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        // UPDATE EM TEMPO REAL NO SLIDER
        function updateStats() {
            let chance = parseFloat(slider.value);
            // TRAVA PARA O MULTIPLICADOR MÍNIMO 1.10x
            if (chance > 88.18) { chance = 88.18; slider.value = chance; }
            
            let payout = RTP / chance;
            if (payout < 1.10) payout = 1.10;

            payoutInput.value = payout.toFixed(2);
            syncUI(chance, payout);
        }

        // MÁSCARA INTELIGENTE DO INPUT DO MULTIPLICADOR
        function formatarEValidarMultiplicador() {
            let valorCru = payoutInput.value.replace(/[^0-9.,]/g, ''); // Limpa letras e caracteres especiais
            valorCru = valorCru.replace(',', '.'); // Aceita vírgula mas transforma em ponto pro cálculo

            let payout = parseFloat(valorCru);
            
            if (isNaN(payout)) { payout = 2.00; }
            if (payout < 1.10) payout = 1.10; 
            if (payout > 970.00) payout = 970.00; 

            payoutInput.value = payout.toFixed(2);
            
            let chance = RTP / payout; 
            slider.value = chance.toFixed(2); 
            syncUI(chance, payout);
        }

        slider.addEventListener('input', () => { iniciarAudio(); updateStats(); }); // Atualiza na mesma hora
        slider.addEventListener('change', () => { tocarSom('sfxClick'); });
        
        // Bloqueia letras na digitação ao vivo (apenas números e pontos)
        payoutInput.addEventListener('input', (e) => {
            payoutInput.value = payoutInput.value.replace(/[^0-9.,]/g, '');
        });
        // Valida as decimais e o valor minimo quando ele tira o dedo do input (blur)
        payoutInput.addEventListener('blur', formatarEValidarMultiplicador);
        // Valida quando ele aperta Enter
        payoutInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                payoutInput.blur();
            }
        });

        function syncUI(chance, payout) {
            let winAmount = apostaAtual * payout;
            chanceDisplay.innerText = chance.toFixed(2) + ' %';
            potentialWin.innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            let tUnder = chance; let tOver = 100 - chance;
            targetUnder.innerText = "Abaixo de " + tUnder.toFixed(2); targetOver.innerText = "Acima de " + tOver.toFixed(2);
            trackTop.style.background = `linear-gradient(to right, #e74c3c ${tOver}%, #3498db ${tOver}%)`;
            trackBottom.style.background = `linear-gradient(to right, #00e676 ${tUnder}%, #e74c3c ${tUnder}%)`;
        }

        async function rollDice(type) {
            if (isRolling) return; iniciarAudio(); tocarSom('sfxClick');
            if (apostaAtual > bancaAtual) { mostrarToast("Saldo insuficiente."); return; }

            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;
            let apostaReal = apostaAtual * proporcaoRealNaMesa;

            isRolling = true;
            document.getElementById('btn-under').classList.add('disabled');
            document.getElementById('btn-over').classList.add('disabled');
            document.getElementById('btnMinus').style.opacity = '0.5';
            document.getElementById('btnPlus').style.opacity = '0.5';
            slider.disabled = true; payoutInput.disabled = true;
            resultDisplay.classList.remove('win', 'lose');

            bancaAtual -= apostaAtual; saldoRealAtual -= apostaReal;
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            await update(ref(db, `usuarios/${idDispositivo}`), {
                saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2))
            });

            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                await set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa + apostaReal).toFixed(2)));
                get(ref(db, `usuarios/${idDispositivo}/rollover_atual`)).then(snap => {
                    set(ref(db, `usuarios/${idDispositivo}/rollover_atual`), parseFloat((snap.val() || 0)) + apostaAtual);
                });
            }

            const chance = parseFloat(slider.value);
            const payout = parseFloat(payoutInput.value);
            let winTotal = apostaAtual * payout;
            let winReal = winTotal * proporcaoRealNaMesa;

            // ANTI-QUEBRA
            let forceLose = false;
            if (modoJogo !== 'admin' && modoJogo !== 'live' && winReal > caixaDaCasa) {
                forceLose = true;
            }

            let finalResult;
            if (forceLose) {
                if (type === 'under') { finalResult = (chance + Math.random() * (99.99 - chance)).toFixed(2); } 
                else { finalResult = (Math.random() * (100 - chance - 0.01)).toFixed(2); }
            } else {
                finalResult = (Math.random() * 100).toFixed(2);
            }

            let ticks = 0;
            const rollInterval = setInterval(() => {
                resultDisplay.innerText = (Math.random() * 100).toFixed(2);
                tocarSom('sfxRoll'); ticks++;
                if (ticks > 25) { clearInterval(rollInterval); finishRoll(finalResult, type, chance, payout, winTotal, winReal); }
            }, 40);
        }

        async function finishRoll(result, type, chance, payout, winTotal, winReal) {
            resultDisplay.innerText = result; let numResult = parseFloat(result);
            let isWin = false;
            if (type === 'under' && numResult < chance) isWin = true;
            else if (type === 'over' && numResult > (100 - chance)) isWin = true;

            if (isWin) {
                resultDisplay.classList.add('win'); tocarSom('sfxWin');
                
                bancaAtual += winTotal; saldoRealAtual += winReal;

                let snapshot = await get(ref(db, `usuarios/${idDispositivo}`));
                let u = snapshot.val() || {};
                let metaRo = parseFloat(u.rollover_meta || 0); let atualRo = parseFloat(u.rollover_atual || 0);
                if (metaRo > 0 && atualRo >= metaRo) { saldoRealAtual = bancaAtual; }

                await update(ref(db, `usuarios/${idDispositivo}`), {
                     saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2))
                });

                if (modoJogo !== 'admin' && modoJogo !== 'live') {
                    get(ref(db, 'sistema/caixa_global')).then(async snap => {
                        let dbCaixa = parseFloat(snap.val() || 0);
                        await set(ref(db, 'sistema/caixa_global'), parseFloat((dbCaixa - winReal).toFixed(2)));
                    });
                }

                winAmountDisplay.innerText = "R$ " + winTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                winToast.classList.add('show'); setTimeout(() => winToast.classList.remove('show'), 2500);
            } else {
                resultDisplay.classList.add('lose'); tocarSom('sfxLose');
            }

            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            isRolling = false;
            document.getElementById('btn-under').classList.remove('disabled'); document.getElementById('btn-over').classList.remove('disabled');
            document.getElementById('btnMinus').style.opacity = '1'; document.getElementById('btnPlus').style.opacity = '1';
            slider.disabled = false; payoutInput.disabled = false;
        }

        document.getElementById('btn-under').addEventListener('click', () => rollDice('under'));
        document.getElementById('btn-over').addEventListener('click', () => rollDice('over'));
        updateStats();
    </script>
</body>
</html>
