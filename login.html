<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- FORÇAR CARREGAMENTO -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>SorteCerta - Login VIP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: rgba(20, 20, 24, 0.85);
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --green: #2ecc71;
            --red: #ff1744;
            --text-main: #f4f4f5;
            --border-color: rgba(241, 196, 15, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-main); 
            background-image: radial-gradient(circle at 50% 0%, rgba(50, 40, 10, 0.6) 0%, transparent 70%);
            color: var(--text-main); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px;
        }

        /* Efeito de Vidro Fosco (Glassmorphism) e Entrada Suave */
        .login-card {
            background: var(--bg-card); width: 100%; max-width: 400px; padding: 40px 30px;
            border-radius: 24px; border: 1px solid var(--border-color); text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(241, 196, 15, 0.05);
            backdrop-filter: blur(20px); position: relative; z-index: 2;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 35px; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo i { color: var(--gold); font-size: 34px; filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.6)); }

        .input-group { margin-bottom: 22px; text-align: left; }
        .input-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 16px; color: #555; font-size: 16px; transition: 0.3s; }
        
        .input-custom {
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid #333; color: #fff; padding: 18px 18px 18px 48px;
            border-radius: 14px; font-size: 16px; outline: none; transition: all 0.3s ease; font-weight: 600; letter-spacing: 1px;
        }
        .input-custom::placeholder { color: #555; font-weight: 400; letter-spacing: normal; }
        .input-custom:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2), inset 0 2px 5px rgba(0,0,0,0.5); background: #000; }
        .input-wrapper i.active { color: var(--gold); filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.5)); }

        .btn-submit {
            width: 100%; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000; border: none; padding: 18px; border-radius: 14px; font-size: 16px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 6px 0 #8a6508, 0 15px 25px rgba(241, 196, 15, 0.2); transition: 0.2s; margin-top: 10px;
        }
        .btn-submit:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .btn-submit:disabled { filter: grayscale(100%); cursor: not-allowed; transform: none; box-shadow: none; }

        .system-msg { margin-top: 20px; font-size: 13px; font-weight: 800; min-height: 20px; color: var(--gold); display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* Selos de Segurança */
        .security-seal { display: flex; justify-content: center; gap: 20px; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .security-seal span { font-size: 10px; color: #777; display: flex; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .security-seal i { color: #555; font-size: 13px; }

        .bg-glow { position: absolute; width: 300px; height: 300px; background: rgba(241, 196, 15, 0.1); filter: blur(100px); border-radius: 50%; top: -100px; left: -100px; z-index: 1; pointer-events: none; }
        .bg-glow-2 { position: absolute; width: 250px; height: 250px; background: rgba(46, 204, 113, 0.05); filter: blur(80px); border-radius: 50%; bottom: -50px; right: -50px; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-card">
        <div class="logo"><i class="fa-solid fa-crown"></i> SORTECERTA</div>
        
        <div class="input-group">
            <label class="input-label">Celular (Com DDD)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="inputPhone" class="input-custom" placeholder="Ex: 83999999999" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Senha de Acesso</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="inputPass" class="input-custom" placeholder="••••••••">
            </div>
        </div>

        <button class="btn-submit" id="btnAcesso" onclick="processarAcesso()">Acessar Plataforma</button>
        
        <div style="font-size: 11px; color: #888; text-align: center; margin-top: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
            <i class="fa-solid fa-bolt" style="color: var(--gold); margin-right: 4px;"></i> Sem conta? Nós criamos na hora!
        </div>
        
        <div class="system-msg" id="msgDisplay"></div>

        <div class="security-seal">
            <span><i class="fa-solid fa-shield-halved"></i> SSL 256-bit</span>
            <span><i class="fa-solid fa-server"></i> Criptografia de Ponta</span>
        </div>
    </div>

    <!-- Limpa os dados fantasmas do jogador ao carregar a página de login -->
    <script>
        localStorage.removeItem('usuario_tracker_id');
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Efeito de iluminar os ícones
        document.querySelectorAll('.input-custom').forEach(input => {
            input.addEventListener('focus', function() { this.previousElementSibling.classList.add('active'); });
            input.addEventListener('blur', function() { this.previousElementSibling.classList.remove('active'); });
        });

        window.processarAcesso = async function() {
            const phone = document.getElementById('inputPhone').value.trim();
            const pass = document.getElementById('inputPass').value.trim();
            const msg = document.getElementById('msgDisplay');
            const btn = document.getElementById('btnAcesso');

            // --- VALIDAÇÕES DE INPUT ---
            if(phone.length !== 11) {
                msg.style.color = 'var(--red)'; 
                msg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Digite exatamente 11 números (DDD + 9).'; 
                return;
            }
            if(pass.length < 4) {
                msg.style.color = 'var(--red)'; 
                msg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Sua senha deve ter no mínimo 4 caracteres.'; 
                return;
            }

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;
            msg.style.color = 'var(--gold)';
            msg.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Conectando ao servidor seguro...';

            try {
                // ========================================================
                // 1. O PORTEIRO (VERIFICA LISTA NEGRA ANTES DE TUDO)
                // ========================================================
                const banRef = ref(db, 'banidos/' + phone);
                const isBanned = await get(banRef);

                if (isBanned.exists()) {
                    msg.style.color = 'var(--red)';
                    msg.innerHTML = '<i class="fa-solid fa-ban"></i> Acesso Bloqueado: Conta banida do sistema.';
                    btn.innerText = "Acesso Recusado";
                    return; // TRAVA A EXECUÇÃO AQUI! NUNCA PASSA PARA BAIXO.
                }

                // ========================================================
                // 2. SE NÃO ESTIVER BANIDO, CONTINUA O LOGIN/CADASTRO
                // ========================================================
                const userRef = ref(db, 'usuarios/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const dados = snapshot.val();
                    if (dados.senha === pass) {
                        localStorage.setItem('usuario_tracker_id', phone);
                        msg.style.color = 'var(--green)';
                        msg.innerHTML = '<i class="fa-solid fa-check"></i> Login Aprovado! Redirecionando...';
                        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                    } else {
                        msg.style.color = 'var(--red)';
                        msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Senha incorreta. Tente novamente.';
                        btn.innerText = "Acessar Plataforma";
                        btn.disabled = false;
                    }
                } else {
                    // CRIAÇÃO DE CONTA AUTOMÁTICA
                    await set(userRef, { 
                        saldo: 0.00, 
                        senha: pass, 
                        modo: 'normal',
                        rollover_meta: 0,
                        rollover_atual: 0,
                        bonus_usado: false,
                        data_criacao: new Date().toISOString()
                    });
                    
                    localStorage.setItem('usuario_tracker_id', phone);
                    msg.style.color = 'var(--green)';
                    msg.innerHTML = '<i class="fa-solid fa-check-double"></i> Conta VIP criada! Redirecionando...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                }
            } catch (error) {
                msg.style.color = 'var(--red)';
                msg.innerHTML = '<i class="fa-solid fa-wifi"></i> Erro de conexão com o servidor.';
                btn.innerText = "Acessar Plataforma";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
