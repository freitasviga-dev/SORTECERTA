<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Clear-Site-Data" content="cache">
    
    <title>Faturamento | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(20, 20, 20, 0.85);
            --gold: #f1c40f;
            --green: #00e676;
            --red: #ff1744;
            --text-main: #f4f4f5;
            --text-muted: #888;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-dark); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a00 0%, #050505 70%);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        #dashboardEspelho { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        
        .header-bar { 
            display: flex; justify-content: center; align-items: center; 
            background: var(--bg-card); backdrop-filter: blur(10px); padding: 20px; 
            border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
        }
        
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .header-brand i { color: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .metric-card { 
            background: var(--bg-card); backdrop-filter: blur(10px); padding: 30px 25px; 
            border-radius: 12px; border: 1px solid var(--border-color); border-top: 4px solid var(--gold); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); text-align: center;
        }
        .metric-card.green { border-top-color: var(--green); }
        .metric-card.red { border-top-color: var(--red); }
        
        .m-title { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 1px; }
        .m-value { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .live-indicator {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 11px; font-weight: bold; color: var(--green); margin-top: 30px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .dot { height: 8px; width: 8px; background-color: var(--green); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; box-shadow: 0 0 8px var(--green); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <script>
        (function() {
            if ('caches' in window) { caches.keys().then(function(names) { for (let name of names) caches.delete(name); }); }
            if ('navigator' in window && 'serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r) { for (let reg of r) reg.unregister(); }); }
        })();
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) { window.location.reload(true); }
        });
    </script>

    <div id="dashboardEspelho">
        
        <div class="header-bar">
            <div class="header-brand">
                <i class="fa-solid fa-chart-line"></i> Relatório de Faturamento
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="m-title"><i class="fa-solid fa-vault" style="color:var(--gold)"></i> Lucro da Casa (RTP)</div>
                <div class="m-value" id="displayCaixaGlobal">R$ 0,00</div>
            </div>
            
            <div class="metric-card green">
                <div class="m-title"><i class="fa-solid fa-arrow-down" style="color:var(--green)"></i> Total Depositado</div>
                <div class="m-value" id="displayDepositos">R$ 0,00</div>
            </div>
            
            <div class="metric-card red">
                <div class="m-title"><i class="fa-solid fa-arrow-up" style="color:var(--red)"></i> Total Sacado</div>
                <div class="m-value" id="displaySaques">R$ 0,00</div>
            </div>
        </div>

        <div class="live-indicator">
            <span class="dot"></span> Atualização em Tempo Real
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LEITURA AUTOMÁTICA EM TEMPO REAL
        onValue(ref(db, 'sistema'), (snapshot) => {
            const sys = snapshot.val() || {};
            
            let caixa = parseFloat(sys.caixa_global || 0);
            let deps = parseFloat(sys.total_depositos || 0);
            let saqs = parseFloat(sys.total_saques || 0);
            
            document.getElementById('displayCaixaGlobal').innerText = "R$ " + caixa.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('displayDepositos').innerText = "R$ " + deps.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('displaySaques').innerText = "R$ " + saqs.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        });
    </script>
</body>
</html>
