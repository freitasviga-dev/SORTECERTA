<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | SorteCerta Central</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: rgba(25, 25, 25, 0.75); --gold: #f1c40f; 
            --green: #00e676; --red: #ff1744; --purple: #9b51e0; --text: #f4f4f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Efeito Glassmorphism 3D */
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* TELA DE LOGIN */
        #loginScreen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .login-box { padding: 40px; text-align: center; width: 90%; max-width: 350px; border: 1px solid var(--gold); box-shadow: 0 10px 40px rgba(241, 196, 15, 0.15); }
        .login-box h2 { color: var(--gold); letter-spacing: 2px; margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; font-size: 16px; outline: none; letter-spacing: 3px; }
        .login-box input:focus { border-color: var(--gold); }
        .error-msg { color: var(--red); font-size: 12px; margin-top: 15px; font-weight: bold; min-height: 15px; }

        /* DASHBOARD */
        #adminDashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; }
        .header-bar h1 { font-size: 22px; font-weight: 900; }
        
        .metric-card { padding: 25px; border-radius: 20px; position: relative; overflow: hidden; border-top: 4px solid var(--gold); }
        .metric-card.green { border-top-color: var(--green); }
        .metric-card h3 { font-size: 12px; opacity: 0.7; text-transform: uppercase; margin-bottom: 10px; }
        .metric-card p { font-size: 32px; font-weight: 900; }
        
        /* BOTÕES ESTILO 3D */
        .btn-action { padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 13px; transition: 0.2s; transform: translateY(0); text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-action:active { transform: translateY(0); box-shadow: none; }
        
        .btn-gold { background: var(--gold); color: #000; }
        .btn-purple { background: linear-gradient(135deg, #9b51e0, #6a1b9a); color: white; box-shadow: 0 4px 0 #4a148c; }
        .btn-red { background: rgba(255, 23, 68, 0.15); color: var(--red); border: 1px solid var(--red); }
        .btn-red:hover { background: var(--red); color: white; }
        .btn-green { background: rgba(0, 230, 118, 0.15); color: var(--green); border: 1px solid var(--green); }
        .btn-green:hover { background: var(--green); color: black; }

        /* TABELA */
        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 800px; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #333; }
        tr { background: #111; transition: 0.2s; }
        tr:hover { background: #1a1a1a; }
        td { padding: 15px; vertical-align: middle; border-bottom: 1px solid #222; }
        .id-badge { font-family: monospace; color: var(--gold); background: rgba(241,196,15,0.1); padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN BLINDADA -->
    <div id="loginScreen">
        <div class="glass login-box">
            <h2><i class="fa-solid fa-crown"></i> ACESSO RESTRITO</h2>
            <input type="password" id="pwdInput" placeholder="Chave Mestra" onkeypress="if(event.key === 'Enter') checkAcesso()">
            <button class="btn-action btn-gold" style="width:100%; justify-content:center;" onclick="checkAcesso()">ENTRAR NO SISTEMA</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <!-- DASHBOARD ADMIN -->
    <div id="adminDashboard">
        <div class="glass header-bar">
            <h1>Gestão <span style="color:var(--gold)">SorteCerta</span></h1>
            <button class="btn-action btn-red" onclick="fazerLogout()"><i class="fa-solid fa-right-from-bracket"></i> SAIR</button>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="glass metric-card">
                <h3><i class="fa-solid fa-vault" style="color:var(--gold)"></i> Lucro da Casa (RTP)</h3>
                <p id="displayCaixa">R$ 0,00</p>
            </div>
            <div class="glass metric-card green">
                <h3><i class="fa-solid fa-arrow-down" style="color:var(--green)"></i> Total Depositado</h3>
                <p id="displayDeps">R$ 0,00</p>
            </div>
        </div>

        <div class="glass" style="padding: 25px;">
            <h2 style="font-size: 18px; margin-bottom: 20px;"><i class="fa-solid fa-users-gear"></i> Controle de Jogadores</h2>
            <div class="table-responsive">
                <table id="tabelaUsers">
                    <thead>
                        <tr>
                            <th>ID DO JOGADOR</th>
                            <th>SALDO REAL</th>
                            <th style="text-align: right;">AÇÕES RÁPIDAS</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <tr><td colspan="3" style="text-align:center; color:#555;">Conectando ao banco de dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- SISTEMA DE LOGIN CRIPTOGRAFADO (Sua lógica original) ---
        const _0xkey = [91, 110, 121, 121, 116, 119, 55, 59, 55, 55, 53, 53];
        
        window.checkAcesso = function() {
            let input = document.getElementById('pwdInput').value;
            let msg = document.getElementById('loginError');
            
            if(!input || input.length !== _0xkey.length) { 
                msg.innerText = "Acesso Negado."; 
                return; 
            }
            
            let valid = true;
            for(let i=0; i < input.length; i++) { 
                if(input.charCodeAt(i) + 5 !== _0xkey[i]) valid = false; 
            }
            
            if(valid) {
                sessionStorage.setItem('admin_auth_supreme', 'authorized');
                document.getElementById('loginScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminDashboard').style.display = 'block';
                }, 500);
            } else { 
                msg.innerText = "Chave Inválida."; 
                document.getElementById('pwdInput').value = ''; 
            }
        };

        window.fazerLogout = function() { 
            sessionStorage.removeItem('admin_auth_supreme'); 
            location.reload(); 
        };

        // Verifica se já está logado
        if(sessionStorage.getItem('admin_auth_supreme') === 'authorized') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        }

        // --- CONFIGURAÇÃO FIREBASE ---
        const config = { apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio", databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com", projectId: "sortecerta-75b77" };
        const db = getDatabase(initializeApp(config));

        // --- PUXAR MÉTRICAS GLOBAIS ---
        onValue(ref(db, 'sistema'), (snapshot) => {
            const sys = snapshot.val() || {};
            let caixa = parseFloat(sys.caixa_global || 0);
            let deps = parseFloat(sys.total_depositos || 0);
            
            document.getElementById('displayCaixa').innerText = "R$ " + caixa.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('displayDeps').innerText = "R$ " + deps.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        });

        // --- BOTÃO ROXO: BÔNUS 100% ---
        window.aplicarBonus100 = (id, saldoAtual) => {
            let valor = prompt(`O Bônus de 100% DOBRA o depósito.\n\nDigite o valor que o jogador depositou:`);
            if(!valor) return;
            
            let v = parseFloat(valor.replace(',','.'));
            if(isNaN(v) || v <= 0) {
                alert("Valor inválido."); return;
            }
            
            let novoSaldo = parseFloat(saldoAtual) + (v * 2);
            let metaRollover = (v * 2) * 3; // Meta de 3x
            
            update(ref(db, `usuarios/${id}`), {
                saldo: novoSaldo,
                rollover_meta: metaRollover,
                rollover_atual: 0,
                bonus_usado: false // RE-LIBERA A ABA DE BÔNUS PARA ELE NO FUTURO SE QUISER
            }).then(() => alert(`✅ Bônus 100% Supremo ativado!\nSaldo atualizado para R$ ${novoSaldo.toFixed(2)}\nMeta de saque configurada para R$ ${metaRollover.toFixed(2)}`));
        }

        // --- EXCLUSÃO REAL E LISTA NEGRA ---
        window.excluirUsuario = (id) => {
            if(confirm(`⚠️ ALERTA VERMELHO!\nTem certeza que deseja APAGAR PERMANENTEMENTE a conta de ${id}?`)) {
                remove(ref(db, `usuarios/${id}`));
                // Salva o ID nos banidos para ele não conseguir logar de novo
                set(ref(db, `banidos/${id}`), true).then(() => {
                    alert("Conta apagada e ID banido com sucesso.");
                }); 
            }
        }

        // --- RENDERIZAR JOGADORES NA TABELA ---
        onValue(ref(db, 'usuarios'), (snap) => {
            const data = snap.val() || {};
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = "";
            
            let count = 0;
            for(let id in data) {
                count++;
                let saldo = parseFloat(data[id].saldo || 0).toFixed(2);
                let senha = data[id].senha || 'Sem senha';
                
                corpo.innerHTML += `<tr>
                    <td>
                        <span class="id-badge">${id}</span>
                        <div style="font-size: 11px; color: #888; margin-top: 5px;"><i class="fa-solid fa-key"></i> ${senha}</div>
                    </td>
                    <td style="color:var(--green); font-weight:900; font-size:18px;">R$ ${saldo}</td>
                    <td style="text-align: right;">
                        <button class="btn-action btn-purple" onclick="aplicarBonus100('${id}', ${saldo})" title="Ativar Bônus de 100% Supremo">
                            <i class="fa-solid fa-bolt"></i> BÔNUS 100%
                        </button>
                        <button class="btn-action btn-red" style="margin-left:8px;" onclick="excluirUsuario('${id}')" title="Excluir Permanentemente">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            }

            if(count === 0) {
                corpo.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#555;">Nenhum jogador encontrado.</td></tr>`;
            }
        });
    </script>
</body>
</html>
