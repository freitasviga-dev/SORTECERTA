<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TigerPanel Pro - Gestão Individual</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #ffcc00; --text: #f4f4f5; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #27272a; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #a1a1aa; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #27272a; }
        td { padding: 16px; border-bottom: 1px solid #27272a; }
        .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 11px; }
        .btn-select { background: #2563eb; color: white; }
        .btn-del { background: #dc2626; color: white; }
        input, select { background: #09090b; border: 1px solid #3f3f46; padding: 8px; border-radius: 6px; color: white; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>TigerPanel <span style="color:var(--accent)">Individual</span></h1>
        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; margin-top:20px;">
            <input type="text" id="inputID" placeholder="ID do Usuário">
            <input type="number" id="inputSaldo" placeholder="Saldo">
            <select id="inputModo">
                <option value="agressivo">Agressivo</option>
                <option value="normal">Normal</option>
                <option value="desfarcado">Disfarçado</option>
            </select>
            <input type="number" id="inputForcarGanho" placeholder="Forçar Ganho (R$)">
            <button class="btn" style="background:var(--accent)" onclick="salvarConfig()">SALVAR CONFIG</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead><tr><th>ID</th><th>SALDO</th><th>MODO</th><th>GANHO FORÇADO</th><th>AÇÕES</th></tr></thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
        authDomain: "sortecerta-75b77.firebaseapp.com",
        databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
        projectId: "sortecerta-75b77",
        storageBucket: "sortecerta-75b77.firebasestorage.app",
        messagingSenderId: "989209096967",
        appId: "1:989209096967:web:e58c112de75fb813068ba2"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    onValue(ref(db, 'usuarios'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('tabelaCorpo');
        tbody.innerHTML = '';
        for (let id in data) {
            const u = data[id];
            tbody.innerHTML += `
                <tr>
                    <td style="color:var(--accent)">${id}</td>
                    <td>R$ ${parseFloat(u.saldo || 0).toFixed(2)}</td>
                    <td>${u.modo || 'normal'}</td>
                    <td style="color:var(--accent)">R$ ${parseFloat(u.forcarGanho || 0).toFixed(2)}</td>
                    <td>
                        <button class="btn btn-select" onclick="selecionar('${id}', ${u.saldo}, '${u.modo || 'normal'}', ${u.forcarGanho || 0})">Selecionar</button>
                        <button class="btn btn-del" onclick="deletar('${id}')">Excluir</button>
                    </td>
                </tr>
            `;
        }
    });

    window.selecionar = (id, saldo, modo, ganho) => {
        document.getElementById('inputID').value = id;
        document.getElementById('inputSaldo').value = saldo;
        document.getElementById('inputModo').value = modo;
        document.getElementById('inputForcarGanho').value = ganho;
    };

    window.salvarConfig = () => {
        const id = document.getElementById('inputID').value.trim();
        if(!id) return alert("Selecione um ID!");
        set(ref(db, 'usuarios/' + id), {
            saldo: parseFloat(document.getElementById('inputSaldo').value),
            modo: document.getElementById('inputModo').value,
            forcarGanho: parseFloat(document.getElementById('inputForcarGanho').value || 0)
        }).then(() => alert("Configurações aplicadas!"));
    };

    window.deletar = (id) => {
        if(confirm("Apagar conta?")) set(ref(db, 'usuarios/' + id), null);
    };
</script>
</body>
</html>
