<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | SorteCerta Central</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: rgba(25, 25, 25, 0.7); --gold: #f1c40f; 
            --green: #00e676; --red: #ff1744; --purple: #9b51e0; --text: #f4f4f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Efeito Glassmorphism 3D */
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8); }

        #loginScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { padding: 40px; text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 15px; margin: 20px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; }

        #adminDashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .metric-card { padding: 20px; border-radius: 20px; text-align: center; position: relative; overflow: hidden; }
        .metric-card h3 { font-size: 12px; opacity: 0.7; }
        .metric-card p { font-size: 24px; font-weight: 800; margin-top: 10px; }
        
        /* BOTÕES ESTILO 3D */
        .btn-action { padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; transform: translateY(0); }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-purple { background: var(--purple); color: white; }
        .btn-green { background: var(--green); color: black; }
        .btn-red { background: var(--red); color: white; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: #111; }
        td { padding: 15px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="glass login-box">
            <h2>MASTER ACCESS</h2>
            <input type="password" id="pwdInput" placeholder="Chave de Acesso">
            <button class="btn-action btn-green" style="width:100%" onclick="checkAcesso()">ENTRAR</button>
        </div>
    </div>

    <div id="adminDashboard">
        <header style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h1>ADM <span style="color:var(--gold)">SorteCerta</span></h1>
            <button class="btn-action btn-red" onclick="location.reload()">SAIR</button>
        </header>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="glass metric-card"><h3>LUCRO</h3><p id="displayCaixa">R$ 0,00</p></div>
            <div class="glass metric-card"><h3>DEPOSITADO</h3><p id="displayDeps">R$ 0,00</p></div>
        </div>

        <div class="glass" style="padding: 20px;">
            <table id="tabelaUsers">
                <thead><tr><th>ID USUÁRIO</th><th>SALDO</th><th>AÇÕES</th></tr></thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG (Ofuscada)
        const config = { apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio", databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com", projectId: "sortecerta-75b77" };
        const db = getDatabase(initializeApp(config));

        // LOGIN BLINDADO (Simples, mas funcional para dev)
        window.checkAcesso = () => {
            if(document.getElementById('pwdInput').value === "91116116121124119575957575353") { // Sua senha criptografada aqui
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
            } else { alert("Acesso Negado"); }
        }

        // BÔNUS ROXO (A lógica que você pediu)
        window.aplicarBonus100 = (id) => {
            let valor = prompt("Digite o valor do depósito original:");
            if(!valor) return;
            let v = parseFloat(valor);
            
            update(ref(db, `usuarios/${id}`), {
                saldo: v * 2,
                rollover_meta: (v * 2) * 3,
                rollover_atual: 0,
                bonus_usado: false // RE-LIBERA O BÔNUS PARA ELE
            }).then(() => alert("Bônus 100% Aplicado com sucesso!"));
        }

        // EXCLUSÃO REAL
        window.excluirUsuario = (id) => {
            if(confirm("Tem certeza? Esta conta será apagada do servidor.")) {
                remove(ref(db, `usuarios/${id}`));
                set(ref(db, `banidos/${id}`), true); // Adiciona na lista negra
            }
        }

        // RENDEREIZAÇÃO (simplificada)
        onValue(ref(db, 'usuarios'), (snap) => {
            const data = snap.val();
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = "";
            for(let id in data) {
                corpo.innerHTML += `<tr>
                    <td>${id}</td>
                    <td>R$ ${data[id].saldo}</td>
                    <td>
                        <button class="btn-action btn-purple" onclick="aplicarBonus100('${id}')">BÔNUS 100%</button>
                        <button class="btn-action btn-red" onclick="excluirUsuario('${id}')">EXCLUIR</button>
                    </td>
                </tr>`;
            }
        });
    </script>
</body>
</html>
