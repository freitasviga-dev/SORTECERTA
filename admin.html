<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Clear-Site-Data" content="cache">
    
    <title>SorteCerta | Gestão Automática</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(20, 20, 20, 0.85);
            --gold: #f1c40f;
            --green: #00e676;
            --red: #ff1744;
            --blue: #3498db;
            --purple: #9b51e0;
            --text-main: #f4f4f5;
            --text-muted: #888;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-dark); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a00 0%, #050505 70%);
        }

        button { transition: all 0.2s ease; outline: none; }
        button:active { transform: translateY(4px); box-shadow: none !important; }

        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.5s ease;
        }
        .login-box {
            background: var(--bg-card); backdrop-filter: blur(15px);
            border: 1px solid var(--gold); border-radius: 16px;
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(241, 196, 15, 0.15), inset 0 0 15px rgba(241, 196, 15, 0.05);
        }
        .login-box h2 { color: var(--gold); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .login-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 20px; text-align: center; letter-spacing: 2px; box-shadow: inset 0 3px 6px rgba(0,0,0,0.5); }
        .login-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(241, 196, 15, 0.2), inset 0 3px 6px rgba(0,0,0,0.5); }
        .login-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #b8950b; }
        
        .error-msg { color: var(--red); font-size: 13px; margin-top: 15px; font-weight: bold; min-height: 15px; }

        #adminDashboard { display: none; flex-direction: column; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--bg-card); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .header-brand i { color: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }
        .header-actions { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; font-size: 13px; text-transform: uppercase; }
        
        .btn-desbanir { background: #111; border: 1px solid var(--green); color: var(--green); box-shadow: 0 4px 0 rgba(0, 230, 118, 0.3); }
        .btn-desbanir:hover { background: var(--green); color: #000; box-shadow: 0 4px 0 #00b359; }

        .btn-logout { background: #111; border: 1px solid var(--red); color: var(--red); box-shadow: 0 4px 0 rgba(255, 23, 68, 0.3); }
        .btn-logout:hover { background: var(--red); color: #fff; box-shadow: 0 4px 0 #b7102f; }
        
        .btn-manu { background: #111; border: 1px solid var(--gold); color: var(--gold); box-shadow: 0 4px 0 rgba(241, 196, 15, 0.3); }
        .btn-manu.active { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 4px 0 #b7102f; animation: blink 1s infinite; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: var(--bg-card); backdrop-filter: blur(10px); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); border-top: 4px solid var(--gold); position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .metric-card.green { border-top-color: var(--green); }
        .metric-card.red { border-top-color: var(--red); }
        .metric-card.blue { border-top-color: var(--blue); }
        .m-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .m-value { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .btn-zerar { width: 100%; background: #111; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-zerar-gold { border: 1px solid var(--gold); color: var(--gold); box-shadow: 0 3px 0 rgba(241, 196, 15, 0.3); }
        .btn-zerar-gold:hover { background: var(--gold); color: #000; box-shadow: 0 3px 0 #b8950b; }
        .btn-zerar-green { border: 1px solid var(--green); color: var(--green); box-shadow: 0 3px 0 rgba(0, 230, 118, 0.3); }
        .btn-zerar-green:hover { background: var(--green); color: #000; box-shadow: 0 3px 0 #00b359; }
        .btn-zerar-red { border: 1px solid var(--red); color: var(--red); box-shadow: 0 3px 0 rgba(255, 23, 68, 0.3); }
        .btn-zerar-red:hover { background: var(--red); color: #fff; box-shadow: 0 3px 0 #b7102f; }

        .panel-section { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid var(--border-color); padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--blue); }
        
        .search-bar { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 8px; padding: 8px 15px; width: 300px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .search-bar i { color: var(--text-muted); margin-right: 10px; }
        .search-bar input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-size: 14px; }
        .search-bar input:focus { color: var(--gold); }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.05); }
        
        .id-badge { font-family: monospace; color: var(--gold); background: rgba(241,196,15,0.1); padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; border: 1px solid rgba(241,196,15,0.3); }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; }
        .status-normal { background: rgba(52, 152, 219, 0.1); color: var(--blue); border-color: var(--blue); }
        .status-admin { background: rgba(232, 67, 147, 0.1); color: #e84393; border-color: #e84393; box-shadow: 0 0 10px rgba(232, 67, 147, 0.3); }

        .action-btns { display: flex; gap: 8px; }
        .btn-act { padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; color: #fff; display: flex; align-items: center; gap: 5px; }
        
        .btn-add-balance { background: rgba(0, 230, 118, 0.15); color: var(--green); border: 1px solid var(--green); box-shadow: 0 3px 0 rgba(0, 230, 118, 0.3); }
        .btn-add-balance:hover { background: var(--green); color: #000; box-shadow: 0 3px 0 #00b359; }
        
        .btn-bonus { background: rgba(155, 81, 224, 0.15); color: var(--purple); border: 1px solid var(--purple); box-shadow: 0 3px 0 rgba(155, 81, 224, 0.3); }
        .btn-bonus:hover { background: var(--purple); color: #fff; box-shadow: 0 3px 0 #6a1b9a; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        .btn-toggle-admin { background: rgba(241, 196, 15, 0.15); color: var(--gold); border: 1px solid var(--gold); box-shadow: 0 3px 0 rgba(241, 196, 15, 0.3); }
        .btn-toggle-admin:hover { background: var(--gold); color: #000; box-shadow: 0 3px 0 #b8950b; }
        
        .btn-delete { background: rgba(255, 23, 68, 0.15); color: var(--red); border: 1px solid var(--red); box-shadow: 0 3px 0 rgba(255, 23, 68, 0.3); }
        .btn-delete:hover { background: var(--red); color: #fff; box-shadow: 0 3px 0 #b7102f; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        @media (max-width: 768px) {
            .header-bar { flex-direction: column; gap: 15px; }
            .header-actions { flex-wrap: wrap; justify-content: center; }
            .section-header { flex-direction: column; gap: 15px; align-items: stretch; }
            .search-bar { width: 100%; }
        }
    </style>
</head>
<body>

    <script>
        (function() {
            if ('caches' in window) { caches.keys().then(function(names) { for (let name of names) caches.delete(name); }); }
            if ('navigator' in window && 'serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r) { for (let reg of r) reg.unregister(); }); }
        })();
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) { window.location.reload(true); }
        });
    </script>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <input type="email" id="emailInput" class="login-input" placeholder="E-mail Administrativo" onkeypress="if(event.key === 'Enter') checkAcesso()">
            
            <input type="password" id="pwdInput" class="login-input" placeholder="Senha" onkeypress="if(event.key === 'Enter') checkAcesso()">
            
            <button class="login-btn" id="btnEntrar" onclick="checkAcesso()">Entrar no Sistema</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <div id="adminDashboard">
        
        <div class="header-bar">
            <div class="header-brand">
                <i class="fa-solid fa-crown"></i> Gestão SorteCerta
            </div>
            <div class="header-actions">
                <button class="btn btn-desbanir" onclick="desbanirPrompt()">
                    <i class="fa-solid fa-unlock"></i> Desbanir
                </button>
                <button class="btn btn-manu" id="btnManutencao" onclick="toggleManutencao()">
                    <i class="fa-solid fa-power-off"></i> Manutenção
                </button>
                <button class="btn btn-logout" onclick="fazerLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </button>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="m-title"><i class="fa-solid fa-vault" style="color:var(--gold)"></i> Lucro da Casa (RTP)</div>
                <button class="btn-zerar btn-zerar-gold" onclick="zerarMetrica('caixa_global', 'Lucro da Casa (RTP)')">
                    <i class="fa-solid fa-rotate-left"></i> Zerar Caixa
                </button>
            </div>
            <div class="metric-card green">
                <div class="m-title"><i class="fa-solid fa-arrow-down" style="color:var(--green)"></i> Total Depositado</div>
                <button class="btn-zerar btn-zerar-green" onclick="zerarMetrica('total_depositos', 'Total Depositado')">
                    <i class="fa-solid fa-rotate-left"></i> Zerar Depósitos
                </button>
            </div>
            <div class="metric-card red">
                <div class="m-title"><i class="fa-solid fa-arrow-up" style="color:var(--red)"></i> Total Sacado</div>
                <button class="btn-zerar btn-zerar-red" onclick="zerarMetrica('total_saques', 'Total Sacado')">
                    <i class="fa-solid fa-rotate-left"></i> Zerar Saques
                </button>
            </div>
            <div class="metric-card blue">
                <div class="m-title"><i class="fa-solid fa-users" style="color:var(--blue)"></i> Jogadores Cadastrados</div>
                <div class="m-value" id="contadorUsers">0</div>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-users-gear"></i> Controle de Contas</div>
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar por ID..." onkeyup="filtrarTabela()">
                </div>
            </div>

            <div class="table-responsive">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID do Jogador</th>
                            <th>Saldo Real</th>
                            <th>Status da Conta</th>
                            <th style="text-align: right;">Ações Rápidas</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <tr><td colspan="4" style="text-align:center; color:#555;">Carregando banco de dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app); 

        const ADMIN_UID = 'bVqxxsRVcYSS23OuE5zrG2d63rA2';

        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === ADMIN_UID) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'flex';
                carregarDados();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminDashboard').style.display = 'none';
            }
        });

        window.checkAcesso = function() {
            let email = document.getElementById('emailInput').value.trim();
            let pwd = document.getElementById('pwdInput').value;
            let msg = document.getElementById('loginError');
            let btn = document.getElementById('btnEntrar');

            if(!email || !pwd) { msg.innerText = "Preencha E-mail e Senha."; return; }

            btn.innerText = "Verificando...";
            msg.innerText = "";

            signInWithEmailAndPassword(auth, email, pwd)
                .then((userCredential) => {
                    const user = userCredential.user;
                    if(user.uid !== ADMIN_UID) {
                        msg.innerText = "Este usuário não tem permissão de Administrador.";
                        btn.innerText = "Entrar no Sistema";
                        signOut(auth); 
                    }
                })
                .catch((error) => {
                    msg.innerText = "E-mail ou Senha inválidos.";
                    btn.innerText = "Entrar no Sistema";
                });
        };

        window.fazerLogout = function() { 
            signOut(auth).then(() => {
                location.reload(); 
            });
        };

        let isManutencao = false;
        let usersDataGlobal = {};

        function carregarDados() {
            // Apenas para verificar manutenção
            onValue(ref(db, 'sistema'), (snapshot) => {
                const sys = snapshot.val() || {};
                isManutencao = sys.manutencao === true;
                
                const btnManu = document.getElementById('btnManutencao');
                if(isManutencao) {
                    btnManu.classList.add('active');
                    btnManu.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> EM MANUTENÇÃO';
                } else {
                    btnManu.classList.remove('active');
                    btnManu.innerHTML = '<i class="fa-solid fa-power-off"></i> Manutenção';
                }
            });

            onValue(ref(db, 'usuarios'), (snapshot) => {
                usersDataGlobal = snapshot.val() || {};
                renderizarTabela(usersDataGlobal);
            });
        }

        window.toggleManutencao = () => { set(ref(db, 'sistema/manutencao'), !isManutencao); };

        window.zerarMetrica = (chaveNoFirebase, nomeDaMetrica) => {
            if(confirm(`⚠️ ATENÇÃO!\nTem certeza que deseja ZERAR a métrica de ${nomeDaMetrica}?`)) {
                set(ref(db, `sistema/${chaveNoFirebase}`), 0).then(() => {
                    alert(`${nomeDaMetrica} zerado com sucesso!`);
                });
            }
        };

        function renderizarTabela(data) {
            const tbody = document.getElementById('tabelaCorpo');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            tbody.innerHTML = '';
            let contador = 0;

            for (let id in data) {
                if (searchTerm && !id.toLowerCase().includes(searchTerm)) continue;

                contador++;
                const u = data[id];
                let saldo = parseFloat(u.saldo || 0).toFixed(2);
                let isInfluenciador = u.modo === 'influenciador';
                let senha = u.senha || 'Sem senha';
                
                let badgeClass = isInfluenciador ? 'status-admin' : 'status-normal';
                let badgeText = isInfluenciador ? '<i class="fa-solid fa-star"></i> Admin/Live' : 'Normal Automático';

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <span class="id-badge">${id}</span>
                            <div style="font-size: 10px; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.5px;">
                                <i class="fa-solid fa-key" style="font-size: 9px; margin-right: 3px;"></i> ${senha}
                            </div>
                        </td>
                        <td style="color:var(--green); font-weight:bold; font-size:16px;">R$ ${saldo}</td>
                        <td><span class="status-badge ${badgeClass}">${badgeText}</span></td>
                        <td style="text-align: right;">
                            <div class="action-btns" style="justify-content: flex-end;">
                                <button class="btn-act btn-add-balance" onclick="adicionarSaldoPrompt('${id}', ${saldo})" title="Adicionar Saldo">
                                    <i class="fa-solid fa-money-bill-wave"></i> Saldo
                                </button>
                                
                                <button class="btn-act btn-bonus" onclick="aplicarBonusPrompt('${id}', ${saldo})" title="Aplicar Bônus de 100%">
                                    <i class="fa-solid fa-bolt"></i> Bônus
                                </button>

                                <button class="btn-act btn-toggle-admin" onclick="toggleAdminMode('${id}', ${isInfluenciador})" title="Ativar Modo Live">
                                    <i class="fa-solid fa-star"></i>
                                </button>
                                <button class="btn-act btn-delete" onclick="excluirContaPrompt('${id}')" title="Excluir Conta Permanentemente">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }

            document.getElementById('contadorUsers').innerText = Object.keys(data).length;
            
            if (contador === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#555;">Nenhuma conta encontrada.</td></tr>';
            }
        }

        window.filtrarTabela = () => { renderizarTabela(usersDataGlobal); };

        window.adicionarSaldoPrompt = (id, saldoAtual) => {
            let u = usersDataGlobal[id] || {};
            let metaAntiga = parseFloat(u.rollover_meta || 0);
            let atualAntigo = parseFloat(u.rollover_atual || 0);
            let faltaApostar = metaAntiga - atualAntigo;
            if(faltaApostar < 0) faltaApostar = 0;

            let valorStr = prompt(`Adicionar Saldo Normal para ${id}\nSaldo Atual: R$ ${saldoAtual}\nRollover Pendente: R$ ${faltaApostar.toFixed(2)}\n\nDigite o valor do NOVO DEPÓSITO:`, "10.00");
            if(valorStr === null || valorStr === "") return;
            
            let valorNum = parseFloat(valorStr.replace(',','.'));
            if(isNaN(valorNum) || valorNum <= 0) return alert("Valor inválido.");

            let novoSaldo = parseFloat(saldoAtual) + valorNum;
            let novoRolloverGerado = valorNum + (valorNum * 0.20);
            let metaRolloverFinal = faltaApostar + novoRolloverGerado;
            
            update(ref(db, `usuarios/${id}`), {
                saldo: parseFloat(novoSaldo.toFixed(2)),
                rollover_meta: metaRolloverFinal,
                rollover_atual: 0
            }).then(() => {
                push(ref(db, `usuarios/${id}/transacoes`), { 
                    tipo: "DEPÓSITO", 
                    valor: valorNum.toFixed(2), 
                    data: new Date().toISOString() 
                });
                
                alert(`✅ Sucesso! R$ ${valorNum.toFixed(2)} adicionados.\n\n⚠️ O saque agora está bloqueado em R$ ${metaRolloverFinal.toFixed(2)}\n(Dívida antiga: R$ ${faltaApostar.toFixed(2)} + Nova meta: R$ ${novoRolloverGerado.toFixed(2)}).`);
                document.getElementById('searchInput').value = ''; 
            });
        };

        window.aplicarBonusPrompt = (id, saldoAtual) => {
            let u = usersDataGlobal[id] || {};
            let metaAntiga = parseFloat(u.rollover_meta || 0);
            let atualAntigo = parseFloat(u.rollover_atual || 0);
            let faltaApostar = metaAntiga - atualAntigo;
            if(faltaApostar < 0) faltaApostar = 0;

            let valorStr = prompt(`ATIVAR BÔNUS 100% PARA ${id}\n\nO bônus dobra o valor digitado e cria uma meta de 3x.\nRollover Pendente: R$ ${faltaApostar.toFixed(2)}\n\nDigite o valor do NOVO DEPÓSITO:`, "20.00");
            if(valorStr === null || valorStr === "") return;
            
            let valorDepositado = parseFloat(valorStr.replace(',','.'));
            if(isNaN(valorDepositado) || valorDepositado <= 0) return alert("Valor inválido.");

            let bancaTotalRecebida = valorDepositado * 2;
            let novoSaldo = parseFloat(saldoAtual) + bancaTotalRecebida;
            let novoRolloverGerado = bancaTotalRecebida * 3;
            let metaRolloverFinal = faltaApostar + novoRolloverGerado;

            update(ref(db, `usuarios/${id}`), {
                saldo: parseFloat(novoSaldo.toFixed(2)),
                rollover_meta: metaRolloverFinal,
                rollover_atual: 0,
                bonus_usado: false
            }).then(() => {
                push(ref(db, `usuarios/${id}/transacoes`), { tipo: "BÔNUS VIP 100%", valor: bancaTotalRecebida.toFixed(2), data: new Date().toISOString() });
                alert(`⚡ Bônus ativado com sucesso!\n\nFoi somado R$ ${bancaTotalRecebida.toFixed(2)} ao saldo.\nNova meta de saque total: R$ ${metaRolloverFinal.toFixed(2)}.`);
                document.getElementById('searchInput').value = ''; 
            }).catch(e => alert("Erro ao conectar no banco de dados."));
        };

        window.excluirContaPrompt = (id) => {
            if(confirm(`⚠️ ALERTA VERMELHO!\nTem certeza que deseja APAGAR PERMANENTEMENTE a conta de ${id} e bani-lo do sistema?`)) {
                remove(ref(db, `usuarios/${id}`)).then(() => {
                    set(ref(db, `banidos/${id}`), true).then(() => {
                        alert("Conta apagada e ID bloqueado com sucesso.");
                        document.getElementById('searchInput').value = '';
                    });
                });
            }
        };

        window.desbanirPrompt = () => {
            let idBanido = prompt("Digite o ID (Celular) do jogador que deseja DESBANIR:");
            if (idBanido === null || idBanido.trim() === "") return;

            remove(ref(db, `banidos/${idBanido}`)).then(() => {
                alert(`✅ SUCESSO!\nO número ${idBanido} foi removido da lista negra.\nEle já pode entrar e criar uma nova conta no sistema.`);
            }).catch(() => {
                alert("Erro ao tentar desbanir. Verifique a conexão.");
            });
        };

        window.toggleAdminMode = (id, isCurrentlyAdmin) => {
            let novoModo = isCurrentlyAdmin ? 'normal' : 'influenciador';
            let msg = isCurrentlyAdmin ? 
                `Desativar Modo Admin para ${id}? Ele voltará a perder pelo RTP normal.` : 
                `Ativar Modo Admin/Live para ${id}? O RTP ficará pagando ganhos falsos infinitos para essa conta gravar vídeos.`;
            
            if(confirm(msg)) {
                set(ref(db, `usuarios/${id}/modo`), novoModo).then(() => {
                    document.getElementById('searchInput').value = '';
                });
            }
        };

    </script>
</body>
</html>
