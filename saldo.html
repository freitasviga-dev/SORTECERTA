<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ANTI-CACHE STRICT -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Clear-Site-Data" content="cache">

    <title>SorteCerta - Adicionar Saldo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0c; --bg-card: #18181b;
            --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c;
            --text-main: #f4f4f5; --text-muted: #a1a1aa; --border-color: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

        .header { position: sticky; top: 0; width: 100%; background: rgba(18, 18, 20, 0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 15px; padding-top: calc(15px + env(safe-area-inset-top)); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 20px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .page-title { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
        .balance-badge { background: rgba(46, 204, 113, 0.1); color: var(--green); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 11px; border: 1px solid rgba(46, 204, 113, 0.3); display: flex; align-items: center; gap: 4px; }

        .container { flex: 1; max-width: 600px; margin: 0 auto; padding: 20px 15px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

        .support-banner { background: linear-gradient(135deg, rgba(37, 211, 102, 0.1) 0%, rgba(18, 18, 20, 0.8) 100%); border: 1px solid rgba(37, 211, 102, 0.2); border-radius: 16px; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .support-info { display: flex; align-items: center; gap: 12px; }
        .support-icon { background: #25D366; color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .support-text h4 { font-size: 13px; color: #fff; margin-bottom: 2px; font-weight: 800; }
        .support-text p { font-size: 10px; color: var(--text-muted); }
        .btn-wa { background: #25D366; color: #000; text-decoration: none; font-size: 10px; font-weight: 800; padding: 8px 16px; border-radius: 20px; text-transform: uppercase; }

        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-header { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .sh-icon { background: rgba(46, 204, 113, 0.1); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 18px; }
        .sh-text h3 { font-size: 16px; color: #fff; font-weight: 700; }
        
        .value-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .btn-value { background: #111; border: 1px solid #333; color: var(--text-muted); padding: 16px 0; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-value.active { background: rgba(46, 204, 113, 0.1); border-color: var(--green); color: var(--green); transform: scale(1.03); }
        
        .custom-input-group { position: relative; margin-bottom: 20px; }
        .custom-input-group span { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--green); font-weight: 900; font-size: 20px; }
        .input-custom { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 20px 20px 20px 60px; border-radius: 12px; font-size: 26px; font-weight: 900; outline: none; transition: 0.2s; }
        .input-custom:focus { border-color: var(--green); background: rgba(46, 204, 113, 0.05); }

        /* AVISO DE BÔNUS (COM TRANSIÇÃO SUAVE) */
        .bonus-alert { background: rgba(241, 196, 15, 0.05); border-left: 3px solid var(--gold); padding: 12px 15px; border-radius: 4px; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; }
        .bonus-alert i { font-size: 20px; }
        .bonus-alert p { font-size: 11px; color: #ccc; line-height: 1.4; }

        .btn-submit { width: 100%; background: linear-gradient(180deg, var(--green) 0%, #00b359 100%); color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 0 #145a32; transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-submit:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('usuario_tracker_id')) { window.location.href = 'login.html'; }
        (function() {
            if ('caches' in window) { caches.keys().then(function(names) { for (let name of names) caches.delete(name); }); }
            if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r) { for (let reg of r) reg.unregister(); }); }
        })();
    </script>

    <header class="header">
        <a href="perfil.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="page-title">Caixa SorteCerta</div>
        <div class="balance-badge"><i class="fa-solid fa-wallet"></i> R$ <span id="displaySaldoTop">0,00</span></div>
    </header>

    <div class="container">
        
        <div class="support-banner">
            <div class="support-info">
                <div class="support-icon"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="support-text">
                    <h4>Suporte Financeiro</h4>
                    <p>Atendimento VIP para liberação imediata</p>
                </div>
            </div>
            <a href="#" id="linkSuporteDireto" target="_blank" class="btn-wa">Chamar</a>
        </div>

        <div class="card">
            <div class="section-header">
                <div class="sh-icon"><i class="fa-solid fa-circle-plus"></i></div>
                <div class="sh-text">
                    <h3>Adicionar Saldo</h3>
                    <p>Escolha o valor que deseja depositar na plataforma.</p>
                </div>
            </div>
            
            <div class="value-grid" id="gridBotoes">
                <button class="btn-value" onclick="selecionarValor(30, this)">R$ 30</button>
                <button class="btn-value" onclick="selecionarValor(50, this)">R$ 50</button>
                <button class="btn-value active" onclick="selecionarValor(100, this)">R$ 100</button>
                <button class="btn-value" onclick="selecionarValor(200, this)">R$ 200</button>
                <button class="btn-value" onclick="selecionarValor(500, this)">R$ 500</button>
                <button class="btn-value" onclick="selecionarValor(1000, this)">R$ 1000</button>
            </div>

            <div class="custom-input-group">
                <span>R$</span>
                <input type="number" id="inputValor" class="input-custom" value="100" oninput="limparBotoes()">
            </div>

            <!-- CAIXA DE AVISO (MUDA DINAMICAMENTE) -->
            <div class="bonus-alert" id="avisoBonus">
                <i class="fa-solid fa-circle-info" style="color:var(--gold);"></i>
                <p>O saldo mínimo para depósito é de <strong>R$ 1,00</strong>. Ao continuar, você receberá a chave Pix oficial do financeiro.</p>
            </div>

            <button class="btn-submit" onclick="enviarOrdemDeposito()">
                <i class="fa-brands fa-pix"></i> Solicitar Pagamento PIX
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE OFUSCADO
        const _0x1a2b=["\x41\x49\x7a\x61\x53\x79\x42\x4f\x50\x37\x54\x66\x48\x6a\x41\x32\x6a\x6a\x77\x4a\x76\x57\x61\x62\x37\x32\x5a\x6b\x30\x6a\x66\x77\x35\x55\x39\x6f\x48\x69\x6f","\x68\x74\x74\x70\x73\x3a\x2f\x2f\x73\x6f\x72\x74\x65\x63\x65\x72\x74\x61\x2d\x37\x35\x62\x37\x37\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d","\x73\x6f\x72\x74\x65\x63\x65\x72\x74\x61\x2d\x37\x35\x62\x37\x37"];
        const app = initializeApp({ apiKey: _0x1a2b[0], databaseURL: _0x1a2b[1], projectId: _0x1a2b[2] });
        const db = getDatabase(app);

        const idDispositivo = localStorage.getItem('usuario_tracker_id');
        let bancaAtual = 0.00;
        let missaoAtiva = null; 
        const phoneDestination = "5583996469538";

        // LÓGICA DO INTERRUPTOR (LIGA/DESLIGA O VISUAL DO BÔNUS)
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            document.getElementById('displaySaldoTop').innerText = parseFloat(dados.saldo || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            missaoAtiva = dados.missao_ativa || null;
            const avisoBox = document.getElementById('avisoBonus');

            // Verifica se o Bônus 100% está ativo
            if(missaoAtiva && missaoAtiva.tipo === '100porcento') {
                avisoBox.style.background = 'rgba(155, 81, 224, 0.1)';
                avisoBox.style.borderLeftColor = '#9b51e0';
                avisoBox.innerHTML = `<i class="fa-solid fa-gift" style="color:#9b51e0"></i><p style="color:#fff;"><strong>BÔNUS SUPREMO 100% ATIVADO!</strong> O valor que você escolher depositar será dobrado na hora.</p>`;
            } else {
                // Se ele desativar (cancelar) no perfil, o código entra aqui e restaura a cor normal
                avisoBox.style.background = 'rgba(241, 196, 15, 0.05)';
                avisoBox.style.borderLeftColor = 'var(--gold)';
                avisoBox.innerHTML = `<i class="fa-solid fa-circle-info" style="color:var(--gold);"></i><p>O saldo mínimo para depósito é de <strong>R$ 1,00</strong>. Ao continuar, você receberá a chave Pix oficial do financeiro.</p>`;
            }
        });

        document.getElementById('linkSuporteDireto').href = `https://wa.me/${phoneDestination}?text=Olá,%20estou%20na%20página%20de%20depósito.%20Meu%20ID:%20${idDispositivo}`;

        window.selecionarValor = function(valor, btnElement) {
            document.querySelectorAll('.btn-value').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('inputValor').value = valor;
        }
        window.limparBotoes = function() { document.querySelectorAll('.btn-value').forEach(btn => btn.classList.remove('active')); }

        window.enviarOrdemDeposito = async function() {
            let valorInput = parseFloat(document.getElementById('inputValor').value);
            if(isNaN(valorInput) || valorInput < 1.00) { alert("Valor mínimo de depósito é R$ 1,00."); return; }
            
            // LÓGICA DE METAS DE APOSTAS (ROLLOVER) PARA O SAQUE
            let novaMetaDeAposta = valorInput; // Padrão: Sem bônus, tem que apostar o que depositou
            let msgBonusZap = "NENHUM";

            if (missaoAtiva && missaoAtiva.tipo === '100porcento') {
                // Bônus Supremo: (Depósito x 2) * 2 = Meta
                novaMetaDeAposta = (valorInput * 2) * 2;
                msgBonusZap = "BÔNUS 100% SUPREMO";
            }

            try {
                // 1. Grava a meta no Banco de Dados (Rollover)
                await set(ref(db, 'usuarios/' + idDispositivo + '/rollover_meta'), novaMetaDeAposta);
                await set(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual'), 0);
                
                // 2. Marca o bônus como usado (Isso apaga o painel do perfil para sempre!)
                await set(ref(db, 'usuarios/' + idDispositivo + '/bonus_usado'), true);

                // 3. Limpa a variável de ativação
                if(missaoAtiva) await set(ref(db, 'usuarios/' + idDispositivo + '/missao_ativa'), null);

                // 4. Salva a métrica global de depósitos
                const refTotalDepositos = ref(db, 'sistema/total_depositos');
                get(refTotalDepositos).then((snap) => {
                    let totalAtual = parseFloat(snap.val() || 0);
                    set(refTotalDepositos, totalAtual + valorInput);
                });

                let valorFormatado = valorInput.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                let mensagemComposta = `*⚠️ NOVA INTENÇÃO DE DEPÓSITO VIP*\n\n` +
                                       `👤 *ID:* ${idDispositivo}\n` +
                                       `💰 *Valor Solicitado:* ${valorFormatado}\n` +
                                       `🎁 *Bônus Selecionado:* ${msgBonusZap}\n\n` +
                                       `_Aguardando envio da chave PIX para pagamento._`;
                
                alert("Ordem de depósito gerada! Você será redirecionado para o nosso financeiro.");
                window.location.href = `https://wa.me/${phoneDestination}?text=${encodeURIComponent(mensagemComposta)}`;
            
            } catch (error) {
                alert("Ocorreu um erro ao processar sua solicitação. Tente novamente.");
            }
        }
    </script>
</body>
</html>
