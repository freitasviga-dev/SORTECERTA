<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adicionar Saldo</title>
    <style>
        body {
            background: radial-gradient(circle, #2c0202 0%, #0f0101 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .box-saldo {
            background: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            padding: 30px;
            border-radius: 24px;
            border: 4px solid #ffcc00;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h2 { color: #ffcc00; margin-bottom: 20px; text-transform: uppercase; }

        .id-container {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ffcc00;
            margin-bottom: 20px;
        }

        .id-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .id-valor { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 2px; }

        .btn-voltar {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-voltar:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="box-saldo">
        <h2>Adicionar Saldo</h2>
        <div class="id-container">
            <div class="id-label">SEU ID DE JOGADOR</div>
            <div class="id-valor" id="lblIdUsuario">CARREGANDO...</div>
        </div>
        <p style="font-size: 14px; margin-bottom: 20px;">Entre em contato com o suporte para processar sua recarga informando o ID acima.</p>
        <button class="btn-voltar" onclick="window.history.back()">VOLTAR AO JOGO</button>
    </div>

    <script>
        // Recupera o ID do LocalStorage criado no jogo
        const idSalvo = localStorage.getItem('usuario_tracker_id') || "NÃO ENCONTRADO";
        document.getElementById('lblIdUsuario').innerText = idSalvo;
    </script>
</body>
</html>
