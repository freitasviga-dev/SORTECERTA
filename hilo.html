<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- FORÇAR CARREGAMENTO (ANTI-CACHE EXTREMO) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Clear-Site-Data" content="cache">
    
    <script>
        // BLINDAGEM ANTI-CACHE GRAU MILITAR
        (function() {
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) registration.unregister();
                });
            }
            window.addEventListener('pageshow', function(event) {
                if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                    let urlBase = window.location.href.split('?')[0];
                    window.location.replace(urlBase + '?clear=' + new Date().getTime());
                }
            });
        })();
    </script>
    
    <title>HILO VIP | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* TEMA PREMIUM DARK INDIGO VIP 👑 */
            --bg-top: #2a0a3a; 
            --bg-bottom: #0a0210;
            --panel-bg: #14051c;
            --btn-green: #00e676; --btn-green-dark: #00b359;
            --btn-yellow: #f1c40f;
            --text-light: #ffffff;
            --card-red: #e74c3c; --card-black: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        body { 
            background: radial-gradient(circle at 50% 0%, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-light); min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none;
            align-items: center; justify-content: flex-start;
        }

        #mobile-container {
            width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column;
            position: relative; background: transparent; margin: 0 auto;
        }

        .btn-3d { transition: transform 0.1s ease, box-shadow 0.1s ease; cursor: pointer; }
        .btn-3d:active:not(.disabled) { transform: translateY(4px); box-shadow: none !important; }

        /* TELA INICIAL (TEXTO DOURADO E ÍCONE DE CARTAS) */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05020a; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.3s ease;
        }
        #startScreen h2 {
            color: var(--btn-yellow); text-transform: uppercase; font-weight: 900;
            letter-spacing: 1px; margin-bottom: 30px; font-size: 28px;
            text-shadow: 0 0 20px rgba(241,196,15,0.5); display: flex; align-items: center; gap: 10px;
        }
        .btn-start {
            background: linear-gradient(180deg, var(--btn-green), var(--btn-green-dark)); color: #000;
            padding: 15px 40px; border-radius: 30px; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 230, 118, 0.4);
            font-size: 16px; letter-spacing: 1px;
        }

        /* HEADER PADRONIZADO VIP */
        .header-bar {
            padding: 10px 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            padding-top: calc(10px + env(safe-area-inset-top)); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 16px; font-weight: 900; letter-spacing: 1px; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 6px; }
        .logo-text i { color: var(--btn-yellow); }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* GAME AREA */
        .game-area {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; position: relative; width: 100%; padding-top: 60px; 
        }

        .cards-display { display: flex; gap: 20px; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; }
        
        .hint-icon {
            position: absolute; left: -50px; color: rgba(255,255,255,0.4);
            font-weight: 900; font-size: 14px; display: flex; flex-direction: column;
            align-items: center; background: rgba(0,0,0,0.3); padding: 10px 5px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        /* CARTA PRINCIPAL */
        .card {
            width: 100px; height: 145px; background: #fff; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column;
            padding: 10px; position: relative; overflow: hidden; z-index: 10;
            border: 2px solid #ccc;
        }
        .card.red { color: var(--card-red); }
        .card.black { color: var(--card-black); }
        
        .card .top-left { font-size: 30px; font-weight: 900; line-height: 0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .card .suit-small { font-size: 22px; line-height: 1; }
        .card .suit-big { position: absolute; bottom: -20px; right: -15px; font-size: 90px; opacity: 0.12; line-height: 1; }

        /* EFEITO PISCANTE DE DERROTA */
        .card.lose-flash {
            animation: flashRedBorder 0.4s infinite alternate !important;
            border: 3px solid #ff0000 !important;
            z-index: 50;
        }
        @keyframes flashRedBorder {
            from { box-shadow: 0 0 10px #ff0000, inset 0 0 15px rgba(255,0,0,0.3); transform: scale(1); }
            to { box-shadow: 0 0 35px #ff0000, inset 0 0 25px rgba(255,0,0,0.5); transform: scale(1.05); }
        }

        /* BARALHO 3D VIP */
        .deck-back {
            width: 100px; height: 145px; background: #13041c; 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.05) 5px, rgba(255,255,255,0.05) 10px);
            border: 3px solid #fff; border-radius: 10px; z-index: 5;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 
                1px 1px 0 #ccc, 2px 2px 0 #fff, 
                3px 3px 0 #ccc, 4px 4px 0 #fff, 
                5px 5px 0 #ccc, 6px 6px 0 #fff,
                0 15px 25px rgba(0,0,0,0.8);
        }
        .deck-back::after { content: '♠♥\A♦♣'; white-space: pre-wrap; font-size: 22px; color: rgba(255,255,255,0.2); text-align: center; font-weight: 900; line-height: 1.2;}

        .btn-skip {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 20px; padding: 8px 25px; font-size: 14px; font-weight: bold;
            margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }
        .btn-skip:active { box-shadow: none; transform: translateY(4px); }
        .btn-skip.hidden { display: none; }

        /* PAINEL DE STATUS DA SPRIBE */
        .history-wrapper {
            display: flex;
            width: 90%; max-width: 350px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;
            padding: 6px; gap: 6px; margin-top: 15px;
            animation: popUp 0.3s ease-out; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .history-row {
            flex: 1; display: flex; align-items: center; gap: 8px;
            overflow-x: auto; background: rgba(0, 0, 0, 0.2); border-radius: 8px;
            padding: 5px; height: 55px; scroll-behavior: smooth;
        }
        .history-row::-webkit-scrollbar { display: none; }

        .mini-card-container {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            height: 100%; gap: 1px; animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* INDICADOR DE CHUTE MELHORADO */
        .guess-above {
            height: 16px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8); margin-bottom: 2px; font-weight: bold;
        }
        .guess-above.high { color: #2ecc71; filter: drop-shadow(0 0 2px #2ecc71); }
        .guess-above.low { color: #e74c3c; filter: drop-shadow(0 0 2px #e74c3c); }

        .mini-card {
            min-width: 28px; height: 36px; background: #fff; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        .mini-card.red { color: var(--card-red); }
        .mini-card.black { color: var(--card-black); }
        .mini-card span { font-size: 11px; margin-top: -3px; }

        .history-stats {
            width: 75px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: rgba(0, 0, 0, 0.3); border-radius: 8px;
            height: 55px; gap: 4px; flex-shrink: 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .stat-count { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 6px; }
        .stat-count i { opacity: 0.8; font-size: 12px; }
        .stat-mult { background: var(--btn-green); color: #000; font-size: 12px; font-weight: 900; padding: 2px 8px; border-radius: 10px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px) scale(0.5); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes popUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* OPÇÕES HILO */
        .hilo-options { 
            display: none; 
            gap: 15px; width: 100%; max-width: 320px; justify-content: center; 
            margin-top: auto; 
            margin-bottom: 20px; 
            animation: popUp 0.3s ease-out;
        }
        
        .btn-guess {
            background: rgba(0,0,0,0.5); border: 2px solid transparent;
            color: #fff; border-radius: 15px; padding: 12px 0; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .btn-guess.low { border-color: rgba(231, 76, 60, 0.6); box-shadow: inset 0 2px 10px rgba(231,76,60,0.2), 0 4px 10px rgba(0,0,0,0.5); }
        .btn-guess.high { border-color: rgba(46, 204, 113, 0.6); box-shadow: inset 0 2px 10px rgba(46,204,113,0.2), 0 4px 10px rgba(0,0,0,0.5); }
        .btn-guess:active { transform: scale(0.95); }

        .btn-guess span:first-child { font-size: 18px; margin-bottom: 4px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .btn-guess span:last-child { font-size: 14px; color: var(--btn-yellow); background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 8px; }
        
        .btn-guess.high i { color: #2ecc71; font-size: 20px; }
        .btn-guess.low i { color: #e74c3c; font-size: 20px; }

        /* TOAST DE DERROTA */
        .lose-toast {
            position: absolute; top: 15px; left: 50%; transform: translate(-50%, -20px) scale(0.9);
            background: #e74c3c; color: #fff; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; font-size: 14px; box-shadow: 0 5px 20px rgba(231, 76, 60, 0.6);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; white-space: nowrap;
        }
        .lose-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

        /* POP-UP COMPACTO DE VITÓRIA */
        .win-toast {
            position: absolute; top: 15px; left: 50%; transform: translate(-50%, -20px) scale(0.9);
            background: linear-gradient(135deg, #00e676, #00b359); color: #000; padding: 10px 25px; border-radius: 40px; 
            border: 2px solid #ffffff; box-shadow: 0 10px 30px rgba(0, 230, 118, 0.6);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.5px; }
        .win-toast #winAmount { font-size: 20px; font-weight: 900; color: #000; letter-spacing: -0.5px; }

        /* CONTROLES ESTILO VIP */
        .controls-wrapper {
            width: 100%; background: var(--panel-bg); border-top: 2px solid #230833;
            padding: 15px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); position: relative; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.5); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .bet-label { font-size: 10px; color: #888; font-weight: 800; padding-left: 15px; text-transform: uppercase; pointer-events: none; }
        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 5px 0; border-radius: 10px; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: linear-gradient(180deg, #3d1455, #1d072b); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 0 #0d0214; cursor: pointer; border-bottom: none; transition: 0.1s; }
        .bet-adjust:active { transform: translateY(4px); box-shadow: none; }

        .btn-action {
            width: 100%; border: none; border-radius: 12px; font-weight: 900; font-size: 18px;
            color: #000; text-transform: uppercase; box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 6px 0 #006633, 0 10px 20px rgba(0, 230, 118, 0.4); 
            height: 55px; display: flex; justify-content: center; align-items: center; gap: 10px; border-bottom: none;
            background: linear-gradient(180deg, var(--btn-green), var(--btn-green-dark));
        }
        .btn-action.cashout { background: linear-gradient(180deg, #f1c40f, #d35400); box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 6px 0 #8a3a00, 0 10px 20px rgba(243, 156, 18, 0.4); display: none; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-action.disabled { filter: grayscale(100%); opacity: 0.4; pointer-events: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 5px; }
        .game-name { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; }
        .balance-info { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .balance-info i { color: var(--btn-yellow); font-size: 12px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="startScreen">
        <h2><i class="fa-solid fa-layer-group"></i> HILO VIP</h2>
        <div class="btn-start btn-3d">Jogar Agora</div>
    </div>

    <div id="mobile-container">
        <!-- HEADER PADRONIZADO -->
        <div class="header-bar">
            <div class="btn-back btn-3d" id="btnBack"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="logo-text"><i class="fa-solid fa-layer-group"></i> HILO VIP</div>
            <div class="top-actions">
                <div class="btn-top btn-3d" id="btnAudio"><i class="fa-solid fa-volume-xmark"></i></div>
            </div>
        </div>

        <!-- GAME AREA -->
        <div class="game-area">
            
            <div class="win-toast" id="winToast">
                <span>LUCRO DA SEQUÊNCIA</span>
                <div id="winAmount">R$ 0,00</div>
            </div>

            <!-- TOAST DE DERROTA -->
            <div class="lose-toast" id="loseToast">
                Você Perdeu a Sequência!
            </div>

            <!-- DISPLAY DAS CARTAS -->
            <div class="cards-display">
                <div class="hint-icon"><span>A</span><span>v</span><span>2</span></div>
                <div class="card red" id="currentCard"></div>
                <!-- BARALHO 3D -->
                <div class="deck-back"></div>
            </div>
            
            <button class="btn-skip btn-3d" id="btnSkip" onclick="skipCard()"><i class="fa-solid fa-arrows-rotate"></i> Pular Carta</button>

            <!-- PAINEL DE STATUS -->
            <div class="history-wrapper" id="historyWrapper">
                <div class="history-row" id="historyRow">
                    <!-- Mini-cartas inseridas via JS -->
                </div>
                <div class="history-stats">
                    <div class="stat-count"><i class="fa-solid fa-layer-group"></i> <span id="cardCount">0</span></div>
                    <div class="stat-mult" id="currentMultValue">1.00x</div>
                </div>
            </div>

            <!-- BOTÕES HIGH LOW (COM SÍMBOLO DE IGUAL) -->
            <div class="hilo-options" id="hiloOptions">
                <div class="btn-guess low btn-3d" onclick="makeGuess('low')">
                    <span><i class="fa-solid fa-caret-down"></i><i class="fa-solid fa-equals" style="font-size: 14px; margin-right: 5px;"></i> LOW</span>
                    <span id="multLow">2.10x</span>
                </div>
                <div class="btn-guess high btn-3d" onclick="makeGuess('high')">
                    <span><i class="fa-solid fa-caret-up"></i><i class="fa-solid fa-equals" style="font-size: 14px; margin-right: 5px;"></i> HIGH</span>
                    <span id="multHigh">1.54x</span>
                </div>
            </div>
        </div>

        <!-- CONTROLES ESTILO VIP -->
        <div class="controls-wrapper">
            <div class="bet-input-row">
                <div class="bet-label">Aposta</div>
                <button class="bet-adjust btn-3d" id="btnMinus"><i class="fa-solid fa-minus"></i></button>
                <div class="bet-display" id="displayAposta">R$ 1,00</div>
                <button class="bet-adjust btn-3d" id="btnPlus"><i class="fa-solid fa-plus"></i></button>
            </div>

            <button class="btn-action bet btn-3d" id="btnBet" onclick="startGame()"><i class="fa-solid fa-play"></i> APOSTAR</button>
            <button class="btn-action cashout btn-3d disabled" id="btnCashout" onclick="cashout()"><i class="fa-solid fa-sack-dollar"></i> CASHOUT</button>

            <div class="footer-info">
                <div class="game-name">ORIGINAL <i class="fa-solid fa-clone" style="margin-left: 5px; opacity: 0.5;"></i></div>
                <div class="balance-info">
                    <i class="fa-solid fa-wallet"></i>
                    <span id="displaySaldo">R$ 0,00</span>
                </div>
            </div>
        </div>
    </div>

        const currentMultValue = document.getElementById('currentMultValue');
        const hiloOptions = document.getElementById('hiloOptions');
        const btnSkip = document.getElementById('btnSkip');
        const uiCard = document.getElementById('currentCard');
        const btnCashout = document.getElementById('btnCashout');

        // ==========================================
        // 2. MOTOR DE ÁUDIO NATIVO
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        document.getElementById('startScreen').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => { this.style.display = 'none'; }, 300);
            
            audioLigado = true;
            btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            btnAudio.style.color = '#fff';

            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0; osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.01);
        });

        const tocarSom = (tipo) => {
            if (!audioLigado || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (tipo === 'sfxClick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (tipo === 'sfxCard') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (tipo === 'sfxWin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (tipo === 'sfxLose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ==========================================
        // 3. FIREBASE SYNC & ANTI-FUGA
        // ==========================================
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isPlaying) {
                bancaAtual = parseFloat(dados.saldo || 0);
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                displaySaldo.innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
            modoJogo = String(dados.modo || "normal").toLowerCase();
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        async function lidarComSaidaAbrupta() {
            if (isPlaying) {
                isPlaying = false;
                let cashoutAtual = apostaAtual * currentMultiplier;
                let cashoutReal = cashoutAtual * proporcaoRealNaMesa;
                
                bancaAtual += cashoutAtual; saldoRealAtual += cashoutReal;
                await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });
                
                if (modoJogo !== 'admin' && modoJogo !== 'live') {
                    const snap = await get(ref(db, 'sistema/caixa_global'));
                    await set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) - cashoutReal).toFixed(2)));
                }
            }
        }
        window.addEventListener('pagehide', () => { lidarComSaidaAbrupta(); });
        document.addEventListener('visibilitychange', function() { if (document.hidden) lidarComSaidaAbrupta(); });

        btnBack.addEventListener('click', async () => {
            tocarSom('sfxClick'); await lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        });

        btnAudio.addEventListener('click', () => {
            audioLigado = !audioLigado; 
            if(audioLigado) { 
                if (audioCtx.state === 'suspended') audioCtx.resume();
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btnAudio.style.color = '#fff'; tocarSom('sfxClick');
            } else { 
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btnAudio.style.color = '#888'; 
            }
        });

        // ==========================================
        // 4. LÓGICA DO HILO VIP
        // ==========================================
        const RTP = 0.97;
        const suits = [
            { name: 'hearts', symbol: '♥', color: 'red' },
            { name: 'diamonds', symbol: '♦', color: 'red' },
            { name: 'clubs', symbol: '♣', color: 'black' },
            { name: 'spades', symbol: '♠', color: 'black' }
        ];

        let isPlaying = false;
        let currentMultiplier = 1.00;
        let activeCard = null;
        let cardsGuessed = 0;

        function formatCard(rank, suit) {
            let visual = rank.toString();
            if(rank === 11) visual = 'J';
            if(rank === 12) visual = 'Q';
            if(rank === 13) visual = 'K';
            if(rank === 14) visual = 'A';
            return { rank, visual, suit };
        }

        function getRandomCard() {
            let rank = Math.floor(Math.random() * 13) + 2;
            let suit = suits[Math.floor(Math.random() * suits.length)];
            return formatCard(rank, suit);
        }

        function getLosingCard(type, currentRank) {
            let possibleRanks = [];
            // Para perder: 
            // Se chutou HIGH (alto ou igual), a carta tem que ser ESTRITAMENTE menor.
            // Se chutou LOW (baixo ou igual), a carta tem que ser ESTRITAMENTE maior.
            if (type === 'high') { for(let i=2; i < currentRank; i++) possibleRanks.push(i); } 
            else { for(let i=currentRank + 1; i <= 14; i++) possibleRanks.push(i); }
            
            if (possibleRanks.length === 0) return getRandomCard(); 
            let rank = possibleRanks[Math.floor(Math.random() * possibleRanks.length)];
            let suit = suits[Math.floor(Math.random() * suits.length)];
            return formatCard(rank, suit);
        }

        function renderCard(cardData) {
            tocarSom('sfxCard');
            uiCard.classList.remove('lose-flash');
            
            uiCard.style.transition = 'none'; 
            uiCard.style.transform = 'translateX(120px)'; 
            uiCard.style.opacity = '0';
            
            uiCard.className = `card ${cardData.suit.color}`;
            uiCard.innerHTML = `
                <div class="top-left">${cardData.visual}<br><span class="suit-small">${cardData.suit.symbol}</span></div>
                <div class="suit-big">${cardData.suit.symbol}</div>
            `;
            
            void uiCard.offsetWidth;
            
            uiCard.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease-out, border 0.2s, box-shadow 0.2s';
            uiCard.style.transform = 'translateX(0)';
            uiCard.style.opacity = '1';
        }

        // ADICIONA INDICADOR VISUAL CLARO SE FOI HIGH OU LOW
        function addCardToHistory(cardData, guessType = null) {
            const container = document.createElement('div');
            container.className = 'mini-card-container';
            
            let guessHtml = `<div class="guess-above"></div>`;
            if (guessType === 'high') {
                guessHtml = `<div class="guess-above high"><i class="fa-solid fa-arrow-up"></i><i class="fa-solid fa-equals" style="font-size:10px;"></i></div>`;
            } else if (guessType === 'low') {
                guessHtml = `<div class="guess-above low"><i class="fa-solid fa-arrow-down"></i><i class="fa-solid fa-equals" style="font-size:10px;"></i></div>`;
            }

            container.innerHTML = `
                ${guessHtml}
                <div class="mini-card ${cardData.suit.color}">
                    ${cardData.visual}<span>${cardData.suit.symbol}</span>
                </div>
            `;

            historyRow.appendChild(container);
            historyRow.scrollLeft = historyRow.scrollWidth;
        }

        window.skipCard = function() {
            if(isPlaying) return;
            tocarSom('sfxClick');
            activeCard = getRandomCard();
            renderCard(activeCard);
            historyRow.innerHTML = '';
            addCardToHistory(activeCard);
        }

        function calculateMultipliers() {
            let rank = activeCard.rank;
            
            // Probabilidade inclui a carta IGUAL (13 possibilidades totais, mas as vezes repete)
            let pHigh = (15 - rank) / 13;
            let pLow = rank / 13; // Ajustado para incluir o igual com mais justiça

            let multHigh = Math.max(1.01, RTP / pHigh);
            let multLow = Math.max(1.01, RTP / pLow);

            // Trava as casas decimais na interface
            document.getElementById('multHigh').innerText = multHigh.toFixed(2) + "x";
            document.getElementById('multLow').innerText = multLow.toFixed(2) + "x";

            return { multHigh, multLow };
        }

        // ==========================================
        // 5. CONTROLES DE APOSTA
        // ==========================================
        displayAposta.addEventListener('click', () => {
            if(isPlaying) return;
            tocarSom('sfxClick');
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                }
            }
        });

        document.getElementById('btnMinus').addEventListener('click', () => {
            if(isPlaying) return; tocarSom('sfxClick');
            let novoIndex = indexAposta - 1;
            if(novoIndex >= 0) { indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta]; displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        });
        document.getElementById('btnPlus').addEventListener('click', () => {
            if(isPlaying) return; tocarSom('sfxClick');
            let novoIndex = indexAposta + 1;
            if(novoIndex < apostasPermitidas.length) { indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta]; displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        });

        // ==========================================
        // 6. MOTOR DE JOGO (ANTI-QUEBRA & PROPORÇÃO)
        // ==========================================
        window.startGame = async function() {
            tocarSom('sfxClick');
            if (apostaAtual > bancaAtual) { 
                loseToast.innerText = "Saldo insuficiente!";
                loseToast.classList.add('show');
                setTimeout(() => loseToast.classList.remove('show'), 2000);
                return; 
            }

            uiCard.classList.remove('lose-flash');

            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;
            let apostaReal = apostaAtual * proporcaoRealNaMesa;

            bancaAtual -= apostaAtual; saldoRealAtual -= apostaReal;
            displaySaldo.innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });
            
            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                get(ref(db, `usuarios/${idDispositivo}/rollover_atual`)).then(snap => {
                    set(ref(db, `usuarios/${idDispositivo}/rollover_atual`), parseFloat((snap.val() || 0)) + apostaAtual);
                });

                let snapCaixa = await get(ref(db, 'sistema/caixa_global'));
                await set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snapCaixa.val() || 0) + apostaReal).toFixed(2)));
            }

            isPlaying = true;
            currentMultiplier = 1.00;
            cardsGuessed = 0;
            
            historyRow.innerHTML = '';
            addCardToHistory(activeCard); 
            cardCountElement.innerText = cardsGuessed;
            currentMultValue.innerText = "1.00x";
            
            document.getElementById('btnBet').style.display = 'none';
            
            // TRAVA O BOTÃO DE SAQUE PARA EXIGIR PELO MENOS 1 CHUTE
            btnCashout.style.display = 'flex';
            btnCashout.classList.add('disabled');
            
            btnSkip.classList.add('hidden');
            hiloOptions.style.display = 'flex'; 
            
            document.getElementById('btnMinus').style.opacity = '0.5';
            document.getElementById('btnPlus').style.opacity = '0.5';

            updateGameState();
        }

        function updateGameState() {
            calculateMultipliers();
            currentMultValue.innerText = currentMultiplier.toFixed(2) + "x"; 
            
            let winAmount = apostaAtual * currentMultiplier;
            btnCashout.innerHTML = `<i class="fa-solid fa-sack-dollar"></i> CASHOUT R$ ${winAmount.toFixed(2)}`;
        }

        window.makeGuess = function(type) {
            if(!isPlaying) return;
            
            let mults = calculateMultipliers();
            let nextMult = type === 'high' ? mults.multHigh : mults.multLow;
            let potentialWin = apostaAtual * currentMultiplier * nextMult;
            let potentialWinReal = potentialWin * proporcaoRealNaMesa;

            let forceLose = false;

            // Manipulação SorteCerta Anti-Quebra
            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                if (potentialWinReal > (caixaDaCasa * RTP)) { forceLose = true; }
            }

            let nextCard;
            if (forceLose) {
                nextCard = getLosingCard(type, activeCard.rank);
            } else {
                nextCard = getRandomCard();
            }

            let isWin = false;
            // REGRA CORRIGIDA: Alto ou igual ganha, baixo ou igual ganha
            if (type === 'high' && nextCard.rank >= activeCard.rank) isWin = true;
            if (type === 'low' && nextCard.rank <= activeCard.rank) isWin = true;

            renderCard(nextCard);

            if(isWin) {
                currentMultiplier *= nextMult;
                activeCard = nextCard;
                
                cardsGuessed++;
                cardCountElement.innerText = cardsGuessed;
                addCardToHistory(activeCard, type); 
                
                // LIBERA O BOTÃO DE SAQUE APÓS O PRIMEIRO ACERTO
                btnCashout.classList.remove('disabled');

                updateGameState();
            } else {
                isPlaying = false;
                tocarSom('sfxLose');
                
                loseToast.innerText = "Você Perdeu a Sequência!";
                loseToast.classList.add('show');
                uiCard.classList.add('lose-flash');
                
                hiloOptions.style.display = 'none';
                btnCashout.style.display = 'none';
                
                addCardToHistory(nextCard, type); 
                
                setTimeout(() => {
                    uiCard.classList.remove('lose-flash');
                    loseToast.classList.remove('show');
                    
                    resetGame();
                    activeCard = getRandomCard();
                    renderCard(activeCard);
                    historyRow.innerHTML = '';
                    addCardToHistory(activeCard);
                    cardCountElement.innerText = "0";
                    currentMultValue.innerText = "1.00x";
                }, 2500);
            }
        }

        window.cashout = async function() {
            if(!isPlaying || cardsGuessed === 0) return; // Segurança dupla
            isPlaying = false; 
            
            let winAmount = apostaAtual * currentMultiplier;
            let winReal = winAmount * proporcaoRealNaMesa;
            
            bancaAtual += winAmount; saldoRealAtual += winReal;

            let snapshot = await get(ref(db, `usuarios/${idDispositivo}`));
            let u = snapshot.val() || {};
            if (parseFloat(u.rollover_meta || 0) > 0 && parseFloat(u.rollover_atual || 0) >= parseFloat(u.rollover_meta || 0)) { saldoRealAtual = bancaAtual; }

            await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });
            
            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                get(ref(db, 'sistema/caixa_global')).then(async snap => {
                    let cx = parseFloat(snap.val() || 0);
                    await set(ref(db, 'sistema/caixa_global'), parseFloat((cx - winReal).toFixed(2)));
                });
            }

            tocarSom('sfxWin');
            
            // EXIBIÇÃO NO TOAST ESTÁ AQUI - REPARADA!
            winAmountDisplay.innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            winToast.classList.add('show');
            
            hiloOptions.style.display = 'none';
            btnCashout.style.display = 'none';

            setTimeout(() => {
                winToast.classList.remove('show');
                resetGame();
                activeCard = getRandomCard();
                renderCard(activeCard);
                historyRow.innerHTML = '';
                addCardToHistory(activeCard);
                cardCountElement.innerText = "0";
                currentMultValue.innerText = "1.00x";
            }, 2500);
        }

        function resetGame() {
            isPlaying = false;
            currentMultiplier = 1.00;
            cardsGuessed = 0;
            
            document.getElementById('btnBet').style.display = 'flex';
            btnCashout.style.display = 'none';
            btnSkip.classList.remove('hidden');
            
            hiloOptions.style.display = 'none';
            
            document.getElementById('btnMinus').style.opacity = '1';
            document.getElementById('btnPlus').style.opacity = '1';
        }

        // Boot
        activeCard = getRandomCard();
        renderCard(activeCard);
        historyRow.innerHTML = '';
        addCardToHistory(activeCard);

    </script>
</body>
</html>
