<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SorteCerta - Aviator Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: #121214;
            --red-crash: #e74c3c;
            --green-win: #2ecc71;
            --text-main: #f4f4f5;
            --text-muted: #8b8b93;
            --gold: #f1c40f;
            --blue-mult: #3498db;
            --purple-mult: #9b59b6;
            --pink-mult: #e84393;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: manipulation; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { width: 100%; background: rgba(18, 18, 20, 0.95); border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; z-index: 100; }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 18px; }
        .logo-aviator { font-weight: 900; color: #e74c3c; font-style: italic; letter-spacing: 1px; font-size: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .balance-badge { background: rgba(0, 230, 118, 0.1); color: var(--green-win); padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 13px; border: 1px solid var(--green-win); cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .game-container { width: 100%; max-width: 500px; padding: 10px; display: flex; flex-direction: column; gap: 10px; height: calc(100vh - 60px); }

        /* HISTÓRICO DE RESULTADOS (MELHORADO) */
        .history-wrapper { background: var(--bg-card); border-radius: 12px; padding: 8px; border: 1px solid #27272a; display: flex; align-items: center; }
        .history-icon { color: var(--text-muted); font-size: 14px; margin-right: 10px; padding-right: 10px; border-right: 1px solid #333; }
        .crash-history { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; align-items: center; }
        .crash-history::-webkit-scrollbar { display: none; }
        .history-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 900; white-space: nowrap; background: rgba(0,0,0,0.5); }
        .history-badge.blue { color: var(--blue-mult); border: 1px solid rgba(52,152,219,0.3); }
        .history-badge.purple { color: var(--purple-mult); border: 1px solid rgba(155,89,182,0.3); }
        .history-badge.pink { color: var(--pink-mult); border: 1px solid rgba(232,67,147,0.3); }

        /* TELA DE VOO (CANVAS ANIMADO) */
        .flight-screen { background: #0a0a0c; border: 2px solid #27272a; border-radius: 16px; width: 100%; flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        
        .graph-curve { position: absolute; bottom: -50px; left: -50px; width: 200%; height: 200%; border-radius: 50%; border: 4px solid #e74c3c; opacity: 0; transition: transform 0.1s linear; transform-origin: bottom left; box-shadow: 0 0 20px rgba(231, 76, 60, 0.4); }
        .plane-icon { position: absolute; font-size: 45px; color: #e74c3c; z-index: 10; opacity: 0; transition: transform 0.1s linear; filter: drop-shadow(0 4px 10px rgba(231,76,60,0.6)); }
        
        /* Fundo animado */
        .stars { position: absolute; top: 0; left: 0; width: 200%; height: 100%; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; }
        .stars.moving { animation: moveStars 8s linear infinite; }

        /* Multiplicador Central */
        .multiplier-display { z-index: 20; text-align: center; }
        .multiplier-text { font-size: 65px; font-weight: 900; color: #fff; font-family: 'Arial Black', sans-serif; transition: 0.2s; letter-spacing: -2px; }
        .status-text { font-size: 14px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: -10px; }

        .flew-away .multiplier-text { color: var(--red-crash); animation: shake 0.4s; }
        .flew-away .status-text { color: var(--red-crash); }
        .flew-away .graph-curve { border-color: #555; box-shadow: none; }
        
        .waiting-text { font-size: 24px; color: var(--gold); font-weight: bold; animation: pulse 1s infinite; display: none; }

        /* CONTROLES DE APOSTA */
        .control-panel { background: var(--bg-card); border: 1px solid #27272a; border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .bet-inputs { display: flex; justify-content: space-between; align-items: center; background: #000; border-radius: 12px; border: 1px solid #333; padding: 5px; }
        .btn-adjust { background: #1a1a1e; border: none; color: var(--text-muted); width: 45px; height: 45px; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-adjust:active { background: #333; transform: scale(0.9); }
        .bet-amount-input { background: transparent; border: none; color: #fff; font-size: 24px; font-weight: 900; text-align: center; width: 100%; outline: none; }

        .bet-chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .chip { background: #1a1a1e; border: 1px solid #333; color: var(--text-muted); border-radius: 8px; padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.1s; }
        .chip:active { background: #333; border-color: var(--gold); color: var(--gold); }

        /* BOTÃO GIGANTE */
        .btn-action { width: 100%; height: 75px; border-radius: 16px; border: none; color: #fff; font-size: 26px; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-action:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.4); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-bet { background: linear-gradient(180deg, #2ecc71, #27ae60); box-shadow: 0 6px 0 #145a32; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .btn-cashout { background: linear-gradient(180deg, #e67e22, #d35400); box-shadow: 0 6px 0 #873600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .btn-cancel { background: linear-gradient(180deg, #e74c3c, #c0392b); box-shadow: 0 6px 0 #7b241c; }
        .btn-subtext { font-size: 13px; font-weight: bold; opacity: 0.9; margin-top: 2px; }

        /* NOTIFICAÇÃO SAQUE */
        .win-notification { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(46, 204, 113, 0.95); border: 2px solid #fff; color: #fff; padding: 12px 25px; border-radius: 30px; font-weight: 900; font-size: 18px; z-index: 100; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.6); white-space: nowrap; text-align: center; }

        @keyframes moveStars { from { transform: translateX(0) translateY(0); } to { transform: translateX(-50px) translateY(50px); } }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1.02); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -60px); opacity: 0; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo-aviator"><i class="fa-solid fa-plane-up"></i> Aviator</div>
        <div class="balance-badge" onclick="window.location.href='saldo.html'">
            <i class="fa-solid fa-wallet"></i> <span id="displaySaldoTop">R$ 0,00</span>
        </div>
    </header>

    <div class="game-container">
        
        <div class="history-wrapper">
            <div class="history-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <div class="crash-history" id="historyBar">
                </div>
        </div>

        <div class="flight-screen" id="flightScreen">
            <div class="stars" id="bgStars"></div>
            
            <div class="graph-curve" id="graphCurve"></div>
            <i class="fa-solid fa-plane plane-icon" id="planeIcon"></i>
            
            <div class="multiplier-display" id="multiplierContainer">
                <div class="waiting-text" id="waitingText">AGUARDANDO...</div>
                <div id="activeMultiplierBox" style="display:none;">
                    <div class="multiplier-text" id="txtMultiplier">1.00x</div>
                    <div class="status-text" id="txtStatus">Voando</div>
                </div>
            </div>

            <div class="win-notification" id="winNotification">Sacou!<br>R$ 0,00</div>
        </div>

        <div class="control-panel">
            <div class="bet-inputs">
                <button class="btn-adjust" onclick="adjustBet(-1)">-</button>
                <input type="number" class="bet-amount-input" id="inputBet" value="1.00" step="1.00" min="1.00">
                <button class="btn-adjust" onclick="adjustBet(1)">+</button>
            </div>
            
            <div class="bet-chips">
                <button class="chip" onclick="setBet(5)">R$ 5</button>
                <button class="chip" onclick="setBet(10)">R$ 10</button>
                <button class="chip" onclick="setBet(20)">R$ 20</button>
                <button class="chip" onclick="setBet(50)">R$ 50</button>
            </div>

            <button class="btn-action btn-bet" id="btnMainAction" onclick="handleMainAction()">
                <span id="btnMainText">APOSTAR</span>
                <span class="btn-subtext" id="btnSubText">R$ 1.00</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let idDispositivo = localStorage.getItem('usuario_tracker_id') || 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
        let bancaAtual = 0.00;
        let caixaDaCasa = 0.00;
        let margemLucro = 0.30;
        let modoJogo = "normal";
        let estadoSequencia = 0;
        let valorPremioForcado = 0;
        
        let gameState = 'idle'; // idle, betting, flying, crashed
        let currentBet = 1.00;
        let activeBetAmount = 0;
        let multiplier = 1.00;
        let crashPoint = 1.00;
        
        let flightInterval;
        let flightTime = 0;
        let hasCashedOut = false;
        let historyArray = [1.24, 2.50, 1.05, 12.40, 1.10]; // Histórico inicial

        // AUDIO CONTEXT
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let engineOscillator;

        // UI ELEMENTS
        const btnMain = document.getElementById('btnMainAction');
        const txtMultiplier = document.getElementById('txtMultiplier');
        const flightScreen = document.getElementById('flightScreen');
        const plane = document.getElementById('planeIcon');
        const curve = document.getElementById('graphCurve');

        // INIT & FIREBASE SYNC
        initHistory();
        
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                if (gameState === 'idle' || gameState === 'crashed') bancaAtual = parseFloat(dados.saldo || 0);
                if (estadoSequencia !== 3) modoJogo = String(dados.modo || "normal").toLowerCase();
                
                let isca = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                if (isca > 0 && estadoSequencia === 0) {
                    valorPremioForcado = isca; estadoSequencia = 1;
                    set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0);
                }
            }
            updateBalanceUI();
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        function updateBalanceUI() { document.getElementById('displaySaldoTop').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

        // INPUTS
        window.adjustBet = (dir) => { if(gameState === 'flying') return; let val = parseFloat(document.getElementById('inputBet').value) + dir; setBet(Math.max(1, val)); }
        window.setBet = (val) => { if(gameState === 'flying') return; currentBet = val; document.getElementById('inputBet').value = currentBet.toFixed(2); document.getElementById('btnSubText').innerText = "R$ " + currentBet.toFixed(2); }
        document.getElementById('inputBet').addEventListener('input', (e) => { let v = parseFloat(e.target.value); if(!isNaN(v) && v > 0) setBet(v); });

        // AÇÃO DO BOTÃO PRINCIPAL
        window.handleMainAction = () => {
            if (!audioCtx) audioCtx = new AudioContext();

            if (gameState === 'idle' || gameState === 'crashed') {
                if (bancaAtual < currentBet) return alert("Saldo Insuficiente!");
                
                bancaAtual -= currentBet; activeBetAmount = currentBet;
                set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
                set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa + currentBet).toFixed(2)));
                updateBalanceUI();
                prepareRound();
            } 
            else if (gameState === 'betting') {
                bancaAtual += activeBetAmount;
                set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
                set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa - activeBetAmount).toFixed(2)));
                resetUI();
            } 
            else if (gameState === 'flying' && !hasCashedOut) {
                processCashout();
            }
        }

        // MAQUINA DE ESTADOS E RTP
        function prepareRound() {
            gameState = 'betting'; hasCashedOut = false;
            btnMain.className = 'btn-action btn-cancel';
            document.getElementById('btnMainText').innerText = "CANCELAR";
            
            flightScreen.classList.remove('flew-away');
            document.getElementById('activeMultiplierBox').style.display = 'none';
            document.getElementById('waitingText').style.display = 'block';
            plane.style.opacity = '0'; curve.style.opacity = '0';
            plane.className = 'fa-solid fa-plane plane-icon'; // Reset icon se explodiu antes

            generateCrashPoint();
            setTimeout(startFlight, 3000);
        }

        function generateCrashPoint() {
            if (estadoSequencia === 1 && valorPremioForcado > 0) {
                let target = valorPremioForcado / activeBetAmount;
                crashPoint = target + (Math.random() * 2); 
                estadoSequencia = 3; set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo'); return;
            }
            if (modoJogo === 'agressivo' || estadoSequencia === 3) {
                if (Math.random() < 0.70) { crashPoint = 1.00; return; }
                crashPoint = 1.01 + (Math.random() * 0.25); return;
            }
            if (Math.random() < 0.05) { crashPoint = 1.00; return; }

            let rawCrash = 1.01 / (1 - Math.random());
            let maxPaga = caixaDaCasa * (1 - margemLucro);
            let maxMult = maxPaga / activeBetAmount;

            if (rawCrash > maxMult) crashPoint = Math.max(1.05, maxMult * Math.random());
            else if (modoJogo === 'desfarcado' && rawCrash > 4.00) crashPoint = 1.10 + (Math.random() * 2);
            else crashPoint = rawCrash;

            crashPoint = parseFloat(crashPoint.toFixed(2));
        }

        function startFlight() {
            gameState = 'flying'; multiplier = 1.00; flightTime = 0;

            document.getElementById('waitingText').style.display = 'none';
            document.getElementById('activeMultiplierBox').style.display = 'block';
            document.getElementById('txtStatus').innerText = "Voando";
            document.getElementById('bgStars').classList.add('moving');

            plane.style.opacity = '1'; curve.style.opacity = '1';
            plane.style.transform = 'none'; // reset pos
            
            btnMain.className = 'btn-action btn-cashout';
            document.getElementById('btnMainText').innerText = "SACAR";
            updateCashoutBtn();

            if (crashPoint <= 1.00) return triggerCrash();

            startEngineSound();

            flightInterval = setInterval(() => {
                flightTime += 50; 
                multiplier = Math.pow(Math.E, 0.00006 * flightTime);

                // Aumenta o pitch do motor
                if(engineOscillator && audioCtx) {
                    engineOscillator.frequency.value = 80 + (multiplier * 15);
                }

                if (multiplier >= crashPoint) {
                    multiplier = crashPoint;
                    triggerCrash();
                } else {
                    txtMultiplier.innerText = multiplier.toFixed(2) + "x";
                    if(!hasCashedOut) updateCashoutBtn();
                    animatePlaneVisuals(multiplier);
                }
            }, 50);
        }

        function animatePlaneVisuals(mult) {
            // Curva e posição suavizada
            let prog = Math.min((mult - 1) / 3, 1);
            let pX = prog * 100; // translate X
            let pY = prog * -100; // translate Y
            plane.style.transform = `translate(${pX}px, ${pY}px) rotate(${prog * -15}deg)`;
            curve.style.transform = `scale(${0.1 + (prog * 1.5)})`;
        }

        function updateCashoutBtn() { document.getElementById('btnSubText').innerText = "R$ " + (activeBetAmount * multiplier).toFixed(2); }

        // ===============================================
        // REGRA DE OURO: SAQUE E O EXPLOSÃO EM 2 SEGUNDOS
        // ===============================================
        function processCashout() {
            hasCashedOut = true;
            let winAmount = parseFloat((activeBetAmount * multiplier).toFixed(2));
            
            // Paga o jogador e desconta do cofre real
            bancaAtual += winAmount;
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            set(ref(db, 'sistema/caixa_global'), parseFloat(Math.max(0, caixaDaCasa - winAmount).toFixed(2)));
            updateBalanceUI();

            playCashoutSound();
            showWinNotification(winAmount, multiplier);

            // Interface do botão muda para aguarde
            btnMain.className = 'btn-action btn-bet';
            btnMain.disabled = true;
            document.getElementById('btnMainText').innerText = "AGUARDE...";
            document.getElementById('btnSubText').innerText = "";

            // RECALCULA O CRASH PARA DAQUI A EXATAMENTE 2 SEGUNDOS (FOMO)
            let timeIn2Sec = flightTime + 2000;
            let newCrashMult = Math.pow(Math.E, 0.00006 * timeIn2Sec);
            crashPoint = parseFloat(newCrashMult.toFixed(2)); 
            // O loop principal continua rodando até atingir esse novo crashPoint!
        }

        function triggerCrash() {
            clearInterval(flightInterval);
            gameState = 'crashed';
            stopEngineSound();
            playExplosionSound();
            
            flightScreen.classList.add('flew-away');
            txtMultiplier.innerText = crashPoint.toFixed(2) + "x";
            document.getElementById('txtStatus').innerText = "EXPLODIU!";
            document.getElementById('bgStars').classList.remove('moving');
            
            // Efeito visual de explosão
            plane.className = 'fa-solid fa-burst plane-icon';
            plane.style.transform += ' scale(1.5)';
            setTimeout(() => { plane.style.opacity = '0'; }, 300);

            addToHistory(crashPoint);
            
            setTimeout(resetUI, 3000);
        }

        // ===============================================
        // INTERFACE E ÁUDIO
        // ===============================================
        function showWinNotification(amount, mult) {
            const notif = document.getElementById('winNotification');
            notif.innerHTML = `SACOU <b>${mult.toFixed(2)}x</b><br>R$ ${amount.toFixed(2)}`;
            notif.style.display = 'block';
            notif.style.animation = 'floatUp 2s forwards';
            setTimeout(() => { notif.style.display = 'none'; notif.style.animation = ''; }, 2000);
        }

        function initHistory() { historyArray.forEach(m => renderHistoryPill(m)); }
        
        function addToHistory(mult) {
            historyArray.push(mult);
            if(historyArray.length > 15) historyArray.shift();
            const bar = document.getElementById('historyBar');
            bar.innerHTML = '';
            historyArray.forEach(m => renderHistoryPill(m));
        }

        function renderHistoryPill(mult) {
            const bar = document.getElementById('historyBar');
            const el = document.createElement('div');
            el.className = 'history-badge ' + (mult < 2 ? 'blue' : (mult < 10 ? 'purple' : 'pink'));
            el.innerText = mult.toFixed(2) + "x";
            bar.prepend(el); // Mais recentes primeiro
        }

        function resetUI() {
            gameState = 'idle'; hasCashedOut = false;
            btnMain.disabled = false;
            btnMain.className = 'btn-action btn-bet';
            document.getElementById('btnMainText').innerText = "APOSTAR";
            document.getElementById('btnSubText').innerText = "R$ " + currentBet.toFixed(2);
            
            plane.className = 'fa-solid fa-plane plane-icon'; // Volta o avião
            plane.style.transform = "none";
            curve.style.opacity = '0';
        }

        // --- SISTEMA SONORO PROFISSIONAL ---
        function startEngineSound() {
            if(!audioCtx) return;
            try {
                engineOscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                engineOscillator.type = 'sawtooth';
                engineOscillator.frequency.value = 80; // Graves
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                engineOscillator.connect(gain); gain.connect(audioCtx.destination);
                engineOscillator.start();
            } catch(e){}
        }

        function stopEngineSound() {
            if(engineOscillator) { try { engineOscillator.stop(); engineOscillator.disconnect(); } catch(e){} }
        }

        function playCashoutSound() {
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'square';
                o.frequency.setValueAtTime(600, audioCtx.currentTime);
                o.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            } catch(e){}
        }

        function playExplosionSound() {
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(100, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.8);
                g.gain.setValueAtTime(0.4, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.8);
            } catch(e){}
        }
    </script>
</body>
</html>
