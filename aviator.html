<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- FORÇAR CARREGAMENTO (ANTI-CACHE EXTREMO) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Clear-Site-Data" content="cache">
    
    <script>
        // BLINDAGEM ANTI-CACHE GRAU MILITAR
        (function() {
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) registration.unregister();
                });
            }
            window.addEventListener('pageshow', function(event) {
                if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                    let urlBase = window.location.href.split('?')[0];
                    window.location.replace(urlBase + '?clear=' + new Date().getTime());
                }
            });
        })();
    </script>
    
    <title>Hi Lo VIP | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-top: #184b9e;
            --bg-bottom: #0d2b5e;
            --panel-bg: #0c1f45;
            --btn-green: #00e676;
            --btn-green-dark: #00b359;
            --btn-yellow: #f1c40f;
            --btn-yellow-dark: #b8860b;
            --btn-red: #e74c3c;
            --btn-red-dark: #c0392b;
            --text-light: #ffffff;
            --card-red: #e74c3c;
            --card-black: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        body { 
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-light); min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none;
            align-items: center; justify-content: flex-start;
        }

        #mobile-container {
            width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column;
            position: relative; background: transparent; margin: 0 auto;
        }

        .btn-3d { transition: transform 0.1s ease, box-shadow 0.1s ease; cursor: pointer; }
        .btn-3d:active:not(.disabled) { transform: translateY(4px); box-shadow: none !important; }

        /* TELA INICIAL (DESBLOQUEIO DE ÁUDIO) */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.3s ease;
        }
        #startScreen h2 {
            color: var(--btn-green); text-transform: uppercase; font-weight: 900;
            letter-spacing: 1px; margin-bottom: 30px; font-size: 28px;
            text-shadow: 0 0 15px rgba(0,230,118,0.5);
        }
        .btn-start {
            background: linear-gradient(180deg, var(--btn-green), var(--btn-green-dark)); color: #000;
            padding: 15px 40px; border-radius: 30px; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 230, 118, 0.4);
            font-size: 16px; letter-spacing: 1px;
        }

        /* HEADER PADRONIZADO VIP */
        .header-bar {
            padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            padding-top: calc(10px + env(safe-area-inset-top)); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 16px; font-weight: 900; letter-spacing: 1px; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* GAME AREA */
        .game-area {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative; gap: 20px; width: 100%;
        }

        .cards-display { display: flex; gap: 20px; align-items: center; justify-content: center; position: relative; }
        
        .hint-icon {
            position: absolute; left: -50px; color: rgba(255,255,255,0.4);
            font-weight: 900; font-size: 14px; display: flex; flex-direction: column;
            align-items: center; background: rgba(0,0,0,0.2); padding: 10px 5px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* CARTAS LUXO */
        .card {
            width: 100px; height: 145px; background: #fff; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            padding: 10px; position: relative; overflow: hidden; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #ccc;
        }
        .card.red { color: var(--card-red); }
        .card.black { color: var(--card-black); }
        
        .card .top-left { font-size: 30px; font-weight: 900; line-height: 0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .card .suit-small { font-size: 22px; line-height: 1; }
        .card .suit-big { position: absolute; bottom: -20px; right: -15px; font-size: 90px; opacity: 0.12; line-height: 1; }

        .deck-back {
            width: 90px; height: 135px; background: #0c1f45;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.05) 5px, rgba(255,255,255,0.05) 10px);
            border: 5px solid #fff; border-radius: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .deck-back::after { content: '♠♥\A♦♣'; white-space: pre-wrap; font-size: 20px; color: rgba(255,255,255,0.2); text-align: center; font-weight: 900; line-height: 1.2;}

        /* OPÇÕES HI LO */
        .hilo-options { display: flex; gap: 15px; opacity: 0; pointer-events: none; transition: 0.3s; width: 100%; max-width: 300px; justify-content: center; }
        .hilo-options.active { opacity: 1; pointer-events: auto; }
        
        .btn-guess {
            background: rgba(0,0,0,0.4); border: 2px solid transparent;
            color: #fff; border-radius: 15px; padding: 12px 0; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .btn-guess.low { border-color: rgba(231, 76, 60, 0.4); }
        .btn-guess.high { border-color: rgba(46, 204, 113, 0.4); }
        .btn-guess:active { transform: scale(0.95); }

        .btn-guess span:first-child { font-size: 18px; margin-bottom: 4px; text-transform: uppercase; }
        .btn-guess span:last-child { font-size: 14px; color: var(--btn-yellow); background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 8px; }
        .btn-guess.high i { color: #2ecc71; margin-right: 5px; font-size: 20px; }
        .btn-guess.low i { color: #e74c3c; margin-right: 5px; font-size: 20px; }

        .btn-skip {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 20px; padding: 8px 25px; font-size: 14px; font-weight: bold;
            margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn-skip:active { box-shadow: none; transform: translateY(4px); }
        .btn-skip.hidden { opacity: 0; pointer-events: none; position: absolute; }

        /* POP-UP COMPACTO DE VITÓRIA */
        .win-toast {
            position: absolute; top: 10px; left: 50%; transform: translate(-50%, -10px) scale(0.9);
            background: #00d665; color: #000; padding: 8px 24px; border-radius: 40px; 
            border: 2px solid #ffffff; box-shadow: 0 0 25px rgba(0, 230, 118, 0.8);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.5px; }
        .win-toast #winAmount { font-size: 18px; font-weight: 900; color: #000; letter-spacing: -0.5px; }

        /* CONTROLES ESTILO VIP */
        .controls-wrapper {
            width: 100%; background: var(--panel-bg); border-top: 2px solid #143570;
            padding: 15px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); position: relative;
        }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.4); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; }
        .bet-label { font-size: 10px; color: #888; font-weight: 700; padding-left: 15px; text-transform: uppercase; pointer-events: none; }
        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 5px 0; border-radius: 10px; transition: 0.2s; }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: #1c3a76; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #0d214a; border-bottom: 2px solid #0a1835; cursor: pointer; }

        .btn-action {
            width: 100%; border: none; border-radius: 12px; font-weight: 900; font-size: 18px;
            color: #000; text-transform: uppercase; box-shadow: 0 6px 0 #006633, 0 8px 15px rgba(0, 230, 118, 0.3); 
            height: 55px; display: flex; justify-content: center; align-items: center; gap: 10px; border-bottom: 2px solid #004d26;
            background: linear-gradient(180deg, var(--btn-green), var(--btn-green-dark));
        }
        .btn-action.cashout { background: linear-gradient(180deg, #f1c40f, #b8860b); box-shadow: 0 6px 0 #8a6508, 0 8px 15px rgba(241, 196, 15, 0.3); border-bottom: 2px solid #5c4305; display: none; color: #000; }
        .btn-action:disabled { filter: grayscale(100%); opacity: 0.5; pointer-events: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 5px; }
        .game-name { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; }
        .balance-info { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 5px; }
        .balance-info i { color: var(--btn-green); font-size: 12px; }

        /* TOAST SISTEMA */
        .system-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px;
            font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0;
            transition: 0.3s; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid #ff5252;
        }
        .system-toast.show { opacity: 1; top: 100px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL (DESBLOQUEIO DE ÁUDIO) -->
    <div id="startScreen">
        <h2>HI LO VIP</h2>
        <div class="btn-start btn-3d">Jogar Agora</div>
    </div>

    <div id="mobile-container">
        <!-- HEADER PADRONIZADO -->
        <div class="header-bar">
            <div class="btn-back btn-3d" id="btnBack"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="logo-text">HI LO VIP</div>
            <div class="top-actions">
                <div class="btn-top btn-3d" id="btnAudio"><i class="fa-solid fa-volume-xmark"></i></div>
            </div>
        </div>

        <!-- GAME AREA -->
        <div class="game-area">
            
            <div class="win-toast" id="winToast">
                <span>LUCRO TOTAL</span>
                <div id="winAmount">R$ 0,00</div>
            </div>

            <div class="cards-display">
                <div class="hint-icon"><span>A</span><span>v</span><span>2</span></div>
                
                <div class="card red" id="currentCard">
                    <!-- Carta preenchida via JS -->
                </div>
                <div class="deck-back"></div>
            </div>
            
            <button class="btn-skip" id="btnSkip" onclick="skipCard()"><i class="fa-solid fa-arrows-rotate"></i> Pular Carta</button>

            <div class="hilo-options" id="hiloOptions">
                <div class="btn-guess low" onclick="makeGuess('low')">
                    <span><i class="fa-solid fa-caret-down"></i> LOW</span>
                    <span id="multLow">2.10x</span>
                </div>
                <div class="btn-guess high" onclick="makeGuess('high')">
                    <span><i class="fa-solid fa-caret-up"></i> HIGH</span>
                    <span id="multHigh">1.54x</span>
                </div>
            </div>
        </div>

        <!-- CONTROLES ESTILO VIP -->
        <div class="controls-wrapper">
            
            <div class="bet-input-row">
                <div class="bet-label">Aposta</div>
                <button class="bet-adjust btn-3d" id="btnMinus"><i class="fa-solid fa-minus"></i></button>
                <div class="bet-display" id="displayAposta">R$ 1,00</div>
                <button class="bet-adjust btn-3d" id="btnPlus"><i class="fa-solid fa-plus"></i></button>
            </div>

            <button class="btn-action bet btn-3d" id="btnBet" onclick="startGame()"><i class="fa-solid fa-play"></i> APOSTAR</button>
            <button class="btn-action cashout btn-3d" id="btnCashout" onclick="cashout()"><i class="fa-solid fa-sack-dollar"></i> CASHOUT R$ 0.00</button>

            <div class="footer-info">
                <div class="game-name">HI LO <i class="fa-solid fa-clone" style="margin-left: 5px; opacity: 0.5;"></i></div>
                <div class="balance-info">
                    <i class="fa-solid fa-wallet"></i>
                    <span id="displaySaldo">R$ 0,00</span>
                </div>
            </div>
        </div>
    </div>

    <div class="system-toast" id="toastMsg">Mensagem</div>

    <script type="module">
        // ==========================================
        // 1. IMPORTAÇÕES E FIREBASE STRICT
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        const idDispositivo = localStorage.getItem('usuario_tracker_id');
        if (!idDispositivo) { window.location.href = 'login.html'; }

        // Variáveis de Estado SorteCerta
        let bancaAtual = 0.00;
        let caixaDaCasa = 0.00;
        let margemLucro = 0.30;
        let modoJogo = "normal";
        let estadoSequencia = 0;
        let valorPremioForcado = 0;

        // Padrão de Apostas (Limite 500)
        const apostasPermitidas = [1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00, 500.00];
        let indexAposta = 0; 
        let apostaAtual = apostasPermitidas[indexAposta];

        // Referências DOM
        const displayAposta = document.getElementById('displayAposta');
        const displaySaldo = document.getElementById('displaySaldo');
        const toastMsg = document.getElementById('toastMsg');
        const winToast = document.getElementById('winToast');
        const winAmountDisplay = document.getElementById('winAmount');
        const btnAudio = document.getElementById('btnAudio');
        const btnBack = document.getElementById('btnBack');

        // ==========================================
        // 2. MOTOR DE ÁUDIO NATIVO
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let audioLigado = false;

        document.getElementById('startScreen').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => { this.style.display = 'none'; }, 300);
            
            audioLigado = true;
            btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            btnAudio.style.color = '#fff';

            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0; osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.01);
        });

        btnBack.addEventListener('click', () => {
            tocarSom('sfxClick'); 
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        });

        btnAudio.addEventListener('click', () => {
            audioLigado = !audioLigado; 
            if(audioLigado) { 
                if (audioCtx.state === 'suspended') audioCtx.resume();
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btnAudio.style.color = '#fff'; tocarSom('sfxClick');
            } else { 
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btnAudio.style.color = '#888'; 
            }
        });

        const tocarSom = (tipo) => {
            if (!audioLigado || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (tipo === 'sfxClick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (tipo === 'sfxCard') {
                // Som de carta virando rápido (swoosh)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (tipo === 'sfxWin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (tipo === 'sfxLose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        };

        function mostrarToast(msg) {
            toastMsg.innerText = msg;
            toastMsg.classList.add('show');
            setTimeout(() => toastMsg.classList.remove('show'), 2500);
        }

        // ==========================================
        // 3. FIREBASE SYNC & SEGURANÇA
        // ==========================================
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isPlaying) {
                bancaAtual = parseFloat(dados.saldo || 0);
                displaySaldo.innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
            
            if (estadoSequencia !== 3) modoJogo = String(dados.modo || "normal").toLowerCase();
            
            let iscaLida = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
            if (iscaLida > 0 && estadoSequencia === 0) {
                valorPremioForcado = iscaLida; estadoSequencia = 1;
                set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0);
            }
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { 
            caixaDaCasa = parseFloat(snapshot.val() || 0); 
        });

        // ==========================================
        // 4. LÓGICA DO HI LO VIP E MOTOR DE CARTAS
        // ==========================================
        const MAX_BET = 500.00;
        const RTP = 0.97;
        
        const suits = [
            { name: 'hearts', symbol: '♥', color: 'red' },
            { name: 'diamonds', symbol: '♦', color: 'red' },
            { name: 'clubs', symbol: '♣', color: 'black' },
            { name: 'spades', symbol: '♠', color: 'black' }
        ];

        let isPlaying = false;
        let currentMultiplier = 1.00;
        let activeCard = null;

        const uiCard = document.getElementById('currentCard');

        function formatCard(rank, suit) {
            let visual = rank.toString();
            if(rank === 11) visual = 'J';
            if(rank === 12) visual = 'Q';
            if(rank === 13) visual = 'K';
            if(rank === 14) visual = 'A';
            return { rank, visual, suit };
        }

        function getRandomCard() {
            let rank = Math.floor(Math.random() * 13) + 2;
            let suit = suits[Math.floor(Math.random() * suits.length)];
            return formatCard(rank, suit);
        }

        // Funções para manipular a rodada quando o Caixa Global exige
        function getLosingCard(type, currentRank) {
            let possibleRanks = [];
            if (type === 'high') {
                for(let i=2; i < currentRank; i++) possibleRanks.push(i);
            } else {
                for(let i=currentRank + 1; i <= 14; i++) possibleRanks.push(i);
            }
            if (possibleRanks.length === 0) return getRandomCard(); 
            let rank = possibleRanks[Math.floor(Math.random() * possibleRanks.length)];
            let suit = suits[Math.floor(Math.random() * suits.length)];
            return formatCard(rank, suit);
        }

        function getWinningCard(type, currentRank) {
            let possibleRanks = [];
            if (type === 'high') {
                for(let i=currentRank; i <= 14; i++) possibleRanks.push(i);
            } else {
                for(let i=2; i <= currentRank; i++) possibleRanks.push(i);
            }
            let rank = possibleRanks[Math.floor(Math.random() * possibleRanks.length)];
            let suit = suits[Math.floor(Math.random() * suits.length)];
            return formatCard(rank, suit);
        }

        function renderCard(cardData) {
            tocarSom('sfxCard');
            uiCard.className = `card ${cardData.suit.color}`;
            uiCard.innerHTML = `
                <div class="top-left">${cardData.visual}<br><span class="suit-small">${cardData.suit.symbol}</span></div>
                <div class="suit-big">${cardData.suit.symbol}</div>
            `;
            // Animação suave de virada/deslize
            uiCard.style.transform = 'scale(0.85) translateX(30px)';
            uiCard.style.opacity = '0';
            setTimeout(() => {
                uiCard.style.transform = 'scale(1) translateX(0)';
                uiCard.style.opacity = '1';
            }, 50);
        }

        function skipCard() {
            if(isPlaying) return;
            tocarSom('sfxClick');
            activeCard = getRandomCard();
            renderCard(activeCard);
        }

        function calculateMultipliers() {
            let rank = activeCard.rank; // 2 a 14
            let pHigh = (15 - rank) / 13;
            let pLow = (rank - 1) / 13;

            let multHigh = Math.max(1.01, RTP / pHigh);
            let multLow = Math.max(1.01, RTP / pLow);

            document.getElementById('multHigh').innerText = multHigh.toFixed(2) + "x";
            document.getElementById('multLow').innerText = multLow.toFixed(2) + "x";

            return { multHigh, multLow };
        }

        // ==========================================
        // 5. CONTROLE DE APOSTAS VIP
        // ==========================================
        displayAposta.addEventListener('click', () => {
            if(isPlaying) return;
            tocarSom('sfxClick');
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                } else { mostrarToast("Valor inválido."); }
            }
        });

        function mudarAposta(direcao) {
            if(isPlaying) return;
            tocarSom('sfxClick');
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        }
        document.getElementById('btnMinus').addEventListener('click', () => mudarAposta(-1));
        document.getElementById('btnPlus').addEventListener('click', () => mudarAposta(1));

        // ==========================================
        // 6. MOTOR DE JOGO (START, GUESS, CASHOUT)
        // ==========================================
        window.startGame = async function() {
            tocarSom('sfxClick');
            if (apostaAtual > bancaAtual) { mostrarToast("Saldo insuficiente!"); return; }

            // 1. DESCONTA NO SALDO DO JOGADOR E AUMENTA O CAIXA GLOBAL
            let saldoReduzido = bancaAtual - apostaAtual;
            bancaAtual = saldoReduzido; // Atualiza RAM
            displaySaldo.innerText = "R$ " + saldoReduzido.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoReduzido.toFixed(2)));
            
            get(ref(db, 'sistema/caixa_global')).then(async snap => {
                let cx = parseFloat(snap.val() || 0);
                await set(ref(db, 'sistema/caixa_global'), parseFloat((cx + apostaAtual).toFixed(2)));
            });

            isPlaying = true;
            currentMultiplier = 1.00;

            document.getElementById('btnBet').style.display = 'none';
            document.getElementById('btnCashout').style.display = 'flex';
            document.getElementById('btnSkip').classList.add('hidden');
            
            // Opacidade nos controles de aposta
            document.getElementById('btnMinus').style.opacity = '0.5';
            document.getElementById('btnPlus').style.opacity = '0.5';

            updateGameState();
        }

        function updateGameState() {
            calculateMultipliers();
            document.getElementById('hiloOptions').classList.add('active');
            let winAmount = apostaAtual * currentMultiplier;
            document.getElementById('btnCashout').innerHTML = `<i class="fa-solid fa-sack-dollar"></i> CASHOUT R$ ${winAmount.toFixed(2)}`;
        }

        window.makeGuess = function(type) {
            if(!isPlaying) return;
            
            let mults = calculateMultipliers();
            let nextMult = type === 'high' ? mults.multHigh : mults.multLow;
            let potentialWin = apostaAtual * currentMultiplier * nextMult;
            
            let availableFunds = caixaDaCasa * (1 - margemLucro);

            let forceLose = false;
            let forceWin = false;

            // INTEGRAÇÃO DE RISCO: Manipulação SorteCerta Pro
            if (estadoSequencia === 1) { 
                estadoSequencia = 2; forceLose = true; 
            } else if (estadoSequencia === 2 && valorPremioForcado > 0) {
                estadoSequencia = 3; 
                set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo');
                forceWin = true; 
            } else if (modoJogo === 'agressivo' || estadoSequencia === 3) {
                if (Math.random() < 0.8) forceLose = true;
            } else if (potentialWin > availableFunds || (modoJogo === 'desfarcado' && potentialWin > (apostaAtual * 3))) { 
                forceLose = true; 
            }

            let nextCard;
            if (forceLose) {
                nextCard = getLosingCard(type, activeCard.rank);
            } else if (forceWin) {
                nextCard = getWinningCard(type, activeCard.rank);
            } else {
                nextCard = getRandomCard(); // 100% Justo se o caixa permitir
            }

            // Validação Final (Empate é considerado Vitória para manter fluxo)
            let isWin = false;
            if (type === 'high' && nextCard.rank >= activeCard.rank) isWin = true;
            if (type === 'low' && nextCard.rank <= activeCard.rank) isWin = true;

            renderCard(nextCard);

            if(isWin) {
                currentMultiplier *= nextMult;
                activeCard = nextCard;
                updateGameState();
            } else {
                tocarSom('sfxLose');
                mostrarToast("Você Perdeu a Sequência!");
                resetGame();
                activeCard = nextCard; 
            }
        }

        window.cashout = async function() {
            if(!isPlaying) return;
            
            let winAmount = apostaAtual * currentMultiplier;
            
            // 2. DEDUZ DO CAIXA GLOBAL E DEVOLVE PARA O JOGADOR NO FIREBASE
            get(ref(db, `usuarios/${idDispositivo}/saldo`)).then(async snap => {
                let dbSaldo = parseFloat(snap.val() || 0);
                await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((dbSaldo + winAmount).toFixed(2)));
            });
            
            get(ref(db, 'sistema/caixa_global')).then(async snap => {
                let cx = parseFloat(snap.val() || 0);
                await set(ref(db, 'sistema/caixa_global'), parseFloat((cx - winAmount).toFixed(2)));
            });

            tocarSom('sfxWin');
            winAmountDisplay.innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            winToast.classList.add('show');
            setTimeout(() => winToast.classList.remove('show'), 2500);

            resetGame();
        }

        function resetGame() {
            isPlaying = false;
            currentMultiplier = 1.00;
            
            document.getElementById('btnBet').style.display = 'flex';
            document.getElementById('btnCashout').style.display = 'none';
            document.getElementById('btnSkip').classList.remove('hidden');
            document.getElementById('hiloOptions').classList.remove('active');
            
            document.getElementById('btnMinus').style.opacity = '1';
            document.getElementById('btnPlus').style.opacity = '1';
            
            // Atualiza saldo visual via Firebase onValue que volta a rodar
        }

        // Boot Visual da primeira carta
        activeCard = getRandomCard();
        renderCard(activeCard);
        window.skipCard = skipCard;

    </script>
</body>
</html>
