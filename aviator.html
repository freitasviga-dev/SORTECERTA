<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Expires" content="Tue, 01 Jan 1980 1:00:00 GMT">
    <meta http-equiv="Clear-Site-Data" content="cache">
    
    <script>
        // BLINDAGEM ANTI-CACHE GRAU MILITAR
        (function() {
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) registration.unregister();
                });
            }
            window.addEventListener('pageshow', function(event) {
                if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                    let urlBase = window.location.href.split('?')[0];
                    window.location.replace(urlBase + '?clear=' + new Date().getTime());
                }
            });
        })();
    </script>
    
    <title>Roleta Imperial | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --red: #e74c3c;
            --red-dark: #c0392b;
            --black: #1a1a1a;
            --black-light: #2c3e50;
            --green: #00e676;
            --green-dark: #00b359;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        body { 
            background: linear-gradient(180deg, #184b9e 0%, #0d2b5e 100%);
            color: #ffffff; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none;
        }

        .btn-3d { transition: transform 0.1s ease, box-shadow 0.1s ease, border-bottom 0.1s ease; cursor: pointer; }
        .btn-3d:active:not(.disabled) { transform: translateY(4px) !important; box-shadow: none !important; border-bottom-width: 0px !important; margin-top: 4px; }

        /* TELA INICIAL (DESBLOQUEIO DE ÁUDIO) */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.3s ease;
        }
        #startScreen h2 {
            color: var(--green); text-transform: uppercase; font-weight: 900;
            letter-spacing: 1px; margin-bottom: 30px; font-size: 28px;
            text-shadow: 0 0 15px rgba(0,230,118,0.5);
        }
        .btn-start {
            background: linear-gradient(180deg, var(--green), var(--green-dark)); color: #000;
            padding: 15px 40px; border-radius: 30px; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 230, 118, 0.4);
            font-size: 16px; letter-spacing: 1px;
        }

        /* HEADER PADRONIZADO */
        .header-bar {
            padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            padding-top: calc(10px + env(safe-area-inset-top)); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 16px; font-weight: 900; letter-spacing: 1px; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* ÁREA DE JOGO */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; width: 100%; max-width: 450px; margin: 0 auto; gap: 15px; position: relative; }

        /* HISTÓRICO DE CORES */
        .history-bar { width: 100%; display: flex; gap: 6px; overflow-x: auto; padding: 8px 12px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-label { font-size: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; margin-right: 5px; }
        .history-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 2px 5px rgba(0,0,0,0.5); flex-shrink: 0; }
        .history-dot.red { background: var(--red); }
        .history-dot.black { background: #111; border-color: #555; }
        .history-dot.green { background: #2ecc71; }

        /* ROLETA ARENA VISUAL */
        .roulette-arena { width: 100%; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px 0; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.5); overflow: hidden; }
        .wheel-container { position: relative; width: 220px; height: 220px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #111; box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5); transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1); position: relative; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; background: radial-gradient(circle, #f1c40f, #b8860b); border-radius: 50%; border: 4px solid #111; z-index: 5; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #fff; z-index: 10; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.8)); }

        .on-screen-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(0,0,0,0.95); padding: 15px 25px; border-radius: 12px; border: 2px solid var(--gold); color: #fff; font-weight: 900; text-align: center; z-index: 20; opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 80%; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .on-screen-msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* CONTROLES E SELEÇÃO */
        .controls-wrapper { width: 100%; background: #0c1f45; border-top: 2px solid #143570; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); position: relative; }
        
        .action-row { display: flex; gap: 8px; }
        .btn-choice { flex: 1; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; box-shadow: 0 4px 0 rgba(0,0,0,0.5); border: 2px solid transparent; opacity: 0.4; transition: 0.2s; cursor: pointer; position: relative; }
        .btn-choice span { font-size: 9px; opacity: 0.8; font-weight: bold; }
        .btn-choice.red { background: linear-gradient(145deg, var(--red), var(--red-dark)); color: #fff; box-shadow: 0 4px 0 #7b241c; }
        .btn-choice.green { background: linear-gradient(145deg, #2ecc71, #27ae60); color: #000; box-shadow: 0 4px 0 #145a32; flex: 0.8; }
        .btn-choice.black { background: linear-gradient(145deg, var(--black-light), var(--black)); color: #fff; box-shadow: 0 4px 0 #111; }
        .btn-choice.active { opacity: 1; border-color: #fff; transform: scale(1.02); }

        /* MINI FICHAS DE APOSTA (CHIP STACKS) */
        .chip-stack { position: absolute; top: -8px; right: -8px; background: #fff; color: #000; font-size: 10px; font-weight: 900; padding: 3px 6px; border-radius: 12px; border: 2px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.5); display: none; z-index: 5; }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.4); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; }
        .bet-label { font-size: 10px; color: #888; font-weight: 700; padding-left: 15px; text-transform: uppercase; pointer-events: none; }
        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 5px 0; border-radius: 10px; transition: 0.2s; }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: #1c3a76; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #0d214a; border-bottom: 2px solid #0a1835; cursor: pointer; }

        /* BOTÕES DE AÇÃO: APOSTAR E GIRAR */
        .roll-actions { display: flex; gap: 8px; }
        .btn-clear { background: #333; border: none; color: #fff; padding: 0 20px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #111; cursor: pointer; }
        
        .bet-button { flex: 1; border: none; border-radius: 12px; padding: 16px 5px; color: #fff; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
        .btn-apostar { background: linear-gradient(180deg, #3498db, #2980b9); box-shadow: 0 6px 0 #154360, 0 8px 15px rgba(52, 152, 219, 0.3); border-bottom: 2px solid #1a5276; }
        .btn-girar { background: linear-gradient(180deg, #00e676, #00b359); box-shadow: 0 6px 0 #006633, 0 8px 15px rgba(0, 230, 118, 0.3); border-bottom: 2px solid #004d26; color: #000; }
        
        .bet-button.disabled, .btn-clear.disabled { background: #555 !important; box-shadow: 0 6px 0 #222 !important; border-bottom: 2px solid #111 !important; color: #888 !important; pointer-events: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 5px; }
        .game-name { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; }
        .balance-info { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 5px; }
        .balance-info i { color: var(--green); font-size: 12px; }

        /* POP-UP COMPACTO DE VITÓRIA (ESTILO IMAGEM COM BRILHO) */
        .win-toast {
            position: absolute; top: -10px; left: 50%; transform: translate(-50%, -10px) scale(0.9);
            background: #00d665; color: #000;
            padding: 8px 24px; border-radius: 40px; 
            border: 2px solid #ffffff; 
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.8);
            opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.5px; }
        .win-toast #winAmount { font-size: 18px; font-weight: 900; color: #000; letter-spacing: -0.5px; }

        .system-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 100px; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h2>ROLETA IMPERIAL</h2>
        <div class="btn-start btn-3d">Jogar Agora</div>
    </div>

    <div class="header-bar">
        <div class="btn-back btn-3d" id="btnBack"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="logo-text">ROLETA IMPERIAL</div>
        <div class="top-actions">
            <div class="btn-top btn-3d" id="btnAudio"><i class="fa-solid fa-volume-xmark"></i></div>
        </div>
    </div>

    <div class="game-area">
        <div class="win-toast" id="winToast">
            <span>LUCRO TOTAL</span>
            <div id="winAmount">R$ 0,00</div>
        </div>

        <div class="history-bar" id="historyBar">
            <span class="history-label"><i class="fa-solid fa-clock-rotate-left"></i> Últimos:</span>
        </div>

        <div class="roulette-arena">
            <div class="wheel-container">
                <div class="marker"></div>
                <div class="wheel" id="wheel"></div>
                <div class="wheel-center"></div>
            </div>
            
            <div class="on-screen-msg" id="msgPanel">
                <div class="msg-title" id="msgTitle">RESULTADO</div>
                <div class="msg-value" id="msgValue">R$ 0,00</div>
            </div>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="action-row">
            <div class="btn-choice red btn-3d active" id="btn-red" data-color="red">
                VERMELHO <span>2x</span>
                <div class="chip-stack" id="stack-red">R$ 0</div>
            </div>
            <div class="btn-choice green btn-3d" id="btn-green" data-color="green">
                ZERO <span>14x</span>
                <div class="chip-stack" id="stack-green">R$ 0</div>
            </div>
            <div class="btn-choice black btn-3d" id="btn-black" data-color="black">
                PRETO <span>2x</span>
                <div class="chip-stack" id="stack-black">R$ 0</div>
            </div>
        </div>

        <div class="bet-input-row">
            <div class="bet-label">Valor</div>
            <button class="bet-adjust btn-3d" id="btnMinus"><i class="fa-solid fa-minus"></i></button>
            <div class="bet-display" id="displayAposta">R$ 1,00</div>
            <button class="bet-adjust btn-3d" id="btnPlus"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="roll-actions">
            <button class="btn-clear btn-3d" id="btnClear"><i class="fa-solid fa-trash"></i></button>
            <button class="bet-button btn-apostar btn-3d" id="btnPlaceBet">
                <i class="fa-solid fa-plus"></i> APOSTAR
            </button>
            <button class="bet-button btn-girar btn-3d" id="btnSpin">
                <i class="fa-solid fa-rotate-right"></i> GIRAR
            </button>
        </div>

        <div class="footer-info">
            <div class="game-name">ROLETA <i class="fa-solid fa-dharmachakra" style="margin-left: 5px; opacity: 0.5;"></i></div>
            <div class="balance-info">
                <i class="fa-solid fa-wallet"></i>
                <span id="displaySaldo">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="system-toast" id="toastMsg">Mensagem do Sistema</div>

    <script type="module">
        // ==========================================
        // 1. IMPORTAÇÕES E FIREBASE STRICT
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        const idDispositivo = localStorage.getItem('usuario_tracker_id');
        if (!idDispositivo) { window.location.href = 'login.html'; }

        // Variáveis de Estado SorteCerta
        let bancaAtual = 0.00;
        let caixaDaCasa = 0.00;
        let margemLucro = 0.30;
        let modoJogo = "normal";
        let estadoSequencia = 0;
        let valorPremioForcado = 0;

        let audioLigado = false;
        let isSpinning = false;
        let currentRotation = 0;
        let selectedColor = 'red';
        let bets = { red: 0, green: 0, black: 0 };
        let resultHistory = ['red', 'black', 'red', 'green', 'black'];

        // Seletor de Aposta Rápida (Limite Máximo 500)
        const apostasPermitidas = [1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00, 500.00];
        let indexAposta = 0; 
        let apostaAtual = apostasPermitidas[indexAposta];

        // Referências DOM
        const startScreen = document.getElementById('startScreen');
        const btnBack = document.getElementById('btnBack');
        const btnAudio = document.getElementById('btnAudio');
        const toastMsg = document.getElementById('toastMsg');
        const displayAposta = document.getElementById('displayAposta');
        const btnMinus = document.getElementById('btnMinus');
        const btnPlus = document.getElementById('btnPlus');
        const btnPlaceBet = document.getElementById('btnPlaceBet');
        const btnSpin = document.getElementById('btnSpin');
        const btnClear = document.getElementById('btnClear');
        const displaySaldo = document.getElementById('displaySaldo');
        const winToast = document.getElementById('winToast');
        const winAmountDisplay = document.getElementById('winAmount');
        const wheelElement = document.getElementById('wheel');
        const msgPanel = document.getElementById('msgPanel');

        // ==========================================
        // 2. MOTOR DE ÁUDIO SINTETIZADOR NATIVO
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function iniciarAudio() {
            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        const tocarSom = (tipo) => {
            if (!audioLigado || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (tipo === 'sfxClick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (tipo === 'sfxTick') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } else if (tipo === 'sfxWin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (tipo === 'sfxLose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        };

        function mostrarToast(msg) {
            toastMsg.innerText = msg; 
            toastMsg.classList.add('show');
            setTimeout(() => toastMsg.classList.remove('show'), 3000);
        }

        // ==========================================
        // 3. DESENHO MATEMÁTICO DA ROLETA (15 FATIAS)
        // ==========================================
        const numSegments = 15;
        const degPerSegment = 360 / numSegments; // 24 graus por fatia

        function drawWheel() {
            let gradientStr = 'conic-gradient(';
            for(let i=0; i<numSegments; i++) {
                let color = i === 0 ? 'var(--green)' : (i % 2 !== 0 ? 'var(--red)' : 'var(--black)');
                gradientStr += `${color} ${i * degPerSegment}deg ${(i + 1) * degPerSegment}deg${i < numSegments - 1 ? ', ' : ''}`;
            }
            gradientStr += ')';
            wheelElement.style.background = gradientStr;
        }
        drawWheel();

        function updateHistoryBar() {
            const bar = document.getElementById('historyBar');
            bar.innerHTML = '<span class="history-label"><i class="fa-solid fa-clock-rotate-left"></i> Últimos:</span>';
            resultHistory.forEach(color => { bar.innerHTML += `<div class="history-dot ${color}"></div>`; });
        }
        updateHistoryBar();

        // ==========================================
        // 4. INTERFACE E EVENT LISTENERS DIRECTS
        // ==========================================
        startScreen.addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => { this.style.display = 'none'; }, 300);
            audioLigado = true;
            btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            btnAudio.style.color = '#fff';
            iniciarAudio();
            tocarSom('sfxClick');
        });

        btnBack.addEventListener('click', () => {
            iniciarAudio(); tocarSom('sfxClick');
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        });

        btnAudio.addEventListener('click', () => {
            iniciarAudio();
            audioLigado = !audioLigado; 
            if(audioLigado) { 
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btnAudio.style.color = '#fff'; tocarSom('sfxClick');
            } else { 
                btnAudio.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btnAudio.style.color = '#888'; 
            }
        });

        // Seleção de Cor Target
        document.querySelectorAll('.btn-choice').forEach(btn => {
            btn.addEventListener('click', function() {
                if(isSpinning) return;
                iniciarAudio(); tocarSom('sfxClick');
                selectedColor = this.dataset.color;
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Entrada e Controle de Valores de Aposta
        displayAposta.addEventListener('click', () => {
            if(isSpinning) return;
            iniciarAudio();
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    tocarSom('sfxClick');
                } else { mostrarToast("Valor inválido."); }
            }
        });

        function mudarAposta(direcao) {
            if(isSpinning) return;
            iniciarAudio(); tocarSom('sfxClick');
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                displayAposta.innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        }
        btnMinus.addEventListener('click', () => mudarAposta(-1));
        btnPlus.addEventListener('click', () => mudarAposta(1));

        // ==========================================
        // 5. SYNC DE DADOS REAL E GESTÃO DE MESA
        // ==========================================
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isSpinning) {
                bancaAtual = parseFloat(dados.saldo || 0);
                updateBalanceUI();
                
                if (estadoSequencia !== 3) modoJogo = String(dados.modo || "normal").toLowerCase();
                
                let iscaLida = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                if (iscaLida > 0 && estadoSequencia === 0) {
                    valorPremioForcado = iscaLida; estadoSequencia = 1;
                    set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0);
                }
            }
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        // Calcula o saldo virtual (Banca - Fichas já colocadas na mesa prontas pra girar)
        function updateBalanceUI() {
            let totalBets = bets.red + bets.green + bets.black;
            let saldoVisivel = bancaAtual - totalBets;
            displaySaldo.innerText = "R$ " + saldoVisivel.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function updateBetTable() {
            ['red', 'green', 'black'].forEach(color => {
                const stack = document.getElementById(`stack-${color}`);
                if(bets[color] > 0) { stack.style.display = 'block'; stack.innerText = "R$ " + bets[color]; } 
                else { stack.style.display = 'none'; }
            });
        }

        // Devolve fichas se o jogador fechar a aba
        function lidarComSaidaAbrupta() {
            if (!isSpinning) {
                let totalNaMesa = bets.red + bets.green + bets.black;
                if (totalNaMesa > 0) { bets = { red: 0, green: 0, black: 0 }; } 
            }
        }
        window.addEventListener('pagehide', lidarComSaidaAbrupta);
        document.addEventListener('visibilitychange', function() { if (document.hidden) lidarComSaidaAbrupta(); });

        // BOTÃO APOSTAR: Põe o valor na cor selecionada
        btnPlaceBet.addEventListener('click', () => {
            if (isSpinning) return;
            iniciarAudio();
            
            let totalBets = bets.red + bets.green + bets.black;
            let saldoVirtual = bancaAtual - totalBets;
            
            if (apostaAtual > saldoVirtual) {
                mostrarToast("Saldo insuficiente para esta aposta.");
                return;
            }

            // LIMITE MÁXIMO DE APOSTA NA COR ESCOLHIDA
            if (bets[selectedColor] + apostaAtual > 500) {
                mostrarToast("O limite de aposta por cor é R$ 500,00!");
                return;
            }

            bets[selectedColor] += apostaAtual;
            tocarSom('sfxClick');
            updateBalanceUI();
            updateBetTable();
        });

        // BOTÃO LIMPAR: Tira todas as apostas da mesa
        btnClear.addEventListener('click', () => {
            if (isSpinning) return;
            iniciarAudio(); tocarSom('sfxClick');
            bets = { red: 0, green: 0, black: 0 };
            updateBalanceUI();
            updateBetTable();
        });

        // ==========================================
        // 6. EXECUÇÃO DO GIRO E MATEMÁTICA DA PLATAFORMA
        // ==========================================
        btnSpin.addEventListener('click', async () => {
            if (isSpinning) return;
            iniciarAudio(); tocarSom('sfxClick');

            let totalBet = bets.red + bets.green + bets.black;
            if (totalBet === 0) {
                mostrarToast("Coloque uma aposta na mesa antes de girar!");
                return;
            }

            isSpinning = true;
            btnPlaceBet.classList.add('disabled');
            btnSpin.classList.add('disabled');
            btnClear.classList.add('disabled');
            btnMinus.style.opacity = '0.5';
            btnPlus.style.opacity = '0.5';
            msgPanel.classList.remove('show');

            // 1. Desconta o total da mesa permanentemente no Firebase
            let saldoReduzido = bancaAtual - totalBet;
            bancaAtual = saldoReduzido; // Atualiza a RAM
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoReduzido.toFixed(2)));

            // 2. Transfere para o Caixa Global
            await set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa + totalBet).toFixed(2)));

            // 3. Roda o motor de risco unificado analisando todas as fichas na mesa
            let targetColor = determineRiggedOutcome(totalBet);

            let targetIndex = 0;
            if(targetColor === 'red') { const reds = [1, 3, 5, 7, 9, 11, 13]; targetIndex = reds[Math.floor(Math.random() * reds.length)]; } 
            else if(targetColor === 'black') { const blacks = [2, 4, 6, 8, 10, 12, 14]; targetIndex = blacks[Math.floor(Math.random() * blacks.length)]; }

            const baseStopAngle = 360 - (targetIndex * degPerSegment) - (degPerSegment / 2);
            const extraSpins = 360 * 5; 
            const randomOffset = (Math.random() * 16) - 8; 

            currentRotation += extraSpins + baseStopAngle - (currentRotation % 360) + randomOffset;

            // 🔊 RASTREADOR DE ÁUDIO SINCRONIZADO POR ANIMAÇÃO DE QUADRO
            let lastSegment = -1;
            function trackRotation() {
                if (!isSpinning) return;
                const style = window.getComputedStyle(wheelElement);
                const matrix = new DOMMatrix(style.transform);
                let angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
                if (angle < 0) angle += 360;
                let currentSegment = Math.floor(angle / degPerSegment);
                if (currentSegment !== lastSegment) {
                    tocarSom('sfxTick');
                    lastSegment = currentSegment;
                }
                requestAnimationFrame(trackRotation);
            }

            setTimeout(() => {
                requestAnimationFrame(trackRotation);
                wheelElement.style.transform = `rotate(${currentRotation}deg)`;
            }, 50);

            // Finalização Mecânica
            setTimeout(() => {
                isSpinning = false;
                processPayout(targetColor);
            }, 4200);
        });

        function determineRiggedOutcome(totalBet) {
            let pR = bets.red * 2; 
            let pB = bets.black * 2; 
            let pG = bets.green * 14;

            if (estadoSequencia === 1) { estadoSequencia = 2; return getWorstOutcome(pR, pB, pG); }
            if (estadoSequencia === 2 && valorPremioForcado > 0) {
                estadoSequencia = 3; set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo');
                if (pG > 0) return 'green'; if (pR > pB) return 'red'; return 'black';
            }
            if (modoJogo === 'agressivo' || estadoSequencia === 3) {
                if(Math.random() < 0.8) return getWorstOutcome(pR, pB, pG);
            }

            let availableFunds = caixaDaCasa * (1 - margemLucro);
            let roll = Math.random();
            let color = 'red';
            if (roll > 0.475 && roll <= 0.95) color = 'black'; else if (roll > 0.95) color = 'green';

            let payout = color === 'red' ? pR : (color === 'black' ? pB : pG);
            if (payout > availableFunds || (modoJogo === 'desfarcado' && payout > (totalBet * 3))) { return getWorstOutcome(pR, pB, pG); }
            return color;
        }

        function getWorstOutcome(pR, pB, pG) {
            if (pR === 0 && pB === 0) return Math.random() > 0.5 ? 'red' : 'black';
            if (pR === 0) return 'red'; if (pB === 0) return 'black'; if (pG === 0) return 'green';
            if (pR <= pB && pR <= pG) return 'red'; if (pB <= pR && pB <= pG) return 'black'; return 'green';
        }

        async function processPayout(color) {
            resultHistory.unshift(color);
            if(resultHistory.length > 8) resultHistory.pop();
            updateHistoryBar();

            let isWin = false;
            let winAmount = 0;

            if (color === 'red' && bets.red > 0) { winAmount = bets.red * 2; isWin = true; }
            else if (color === 'black' && bets.black > 0) { winAmount = bets.black * 2; isWin = true; }
            else if (color === 'green' && bets.green > 0) { winAmount = bets.green * 14; isWin = true; }

            if (isWin) {
                // Devolve prêmio para o Saldo Real
                get(ref(db, `usuarios/${idDispositivo}/saldo`)).then(async snap => {
                    let dbSaldo = parseFloat(snap.val() || 0);
                    await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((dbSaldo + winAmount).toFixed(2)));
                });

                // Deduz movimento do prêmio do Caixa Global
                get(ref(db, 'sistema/caixa_global')).then(async snap => {
                    let dbCaixa = parseFloat(snap.val() || 0);
                    await set(ref(db, 'sistema/caixa_global'), parseFloat((dbCaixa - winAmount).toFixed(2)));
                });

                tocarSom('sfxWin');
                winAmountDisplay.innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                winToast.classList.add('show');
                setTimeout(() => winToast.classList.remove('show'), 2500);
            } else {
                tocarSom('sfxLose');
                document.getElementById('msgTitle').innerText = "NÃO FOI DESTA VEZ";
                document.getElementById('msgValue').innerText = "Tente Novamente";
                msgPanel.style.borderColor = "var(--red)";
                document.getElementById('msgValue').style.color = "var(--red)";
                msgPanel.classList.add('show');
                setTimeout(() => msgPanel.classList.remove('show'), 2500);
            }

            // Limpa as Fichas e Libera Botões
            bets = { red: 0, green: 0, black: 0 };
            updateBetTable();
            updateBalanceUI();

            btnPlaceBet.classList.remove('disabled');
            btnSpin.classList.remove('disabled');
            btnClear.classList.remove('disabled');
            btnMinus.style.opacity = '1';
            btnPlus.style.opacity = '1';
        }
    </script>
</body>
</html>
