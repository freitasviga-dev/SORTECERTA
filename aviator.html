<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Expires" content="Tue, 01 Jan 1980 1:00:00 GMT">
    
    <title>Cassino Dice | SorteCerta Pro</title>
    <style>
        :root {
            --bg-top: #5b269b;
            --bg-bottom: #31136b;
            --panel-bg: #210d49;
            --panel-light: #2c145e;
            --accent-gold: #f4b63f;
            --text-light: #ffffff;
            --text-muted: #9b82c7;
            
            --track-red: #c51842;
            --track-blue: #0ea5e9;
            --track-green: #10b981;
            
            --btn-green: #10b981;
            --btn-blue: #0ea5e9;
            --btn-action: #4a2199;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            user-select: none;
        }

        #mobile-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            align-items: center;
            padding-top: calc(15px + env(safe-area-inset-top));
        }

        .fun-mode {
            background: #ffa800;
            color: #fff;
            padding: 4px 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .balance-badge {
            background: #210d49;
            color: #fff;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #4a2199;
        }

        /* Result Area */
        .result-area {
            background: var(--panel-bg);
            margin: 15px;
            border-radius: 15px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }

        .number-display {
            font-size: 65px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        .number-display.win { color: var(--track-green); }
        .number-display.lose { color: var(--track-red); }

        /* Sliders / Tracks */
        .slider-container {
            width: 90%;
            position: relative;
            margin-bottom: 20px;
        }

        .track-group {
            position: relative;
            height: 40px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #1a083a;
        }

        .track-top, .track-bottom {
            height: 50%;
            width: 100%;
            position: relative;
        }

        .track-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 5px);
            pointer-events: none;
            z-index: 2;
        }

        .scale-marks {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            padding: 0 5px;
        }

        /* Input Range (Slider invisível por cima) */
        input[type="range"] {
            -webkit-appearance: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 40px;
            background: transparent; outline: none; z-index: 5; margin: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px; height: 30px;
            background: #ffc107; border: 6px solid #ff9800; border-radius: 50%;
            cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.8); position: relative;
        }
        
        input[type="range"]::-webkit-slider-thumb:after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: #000; border-radius: 50%;
        }

        /* Stats Panel */
        .stats-panel {
            background: var(--panel-light); margin: 0 15px; padding: 15px;
            border-radius: 15px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .payout-row { display: flex; justify-content: space-between; align-items: center; }
        .payout-box { display: flex; flex-direction: column; gap: 5px; }
        .payout-box label { font-size: 12px; color: var(--text-muted); }

        .payout-input-wrapper {
            background: #190a36; border-radius: 20px; padding: 5px 15px;
            display: flex; align-items: center;
        }
        .payout-input-wrapper input {
            background: transparent; border: none; color: white;
            font-size: 18px; font-weight: bold; width: 60px; outline: none;
        }
        .payout-input-wrapper span { color: var(--text-muted); font-weight: bold; }

        .info-row { display: flex; justify-content: space-between; font-size: 14px; }
        .info-col { display: flex; flex-direction: column; }
        .info-col span:first-child { color: var(--text-muted); font-size: 11px; }
        .info-col span:last-child { font-weight: bold; }
        .text-right { text-align: right; }

        /* Controls Area */
        .controls-area {
            padding: 20px 15px; display: flex; flex-direction: column; gap: 15px;
            flex-grow: 1; justify-content: flex-end;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .roll-buttons { display: flex; gap: 10px; justify-content: space-between; }
        
        .btn-roll {
            flex-grow: 1; border: none; border-radius: 12px; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 60px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.4); transition: 0.1s;
        }
        .btn-roll:active:not(:disabled) { transform: translateY(4px); box-shadow: none; }
        .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-roll-under { background: var(--btn-green); box-shadow: 0 4px 0 #0b875d; }
        .btn-roll-over { background: var(--btn-blue); box-shadow: 0 4px 0 #0979aa; }

        .btn-roll span:nth-child(1) { font-size: 20px; font-weight: bold; }
        .btn-roll span:nth-child(2) { font-size: 12px; font-weight: bold; }

        .bet-input-container {
            background: var(--panel-light); border-radius: 30px; padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .bet-info { display: flex; flex-direction: column; }
        .bet-info label { font-size: 11px; color: var(--text-muted); }
        .bet-info input {
            background: transparent; border: none; color: white;
            font-size: 18px; font-weight: bold; width: 80px; outline: none;
        }

        .bet-adjust { display: flex; gap: 8px; }
        .btn-adj {
            background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body onclick="iniciarAudio()">

<div id="mobile-container">
    
    <div class="top-bar">
        <div class="fun-mode" onclick="window.location.href='index.html'" style="cursor: pointer;">&lt; SAIR</div>
        <div class="balance-badge" id="user-balance">Saldo: R$ 0.00</div>
    </div>

    <div class="result-area">
        <div class="number-display" id="result-display">50.00</div>
        
        <div class="slider-container">
            <div class="track-group">
                <div class="track-pattern"></div>
                <div class="track-top" id="track-top"></div>
                <div class="track-bottom" id="track-bottom"></div>
            </div>
            
            <input type="range" id="chance-slider" min="0.10" max="96.90" step="0.10" value="48.50">
            
            <div class="scale-marks">
                <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
            </div>
        </div>
    </div>

    <div class="stats-panel">
        <div class="payout-row">
            <div class="payout-box">
                <label>Payout</label>
                <div class="payout-input-wrapper">
                    <input type="number" id="payout-input" value="2.00" step="0.01" min="1.01" max="970.00">
                    <span>x</span>
                </div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-col">
                <span>Potential win:</span>
                <span id="potential-win">0.00 BRL</span>
            </div>
            <div class="info-col text-right">
                <span>Chance:</span>
                <span id="chance-display">48.50 %</span>
            </div>
        </div>
    </div>

    <div class="controls-area">
        <div class="roll-buttons">
            <button class="btn-roll btn-roll-under" id="btn-under" onclick="rollDice('under')" disabled>
                <span>▼ UNDER</span>
                <span id="target-under">48.50</span>
            </button>
            <button class="btn-roll btn-roll-over" id="btn-over" onclick="rollDice('over')" disabled>
                <span>▲ OVER</span>
                <span id="target-over">51.50</span>
            </button>
        </div>

        <div class="bet-input-container">
            <div class="bet-info">
                <label>Aposta BRL</label>
                <input type="number" id="bet-amount" value="1.00" step="1.00" min="0.10" onchange="updateStatsFromSlider()">
            </div>
            <div class="bet-adjust">
                <button class="btn-adj" onclick="adjustBet(-1.00)">-</button>
                <button class="btn-adj" onclick="doubleBet()">X2</button>
                <button class="btn-adj" onclick="adjustBet(1.00)">+</button>
            </div>
        </div>
    </div>

</div>

<script type="module">
    // ANTI-CACHE FORTE DE NAVEGADOR
    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            window.location.reload(true);
        }
    });

    // 1. IMPORTAÇÕES FIREBASE E INTEGRAÇÃO SORTECERTA
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
        databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
        projectId: "sortecerta-75b77"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const idDispositivo = localStorage.getItem('usuario_tracker_id');

    if (!idDispositivo) { window.location.href = 'login.html'; }

    // -------------------------------------------------------------------------------- //
    // 🎵 MOTOR DE ÁUDIO NATIVO PROFISSIONAL (SINTETIZADOR)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    window.iniciarAudio = function() {
        if (!audioCtx) { audioCtx = new AudioContext(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    }

    const tocarSom = (tipo) => {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (tipo === 'sfxClick') {
            // Tick curto para os botões e slider
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        } else if (tipo === 'sfxRoll') {
            // Som rápido enquanto os números rodam
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (tipo === 'sfxWin') {
            // Som de Vitória
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); 
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3); 
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45); 
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        } else if (tipo === 'sfxLose') {
            // Som de Derrota
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    };
    // -------------------------------------------------------------------------------- //

    let saldoUsuario = 0.00;
    const dbRefSaldo = ref(db, 'usuarios/' + idDispositivo + '/saldo');

    // Escuta saldo em tempo real do Firebase
    onValue(dbRefSaldo, (snapshot) => {
        saldoUsuario = parseFloat(snapshot.val() || 0);
        document.getElementById('user-balance').innerText = `Saldo: R$ ${saldoUsuario.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        
        if (!isRolling) {
            document.getElementById('btn-under').disabled = false;
            document.getElementById('btn-over').disabled = false;
        }
    });

    // ==========================================
    // LÓGICA MATEMÁTICA E VISUAL DO JOGO DICE
    // ==========================================
    const RTP = 97.00; // Margem da casa cravada (Padrão SorteCerta/Spribe)
    let isRolling = false;

    const slider = document.getElementById('chance-slider');
    const trackTop = document.getElementById('track-top');
    const trackBottom = document.getElementById('track-bottom');
    const payoutInput = document.getElementById('payout-input');
    const chanceDisplay = document.getElementById('chance-display');
    const potentialWin = document.getElementById('potential-win');
    const targetUnder = document.getElementById('target-under');
    const targetOver = document.getElementById('target-over');
    const betInput = document.getElementById('bet-amount');
    const resultDisplay = document.getElementById('result-display');
    const btnUnder = document.getElementById('btn-under');
    const btnOver = document.getElementById('btn-over');

    window.updateStatsFromSlider = function() {
        iniciarAudio();
        if(!isRolling) tocarSom('sfxClick');
        
        let chance = parseFloat(slider.value);
        let payout = RTP / chance;
        payoutInput.value = payout.toFixed(2);
        syncUI(chance, payout);
    }

    window.updateStatsFromPayout = function() {
        iniciarAudio();
        let payout = parseFloat(payoutInput.value);
        if(payout < 1.01) payout = 1.01;
        if(payout > 970.00) payout = 970.00; 

        let chance = RTP / payout;
        slider.value = chance.toFixed(2);
        syncUI(chance, payout);
    }

    function syncUI(chance, payout) {
        let bet = parseFloat(betInput.value);
        if (isNaN(bet) || bet <= 0) bet = 1.00;
        
        let winAmount = bet * payout;
        
        chanceDisplay.innerText = chance.toFixed(2) + ' %';
        potentialWin.innerText = winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + ' BRL';
        
        let tUnder = chance;
        let tOver = 100 - chance;
        targetUnder.innerText = tUnder.toFixed(2);
        targetOver.innerText = tOver.toFixed(2);

        // Dinamismo das cores da pista ao deslizar a barra
        trackTop.style.background = `linear-gradient(to right, var(--track-red) ${tOver}%, var(--track-blue) ${tOver}%)`;
        trackBottom.style.background = `linear-gradient(to right, var(--track-green) ${tUnder}%, var(--track-red) ${tUnder}%)`;
    }

    window.adjustBet = function(amount) {
        if (isRolling) return;
        iniciarAudio(); tocarSom('sfxClick');
        let currentBet = parseFloat(betInput.value);
        currentBet = Math.max(0.10, currentBet + amount);
        betInput.value = currentBet.toFixed(2);
        updateStatsFromSlider();
    }

    window.doubleBet = function() {
        if (isRolling) return;
        iniciarAudio(); tocarSom('sfxClick');
        let currentBet = parseFloat(betInput.value);
        betInput.value = (currentBet * 2).toFixed(2);
        updateStatsFromSlider();
    }

    window.rollDice = async function(type) {
        if (isRolling) return;
        iniciarAudio(); tocarSom('sfxClick');
        
        let bet = parseFloat(betInput.value);
        if (bet > saldoUsuario) {
            alert("Saldo insuficiente.");
            return;
        }

        isRolling = true;
        btnUnder.disabled = true;
        btnOver.disabled = true;
        slider.disabled = true;
        payoutInput.disabled = true;
        betInput.disabled = true;
        resultDisplay.classList.remove('win', 'lose');

        // 1. DESCONTAR APOSTA DO FIREBASE
        let saldoReduzido = saldoUsuario - bet;
        document.getElementById('user-balance').innerText = `Saldo: R$ ${saldoReduzido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        await set(dbRefSaldo, parseFloat(saldoReduzido.toFixed(2)));

        // 2. ADICIONA NO CAIXA GLOBAL
        get(ref(db, 'sistema/caixa_global')).then(snap => {
            let caixaAtual = parseFloat(snap.val() || 0);
            set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual + bet).toFixed(2)));
        });

        const chance = parseFloat(slider.value);
        const payout = parseFloat(payoutInput.value);
        
        // RESULTADO FINAL RNG (0.00 a 99.99)
        const finalResult = (Math.random() * 100).toFixed(2);

        // Animação de Sorteio com Som Sincronizado
        let ticks = 0;
        const rollInterval = setInterval(() => {
            resultDisplay.innerText = (Math.random() * 100).toFixed(2);
            tocarSom('sfxRoll');
            ticks++;
            
            if (ticks > 25) { // Duração do sorteio
                clearInterval(rollInterval);
                finishRoll(finalResult, type, chance, payout, bet);
            }
        }, 40);
    }

    async function finishRoll(result, type, chance, payout, bet) {
        resultDisplay.innerText = result;
        let numResult = parseFloat(result);
        
        let isWin = false;
        if (type === 'under' && numResult < chance) {
            isWin = true;
        } else if (type === 'over' && numResult > (100 - chance)) {
            isWin = true;
        }

        if (isWin) {
            resultDisplay.classList.add('win');
            tocarSom('sfxWin');
            
            let winAmount = bet * payout;
            
            // 3. PAGAR O LUCRO NO FIREBASE
            let novoSaldo = saldoUsuario + winAmount;
            await set(dbRefSaldo, parseFloat(novoSaldo.toFixed(2)));

            // 4. DESCONTA O PRÊMIO DO CAIXA GLOBAL
            get(ref(db, 'sistema/caixa_global')).then(snap => {
                let caixaAtual = parseFloat(snap.val() || 0);
                set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - winAmount).toFixed(2)));
            });

        } else {
            resultDisplay.classList.add('lose');
            tocarSom('sfxLose');
        }

        isRolling = false;
        btnUnder.disabled = false;
        btnOver.disabled = false;
        slider.disabled = false;
        payoutInput.disabled = false;
        betInput.disabled = false;
    }

    // Ligar listeners ao HTML
    slider.addEventListener('input', updateStatsFromSlider);
    payoutInput.addEventListener('change', updateStatsFromPayout);

    // Iniciar interface
    updateStatsFromSlider();

    // Tratamento de saída abrupta para blindagem
    window.addEventListener('pagehide', () => { if(isRolling) isRolling = false; });
    document.addEventListener('visibilitychange', function() { if (document.hidden && isRolling) isRolling = false; });

</script>

</body>
</html>
