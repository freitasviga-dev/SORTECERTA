<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SorteCerta - Aviator Oficial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1c1c1c;
            --bg-panel: #2b2b2b;
            --red-crash: #e74c3c;
            --green-win: #28a745;
            --gold: #f1c40f;
            --text-main: #ffffff;
            --text-muted: #9e9e9e;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; font-size: 14px; overflow-x: hidden; }

        /* HEADER E SALDO */
        .header { background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-area { display: flex; align-items: center; gap: 10px; color: var(--red-crash); font-weight: 900; font-style: italic; font-size: 18px; text-transform: uppercase; }
        .logo-area a { color: var(--text-muted); text-decoration: none; margin-right: 5px; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .balance-box { color: var(--green-win); font-weight: 900; font-size: 14px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .settings-btn { color: var(--text-muted); font-size: 18px; cursor: pointer; }

        /* HISTÓRICO DE MULTIPLICADORES */
        .history-bar { display: flex; gap: 5px; padding: 5px 10px; background: #000; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); align-items: center; }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-icon { color: var(--text-muted); margin-right: 5px; font-size: 12px; }
        .pill { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; background: #222; }
        .pill.blue { color: #3498db; } .pill.purple { color: #9b59b6; } .pill.pink { color: #e84393; }

        /* ARENA DO JOGO */
        .game-arena { position: relative; height: 280px; background: #0a0a0c; border-bottom: 2px solid var(--red-crash); overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); }
        .stars { position: absolute; width: 200%; height: 100%; background-image: radial-gradient(#444 1px, transparent 1px); background-size: 50px 50px; opacity: 0.2; }
        .stars.moving { animation: moveBg 10s linear infinite; }
        
        .plane-container { position: absolute; bottom: 10%; left: 10%; transition: transform 0.1s linear; z-index: 10; opacity: 0; }
        .plane-icon { font-size: 50px; color: var(--red-crash); filter: drop-shadow(0 5px 10px rgba(231,76,60,0.5)); transition: 0.2s; }
        .curve { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top right, transparent 49%, var(--red-crash) 50%, transparent 51%); opacity: 0; transform-origin: bottom left; transition: transform 0.1s linear; }

        .multiplier-text { position: absolute; font-size: 60px; font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: -2px; z-index: 20; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .crashed-text { color: var(--red-crash); }
        
        /* BARRA DE PROGRESSO (ESPERA) */
        .waiting-panel { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 30; }
        .wait-title { color: var(--gold); font-weight: bold; font-size: 20px; text-transform: uppercase; animation: pulse 1s infinite; }
        .progress-bar-bg { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--red-crash); width: 100%; transition: width 0.1s linear; }

        /* PAINEL DE CONTROLES GERAL */
        .controls-wrapper { padding: 10px; background: #121212; }
        .control-panel { background: var(--bg-panel); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }
        
        /* ABAS: APOSTA / AUTO */
        .tabs { display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 5px; }
        .tab { color: var(--text-muted); font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--red-crash); padding-bottom: 2px; }

        /* OPÇÕES AUTOMÁTICAS */
        .auto-options { display: none; justify-content: space-between; background: #222; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        .auto-options.show { display: flex; }
        .toggle-box { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; color: #ccc; cursor: pointer; }
        .auto-input { background: #111; border: 1px solid #444; color: #fff; width: 55px; padding: 4px; border-radius: 4px; text-align: center; font-size: 11px; font-weight: bold; }

        /* INPUT DE APOSTA E BOTÃO PRINCIPAL */
        .bet-input-row { display: flex; gap: 10px; align-items: center; }
        .stepper { display: flex; align-items: center; background: #111; border: 1px solid #444; border-radius: 8px; flex: 1; padding: 2px; }
        .btn-step { background: transparent; border: none; color: #888; width: 40px; height: 40px; font-size: 20px; cursor: pointer; }
        .btn-step:active { color: #fff; }
        .input-bet { width: 100%; background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 900; text-align: center; outline: none; }
        
        .btn-action { flex: 1.2; height: 50px; border-radius: 12px; border: none; color: #fff; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 0 rgba(0,0,0,0.3); transition: 0.1s; }
        .btn-action:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-bet { background: #28a745; box-shadow: 0 4px 0 #1b6d2d; }
        .btn-cancel { background: #e74c3c; box-shadow: 0 4px 0 #962d22; }
        .btn-cashout { background: #f39c12; box-shadow: 0 4px 0 #a66a0b; color: #000; }
        .btn-sub { font-size: 11px; opacity: 0.9; font-weight: bold; }

        /* BOTÕES RÁPIDOS */
        .quick-bets { display: flex; gap: 5px; margin-top: 5px; }
        .btn-quick { flex: 1; background: #111; border: 1px solid #444; color: var(--text-muted); border-radius: 6px; padding: 8px 0; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-quick:active { background: #333; color: #fff; }

        /* RANKING / TABELA DE JOGADORES */
        .players-panel { background: var(--bg-card); margin: 10px; border-radius: 12px; padding: 10px; border: 1px solid var(--border); }
        .panel-title { font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .players-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; }
        .player-row { display: flex; justify-content: space-between; background: #222; padding: 8px 10px; border-radius: 6px; font-size: 11px; align-items: center; border: 1px solid transparent; transition: 0.2s; }
        .player-row.won { background: rgba(40, 167, 69, 0.1); border-color: rgba(40, 167, 69, 0.3); }
        .p-user { display: flex; align-items: center; gap: 8px; width: 40%; color: #ccc; }
        .p-user i { font-size: 16px; color: #555; }
        .p-bet { width: 20%; text-align: right; color: #fff; font-weight: bold; }
        .p-mult { width: 15%; text-align: center; font-weight: bold; color: var(--gold); }
        .p-win { width: 25%; text-align: right; font-weight: bold; color: var(--green-win); }

        /* AVISOS DO SISTEMA (TOASTS) */
        .toast-container { position: fixed; top: 60px; right: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.9); border-left: 4px solid var(--green-win); color: #fff; padding: 10px 15px; border-radius: 4px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: slideIn 0.3s forwards, fadeOut 0.3s forwards 2.7s; }
        .toast.error { border-color: var(--red-crash); }

        @keyframes moveBg { from { transform: translate(0, 0); } to { transform: translate(-50px, 50px); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
            <i class="fa-solid fa-plane-up"></i> Aviator
        </div>
        <div class="header-right">
            <div class="balance-box" onclick="window.location.href='saldo.html'"><i class="fa-solid fa-wallet"></i> <span id="displaySaldoTop">0.00</span></div>
            <i class="fa-solid fa-volume-high settings-btn" onclick="toggleSound()" id="soundIcon"></i>
        </div>
    </header>

    <div class="history-bar" id="historyBar">
        <i class="fa-solid fa-clock-rotate-left history-icon"></i>
        </div>

    <div class="game-arena">
        <div class="stars" id="bgStars"></div>
        <div class="curve" id="graphCurve"></div>
        
        <div class="plane-container" id="planeContainer">
            <i class="fa-solid fa-plane plane-icon" id="planeIcon"></i>
        </div>

        <div class="multiplier-text" id="mainMultiplier" style="display: none;">1.00x</div>
        
        <div class="waiting-panel" id="waitingPanel">
            <div class="wait-title">Aguardando Próxima...</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="waitProgress"></div></div>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="control-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('manual', this)">Aposta</div>
                <div class="tab" onclick="switchTab('auto', this)">Auto</div>
            </div>

            <div class="auto-options" id="autoOptions">
                <label class="toggle-box"><input type="checkbox" id="chkAutoBet"> Auto Aposta</label>
                <label class="toggle-box">Auto Retirar: <input type="number" id="inputAutoCashout" class="auto-input" value="2.00" step="0.10"></label>
            </div>

            <div class="bet-input-row">
                <div class="stepper">
                    <button class="btn-step" onclick="adjustBet(-1)">-</button>
                    <input type="number" id="inputBet" class="input-bet" value="1.00" step="1.00" min="1.00">
                    <button class="btn-step" onclick="adjustBet(1)">+</button>
                </div>
                <button class="btn-action btn-bet" id="btnMain" onclick="handleMainAction()">
                    <span id="btnMainText">APOSTAR</span>
                    <span class="btn-sub" id="btnSubText">R$ 1.00</span>
                </button>
            </div>

            <div class="quick-bets">
                <button class="btn-quick" onclick="quickBet(1)">R$1</button>
                <button class="btn-quick" onclick="quickBet(5)">R$5</button>
                <button class="btn-quick" onclick="quickBet(10)">R$10</button>
                <button class="btn-quick" onclick="quickBet(50)">R$50</button>
                <button class="btn-quick" onclick="mathBet(0.5)">1/2</button>
                <button class="btn-quick" onclick="mathBet(2)">2x</button>
            </div>
        </div>
    </div>

    <div class="players-panel">
        <div class="panel-title">
            <span>Todos os Apostadores</span>
            <span id="activePlayersCount">0</span>
        </div>
        <div class="players-list" id="playersList">
            </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // IDENTIFICAÇÃO E BANCA
        let idDispositivo = localStorage.getItem('usuario_tracker_id') || 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
        let bancaAtual = 0.00;
        let caixaDaCasa = 0.00;
        let margemLucro = 0.30;
        let modoJogo = "normal";
        let estadoSequencia = 0;
        let valorPremioForcado = 0;

        // MÁQUINA DE ESTADOS DO JOGO
        let gameState = 'waiting'; // waiting, flying, crashed
        let playerState = 'idle';  // idle, queued, betting, cashed_out
        
        let currentBet = 1.00;
        let activeBetAmount = 0;
        let multiplier = 1.00;
        let crashPoint = 1.00;
        
        let flightInterval, waitInterval;
        let flightTime = 0;
        let soundEnabled = true;
        let fakePlayers = [];
        let historyArray = [1.24, 2.50, 1.05, 12.40, 1.10];

        // ÁUDIO E EFEITOS
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let engineOscillator;

        // ELEMENTOS UI
        const btnMain = document.getElementById('btnMain');
        const txtMain = document.getElementById('btnMainText');
        const txtSub = document.getElementById('btnSubText');
        const txtMult = document.getElementById('mainMultiplier');
        const waitingPanel = document.getElementById('waitingPanel');
        const planeContainer = document.getElementById('planeContainer');
        const planeIcon = document.getElementById('planeIcon');
        const graphCurve = document.getElementById('graphCurve');
        const inputBet = document.getElementById('inputBet');

        // INICIALIZAÇÃO
        initHistory();
        startWaitingPhase();

        // SINCRONIZAÇÃO COM FIREBASE
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                if (playerState === 'idle' || playerState === 'queued') bancaAtual = parseFloat(dados.saldo || 0);
                if (estadoSequencia !== 3) modoJogo = String(dados.modo || "normal").toLowerCase();
                let isca = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                if (isca > 0 && estadoSequencia === 0) { valorPremioForcado = isca; estadoSequencia = 1; set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0); }
            }
            updateBalance();
        });
        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        // CONTROLES E BOTÕES DE VALOR RÁPIDO
        window.adjustBet = (val) => { let v = parseFloat(inputBet.value) + val; updateInputBet(v); }
        window.quickBet = (val) => { updateInputBet(val); }
        window.mathBet = (mult) => { let v = parseFloat(inputBet.value) * mult; updateInputBet(v); }
        
        function updateInputBet(v) { 
            if(playerState === 'betting' || playerState === 'cashed_out') return; 
            currentBet = Math.max(1, v); 
            inputBet.value = currentBet.toFixed(2); 
            if(playerState === 'idle') txtSub.innerText = "R$ " + currentBet.toFixed(2); 
        }
        
        inputBet.addEventListener('input', (e) => { let v = parseFloat(e.target.value); if(!isNaN(v) && v > 0) updateInputBet(v); });

        window.switchTab = (tab, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('autoOptions').className = tab === 'auto' ? 'auto-options show' : 'auto-options';
        }

        window.toggleSound = () => { 
            soundEnabled = !soundEnabled; 
            document.getElementById('soundIcon').className = soundEnabled ? 'fa-solid fa-volume-high settings-btn' : 'fa-solid fa-volume-xmark settings-btn'; 
        }

        // ==========================================
        // FLUXO DE APOSTA (BOTÃO PRINCIPAL)
        // ==========================================
        window.handleMainAction = () => {
            if(!audioCtx) audioCtx = new AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            if (playerState === 'idle') {
                if (bancaAtual < currentBet) return showToast("Saldo insuficiente", "error");
                
                playerState = gameState === 'waiting' ? 'betting' : 'queued';
                activeBetAmount = currentBet;
                
                bancaAtual -= activeBetAmount;
                set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
                
                showToast("Aposta aceita");
                updateButtonState();
            } 
            else if (playerState === 'queued' || (playerState === 'betting' && gameState === 'waiting')) {
                bancaAtual += activeBetAmount;
                set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
                playerState = 'idle';
                showToast("Aposta cancelada");
                updateButtonState();
            } 
            else if (playerState === 'betting' && gameState === 'flying') {
                processCashout();
            }
        }

        function updateButtonState() {
            if (playerState === 'idle') {
                btnMain.className = 'btn-action btn-bet'; txtMain.innerText = "APOSTAR"; txtSub.innerText = "R$ " + currentBet.toFixed(2); btnMain.disabled = false;
            } else if (playerState === 'queued') {
                btnMain.className = 'btn-action btn-cancel'; txtMain.innerText = "CANCELAR"; txtSub.innerText = "Aguardando Próxima"; btnMain.disabled = false;
            } else if (playerState === 'betting') {
                if (gameState === 'waiting') { btnMain.className = 'btn-action btn-cancel'; txtMain.innerText = "CANCELAR"; txtSub.innerText = "R$ " + activeBetAmount.toFixed(2); btnMain.disabled = false; }
                else if (gameState === 'flying') { btnMain.className = 'btn-action btn-cashout'; txtMain.innerText = "RETIRAR"; btnMain.disabled = false; }
            } else if (playerState === 'cashed_out') {
                btnMain.className = 'btn-action btn-bet'; txtMain.innerText = "AGUARDE"; txtSub.innerText = "Rodada Encerrar"; btnMain.disabled = true;
            }
        }

        // ==========================================
        // FASE 1: ESPERA E CARREGAMENTO
        // ==========================================
        function startWaitingPhase() {
            gameState = 'waiting';
            generateFakePlayers();
            
            // Lógica Auto Bet
            if (playerState === 'idle' && document.getElementById('chkAutoBet').checked) {
                if(bancaAtual >= currentBet) {
                    playerState = 'betting'; activeBetAmount = currentBet;
                    bancaAtual -= activeBetAmount; set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
                    showToast("Auto Aposta Registrada");
                } else { showToast("Saldo insuficiente para Auto Aposta", "error"); document.getElementById('chkAutoBet').checked = false; }
            }
            if (playerState === 'queued') playerState = 'betting';

            updateButtonState();
            
            waitingPanel.style.display = 'flex';
            txtMult.style.display = 'none';
            txtMult.classList.remove('crashed-text');
            planeContainer.style.opacity = '0';
            planeContainer.style.transform = 'none';
            planeIcon.className = 'fa-solid fa-plane plane-icon';
            document.getElementById('bgStars').classList.remove('moving');

            let waitTime = 5000;
            let start = Date.now();
            document.getElementById('waitProgress').style.width = '100%';

            waitInterval = setInterval(() => {
                let passed = Date.now() - start;
                let pct = Math.max(0, 100 - (passed / waitTime) * 100);
                document.getElementById('waitProgress').style.width = pct + '%';
                
                if (passed >= waitTime) {
                    clearInterval(waitInterval);
                    startFlightPhase();
                }
            }, 50);
        }

        // ==========================================
        // CÁLCULO DO CRASH BASEADO NO COFRE
        // ==========================================
        function generateCrashPoint() {
            if (estadoSequencia === 1 && valorPremioForcado > 0 && playerState === 'betting') {
                crashPoint = (valorPremioForcado / activeBetAmount) + (Math.random() * 2); 
                estadoSequencia = 3; set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo'); return;
            }
            if (modoJogo === 'agressivo' || estadoSequencia === 3) {
                if (Math.random() < 0.70) { crashPoint = 1.00; return; }
                crashPoint = 1.01 + (Math.random() * 0.25); return;
            }
            if (Math.random() < 0.05) { crashPoint = 1.00; return; }

            let rawCrash = 1.01 / (1 - Math.random());
            
            if (playerState === 'betting') {
                let maxPaga = caixaDaCasa * (1 - margemLucro);
                let maxMult = maxPaga / activeBetAmount;
                if (rawCrash > maxMult) crashPoint = Math.max(1.05, maxMult * Math.random());
                else if (modoJogo === 'desfarcado' && rawCrash > 4.00) crashPoint = 1.10 + (Math.random() * 2);
                else crashPoint = rawCrash;
            } else {
                crashPoint = rawCrash; 
            }
            crashPoint = parseFloat(crashPoint.toFixed(2));
        }

        // ==========================================
        // FASE 2: VOO E GRÁFICO
        // ==========================================
        function startFlightPhase() {
            gameState = 'flying';
            multiplier = 1.00; flightTime = 0;
            generateCrashPoint();
            
            if(playerState === 'betting') set(ref(db, 'sistema/caixa_global'), parseFloat((caixaDaCasa + activeBetAmount).toFixed(2)));

            waitingPanel.style.display = 'none';
            txtMult.style.display = 'block';
            txtMult.innerText = "1.00x";
            planeContainer.style.opacity = '1';
            document.getElementById('bgStars').classList.add('moving');
            
            updateButtonState();

            if (crashPoint <= 1.00) return triggerCrash();

            startEngineSound();

            flightInterval = setInterval(() => {
                flightTime += 50; 
                multiplier = Math.pow(Math.E, 0.00006 * flightTime);

                if(engineOscillator && audioCtx) engineOscillator.frequency.value = 80 + (multiplier * 15);

                // Auto Cash Out
                if (playerState === 'betting' && document.getElementById('chkAutoBet').checked) {
                    let autoVal = parseFloat(document.getElementById('inputAutoCashout').value);
                    if (multiplier >= autoVal) processCashout();
                }

                if (multiplier >= crashPoint) {
                    multiplier = crashPoint; triggerCrash();
                } else {
                    txtMult.innerText = multiplier.toFixed(2) + "x";
                    if (playerState === 'betting') txtSub.innerText = "R$ " + (activeBetAmount * multiplier).toFixed(2);
                    animateVisuals(multiplier);
                    updateFakePlayers(multiplier);
                }
            }, 50);
        }

        function animateVisuals(mult) {
            let prog = Math.min((mult - 1) / 3, 1);
            let pX = prog * 150; let pY = prog * -100;
            planeContainer.style.transform = `translate(${pX}px, ${pY}px) rotate(${prog * -10}deg)`;
            graphCurve.style.transform = `scale(${0.1 + (prog * 1.5)})`;
        }

        // ==========================================
        // FASE 3: RETIRADA E O SEGREDO DOS 2 SEGUNDOS
        // ==========================================
        function processCashout() {
            playerState = 'cashed_out';
            let winAmount = parseFloat((activeBetAmount * multiplier).toFixed(2));
            
            bancaAtual += winAmount;
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            set(ref(db, 'sistema/caixa_global'), parseFloat(Math.max(0, caixaDaCasa - winAmount).toFixed(2)));
            updateBalance();

            showToast(`Você ganhou R$ ${winAmount.toFixed(2)}`, "success");
            updateButtonState();
            updateRealPlayerInList(winAmount, multiplier);
            playCashoutSound();

            // A LÓGICA DO FOMO: O avião DEVE explodir 2 segundos após o saque
            let timeIn2Sec = flightTime + 2000;
            let newCrashMult = Math.pow(Math.E, 0.00006 * timeIn2Sec);
            crashPoint = parseFloat(newCrashMult.toFixed(2)); 
        }

        function triggerCrash() {
            clearInterval(flightInterval);
            gameState = 'crashed';
            if (playerState === 'betting') playerState = 'idle'; // O jogador perdeu
            
            stopEngineSound();
            playExplosionSound();

            txtMult.innerText = crashPoint.toFixed(2) + "x";
            txtMult.classList.add('crashed-text');
            document.getElementById('bgStars').classList.remove('moving');
            
            planeIcon.className = 'fa-solid fa-burst plane-icon';
            planeIcon.style.transform = 'scale(1.5)';
            setTimeout(() => { planeContainer.style.opacity = '0'; }, 300);

            updateButtonState();
            
            historyArray.unshift(crashPoint);
            if(historyArray.length > 20) historyArray.pop();
            renderHistory();

            setTimeout(startWaitingPhase, 3000);
        }

        // ==========================================
        // PROVA SOCIAL (TABELA DE JOGADORES)
        // ==========================================
        function generateFakePlayers() {
            fakePlayers = [];
            const names = ["***tor", "***ana", "***oao", "***dro", "***cas", "***777", "***vip", "***xds"];
            let q = Math.floor(Math.random() * 5) + 5;
            document.getElementById('activePlayersCount').innerText = q + (playerState === 'betting' ? 1 : 0);
            
            for(let i=0; i<q; i++) {
                fakePlayers.push({
                    name: names[Math.floor(Math.random()*names.length)],
                    bet: [5, 10, 20, 50, 100][Math.floor(Math.random()*5)],
                    cashOutAt: 1.10 + (Math.random() * 4),
                    done: false
                });
            }
            renderPlayersList();
        }

        function updateFakePlayers(currentMult) {
            let changed = false;
            fakePlayers.forEach(p => {
                if(!p.done && currentMult >= p.cashOutAt) { p.done = true; changed = true; }
            });
            if(changed) renderPlayersList();
        }

        function renderPlayersList() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            
            if (playerState === 'betting' || playerState === 'cashed_out') {
                let mText = playerState === 'cashed_out' ? multiplier.toFixed(2)+'x' : '-';
                let wText = playerState === 'cashed_out' ? 'R$ '+(activeBetAmount * multiplier).toFixed(2) : '-';
                list.innerHTML += `<div class="player-row ${playerState === 'cashed_out' ? 'won' : ''}">
                    <div class="p-user"><i class="fa-solid fa-user" style="color:var(--green-win)"></i> Você</div>
                    <div class="p-bet">R$ ${activeBetAmount.toFixed(2)}</div>
                    <div class="p-mult">${mText}</div>
                    <div class="p-win">${wText}</div>
                </div>`;
            }

            fakePlayers.forEach(p => {
                let mText = p.done ? p.cashOutAt.toFixed(2)+'x' : '-';
                let wText = p.done ? 'R$ '+(p.bet * p.cashOutAt).toFixed(2) : '-';
                list.innerHTML += `<div class="player-row ${p.done ? 'won' : ''}">
                    <div class="p-user"><i class="fa-solid fa-user-ninja"></i> ${p.name}</div>
                    <div class="p-bet">R$ ${p.bet.toFixed(2)}</div>
                    <div class="p-mult">${mText}</div>
                    <div class="p-win">${wText}</div>
                </div>`;
            });
        }
        function updateRealPlayerInList() { renderPlayersList(); }

        // ==========================================
        // UTILS E ÁUDIO
        // ==========================================
        function updateBalance() { document.getElementById('displaySaldoTop').innerText = bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        
        function initHistory() { renderHistory(); }
        function renderHistory() {
            const bar = document.getElementById('historyBar');
            bar.innerHTML = '<i class="fa-solid fa-clock-rotate-left history-icon"></i>';
            historyArray.forEach(m => {
                let color = m < 2 ? 'blue' : (m < 10 ? 'purple' : 'pink');
                bar.innerHTML += `<div class="pill ${color}">${m.toFixed(2)}x</div>`;
            });
        }

        function showToast(msg, type = "success") {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div'); el.className = `toast ${type}`; el.innerText = msg;
            container.appendChild(el); setTimeout(() => el.remove(), 3000);
        }

        function startEngineSound() {
            if(!audioCtx || !soundEnabled) return;
            try {
                engineOscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                engineOscillator.type = 'sawtooth';
                engineOscillator.frequency.value = 80;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                engineOscillator.connect(gain); gain.connect(audioCtx.destination);
                engineOscillator.start();
            } catch(e){}
        }
        function stopEngineSound() { if(engineOscillator) { try { engineOscillator.stop(); engineOscillator.disconnect(); } catch(e){} } }
        function playCashoutSound() {
            if(!audioCtx || !soundEnabled) return;
            try { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(600, audioCtx.currentTime); o.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4); } catch(e){}
        }
        function playExplosionSound() {
            if(!audioCtx || !soundEnabled) return;
            try { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(100, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.8); g.gain.setValueAtTime(0.4, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.8); } catch(e){}
        }
    </script>
</body>
</html>
