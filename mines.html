    <style>
        :root {
            /* TEMA PREMIUM DARK INDIGO VIP 👑 */
            --bg-top: #2a0a3a; 
            --bg-bottom: #0a0210;
            --panel-bg: #14051c;
            --gold: #f1c40f; --gold-dark: #b8860b;
            --red: #e74c3c; --red-dark: #c0392b;
            --black: #1a1a1a; --black-light: #2c3e50;
            --green: #00e676; --green-dark: #00b359;
            --text-light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }

        body { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-light); display: flex; flex-direction: column; overflow: hidden;
        }

        .btn-3d { transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease; cursor: pointer; }
        .btn-3d:active:not(.disabled) { transform: translateY(4px) !important; box-shadow: none !important; margin-top: 4px; border-bottom-width: 0px !important;}

        /* HEADER VIP PADRONIZADO */
        .header-bar { height: 50px; flex-shrink: 0; padding: 0 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 15px; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.6); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .logo-text i { color: var(--gold); font-size: 13px; }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* GAME AREA RESPONSIVA */
        .game-area { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; width: 100%; max-width: 450px; margin: 0 auto; }
        
        .board-header { width: 100%; max-width: 380px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(0,0,0,0.25); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        
        /* SELECT COM A SETINHA */
        .select-wrapper { position: relative; display: inline-block; }
        .select-wrapper::after { content: '\25BC'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #fff; font-size: 10px; pointer-events: none; }
        .mines-select { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-bottom: 3px solid #000; padding: 6px 28px 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; outline: none; appearance: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        
        .next-multiplier { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 900; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4), inset 0 2px 2px rgba(255,255,255,0.4); transition: 0.3s; display: flex; align-items: center; gap: 5px; }

        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: min(100%, calc(100dvh - 280px)); background: rgba(0,0,0,0.4); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5); aspect-ratio: 1/1; flex-shrink: 1; }
        
        /* TILES 3D PROFUNDIDADE (Estilo Dark Indigo VIP) */
        .tile { background: linear-gradient(180deg, #2b1145 0%, #150524 100%); border-radius: 10px; position: relative; box-shadow: inset 0 2px 2px rgba(255,255,255,0.1), inset 0 -4px 0 rgba(0,0,0,0.6), 0 5px 8px rgba(0,0,0,0.5); border-bottom: 4px solid #08020d; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.1s; }
        .tile::after { content: ''; position: absolute; width: 12px; height: 12px; background: rgba(0,0,0,0.4); border-radius: 50%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); }
        .tile:active:not(.opened) { transform: translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.4); border-bottom-width: 0px; }
        
        .tile.opened { background: #0a0210; box-shadow: inset 0 4px 15px rgba(0,0,0,0.9); transform: translateY(4px); border-bottom-width: 0px; cursor: default; }
        .tile.opened::after { display: none; }
        
        .tile.gem { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile.gem::before { content: '👑'; font-size: min(6.5vw, 30px); filter: drop-shadow(0 0 20px rgba(241, 196, 15, 1)); }

        .tile.bomb-reveal::before { content: '💣'; font-size: min(5.5vw, 24px); opacity: 0.9; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));}

        /* PAINEL DE CONTROLE */
        .controls-wrapper { flex-shrink: 0; width: 100%; background: var(--panel-bg); border-top: 2px solid #230833; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }

        .btn-secondary.auto-active { color: #000; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 4px 0 #7a5805; border: none; }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.5); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }

        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 4px 0; border-radius: 10px; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: linear-gradient(180deg, #3d1455, #1d072b); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 15px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 0 #0d0214; cursor: pointer; transition: 0.1s; border-bottom: none;}
        .bet-adjust:active { transform: translateY(4px); box-shadow: none; }

        /* BOTÃO APOSTAR / SACAR (Estilo VIP) */
        .bet-button { width: 100%; background: linear-gradient(180deg, var(--green), var(--green-dark)) !important; border: none; border-radius: 12px; padding: 15px; color: #000 !important; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 5px 0 #006633, 0 8px 15px rgba(0, 230, 118, 0.4) !important; display: flex; justify-content: center; align-items: center; gap: 10px; text-shadow: none !important; transition: all 0.1s; border-bottom: none;}
        .bet-button:active:not(.disabled) { transform: translateY(5px); box-shadow: none !important; }
        
        .bet-button.playing { background: linear-gradient(180deg, #444, #222) !important; box-shadow: 0 5px 0 #111 !important; color: #aaa !important; pointer-events: none; border-bottom: none;}
        .bet-button.cashout { background: linear-gradient(180deg, var(--gold), #d35400) !important; box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 5px 0 #8a3a00, 0 8px 15px rgba(243, 156, 18, 0.4) !important; color: #fff !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5) !important; border-bottom: none;}
        .bet-button.disabled { background: linear-gradient(180deg, #444, #222) !important; box-shadow: 0 5px 0 #111 !important; color: #888 !important; pointer-events: none; border-bottom: none;}

        .footer-info { display: flex; justify-content: space-between; align-items: center; padding: 0 2px; }
        .game-name { font-size: 10px; color: #888; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* PAINEL DE SALDO TOTALMENTE DOURADO VIP */
        .balance-info { font-size: 16px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 8px; background: #0c0c0c; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .balance-info i { color: var(--gold); font-size: 16px; }

        .auto-spin-menu { position: absolute; bottom: 135px; right: 15px; background: #0a0a0a; border: 1px solid var(--gold-dark); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 6px; transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 50; width: 110px; }
        .auto-spin-menu.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .auto-btn-option { background: linear-gradient(180deg, #222, #111); border: 1px solid #333; color: #fff; padding: 8px 0; border-radius: 8px; font-weight: 900; text-align: center; cursor: pointer; font-size: 13px; text-transform: uppercase; box-shadow: 0 2px 0 #000; }
        .auto-btn-option:active { background: linear-gradient(180deg, var(--gold), var(--gold-dark)); color: #000; box-shadow: none; transform: translateY(2px); border-color: transparent; }

        /* POP-UP COMPACTO DE VITÓRIA (TEXTO ENCURTADO E ELEGANTE) */
        .win-toast { position: fixed; top: calc(65px + env(safe-area-inset-top)); left: 50%; transform: translate(-50%, -20px) scale(0.9); background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; font-size: 18px; box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5), inset 0 2px 5px rgba(255,255,255,0.5); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; display: flex; flex-direction: column; align-items: center; border: 2px solid #fff; }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .win-toast #winAmount { font-size: 20px; font-weight: 900; color: #000; letter-spacing: -0.5px; }

        .system-toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 90px; }

        /* TELA INICIAL (DESBLOQUEIO DE ÁUDIO) */
        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a14; z-index: 9999999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.3s ease; }
        #startScreen h2 { color: var(--gold); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 25px; font-size: 26px; text-shadow: 0 0 20px rgba(241,196,15,0.5); display: flex; align-items: center; gap: 10px; }
        .btn-start { background: linear-gradient(180deg, var(--green), var(--green-dark)); color: #000; padding: 15px 40px; border-radius: 30px; font-weight: 900; text-transform: uppercase; box-shadow: inset 0 2px 2px rgba(255,255,255,0.5), 0 8px 20px rgba(0, 230, 118, 0.4); font-size: 14px; letter-spacing: 1px; }

        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }
    </style>
</head>

    <script type="module">

        let bancaAtual = 0; let saldoRealAtual = 0; let caixaDaCasa = 0; let proporcaoRealNaMesa = 1.0;

        function forceAudioResume() {
            if (audioLigado && audioCtx && audioCtx.state === 'suspended') {

        }

        // Sensor Global Ultra Agressivo

                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, t); osc.frequency.setValueAtTime(659.25, t + 0.1); 
                osc.frequency.setValueAtTime(783.99, t + 0.2); osc.frequency.setValueAtTime(1046.50, t + 0.3); 
                gainNode.gain.setValueAtTime(0, t); gainNode.gain.linearRampToValueAtTime(0.3, t + 0.05); gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
                osc.start(t); osc.stop(t + 0.6);
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // DESBLOQUEIO DE TELA + FULLSCREEN API
        document.getElementById('startScreen').addEventListener('click', function() {
            this.style.opacity = '0'; setTimeout(() => { this.style.display = 'none'; }, 300);
            audioLigado = true;
            document.getElementById('btnAudio').innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            document.getElementById('btnAudio').style.color = '#fff';

            let docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen().catch(e => {});
            
            iniciarAudio(); tocarSom('sfxClick');
        });

        window.abrirInputAposta = function() {
            if(isGaming || isAutoModeActive) return; iniciarAudio();
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    tocarSom('sfxClick');
                } else { mostrarToast("Valor inválido."); }
            }
        };

        function toggleAudio() {
            iniciarAudio();
            audioLigado = !audioLigado; 
            const btn = document.getElementById('btnAudio');
            if(audioLigado) { btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btn.style.color = '#fff'; tocarSom('sfxClick'); } 
            else { btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btn.style.color = '#888'; }
        }

        // REEMBOLSO INTELIGENTE DE QUEDA DE NET / SAÍDA ABRUPTA
        async function lidarComSaidaAbrupta() {
            if (isGaming) {
                isGaming = false;
                
                // Paga automaticamente onde ele parou (seja 0 minas ou 10 minas)
                let valorRetorno = apostaAtual * currentMultiplier;
                let valorRetornoReal = valorRetorno * proporcaoRealNaMesa;

                bancaAtual += valorRetorno;
                saldoRealAtual += valorRetornoReal;

                // Salva no banco o saldo protegido
                await update(ref(db, `usuarios/${idDispositivo}`), {
                    saldo: parseFloat(bancaAtual.toFixed(2)),
                    saldo_real: parseFloat(saldoRealAtual.toFixed(2))
                }); 
                
                // Desconta o prêmio real pago do caixa da casa
                if(modoJogador !== 'admin' && modoJogador !== 'live') {
                    get(ref(db, 'sistema/caixa_global')).then(snap => {
                        let caixaAtual = parseFloat(snap.val() || 0);
                        set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - valorRetornoReal).toFixed(2)));
                    });
                }
            }
        }

        async function voltarParaLobby() {
            tocarSom('sfxClick'); pararAutoJogo(); await lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        }

        document.getElementById('btnBack').addEventListener('click', voltarParaLobby);
        document.getElementById('btnAudio').addEventListener('click', toggleAudio);
        window.addEventListener('pagehide', function() { lidarComSaidaAbrupta(); pararAutoJogo(); });
        document.addEventListener('visibilitychange', function() { 
            if (document.hidden) { lidarComSaidaAbrupta(); pararAutoJogo(); }
            else { forceAudioResume(); }
        });

        function updateSaldoDisplay(valor) { document.getElementById('displaySaldo').innerText = "R$ " + valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            if(!isGaming) {
                bancaAtual = parseFloat(dados.saldo || 0); 
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                modoJogador = dados.modo || 'normal';
                updateSaldoDisplay(bancaAtual);
            }
        });
        
        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        function mudarAposta(direcao) {
            if(isGaming || isAutoModeActive) return; iniciarAudio();
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                tocarSom('sfxClick');
            }
        }
        document.getElementById('btnMinus').addEventListener('click', () => mudarAposta(-1));
        document.getElementById('btnPlus').addEventListener('click', () => mudarAposta(1));

        // ------------------ SISTEMA AUTO JOGO ------------------ //
        function toggleMenuAuto() {
            if(isGaming || isAutoModeActive) { tocarSom('sfxClick'); pararAutoJogo(); return; }
            iniciarAudio(); tocarSom('sfxClick'); document.getElementById('menuAuto').classList.toggle('show');
        }

        function iniciarAutoJogo(qtd) {
            document.getElementById('menuAuto').classList.remove('show');
            girosAutoRestantes = qtd; isAutoModeActive = true;
            document.getElementById('btnAuto').classList.add('auto-active');
            processarAutoJogo();
        }

        function pararAutoJogo() {
            isAutoModeActive = false; girosAutoRestantes = 0; clicksAutomáticos = 0;
            document.getElementById('btnAuto').classList.remove('auto-active');
            document.getElementById('btnAuto').innerHTML = '<i class="fa-solid fa-rotate"></i> Auto Jogo';
            clearTimeout(autoTimeoutId);
            
            if (!isGaming) {
                const btn = document.getElementById('btnAction');
                btn.classList.remove('disabled', 'cashout', 'playing');
                btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            }
        }

        function processarAutoJogo() {
            if (!isAutoModeActive) return;
            if (girosAutoRestantes <= 0) { pararAutoJogo(); return; }
            document.getElementById('btnAuto').innerHTML = `<i class="fa-solid fa-rotate"></i> AUTO (${girosAutoRestantes})`;

            if (!isGaming) {
                if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); pararAutoJogo(); return; }
                clicksAutomáticos = 0; 
                const apostaIniciada = iniciarApostaBackend();
                if (apostaIniciada) { autoTimeoutId = setTimeout(fazerJogadaAuto, 600); } else { pararAutoJogo(); }
            }
        }

        function fazerJogadaAuto() {
            if (!isGaming || !isAutoModeActive) return;
            clickAleatorio();
            clicksAutomáticos++;

            if (isGaming) {
                if (clicksAutomáticos >= TARGET_CLICKS_AUTO) {
                    finalizarJogoComVitoria(); 
                    girosAutoRestantes--;
                    autoTimeoutId = setTimeout(processarAutoJogo, 1500);
                } else { autoTimeoutId = setTimeout(fazerJogadaAuto, 800); }
            } else {
                girosAutoRestantes--;
                autoTimeoutId = setTimeout(processarAutoJogo, 2500);
            }
        }

        document.getElementById('btnAuto').addEventListener('click', toggleMenuAuto);
        document.querySelectorAll('.auto-btn-option').forEach(btn => {
            btn.addEventListener('click', function() { tocarSom('sfxClick'); iniciarAutoJogo(parseInt(this.dataset.spins)); });
        });

        // MATEMÁTICA RTP
        function _0xMath(a, b) {
            if(b === 0) return 1.00; let p = 1;
            for(let i=0; i<b; i++) { p *= (25 - a - i) / (25 - i); }
            return parseFloat((0.95 / p).toFixed(2)); // Retenção 5% base
        }

        function atualizarMultiplicadorPreview() {
            if(isGaming) return;
            const minas = parseInt(document.getElementById('minesCount').value);
            document.getElementById('nextMultDisplay').innerText = _0xMath(minas, 1).toFixed(2) + "x";
        }

        function desenharGrade() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile btn-3d'; tile.dataset.index = i;
                tile.addEventListener('click', () => cliqueNoBloco(i));
                grid.appendChild(tile);
            }
        }

        function cliqueBotaoApostar() {
            if(isAutoModeActive) return; 
            iniciarAudio(); tocarSom('sfxClick');
            if (isGaming) { 
                if (openedTiles === 0) return; // TRAVA DE CLIQUE: Obriga jogar
                finalizarJogoComVitoria(); 
            } 
            else { iniciarApostaBackend(); }
        }
        document.getElementById('btnAction').addEventListener('click', cliqueBotaoApostar);

        function iniciarApostaBackend() {
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); return false; }

            // LÓGICA DE PROPORÇÃO REAL (Evita que o Bônus infle a casa)
            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;
            let apostaReal = apostaAtual * proporcaoRealNaMesa;

            isGaming = true; openedTiles = 0; currentMultiplier = 1.00;
            document.getElementById('minesCount').disabled = true;
            document.getElementById('btnMinus').style.opacity = '0.5';
            document.getElementById('btnPlus').style.opacity = '0.5';

            const btn = document.getElementById('btnAction');
            btn.classList.remove('disabled', 'cashout'); 
            
            // BOTÃO NEUTRO - OBRIGA A CLICAR NO GRID ANTES DE SACAR
            btn.classList.add('playing'); 
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> JOGANDO...`;

            bancaAtual -= apostaAtual;
            saldoRealAtual -= apostaReal;
            updateSaldoDisplay(bancaAtual);

            // FIREBASE COBRANÇA
            update(ref(db, `usuarios/${idDispositivo}`), {
                saldo: parseFloat(bancaAtual.toFixed(2)),
                saldo_real: parseFloat(saldoRealAtual.toFixed(2))
            });

            // INJETA APENAS O DINHEIRO REAL NO CAIXA GLOBAL
            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                get(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual')).then(snap => {
                    set(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual'), parseFloat((snap.val() || 0)) + apostaAtual);
                });

                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    let caixaAtual = parseFloat(snap.val() || 0);
                    set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual + apostaReal).toFixed(2)));
                });
            }

            const minas = parseInt(document.getElementById('minesCount').value);
            board = Array(25).fill(0);
            let bombasPlantadas = 0;
            while(bombasPlantadas < minas) {
                let pos = Math.floor(Math.random() * 25);
                if(board[pos] === 0) { board[pos] = 1; bombasPlantadas++; }
            }

            atualizarMultiplicadorPreview();
            desenharGrade(); 
            return true;
        }

        function cliqueNoBloco(index) {
            if(!isGaming) return; iniciarAudio();
            const tile = document.querySelector(`.tile[data-index='${index}']`);
            if(tile.classList.contains('opened')) return; 

            const minas = parseInt(document.getElementById('minesCount').value);
            let isBomb = board[index] === 1;

            // SISTEMA ANTI-QUEBRA (Olha a proporção de saldo real)
            if(!isBomb && modoJogador !== 'admin' && modoJogador !== 'live') {
                let futureMultiplier = _0xMath(minas, openedTiles + 1);
                let potentialWin = apostaAtual * futureMultiplier;
                let potentialWinReal = potentialWin * proporcaoRealNaMesa;

                // Se a casa não tiver saldo *real* pra pagar, a bomba é forçada
                if (potentialWinReal > caixaDaCasa) {
                    let bombIndex = board.findIndex((v, i) => v === 1 && !document.querySelector(`.tile[data-index='${i}']`).classList.contains('opened'));
                    if (bombIndex !== -1) {
                        board[bombIndex] = 0;
                        board[index] = 1;
                        isBomb = true;
                    }
                }
            }

            tile.classList.add('opened');

            if(isBomb) {
                isGaming = false; tocarSom('sfxBomb');
                tile.classList.add('bomb');
                endGame(false);
            } else {
                tocarSom('sfxGem'); tile.classList.add('gem');
                openedTiles++;

                currentMultiplier = _0xMath(minas, openedTiles);
                nextMultiplier = _0xMath(minas, openedTiles + 1);
                
                let valorSaque = (apostaAtual * currentMultiplier).toFixed(2);
                
                // LIBERA O BOTÃO DE SACAR AGORA QUE ELE ABRIU A PRIMEIRA MINA!
                const btn = document.getElementById('btnAction');
                btn.classList.remove('playing');
                btn.classList.add('cashout');
                btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${valorSaque.replace('.',',')})`;
                
                document.getElementById('nextMultDisplay').innerText = nextMultiplier.toFixed(2) + "x";

                if(openedTiles === (25 - minas)) { finalizarJogoComVitoria(); }
            }
        }

        function clickAleatorioUser() {
            if(!isGaming || isAutoModeActive) { mostrarToast("Inicie uma aposta primeiro."); return; }
            iniciarAudio(); tocarSom('sfxClick');
            clickAleatorio();
        }

        function clickAleatorio() {
            if(!isGaming) return;
            const closedTiles = Array.from(document.querySelectorAll('.tile:not(.opened)'));
            if(closedTiles.length > 0) {
                const randomTile = closedTiles[Math.floor(Math.random() * closedTiles.length)];
                cliqueNoBloco(parseInt(randomTile.dataset.index));
            }
        }
        document.getElementById('btnRandom').addEventListener('click', clickAleatorioUser);

        function endGame(won) {
            document.getElementById('minesCount').disabled = false;
            document.getElementById('btnMinus').style.opacity = '1';
            document.getElementById('btnPlus').style.opacity = '1';
            
            const btn = document.getElementById('btnAction');
            if(!isAutoModeActive) {
                btn.classList.remove('cashout', 'playing', 'disabled');
                btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            } else { btn.classList.add('disabled'); }
            
            document.getElementById('nextMultDisplay').innerText = _0xMath(parseInt(document.getElementById('minesCount').value), 1).toFixed(2) + "x";

            document.querySelectorAll('.tile').forEach(t => {
                let idx = parseInt(t.dataset.index);
                t.style.pointerEvents = 'none'; 
                if(!t.classList.contains('opened') && board[idx] === 1) {
                    t.classList.add('opened', 'bomb-reveal');
                }
            });

            if (isAutoModeActive && !won) { setTimeout(() => { btn.classList.remove('disabled'); }, 1500); }
        }

        async function finalizarJogoComVitoria() {
            isGaming = false;
            let lucro = apostaAtual * currentMultiplier;
            let lucroReal = lucro * proporcaoRealNaMesa; 
            
            bancaAtual += lucro;
            saldoRealAtual += lucroReal;

            // CHECK ROLLOVER
            let snapshot = await get(ref(db, `usuarios/${idDispositivo}`));
            let u = snapshot.val() || {};
            let metaRo = parseFloat(u.rollover_meta || 0); let atualRo = parseFloat(u.rollover_atual || 0);
            if (metaRo > 0 && atualRo >= metaRo) { saldoRealAtual = bancaAtual; }
            
            updateSaldoDisplay(bancaAtual);
            await update(ref(db, `usuarios/${idDispositivo}`), {
                saldo: parseFloat(bancaAtual.toFixed(2)),
                saldo_real: parseFloat(saldoRealAtual.toFixed(2))
            });
            
            // DEDUZ O PRÊMIO REAL DO COFRE GLOBAL DA CASA
            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    let caixaAtual = parseFloat(snap.val() || 0);
                    set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - lucroReal).toFixed(2)));
                });
            }

            tocarSom('sfxWin');

            document.getElementById('winToast').classList.remove('show');
            setTimeout(() => {
                const toast = document.getElementById('winToast');
                document.getElementById('winAmount').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }, 50);

            endGame(true);

            const btn = document.getElementById('btnAction');
            setTimeout(() => { if(isAutoModeActive) btn.classList.remove('disabled'); }, 1500);
        }

        desenharGrade();
        atualizarMultiplicadorPreview();
    </script>
</body>
</html>
