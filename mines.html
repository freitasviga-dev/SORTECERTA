<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Mines | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* RESET E TRAVAS MOBILE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        body { 
            background: linear-gradient(180deg, #184b9e 0%, #0d2b5e 100%);
            color: #ffffff; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none;
        }

        /* HEADER PREMIUM */
        .header-bar {
            padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            padding-top: calc(10px + env(safe-area-inset-top)); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back { color: #fff; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.8; transition: 0.2s; }
        .btn-back:active { opacity: 1; transform: scale(0.9); }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-top { color: #fff; font-size: 18px; cursor: pointer; padding: 5px; opacity: 0.8; }

        /* ÁREA PRINCIPAL DO JOGO */
        .game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; width: 100%; max-width: 450px; margin: 0 auto;
        }

        /* BARRA SUPERIOR DO TABULEIRO (Minas e Seguinte) */
        .board-header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mines-select {
            background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; outline: none; appearance: none;
        }
        .next-multiplier {
            background: linear-gradient(180deg, #f1c40f, #b8860b); color: #000;
            padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 900;
            box-shadow: 0 2px 10px rgba(241, 196, 15, 0.3); transition: 0.3s;
        }

        /* TABULEIRO MINES (GRID 5x5) */
        .mines-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%;
            background: rgba(0,0,0,0.1); padding: 8px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); aspect-ratio: 1/1;
        }
        
        .tile {
            background: #1c3a76; border-radius: 8px; position: relative;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.1s ease;
        }
        .tile::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: rgba(0,0,0,0.15); border-radius: 50%;
        }
        
        /* ESTADOS DOS BLOCOS */
        .tile:active:not(.opened) { transform: translateY(2px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
        .tile.opened {
            background: #152b5e; box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
            transform: translateY(2px); cursor: default;
        }
        .tile.opened::after { display: none; }
        
        .tile.gem { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile.gem::before { content: '💎'; font-size: 28px; filter: drop-shadow(0 0 10px rgba(0, 230, 118, 0.6)); }
        
        .tile.bomb { background: #e74c3c; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); animation: shake 0.4s ease-in-out; }
        .tile.bomb::before { content: '💣'; font-size: 28px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .tile.bomb-reveal { opacity: 0.5; background: #8a2b2b; }
        .tile.bomb-reveal::before { content: '💣'; font-size: 24px; opacity: 0.8; }

        /* CONTROLES INFERIORES E FOOTER */
        .controls-wrapper {
            width: 100%; background: #0c1f45; border-top: 2px solid #143570;
            padding: 15px; display: flex; flex-direction: column; gap: 12px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .action-row { display: flex; gap: 10px; }
        .btn-secondary {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: #aaa; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn-secondary:active { background: rgba(0,0,0,0.5); }

        .bet-button {
            width: 100%; background: linear-gradient(180deg, #00e676, #00b359);
            border: none; border-radius: 12px; padding: 16px; color: #000;
            font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3), inset 0 -3px 0 rgba(0,0,0,0.2);
            cursor: pointer; transition: all 0.1s ease; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .bet-button:active { transform: translateY(3px); box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); }
        .bet-button.cashout {
            background: linear-gradient(180deg, #f39c12, #d35400);
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), inset 0 -3px 0 rgba(0,0,0,0.2);
            animation: pulseCashout 1.5s infinite alternate; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .bet-input-row {
            display: flex; background: rgba(0,0,0,0.4); border-radius: 50px; padding: 4px;
            border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between;
        }
        .bet-label { font-size: 10px; color: #888; font-weight: 700; padding-left: 15px; text-transform: uppercase; }
        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; }
        .bet-adjust {
            background: #1c3a76; border: none; color: #fff; width: 35px; height: 35px;
            border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .bet-adjust:active { transform: scale(0.9); }

        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 5px; }
        .game-name { font-size: 11px; color: #888; font-weight: 800; }
        .balance-info { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 5px; }
        .balance-info i { color: #00e676; font-size: 12px; }

        /* WIN POPUP MÓVEL */
        .win-toast {
            position: fixed; top: 100px; left: 50%; transform: translate(-50%, -20px) scale(0.9);
            background: linear-gradient(135deg, #00e676, #00b359); color: #000;
            padding: 12px 30px; border-radius: 30px; font-weight: 900; font-size: 18px;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4); opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; text-transform: uppercase; border: 2px solid #fff;
        }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.6); margin-bottom: -2px; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        @keyframes pulseCashout { 0% { box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); } 100% { box-shadow: 0 4px 25px rgba(243, 156, 18, 0.6); } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="sfxClick" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=button-pressed-38129.mp3"></audio>
    <audio id="sfxGem" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_d14f4469f4.mp3?filename=coins-handling-38827.mp3"></audio>
    <audio id="sfxBomb" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7d2f9b884d.mp3?filename=explosion-39897.mp3"></audio>

    <div class="header-bar">
        <div class="btn-back" onclick="window.voltarParaLobby()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="logo-text">MINES</div>
        <div class="top-actions">
            <div class="btn-top" onclick="toggleAudio()" id="audioBtn"><i class="fa-solid fa-volume-xmark"></i></div>
        </div>
    </div>

    <div class="game-area">
        <div class="board-header">
            <select class="mines-select" id="minesCount" onchange="atualizarMultiplicadorPreview()">
                <option value="1">Minas: 1</option>
                <option value="2">Minas: 2</option>
                <option value="3" selected>Minas: 3</option>
                <option value="4">Minas: 4</option>
                <option value="5">Minas: 5</option>
                <option value="10">Minas: 10</option>
                <option value="20">Minas: 20</option>
            </select>
            <div class="next-multiplier">Seguinte: <span id="nextMultDisplay">1.00x</span></div>
        </div>

        <div class="mines-grid" id="grid">
            </div>
    </div>

    <div class="controls-wrapper">
        <div class="action-row">
            <div class="btn-secondary" onclick="selecaoAleatoria()"><i class="fa-solid fa-shuffle"></i> Aleatório</div>
            <div class="btn-secondary"><i class="fa-solid fa-rotate"></i> Auto Jogo</div>
        </div>

        <div class="bet-input-row">
            <div class="bet-label">Aposta</div>
            <button class="bet-adjust" onclick="mudarAposta(-1)"><i class="fa-solid fa-minus"></i></button>
            <div class="bet-display" id="displayAposta">R$ 1,00</div>
            <button class="bet-adjust" onclick="mudarAposta(1)"><i class="fa-solid fa-plus"></i></button>
        </div>

        <button class="bet-button" id="btnAction" onclick="acaoPrincipal()">
            <i class="fa-solid fa-play"></i> APOSTAR
        </button>

        <div class="footer-info">
            <div class="game-name">MINES <i class="fa-solid fa-circle-question" style="margin-left: 5px; opacity: 0.5;"></i></div>
            <div class="balance-info">
                <i class="fa-solid fa-wallet"></i>
                <span id="displaySaldo">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="win-toast" id="winToast">
        <span>LUCRO TOTAL</span>
        <div id="winAmount">R$ 0,00</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const idDispositivo = localStorage.getItem('usuario_tracker_id');

        if (!idDispositivo) { window.location.href = 'login.html'; }

        // VARIÁVEIS GLOBAIS
        let bancaAtual = 0; let modoJogador = 'normal'; let audioLigado = false;
        
        // ESTADO DO JOGO MINES
        let isGaming = false;
        let board = []; // 0 = Diamante, 1 = Bomba
        let openedTiles = 0;
        let currentMultiplier = 1.00;
        let nextMultiplier = 1.00;
        
        const apostasPermitidas = [1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00, 500.00];
        let indexAposta = 0; let apostaAtual = apostasPermitidas[indexAposta];

        // ÁUDIO E SILENCIADOR
        const bgMusic = document.getElementById('bgMusic');
        const sfxClick = document.getElementById('sfxClick'); 
        const sfxGem = document.getElementById('sfxGem'); 
        const sfxBomb = document.getElementById('sfxBomb');
        bgMusic.volume = 0.2; sfxClick.volume = 0.4; sfxGem.volume = 0.6; sfxBomb.volume = 0.8;

        const pausarTodoAudio = () => { if(bgMusic) bgMusic.pause(); if(sfxClick) sfxClick.pause(); if(sfxGem) sfxGem.pause(); if(sfxBomb) sfxBomb.pause(); };

        window.toggleAudio = function() {
            audioLigado = !audioLigado; const btn = document.getElementById('audioBtn');
            if(audioLigado) { bgMusic.play().catch(()=>{}); btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btn.style.color = '#fff'; } 
            else { pausarTodoAudio(); btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btn.style.color = '#888'; }
        };

        // INTEGRAÇÃO APP SHELL (LOBBY) E ANTI-LOSS PÓS SAÍDA
        window.voltarParaLobby = function() {
            pausarTodoAudio();
            lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        };

        // ANTI-LOSS: No Mines, se ele fechar a aba de vez, fazemos o Cashout Automático do que ele já ganhou.
        function lidarComSaidaAbrupta() {
            if (isGaming) {
                if (openedTiles > 0) {
                    let ganhoAuto = apostaAtual * currentMultiplier;
                    set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((bancaAtual + ganhoAuto).toFixed(2)));
                } else {
                    set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((bancaAtual + apostaAtual).toFixed(2))); // Reembolsa
                }
                isGaming = false;
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) { bgMusic.pause(); } 
            else if (audioLigado) { bgMusic.play().catch(()=>{}); }
        });
        window.addEventListener("beforeunload", function (e) { lidarComSaidaAbrupta(); });

        // BANCA REAL TIME
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            bancaAtual = parseFloat(dados.saldo || 0); 
            modoJogador = dados.modo || 'normal';
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        });

        // CONTROLES DE APOSTA
        window.mudarAposta = function(direcao) {
            if(isGaming) return;
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                if(audioLigado) { sfxClick.currentTime = 0; sfxClick.play(); }
            }
        };

        // MATEMÁTICA DO MINES (RTP ~97%)
        function calcularMultiplicador(minas, acertos) {
            if(acertos === 0) return 1.00;
            let prob = 1;
            for(let i=0; i<acertos; i++) {
                prob *= (25 - minas - i) / (25 - i);
            }
            return parseFloat((0.97 / prob).toFixed(2));
        }

        window.atualizarMultiplicadorPreview = function() {
            if(isGaming) return;
            const minas = parseInt(document.getElementById('minesCount').value);
            const preview = calcularMultiplicador(minas, 1);
            document.getElementById('nextMultDisplay').innerText = preview.toFixed(2) + "x";
        };

        // GERAR GRADE VISUAL
        function desenharGrade() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i;
                tile.onclick = () => cliqueNoBloco(i);
                grid.appendChild(tile);
            }
        }

        // MOTOR PRINCIPAL (BOTÃO DE AÇÃO)
        window.acaoPrincipal = async function() {
            if (isGaming) {
                // É O BOTÃO DE CASH OUT
                if (openedTiles === 0) return; // Não pode sacar sem abrir nada
                finalizarJogoComVitoria();
            } else {
                // INICIAR NOVA APOSTA
                if(bancaAtual < apostaAtual) return alert("Saldo insuficiente.");
                if(audioLigado) { sfxClick.currentTime = 0; sfxClick.play(); }

                isGaming = true; openedTiles = 0; currentMultiplier = 1.00;
                
                // Trava controles
                document.getElementById('minesCount').disabled = true;
                const btn = document.getElementById('btnAction');
                btn.classList.add('cashout');
                btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual).toFixed(2).replace('.',',')})`;

                // Desconta do Firebase
                let novoSaldo = bancaAtual - apostaAtual;
                await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(novoSaldo.toFixed(2)));
                get(ref(db, 'sistema/caixa_global')).then(snap => set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) + apostaAtual).toFixed(2))));

                // Gera as Bombas Internamente
                const minas = parseInt(document.getElementById('minesCount').value);
                board = Array(25).fill(0);
                let bombasPlantadas = 0;
                while(bombasPlantadas < minas) {
                    let pos = Math.floor(Math.random() * 25);
                    if(board[pos] === 0) { board[pos] = 1; bombasPlantadas++; }
                }

                atualizarMultiplicadorPreview();
                desenharGrade(); // Limpa e desenha grid fresca
            }
        };

        // LÓGICA DE CLIQUE NO BLOCO
        function cliqueNoBloco(index) {
            if(!isGaming) return;
            const tile = document.querySelector(`.tile[data-index='${index}']`);
            if(tile.classList.contains('opened')) return; // Já abriu

            const minas = parseInt(document.getElementById('minesCount').value);

            // MODO INFLUENCIADOR: O DESVIO DE BOMBA (Garante os primeiros acertos)
            if(modoJogador === 'influenciador' && board[index] === 1) {
                // Se ele clicar numa bomba e tiver poucas casas abertas, a gente move a bomba!
                let maxSafeClicks = Math.max(3, 10 - minas); // Dinâmico pra ficar natural
                if(openedTiles < maxSafeClicks) {
                    // Acha uma casa vazia pra jogar a bomba
                    let freeIndex = board.findIndex((val, i) => val === 0 && !document.querySelector(`.tile[data-index='${i}']`).classList.contains('opened'));
                    if(freeIndex !== -1) {
                        board[index] = 0; // Tira a bomba daqui
                        board[freeIndex] = 1; // Bota a bomba lá
                    }
                }
            }

            // REVELAÇÃO
            tile.classList.add('opened');

            if(board[index] === 1) {
                // ESTOUROU A BOMBA
                if(audioLigado) { sfxBomb.currentTime = 0; sfxBomb.play(); }
                tile.classList.add('bomb');
                finalizarJogoComDerrota();
            } else {
                // ACHOU O DIAMANTE
                if(audioLigado) { sfxGem.currentTime = 0; sfxGem.play(); }
                tile.classList.add('gem');
                openedTiles++;

                // Calcula os lucros
                currentMultiplier = calcularMultiplicador(minas, openedTiles);
                nextMultiplier = calcularMultiplicador(minas, openedTiles + 1);
                
                // Atualiza Interface
                let valorSaque = (apostaAtual * currentMultiplier).toFixed(2);
                document.getElementById('btnAction').innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${valorSaque.replace('.',',')})`;
                document.getElementById('nextMultDisplay').innerText = nextMultiplier.toFixed(2) + "x";

                // Se abriu todos os diamantes possíveis
                if(openedTiles === (25 - minas)) { finalizarJogoComVitoria(); }
            }
        }

        // FUNÇÃO DE ALEATÓRIO PARA QUEM TEM PREGUIÇA DE CLICAR
        window.selecaoAleatoria = function() {
            if(!isGaming) return;
            const closedTiles = Array.from(document.querySelectorAll('.tile:not(.opened)'));
            if(closedTiles.length > 0) {
                const randomTile = closedTiles[Math.floor(Math.random() * closedTiles.length)];
                cliqueNoBloco(randomTile.dataset.index);
            }
        };

        // FIM DE JOGO - DERROTA
        function finalizarJogoComDerrota() {
            isGaming = false;
            document.getElementById('minesCount').disabled = false;
            
            const btn = document.getElementById('btnAction');
            btn.classList.remove('cashout');
            btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            document.getElementById('nextMultDisplay').innerText = calcularMultiplicador(parseInt(document.getElementById('minesCount').value), 1).toFixed(2) + "x";

            // Revela as outras bombas escuras
            document.querySelectorAll('.tile').forEach(t => {
                let idx = parseInt(t.dataset.index);
                t.style.pointerEvents = 'none'; // Trava o clique
                if(!t.classList.contains('opened') && board[idx] === 1) {
                    t.classList.add('opened', 'bomb-reveal');
                }
            });
        }

        // FIM DE JOGO - VITÓRIA (SAQUE)
        async function finalizarJogoComVitoria() {
            isGaming = false;
            document.getElementById('minesCount').disabled = false;
            
            let lucro = apostaAtual * currentMultiplier;
            let novoSaldo = bancaAtual + lucro;
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(novoSaldo.toFixed(2)));

            // Reset do Botão
            const btn = document.getElementById('btnAction');
            btn.classList.remove('cashout');
            btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            document.getElementById('nextMultDisplay').innerText = calcularMultiplicador(parseInt(document.getElementById('minesCount').value), 1).toFixed(2) + "x";

            // Popup de Vitória
            if(audioLigado) { sfxGem.currentTime = 0; sfxGem.play(); }
            const toast = document.getElementById('winToast');
            document.getElementById('winAmount').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);

            // Revela as bombas restantes escuras e trava os cliques
            document.querySelectorAll('.tile').forEach(t => {
                let idx = parseInt(t.dataset.index);
                t.style.pointerEvents = 'none';
                if(!t.classList.contains('opened') && board[idx] === 1) {
                    t.classList.add('opened', 'bomb-reveal');
                }
            });
        }

        // Inicia a grade no carregamento da página
        desenharGrade();
        atualizarMultiplicadorPreview();
    </script>
</body>
</html>
