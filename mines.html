Es cierto lo que dices sobre la historia original en la que esta basada la peli, es la hostia, de echo una vez por you tube pude leerla narrada que no se si sera un creepypasta o lo que sea, pero esta guapisimo un saludo amigo

¡Yo también le tengo unas ganas tremendas! A mí es que James Wan me parece en general de lo mejorcito que le ha pasado al terror actual así que hay que estar muy atento a todo lo que produzca.

Desconocia el relato sobre el que se basaba la peli, a ver si lo encuentro por ahí y le echo un vistazo.

¡Saludos!
