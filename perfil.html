<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SorteCerta - Meu Perfil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: #121214;
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --green: #00e676;
            --text-main: #f4f4f5;
            --text-muted: #8b8b93;
            --border-color: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER FIXO */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 15px;
        }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 18px; }
        .page-title { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .btn-settings { color: var(--text-muted); font-size: 18px; }

        .container { max-width: 600px; margin: 70px auto 0; padding: 15px; }

        /* CARTÃO DE USUÁRIO */
        .profile-card {
            background: linear-gradient(135deg, #1a1a1e 0%, #0a0a0c 100%); border: 1px solid var(--gold);
            border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.1); margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .profile-card::after { content: ''; position: absolute; right: -20px; bottom: -20px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(241,196,15,0.2) 0%, transparent 70%); }
        
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, var(--gold), var(--gold-dark)); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; border: 2px solid #fff; z-index: 1; }
        .user-info { z-index: 1; flex: 1; }
        .user-name { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 2px; }
        
        .user-id-box { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .user-id { font-family: monospace; color: var(--gold); background: rgba(241, 196, 15, 0.1); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid rgba(241, 196, 15, 0.3); }
        .btn-copy-id { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-copy-id:active { color: var(--green); transform: scale(1.1); }

        /* CARTÃO DE CARTEIRA (SALDO) */
        .wallet-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .wallet-header { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .wallet-header i { color: var(--green); }
        .wallet-balance { font-size: 32px; font-weight: 900; color: var(--green); margin-bottom: 20px; letter-spacing: -1px; }
        
        .wallet-actions { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 13px; text-align: center; text-decoration: none; text-transform: uppercase; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-action:active { transform: scale(0.96); }
        .btn-dep { background: linear-gradient(180deg, var(--green) 0%, #00b359 100%); color: #000; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2); }
        .btn-saq { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        /* LISTA DE MENUS */
        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .menu-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #fff; transition: 0.2s; }
        .menu-item:active { background: #1a1a1e; border-color: #333; }
        .menu-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { width: 35px; height: 35px; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .menu-text { font-size: 14px; font-weight: 600; }
        .menu-item i.fa-chevron-right { color: var(--text-muted); font-size: 12px; }

        /* CORES DOS ÍCONES */
        .icon-history { color: #3498db; }
        .icon-vip { color: var(--gold); }
        .icon-terms { color: #9b59b6; }
        .icon-logout { color: #e74c3c; }

        /* VERSÃO/RODAPÉ */
        .app-version { text-align: center; font-size: 11px; color: #555; font-weight: bold; margin-bottom: 20px; }

        /* NAVEGAÇÃO INFERIOR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #27272a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 10px; gap: 4px; transition: 0.2s; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="page-title">Meu Perfil</div>
        <a href="#" class="btn-settings"><i class="fa-solid fa-gear"></i></a>
    </header>

    <div class="container">
        
        <div class="profile-card">
            <div class="avatar"><i class="fa-solid fa-user-ninja"></i></div>
            <div class="user-info">
                <div class="user-name">Jogador VIP</div>
                <div class="user-id-box">
                    <span class="user-id" id="displayUserId">CARREGANDO...</span>
                    <button class="btn-copy-id" onclick="copiarID()" id="btnCopyIcon"><i class="fa-regular fa-copy"></i></button>
                </div>
                <div style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">Forneça este ID ao suporte para pagamentos.</div>
            </div>
        </div>

        <div class="wallet-card">
            <div class="wallet-header"><i class="fa-solid fa-wallet"></i> Saldo Real Disponível</div>
            <div class="wallet-balance" id="displaySaldo">R$ 0,00</div>
            <div class="wallet-actions">
                <a href="saldo.html" class="btn-action btn-dep"><i class="fa-solid fa-plus"></i> Depositar</a>
                <a href="saque.html" class="btn-action btn-saq"><i class="fa-solid fa-money-bill-transfer"></i> Sacar</a>
            </div>
        </div>

        <div class="menu-list">
            <a href="#" class="menu-item" onclick="alert('Histórico de apostas estará disponível em breve.')">
                <div class="menu-left">
                    <div class="menu-icon icon-history"><i class="fa-solid fa-clock-rotate-left"></i></div>
                    <span class="menu-text">Histórico de Transações</span>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="#" id="linkSuporte" target="_blank" class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon icon-vip"><i class="fa-solid fa-headset"></i></div>
                    <span class="menu-text">Suporte VIP (Plantão)</span>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="#" class="menu-item" onclick="alert('Termos aceitos no momento do cadastro.')">
                <div class="menu-left">
                    <div class="menu-icon icon-terms"><i class="fa-solid fa-file-contract"></i></div>
                    <span class="menu-text">Termos e Condições</span>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a href="index.html" class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon icon-logout"><i class="fa-solid fa-right-from-bracket"></i></div>
                    <span class="menu-text">Sair da Conta</span>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>

        <div class="app-version">SorteCerta V2.0.1 - Licenciado e Seguro</div>

    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-gamepad"></i>
            <span>Cassino</span>
        </a>
        <a href="saque.html" class="nav-item">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Saque</span>
        </a>
        <a href="perfil.html" class="nav-item active">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // CONFIGURAÇÃO DO ID DO USUÁRIO
        let idDispositivo = localStorage.getItem('usuario_tracker_id');
        if (!idDispositivo) {
            idDispositivo = 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('usuario_tracker_id', idDispositivo);
        }
        
        document.getElementById('displayUserId').innerText = idDispositivo;

        // Configura o link de Suporte com o ID automático (número oculto)
        const phoneDestination = "5583996469538";
        document.getElementById('linkSuporte').href = `https://wa.me/${phoneDestination}?text=Olá,%20preciso%20de%20ajuda%20com%20minha%20conta.%20Meu%20ID%20é:%20${idDispositivo}`;

        // FUNÇÃO DE COPIAR ID
        window.copiarID = function() {
            navigator.clipboard.writeText(idDispositivo).then(() => {
                const btn = document.getElementById('btnCopyIcon');
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.style.color = 'var(--green)';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
                    btn.style.color = 'var(--text-muted)';
                }, 2000);
            });
        }

        // PUXAR SALDO DO FIREBASE
        onValue(ref(db, 'usuarios/' + idDispositivo + '/saldo'), (snapshot) => {
            const saldo = snapshot.val() || 0;
            document.getElementById('displaySaldo').innerText = "R$ " + parseFloat(saldo).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        });
    </script>
</body>
</html>
