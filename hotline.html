        });

        document.getElementById('btnAudio').addEventListener('click', () => {
            iniciarAudio(); audioLigado = !audioLigado; 
            const btn = document.getElementById('btnAudio');
            if(audioLigado) { btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btn.style.color = '#fff'; tocarSom('sfxClick'); } else { btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btn.style.color = '#888'; }
        });

        document.getElementById('displayAposta').addEventListener('click', () => {
            if(isSpinning) return; iniciarAudio(); let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) { let parsed = parseFloat(novoValor.replace(',', '.')); if(!isNaN(parsed) && parsed >= 0.10) { apostaAtual = Math.min(parsed, 500.00); document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); tocarSom('sfxClick'); } else { mostrarToast("Valor inválido."); } }
        });

        function mudarAposta(direcao) {
            if(isSpinning) return; iniciarAudio(); tocarSom('sfxClick'); let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) { indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta]; document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        }

        // MUDANÇA DINÂMICA DO PRÊMIO ALVO
        window.selectColor = function(color) {
            if(isSpinning) return; iniciarAudio(); tocarSom('sfxClick'); selectedColor = color;
            ['red', 'black', 'fire'].forEach(c => document.getElementById(`btn-${c}`).classList.remove('active'));
            document.getElementById(`btn-${color}`).classList.add('active');
            
            const multView = document.getElementById('mult-view');
            if (color === 'fire') {
                multView.innerHTML = 'Prêmio Alvo: <span>32.00x</span>';
                multView.style.background = 'linear-gradient(135deg, #f1c40f, #b8860b)';
                multView.style.color = '#000';
            } else if (color === 'red') {
                multView.innerHTML = 'Prêmio Alvo: <span>2.00x</span>';
                multView.style.background = 'linear-gradient(135deg, #e74c3c, #961d12)';
                multView.style.color = '#fff';
            } else if (color === 'black') {
                multView.innerHTML = 'Prêmio Alvo: <span>2.00x</span>';
                multView.style.background = 'linear-gradient(135deg, #2c3e50, #111)';
                multView.style.color = '#fff';
            }
        }

        function updateSaldoDisplay(valor) { document.getElementById('displaySaldo').innerText = "R$ " + valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            if (!isSpinning) {
                bancaAtual = parseFloat(dados.saldo || 0); 
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                updateSaldoDisplay(bancaAtual);
                modoJogo = String(dados.modo || "normal").toLowerCase();
            }
        });
        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        // ROLETA INICIAL INTERCALADA
        function initIdleReel() {
            reel.style.transition = 'none'; reel.innerHTML = '';
            for(let i=0; i<20; i++) {
                let type = (i % 2 === 0) ? 'red' : 'black';
                if (i === 6) type = 'fire'; 
                const slot = document.createElement('div'); slot.className = `slot ${type}`;
                if (type !== 'fire') slot.innerHTML = '<div class="inner-circle"></div>';
                reel.appendChild(slot);
            }
            reel.style.transform = `translateX(-45px)`; 
        }

        window.cliqueBotaoApostar = async function() {
            if(isSpinning) return; iniciarAudio(); tocarSom('sfxClick');
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); return; }

            document.getElementById('winToast').classList.remove('show'); // Limpa vitória anterior imediatamente

            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;
            let apostaReal = apostaAtual * proporcaoRealNaMesa;

            isSpinning = true; document.getElementById('btnAction').classList.add('disabled');

            bancaAtual -= apostaAtual; saldoRealAtual -= apostaReal;
            updateSaldoDisplay(bancaAtual);
            await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });

            if (modoJogo !== 'admin' && modoJogo !== 'live') {
                get(ref(db, `usuarios/${idDispositivo}/rollover_atual`)).then(snap => {
                    set(ref(db, `usuarios/${idDispositivo}/rollover_atual`), parseFloat((snap.val() || 0)) + apostaAtual);
                });
                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    let caixaAtual = parseFloat(snap.val() || 0);
                    set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual + apostaReal).toFixed(2)));
                });
            }

            // ANTI-QUEBRA
            let availableFunds = caixaDaCasa * CONFIG_RTP;
            let fireProb = 0.03; let colorProb = (1 - fireProb) / 2; 
            let rand = Math.random(); let resultColor;
            
            if (modoJogo === 'admin' || modoJogo === 'live') {
                resultColor = selectedColor === 'fire' ? (Math.random() > 0.5 ? 'fire' : 'red') : selectedColor;
            } else {
                if (rand < fireProb) { resultColor = 'fire'; } else if (rand < fireProb + colorProb) { resultColor = 'red'; } else { resultColor = 'black'; }
                let potentialWin = apostaAtual * (resultColor === 'fire' ? 32 : 2);
                if (potentialWin * proporcaoRealNaMesa > availableFunds) {
                    resultColor = (selectedColor === 'red' || selectedColor === 'fire') ? 'black' : 'red';
                }
            }

            const isWin = (selectedColor === resultColor);
            spinReel(resultColor, isWin);
        }

        function spinReel(resultColor, isWin) {
            reel.innerHTML = ''; const TOTAL_SLOTS = 80; 
            
            // Garantindo que vermelho cai no Par, preto cai no Ímpar nativamente.
            let targetIndex = resultColor === 'black' ? 65 : 64; 
            if (resultColor === 'fire') targetIndex = 60; 

            // NEAR MISS (Sensação de Quase)
            let nearMissIndex = -1; let randomOffset = Math.floor(Math.random() * 40) - 20; 
            if (!isWin) {
                if (selectedColor === 'fire' || Math.random() < 0.4) {
                    const side = Math.random() > 0.5 ? 1 : -1; 
                    nearMissIndex = targetIndex + side; 
                    randomOffset = side === 1 ? (40 + Math.floor(Math.random() * 5)) : (-40 - Math.floor(Math.random() * 5)); 
                }
            }

            // MÁGICA DA INTEGRAÇÃO CIRÚRGICA: O Amarelo inverte a fase! 👑
            let phase = 0;
            for(let i=0; i<TOTAL_SLOTS; i++) {
                let type;
                if (i === targetIndex) { type = resultColor; } 
                else if (i === nearMissIndex) { type = selectedColor; } 
                else if (i === 30 && targetIndex !== 30 && nearMissIndex !== 30) { type = 'fire'; } 
                else {
                    type = ((i + phase) % 2 === 0) ? 'red' : 'black';
                }
                
                // GATILHO DE FLIP: Toda vez que passar por um amarelo, invertemos o grid
                if (type === 'fire') {
                    phase = (phase === 0) ? 1 : 0;
                }
                
                const slot = document.createElement('div'); slot.className = `slot ${type}`;
                if (type !== 'fire') slot.innerHTML = '<div class="inner-circle"></div>';
                reel.appendChild(slot);
            }

            reel.style.transition = 'none'; reel.style.transform = `translateX(-45px)`; reel.offsetHeight; 

            // LARGURA SLOT = 90 + GAP 8 = 98px
            const moveDistance = -(targetIndex * 98 + 45) + randomOffset;

            let lastTileIndex = -1;
            function trackTicks() {
                if (!isSpinning) return;
                const style = window.getComputedStyle(reel);
                const matrix = window.DOMMatrix ? new DOMMatrix(style.transform) : new WebKitCSSMatrix(style.transform);
                const currentX = matrix.m41; 
                const distancePassed = Math.abs(currentX - (-45));
                const currentTileIndex = Math.floor(distancePassed / 98);
                if (currentTileIndex !== lastTileIndex && currentTileIndex >= 0) { tocarSom('sfxTick'); lastTileIndex = currentTileIndex; }
                requestAnimationFrame(trackTicks);
            }
            
            setTimeout(() => {
                requestAnimationFrame(trackTicks);
                reel.style.transition = 'transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1)';
                reel.style.transform = `translateX(${moveDistance}px)`;
            }, 50);

            setTimeout(async () => {
                isSpinning = false;
                document.getElementById('btnAction').classList.remove('disabled');
                
                resultHistory.unshift(resultColor);
                if (resultHistory.length > 10) resultHistory.pop();
                updateHistoryBar();

                if (isWin) {
                    const multiplier = selectedColor === 'fire' ? 32.00 : 2.00;
                    const winAmount = apostaAtual * multiplier;
                    const winReal = winAmount * proporcaoRealNaMesa;
                    
                    bancaAtual += winAmount; saldoRealAtual += winReal;

                    let snapshot = await get(ref(db, `usuarios/${idDispositivo}`));
                    let u = snapshot.val() || {};
                    let metaRo = parseFloat(u.rollover_meta || 0); let atualRo = parseFloat(u.rollover_atual || 0);
                    if (metaRo > 0 && atualRo >= metaRo) { saldoRealAtual = bancaAtual; }
                    
                    await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });
                    
                    if (modoJogo !== 'admin' && modoJogo !== 'live') {
                        let snap = await get(ref(db, 'sistema/caixa_global'));
                        let caixaAtual = parseFloat(snap.val() || 0);
                        await set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - winReal).toFixed(2)));
                    }

                    tocarSom('sfxWin');
                    const toast = document.getElementById('winToast');
                    document.getElementById('winTitle').innerText = selectedColor === 'fire' ? "32X SUPER WIN!" : "VENCEU!";
                    document.getElementById('winAmount').innerText = "R$ " + winAmount.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
                    updateSaldoDisplay(bancaAtual);
                } else { tocarSom('sfxLose'); }
            }, 3600);
        }

        initIdleReel();
    </script>
</body>
</html>
