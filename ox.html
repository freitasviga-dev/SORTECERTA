<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SorteCerta - Fortune Ox</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* =========================================
           CONFIGURAÇÕES BASE E TEMA
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        body {
            background: #050000;
            background-image: radial-gradient(circle at 50% 10%, #4a0000 0%, #050000 100%);
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; padding: 10px;
        }

        .app-container {
            width: 100%; max-width: 420px; background: linear-gradient(180deg, #660000 0%, #1a0000 100%);
            border: 2px solid #ffaa00; border-radius: 20px; padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 0 20px rgba(255, 170, 0, 0.15);
        }

        /* HEADER */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-back { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #ffaa00; padding: 6px 12px; border-radius: 8px; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .wallet-box { background: rgba(0, 0, 0, 0.8); border: 2px solid #ffaa00; border-radius: 50px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .wallet-val { color: #00e676; font-weight: 900; font-size: 15px; }
        .wallet-add { background: linear-gradient(180deg, #ffaa00, #d35400); color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MENSAGENS E GANHOS */
        .status-panel { background: rgba(0, 0, 0, 0.6); border: 1px solid #ffaa00; border-radius: 10px; padding: 8px; text-align: center; margin-bottom: 15px; min-height: 35px; display: flex; align-items: center; justify-content: center; }
        .status-text { color: #ffaa00; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255, 170, 0, 0.5); }
        .status-text.feature { color: #e74c3c; animation: pulsar 0.5s infinite alternate; }

        .win-display { background: #000; border: 2px solid #ffaa00; border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(255, 170, 0, 0.2); }
        .win-display span { font-size: 10px; color: #aaa; letter-spacing: 1px; font-weight: bold; }
        .win-display h1 { color: #ffaa00; font-size: 28px; font-weight: 900; margin-top: 2px; }

        /* MÁQUINA FORTUNE OX (GRADE 3-4-3) */
        .slot-machine {
            background: #220000; border: 4px solid #8b0000; border-radius: 16px; padding: 15px 10px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); margin-bottom: 15px; position: relative;
        }
        
        /* O fundo decorativo do touro */
        .slot-machine::before {
            content: '🐂'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; opacity: 0.1; z-index: 0;
        }

        .reels-container { display: flex; justify-content: center; gap: 6px; z-index: 1; position: relative; }
        
        .reel { display: flex; flex-direction: column; gap: 6px; }
        .reel-side { justify-content: center; } /* Colunas 1 e 3 têm 3 itens, alinhados ao centro */
        .reel-center { justify-content: space-between; } /* Coluna 2 tem 4 itens */

        .slot-item {
            background: linear-gradient(145deg, #fff, #e0e0e0); width: 75px; height: 75px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 45px; position: relative;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.5); border: 1px solid #fff; transition: filter 0.1s;
        }
        .reel-center .slot-item { height: 65px; font-size: 38px; } /* Itens do meio um pouco menores para caberem 4 */

        .slot-item.ganhador { animation: brilhoVitoria 0.4s alternate infinite; border: 3px solid #ffaa00; z-index: 5; box-shadow: 0 0 15px #ffaa00; }
        .slot-item.feature-lock { border: 3px solid #e74c3c; box-shadow: 0 0 15px #e74c3c; filter: brightness(1.2); }
        .wild-badge { position: absolute; bottom: 2px; background: linear-gradient(90deg, #ffaa00, #e67e22); color: #000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 6px; border: 1px solid #fff; }

        /* CONTROLES INFERIORES */
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 16px; border: 1px solid #4a0000; }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555; background: linear-gradient(180deg, #333, #111); color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .action-btn.active-turbo { border-color: #ffaa00; background: linear-gradient(180deg, #f39c12, #d35400); color: #000; box-shadow: 0 4px 0 #8e44ad; }
        .action-btn.active-auto { border-color: #3498db; background: linear-gradient(180deg, #2980b9, #2c3e50); color: #fff; box-shadow: 0 4px 0 #1a252f; }

        .bet-selector { display: flex; align-items: center; background: #000; border-radius: 30px; padding: 4px; border: 1px solid #330000; }
        .bet-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: linear-gradient(180deg, #ffaa00, #d35400); color: #000; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bet-btn:active { transform: scale(0.9); }
        .bet-amount { min-width: 80px; text-align: center; font-size: 16px; font-weight: 900; color: #ffaa00; }

        /* BOTÃO GIRAR */
        .spin-btn { width: 100%; background: linear-gradient(180deg, #00b37e 0%, #00875f 100%); border: none; color: #fff; padding: 16px; font-size: 24px; font-weight: 900; border-radius: 14px; cursor: pointer; box-shadow: 0 6px 0 #005239, 0 10px 15px rgba(0,0,0,0.5); text-shadow: 1px 2px 2px rgba(0,0,0,0.4); transition: 0.1s; position: relative; }
        .spin-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 #005239; }
        .spin-btn:disabled { background: linear-gradient(180deg, #555, #333); box-shadow: 0 6px 0 #111; color: #888; cursor: not-allowed; }

        .auto-badge { position: absolute; top: -10px; right: -5px; background: #e74c3c; color: #fff; font-size: 12px; font-weight: bold; width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; display: none; align-items: center; justify-content: center; animation: pulsar 1s infinite; }

        /* TELA DE SUPER GANHO */
        .mega-win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px); }
        .mega-win-box h2 { font-size: 40px; color: #ffaa00; font-weight: 900; text-shadow: 0 0 20px #e67e22; animation: pulsar 0.5s infinite alternate; margin-bottom: 5px; }
        .mega-win-box h3 { font-size: 55px; color: #00b37e; font-weight: 900; text-shadow: 0 0 20px rgba(0, 179, 126, 0.5); }

        /* ANIMAÇÕES */
        @keyframes brilhoVitoria { 0% { transform: scale(1); filter: brightness(1); } 100% { transform: scale(1.05); filter: brightness(1.3); } }
        @keyframes pulsar { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        @keyframes rainCoin { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-top">
            <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Início</a>
            <div class="wallet-box" onclick="window.location.href='saldo.html'">
                <span class="wallet-val" id="txtSaldo">R$ 0,00</span>
                <div class="wallet-add"><i class="fa-solid fa-plus"></i></div>
            </div>
        </div>

        <div class="status-panel">
            <span class="status-text" id="displayMensagem">BOA SORTE! 🍀</span>
        </div>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="reel reel-side">
                    <div class="slot-item" id="s0_0">🍊</div>
                    <div class="slot-item" id="s0_1">🧨</div>
                    <div class="slot-item" id="s0_2">🍊</div>
                </div>
                <div class="reel reel-center">
                    <div class="slot-item" id="s1_0">🧧</div>
                    <div class="slot-item" id="s1_1">🐂<span class="wild-badge">WILD</span></div>
                    <div class="slot-item" id="s1_2">🧧</div>
                    <div class="slot-item" id="s1_3">🪙</div>
                </div>
                <div class="reel reel-side">
                    <div class="slot-item" id="s2_0">🍊</div>
                    <div class="slot-item" id="s2_1">💰</div>
                    <div class="slot-item" id="s2_2">🍊</div>
                </div>
            </div>
        </div>

        <div class="win-display">
            <span>GANHO DA RODADA</span>
            <h1 id="txtGanhoTotal">R$ 0,00</h1>
        </div>

        <div class="controls-bar">
            <button class="action-btn" id="btnTurbo" onclick="toggleTurbo()"><i class="fa-solid fa-bolt"></i></button>
            <div class="bet-selector">
                <button class="bet-btn" onclick="ajustarAposta(-1)">-</button>
                <div class="bet-amount" id="txtAposta">R$ 0,40</div>
                <button class="bet-btn" onclick="ajustarAposta(1)">+</button>
            </div>
            <button class="action-btn" id="btnAuto" onclick="iniciarAuto()"><i class="fa-solid fa-rotate"></i></button>
        </div>

        <button class="spin-btn" id="btnDisparar" onclick="executarRodada()">
            GIRAR
            <div class="auto-badge" id="badgeAuto">0</div>
        </button>

        <div style="font-size: 9px; color: #444; margin-top: 10px; text-align: center;" id="lblIdDispositivo">ID: Conectando...</div>
    </div>

    <div class="mega-win-overlay" id="telaBonus">
        <div class="mega-win-box">
            <h2>GANHO ÉPICO!</h2>
            <h3 id="valorPremioFantastico">R$ 0,00</h3>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let idDispositivo = localStorage.getItem('usuario_tracker_id') || 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('usuario_tracker_id', idDispositivo);
        document.getElementById('lblIdDispositivo').innerText = "ID: " + idDispositivo;
        
        let bancaAtual = 0.00; 
        let valorDoGiro = 0.40;
        let firebaseConectado = false;
        
        window.caixaDaCasa = 0.00; 
        window.margemLucro = 0.30; 
        window.isTurbo = false;
        window.girosAutoRestantes = 0;
        window.emGiro = false;
        window.estadoSequencia = 0; 
        window.valorPremioForcado = 0;
        window.girosAtaqueRestantes = 0;
        window.modoJogo = "normal";

        const tabelaApostas = [0.40, 0.80, 1.20, 2.00, 4.00, 10.00, 20.00, 50.00, 100.00, 250.00];
        
        // Simbologia do Ox: Wild(Touro), Ouro(Coins), Saco(💰), Envelope(🧧), Laranja(🍊), Foguete(🧨)
        const dicionarioPremios = { '🐂': 100, '💰': 40, '🪙': 20, '🧧': 10, '🍊': 5, '🧨': 2 };
        const listaSimbolosBase = ['🐂', '💰', '💰', '🪙', '🪙', '🪙', '🧧', '🧧', '🧧', '🧧', '🍊', '🍊', '🍊', '🍊', '🍊', '🧨', '🧨', '🧨', '🧨', '🧨', '🧨'];
        
        // Linhas de Pagamento (Ligando as 3 colunas)
        const combinacoesLinhas = [
            [[0,0], [1,0], [2,0]], [[0,0], [1,1], [2,0]], 
            [[0,1], [1,1], [2,1]], [[0,1], [1,2], [2,1]], 
            [[0,2], [1,2], [2,2]], [[0,2], [1,3], [2,2]],
            [[0,0], [1,2], [2,0]], [[0,2], [1,1], [2,2]]
        ];
        
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();

        // INICIALIZA CONEXÃO
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                if (!window.emGiro) bancaAtual = parseFloat(dados.saldo || 0);
                if (window.estadoSequencia !== 3) window.modoJogo = String(dados.modo || "normal").toLowerCase();
                
                let ganhoForcadoLido = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                if (ganhoForcadoLido > 0 && window.estadoSequencia === 0) {
                    window.valorPremioForcado = ganhoForcadoLido;
                    window.estadoSequencia = 1;
                    window.girosAtaqueRestantes = Math.floor(Math.random() * 3) + 2; 
                    set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0);
                }
            }
            firebaseConectado = true;
            atualizarTelas();
        });

        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => {
            window.caixaDaCasa = parseFloat(snapshot.val() || 0);
        });

        function notificarDisplay(texto, feature = false) { 
            const display = document.getElementById('displayMensagem'); 
            display.innerText = texto; 
            if(feature) display.classList.add('feature'); else display.classList.remove('feature');
            display.style.transform = "scale(1.1)"; 
            setTimeout(() => display.style.transform = "scale(1)", 200);
        }

        window.ajustarAposta = function(direcao) {
            if(window.emGiro) return;
            let i = tabelaApostas.findIndex(v => v >= valorDoGiro);
            i = (i === -1) ? 0 : i + direcao;
            if(i < 0) return notificarDisplay("MÍNIMO: R$ 0,40");
            if(i >= tabelaApostas.length) return notificarDisplay("MÁXIMO: R$ 250,00");
            valorDoGiro = tabelaApostas[i];
            atualizarTelas(); notificarDisplay(`BET: R$ ${valorDoGiro.toFixed(2)}`);
        }

        window.toggleTurbo = function() {
            if(window.emGiro) return;
            window.isTurbo = !window.isTurbo;
            document.getElementById('btnTurbo').classList.toggle('active-turbo');
            notificarDisplay(window.isTurbo ? "⚡ TURBO ATIVADO" : "MODO NORMAL");
        }

        window.iniciarAuto = function() {
            if(window.emGiro) {
                window.girosAutoRestantes = 0; atualizarBadgeAuto();
                return notificarDisplay("AUTO CANCELADO");
            }
            let qtd = parseInt(prompt("Giros Automáticos:", "10"));
            if(!isNaN(qtd) && qtd > 0) {
                window.girosAutoRestantes = qtd; atualizarBadgeAuto();
                notificarDisplay(`🔄 AUTO: ${qtd}`); window.executarRodada();
            }
        }

        function atualizarBadgeAuto() {
            const badge = document.getElementById('badgeAuto');
            const btnAuto = document.getElementById('btnAuto');
            if(window.girosAutoRestantes > 0) { badge.style.display = 'flex'; badge.innerText = window.girosAutoRestantes; btnAuto.classList.add('active-auto'); } 
            else { badge.style.display = 'none'; btnAuto.classList.remove('active-auto'); }
        }

        // MOTOR DO GIRO
        window.executarRodada = function() {
            if (!firebaseConectado) return;
            if (bancaAtual < valorDoGiro) { notificarDisplay("SALDO INSUFICIENTE"); window.girosAutoRestantes = 0; atualizarBadgeAuto(); return; }

            if (ctxAudio.state === 'suspended') ctxAudio.resume();
            window.emGiro = true;
            
            bancaAtual -= valorDoGiro;
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            set(ref(db, 'sistema/caixa_global'), parseFloat((window.caixaDaCasa + valorDoGiro).toFixed(2)));
            
            atualizarTelas();
            document.getElementById('btnDisparar').disabled = true;
            document.getElementById('txtGanhoTotal').innerText = "R$ 0,00";

            limparGradeVisual();

            // Decidir se ativa a Feature "Touro da Sorte"
            let triggerFeature = false;
            let featureSymbol = '🍊';
            if (window.estadoSequencia === 2 && window.valorPremioForcado > 0) {
                triggerFeature = true; // Ativa visualmente pra pagar a isca
                featureSymbol = '💰';
            }

            if(triggerFeature) {
                executarTouroDaSorte(featureSymbol);
            } else {
                executarGiroNormal();
            }
        }

        function limparGradeVisual() {
            for(let c=0; c<3; c++) {
                let max = (c===1) ? 4 : 3;
                for(let r=0; r<max; r++) {
                    let el = document.getElementById(`s${c}_${r}`);
                    el.classList.remove('ganhador', 'feature-lock');
                    el.style.filter = "blur(3px)";
                }
            }
        }

        function executarGiroNormal() {
            let passagens = 0; let vel = window.isTurbo ? 35 : 80;
            const loop = setInterval(() => {
                tocarSomGiro();
                renderizarGradeAleatoria();
                passagens++;
                if(passagens > 12) {
                    clearInterval(loop);
                    removerBlur();
                    processarResultadoFinal(false);
                }
            }, vel);
        }

        function executarTouroDaSorte(simboloBase) {
            notificarDisplay("🐂 TOURO DA SORTE!", true);
            let passagens = 0; let vel = window.isTurbo ? 35 : 80;
            
            // Trava as colunas 0 e 2 com o símbolo base
            for(let r=0; r<3; r++) {
                document.getElementById(`s0_${r}`).style.filter = "none";
                document.getElementById(`s2_${r}`).style.filter = "none";
                renderizarSlot(0, r, simboloBase);
                renderizarSlot(2, r, simboloBase);
                document.getElementById(`s0_${r}`).classList.add('feature-lock');
                document.getElementById(`s2_${r}`).classList.add('feature-lock');
            }

            const loop = setInterval(() => {
                tocarSomGiro();
                // Gira só o meio
                for(let r=0; r<4; r++) renderizarSlot(1, r, listaSimbolosBase[Math.floor(Math.random() * listaSimbolosBase.length)]);
                passagens++;
                if(passagens > 15) {
                    clearInterval(loop);
                    removerBlur();
                    processarResultadoFinal(true, simboloBase);
                }
            }, vel);
        }

        function removerBlur() {
            for(let c=0; c<3; c++) {
                let max = (c===1) ? 4 : 3;
                for(let r=0; r<max; r++) document.getElementById(`s${c}_${r}`).style.filter = "none";
            }
        }

        function renderizarGradeAleatoria() {
            for(let c=0; c<3; c++) {
                let max = (c===1) ? 4 : 3;
                for(let r=0; r<max; r++) renderizarSlot(c, r, listaSimbolosBase[Math.floor(Math.random() * listaSimbolosBase.length)]);
            }
        }

        function gerarGradeCompletaAleatoria() {
            let grid = [[], [], []];
            for(let c=0; c<3; c++) { let max = (c===1) ? 4 : 3; for(let r=0; r<max; r++) grid[c].push(listaSimbolosBase[Math.floor(Math.random() * listaSimbolosBase.length)]); }
            return grid;
        }

        function gerarMatrizPerdedora() {
            let grid, info, s=0; do { grid = gerarGradeCompletaAleatoria(); info = calcularGanhos(grid); s++; } while (info.ganho > 0 && s < 100);
            return info.ganho > 0 ? [['🍊','💰','🍀'], ['💰','🍊','🧧','🍀'], ['🧧','🍊','🧨']] : grid;
        }

        function calcularGanhos(grid) {
            let ganho = 0, linhas = [];
            combinacoesLinhas.forEach(linha => {
                const [p1, p2, p3] = linha;
                let s1 = grid[p1[0]][p1[1]], s2 = grid[p2[0]][p2[1]], s3 = grid[p3[0]][p3[1]];
                
                let matchNormal = (s1 === s2 && s2 === s3); let matchWild = false;
                if (s1 === '🐂' || s2 === '🐂' || s3 === '🐂') {
                    let f = [s1, s2, s3].filter(x => x !== '🐂');
                    if (f.length <= 1 || (f.length === 2 && f[0] === f[1])) matchWild = true;
                }
                if (matchNormal || matchWild) {
                    let ref = (s1 !== '🐂') ? s1 : ((s2 !== '🐂') ? s2 : s3) || '🐂'; 
                    ganho += (valorDoGiro * (dicionarioPremios[ref] / 10)); linhas.push(linha);
                }
            });
            // Multiplicador 10x se a tela toda for igual
            let flatGrid = grid[0].concat(grid[1]).concat(grid[2]);
            let refSym = flatGrid.find(x => x !== '🐂') || '🐂';
            let allSame = flatGrid.every(x => x === refSym || x === '🐂');
            if(allSame && ganho > 0) ganho *= 10;
            return { ganho, linhas, allSame };
        }

        function processarResultadoFinal(isFeature, symbolFeature = null) {
            let gridFinal = [[], [], []], ganhoFinal = 0, linhasVencedoras = [], flagMegaGanho = false;

            if (window.estadoSequencia === 1) { 
                gridFinal = gerarMatrizPerdedora(); window.girosAtaqueRestantes--;
                if(window.girosAtaqueRestantes <= 0) window.estadoSequencia = 2;
            } 
            else if (window.estadoSequencia === 2 && isFeature) { 
                // Monta a vitória forçada da feature
                gridFinal = [[symbolFeature,symbolFeature,symbolFeature], ['🍊','🐂',symbolFeature,'🧨'], [symbolFeature,symbolFeature,symbolFeature]]; 
                ganhoFinal = window.valorPremioForcado; linhasVencedoras = [[[0,0],[1,2],[2,0]], [[0,1],[1,1],[2,1]]]; // Fake lines pra brilhar
                if (ganhoFinal >= 50) flagMegaGanho = true;
                window.estadoSequencia = 3; set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo'); 
            } 
            else if (window.estadoSequencia === 3 || window.modoJogo === 'agressivo') { 
                if (Math.random() < 0.2) { 
                    gridFinal = [['🍊','🍊','🍊'], ['🧧','🧧','🧧','🧧'], ['🧨','🧨','🧨']]; // Micro ganho falso
                    let fakeInfo = calcularGanhos(gridFinal);
                    ganhoFinal = fakeInfo.ganho; linhasVencedoras = fakeInfo.linhas;
                } else { gridFinal = gerarMatrizPerdedora(); }
                if (bancaAtual <= 0.50) window.estadoSequencia = 0; 
            } 
            else {
                // RTP AUDIT
                let maxT = 20, tAtual = 0, infoM;
                do {
                    gridFinal = gerarGradeCompletaAleatoria(); infoM = calcularGanhos(gridFinal);
                    if (infoM.ganho > 0) {
                        let verbaLivre = window.caixaDaCasa * (1 - window.margemLucro);
                        if (infoM.ganho > verbaLivre || (window.modoJogo === 'desfarcado' && infoM.ganho > (valorDoGiro * 4))) { tAtual++; continue; }
                    }
                    break; 
                } while (tAtual < maxT);

                if (tAtual >= maxT) { gridFinal = gerarMatrizPerdedora(); infoM = { ganho: 0, linhas: [], allSame: false }; }
                ganhoFinal = infoM.ganho; linhasVencedoras = infoM.linhas; flagMegaGanho = (infoM.allSame && infoM.ganho > 0);
            }

            // PINTAR TELA E APLICAR RESULTADO
            if (ganhoFinal > 0) { set(ref(db, 'sistema/caixa_global'), parseFloat((Math.max(0, window.caixaDaCasa - ganhoFinal)).toFixed(2))); }

            for (let c = 0; c < 3; c++) { let max = (c===1) ? 4 : 3; for (let r = 0; r < max; r++) renderizarSlot(c, r, gridFinal[c][r]); }
            
            linhasVencedoras.forEach(linha => {
                linha.forEach(pos => {
                    let el = document.getElementById(`s${pos[0]}_${pos[1]}`);
                    el.classList.remove('feature-lock');
                    el.classList.add('ganhador');
                });
            });

            if (flagMegaGanho && ganhoFinal > 0) { tocarSomGanho(); dispararAnimacaoFantastica(ganhoFinal); } 
            else { finalizarRodadaProcesso(ganhoFinal); }
        }

        function finalizarRodadaProcesso(ganho) {
            if (ganho > 0) { bancaAtual += ganho; tocarSomGanho(); notificarDisplay(`GANHOU R$ ${ganho.toFixed(2)}`); } 
            else { notificarDisplay("NÃO FOI DESTA VEZ"); }

            document.getElementById('txtGanhoTotal').innerText = "R$ " + ganho.toFixed(2).replace('.', ',');
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            atualizarTelas();
            
            if(window.girosAutoRestantes > 0) {
                window.girosAutoRestantes--; atualizarBadgeAuto();
                setTimeout(() => { if(window.girosAutoRestantes > 0) window.executarRodada(); else { window.emGiro = false; document.getElementById('btnDisparar').disabled = false; } }, window.isTurbo ? 400 : 1000);
            } else { document.getElementById('btnDisparar').disabled = false; window.emGiro = false; }
        }

        window.dispararAnimacaoFantastica = function(valor) {
            const tela = document.getElementById('telaBonus');
            tela.style.display = 'flex'; document.getElementById('valorPremioFantastico').innerText = "R$ " + valor.toFixed(2);
            for (let i = 0; i < 40; i++) {
                let coin = document.createElement('div'); coin.innerHTML = '🪙'; coin.style.position = 'absolute';
                coin.style.left = Math.random() * 100 + '%'; coin.style.top = '-10%'; coin.style.fontSize = (Math.random() * 20 + 20) + 'px';
                coin.style.animation = `rainCoin ${Math.random() * 1.5 + 1}s linear forwards`; coin.style.zIndex = '10000';
                tela.appendChild(coin); setTimeout(() => coin.remove(), 2500);
            }
            setTimeout(() => { tela.style.display = 'none'; finalizarRodadaProcesso(valor); }, 3000);
        }

        function renderizarSlot(col, row, simbolo) { const item = document.getElementById(`s${col}_${row}`); if (simbolo === '🐂') item.innerHTML = `🐂<span class="wild-badge">WILD</span>`; else item.innerHTML = simbolo; }
        function atualizarTelas() { document.getElementById('txtSaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); document.getElementById('txtAposta').innerText = "R$ " + valorDoGiro.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        
        function tocarSomGiro() { try { let o = ctxAudio.createOscillator(), g = ctxAudio.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(200, ctxAudio.currentTime); g.gain.setValueAtTime(0.05, ctxAudio.currentTime); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + 0.08); } catch(e){} }
        function tocarSomGanho() { try { let o = ctxAudio.createOscillator(), g = ctxAudio.createGain(); o.type = 'square'; o.frequency.setValueAtTime(600, ctxAudio.currentTime); g.gain.setValueAtTime(0.1, ctxAudio.currentTime); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + 0.3); } catch(e){} }
    </script>
</body>
</html>
