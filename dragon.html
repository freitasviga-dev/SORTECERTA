<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Expires" content="Tue, 01 Jan 1980 1:00:00 GMT">
    
    <title>Dice VIP | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        /* Fundo Padrão Goal VIP (Imagem) */
        body { 
            background: linear-gradient(180deg, #184b9e 0%, #0d2b5e 100%);
            color: #ffffff; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none;
        }

        .btn-3d { transition: transform 0.1s ease, box-shadow 0.1s ease, border-bottom 0.1s ease; cursor: pointer; }
        .btn-3d:active:not(.disabled) { transform: translateY(4px) !important; box-shadow: none !important; border-bottom-width: 0px !important; margin-top: 4px; }

        /* HEADER */
        .header-bar {
            padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            padding-top: calc(10px + env(safe-area-inset-top)); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 16px; font-weight: 900; letter-spacing: 1px; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* ÁREA DO RESULTADO E SLIDER */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; width: 100%; max-width: 450px; margin: 0 auto; gap: 20px; }

        .result-box {
            width: 100%; background: rgba(0,0,0,0.15); border-radius: 16px; padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        .number-display {
            font-size: 70px; font-weight: 900; margin-bottom: 25px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: color 0.3s;
        }
        .number-display.win { color: #00e676; text-shadow: 0 0 20px rgba(0, 230, 118, 0.5); }
        .number-display.lose { color: #e74c3c; text-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }

        /* SLIDER TRACKS */
        .slider-container { width: 100%; position: relative; margin-bottom: 10px; }
        .track-group { position: relative; height: 40px; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; border: 2px solid rgba(0,0,0,0.5); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .track-top, .track-bottom { height: 50%; width: 100%; position: relative; }
        .track-pattern { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,0.15) 4px, rgba(0,0,0,0.15) 8px); pointer-events: none; z-index: 2; }
        .scale-marks { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 8px; padding: 0 5px; font-weight: bold; }

        input[type="range"] { -webkit-appearance: none; position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: transparent; outline: none; z-index: 5; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 34px; height: 34px; background: #f1c40f; border: 4px solid #b8860b; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.8); position: relative; }
        
        /* PAINEL DE ESTATÍSTICAS */
        .stats-panel {
            width: 100%; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; }
        .stats-col { display: flex; flex-direction: column; gap: 4px; }
        .stats-label { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: bold; text-transform: uppercase; }
        .stats-value { font-size: 16px; font-weight: 900; color: #fff; }
        .stats-value.gold { color: #f1c40f; }

        .payout-input-wrapper { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .payout-input-wrapper input { background: transparent; border: none; color: #fff; font-size: 16px; font-weight: bold; width: 60px; outline: none; text-align: right; }
        .payout-input-wrapper span { color: rgba(255,255,255,0.5); font-weight: bold; margin-left: 5px; }

        /* CONTROLES ESTILO GOAL VIP */
        .controls-wrapper { width: 100%; background: #0c1f45; border-top: 2px solid #143570; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); position: relative; }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.4); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; }
        .bet-label { font-size: 10px; color: #888; font-weight: 700; padding-left: 15px; text-transform: uppercase; pointer-events: none; }
        .bet-display { font-size: 16px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 5px 0; border-radius: 10px; transition: 0.2s; }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: #1c3a76; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #0d214a; border-bottom: 2px solid #0a1835; }

        .roll-actions { display: flex; gap: 10px; }
        
        .bet-button { flex: 1; border: none; border-radius: 12px; padding: 12px 5px; color: #fff; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
        .bet-button span:nth-child(2) { font-size: 11px; opacity: 0.8; }
        
        .btn-under { background: linear-gradient(180deg, #00e676, #00b359); box-shadow: 0 6px 0 #006633, 0 8px 15px rgba(0, 230, 118, 0.3); border-bottom: 2px solid #004d26; color: #000; }
        .btn-over { background: linear-gradient(180deg, #3498db, #2980b9); box-shadow: 0 6px 0 #154360, 0 8px 15px rgba(52, 152, 219, 0.3); border-bottom: 2px solid #1a5276; }
        .bet-button.disabled { background: #555; box-shadow: 0 6px 0 #222; border-bottom: 2px solid #111; color: #888; pointer-events: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 5px; }
        .game-name { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; }
        .balance-info { font-size: 14px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 5px; }
        .balance-info i { color: #00e676; font-size: 12px; }

        /* TOASTS */
        .system-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 100px; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="btn-back btn-3d" id="btnBack"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="logo-text">DICE VIP</div>
        <div class="top-actions">
            <div class="btn-top btn-3d" id="btnAudio"><i class="fa-solid fa-volume-xmark"></i></div>
        </div>
    </div>

    <div class="game-area">
        <div class="result-box">
            <div class="number-display" id="result-display">50.00</div>
            
            <div class="slider-container">
                <div class="track-group">
                    <div class="track-pattern"></div>
                    <div class="track-top" id="track-top"></div>
                    <div class="track-bottom" id="track-bottom"></div>
                </div>
                <input type="range" id="chance-slider" min="0.10" max="96.90" step="0.10" value="48.50">
                <div class="scale-marks">
                    <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
                </div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stats-row">
                <div class="stats-col">
                    <span class="stats-label">Multiplicador</span>
                    <div class="payout-input-wrapper">
                        <input type="number" id="payout-input" value="2.00" step="0.01" min="1.01" max="970.00">
                        <span>x</span>
                    </div>
                </div>
                <div class="stats-col" style="align-items: flex-end;">
                    <span class="stats-label">Chance</span>
                    <span class="stats-value" id="chance-display">48.50 %</span>
                </div>
            </div>
            <div class="stats-row" style="margin-top: 5px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05);">
                <span class="stats-label">Lucro Possível</span>
                <span class="stats-value gold" id="potential-win">R$ 2,00</span>
            </div>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="bet-input-row">
            <div class="bet-label">Aposta</div>
            <button class="bet-adjust btn-3d" id="btnMinus" onclick="mudarAposta(-1)"><i class="fa-solid fa-minus"></i></button>
            <div class="bet-display" id="displayAposta" onclick="abrirInputAposta()">R$ 1,00</div>
            <button class="bet-adjust btn-3d" id="btnPlus" onclick="mudarAposta(1)"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="roll-actions">
            <button class="bet-button btn-under btn-3d" id="btn-under" onclick="rollDice('under')">
                <span><i class="fa-solid fa-arrow-down"></i> UNDER</span>
                <span id="target-under">Abaixo de 48.50</span>
            </button>
            <button class="bet-button btn-over btn-3d" id="btn-over" onclick="rollDice('over')">
                <span><i class="fa-solid fa-arrow-up"></i> OVER</span>
                <span id="target-over">Acima de 51.50</span>
            </button>
        </div>

        <div class="footer-info">
            <div class="game-name">DICE <i class="fa-solid fa-dice-d20" style="margin-left: 5px; opacity: 0.5;"></i></div>
            <div class="balance-info">
                <i class="fa-solid fa-wallet"></i>
                <span id="displaySaldo">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="system-toast" id="toastMsg">Mensagem do Sistema</div>

    <script type="module">
        // ANTI-CACHE FORTE E PROTEÇÃO DE NAVEGAÇÃO
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload(true);
            }
        });

        // ==========================================
        // 1. IMPORTAÇÕES E FIREBASE (SorteCerta)
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const idDispositivo = localStorage.getItem('usuario_tracker_id');

        if (!idDispositivo) { window.location.href = 'login.html'; }

        // Variáveis Globais de Estado
        let bancaAtual = 0.00;
        let isRolling = false;
        let audioLigado = false;
        
        // Padrão Goal de Apostas (Limite 500)
        const apostasPermitidas = [1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00, 500.00];
        let indexAposta = 0; 
        let apostaAtual = apostasPermitidas[indexAposta];

        const RTP = 97.00; // Margem oficial

        // ==========================================
        // 2. MOTOR DE ÁUDIO NATIVO PROFISSIONAL
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        window.iniciarAudio = function() {
            if (!audioCtx) { audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        const tocarSom = (tipo) => {
            if (!audioLigado || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (tipo === 'sfxClick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (tipo === 'sfxRoll') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.03);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } else if (tipo === 'sfxWin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3); 
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            } else if (tipo === 'sfxLose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==========================================
        // 3. INTERFACE E EVENTOS BÁSICOS
        // ==========================================
        document.body.addEventListener('click', () => { window.iniciarAudio(); }, { once: true });

        window.voltarParaLobby = function() {
            iniciarAudio(); tocarSom('sfxClick'); lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        }

        window.toggleAudio = function() {
            iniciarAudio();
            audioLigado = !audioLigado; 
            const btn = document.getElementById('btnAudio');
            if(audioLigado) { 
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btn.style.color = '#fff'; tocarSom('sfxClick');
            } else { 
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btn.style.color = '#888'; 
            }
        }

        window.abrirInputAposta = function() {
            if(isRolling) return;
            iniciarAudio();
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    tocarSom('sfxClick');
                    updateStatsFromSlider();
                } else { mostrarToast("Valor inválido."); }
            }
        }

        window.mudarAposta = function(direcao) {
            if(isRolling) return;
            iniciarAudio(); tocarSom('sfxClick');
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                updateStatsFromSlider();
            }
        }

        // ==========================================
        // 4. FIREBASE SYNC & BLINDAGEM
        // ==========================================
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            if (!isRolling) {
                bancaAtual = parseFloat(dados.saldo || 0);
                document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        });

        function lidarComSaidaAbrupta() { if (isRolling) isRolling = false; }
        window.addEventListener('pagehide', lidarComSaidaAbrupta);
        document.addEventListener('visibilitychange', function() { if (document.hidden) lidarComSaidaAbrupta(); });

        // ==========================================
        // 5. LÓGICA DO DICE (SLIDER &
