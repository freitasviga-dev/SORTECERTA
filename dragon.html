l<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fortune Dragon | SorteCerta</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --dragon-red: #8b0000;
            --dragon-dark: #3a0000;
            --gold: #f39c12;
            --gold-light: #f1c40f;
            --gold-dark: #b8860b;
            --text-main: #ffffff;
            --bg-panel: rgba(20, 5, 5, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }

        body { 
            background-color: #000; 
            background-image: radial-gradient(circle at 50% 0%, var(--dragon-red) 0%, #000 80%);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- HEADER & SALDO --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 15px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); z-index: 100;
        }
        .btn-back { color: var(--gold-light); font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); cursor: pointer; }
        
        .wallet-pill {
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--gold-dark);
            padding: 6px 15px; border-radius: 30px; display: flex; align-items: center; gap: 8px;
            box-shadow: inset 0 0 10px rgba(243, 156, 18, 0.2), 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .wallet-pill i { color: var(--gold-light); }
        .wallet-pill span { font-weight: 900; color: #fff; font-size: 14px; letter-spacing: 0.5px; }

        /* --- ÁREA PRINCIPAL DO JOGO --- */
        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; position: relative; }
        
        .dragon-mascot { font-size: 60px; filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.6)); margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        
        /* --- MÁQUINA DE SLOT ESTILO PG SOFT --- */
        .slot-machine {
            background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%);
            border: 4px solid var(--gold); border-radius: 16px; padding: 10px;
            width: 100%; max-width: 380px; box-shadow: 0 15px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }
        .slot-machine::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent); z-index: 10; }
        .slot-machine::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(0deg, rgba(0,0,0,0.6), transparent); z-index: 10; }

        .reels-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; background: #000; padding: 6px; border-radius: 10px; border: 1px solid #333; }
        
        .reel { display: flex; flex-direction: column; gap: 6px; }
        
        .symbol-box {
            background: linear-gradient(180deg, #222 0%, #111 100%); border: 1px solid #444;
            border-radius: 8px; height: 85px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            transition: 0.1s;
        }
        
        /* EFEITOS DE GIRO E VITÓRIA */
        .spinning .symbol-box { animation: slotSpin 0.15s infinite linear; filter: blur(3px); color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .win-anim { background: radial-gradient(circle, rgba(243, 156, 18, 0.4), #111) !important; border-color: var(--gold-light) !important; animation: winPulse 0.6s infinite alternate; z-index: 5; box-shadow: 0 0 20px rgba(243, 156, 18, 0.5) !important; }

        /* --- PAINEL DE CONTROLE PG SOFT --- */
        .control-panel {
            background: var(--bg-panel); width: 100%; padding: 20px; border-top: 2px solid var(--gold-dark);
            border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 15px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); position: relative; z-index: 20;
        }

        .bet-info-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .bet-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        .bet-value { font-size: 18px; font-weight: 900; color: var(--gold-light); }

        .spin-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        /* Botões Laterais (Turbo/Auto) */
        .btn-side { background: linear-gradient(180deg, #333 0%, #111 100%); border: 1px solid #444; color: #888; width: 60px; height: 60px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-side span { font-size: 9px; font-weight: bold; margin-top: 3px; text-transform: uppercase; }
        .btn-side.active { color: var(--gold-light); border-color: var(--gold-dark); box-shadow: 0 0 15px rgba(243, 156, 18, 0.3); }
        .btn-side:active { transform: scale(0.9); }

        /* Botão de Giro Principal */
        .btn-spin-wrapper { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 50px; border: 1px solid #333; }
        .btn-bet-adjust { background: transparent; border: none; color: #fff; font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .btn-bet-adjust:active { color: var(--gold-light); transform: scale(0.8); }
        
        .btn-spin-main {
            width: 85px; height: 85px; border-radius: 50%; border: 3px solid #000;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.4), inset 0 -5px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;
        }
        .btn-spin-main i { font-size: 35px; color: #111; filter: drop-shadow(0 2px 2px rgba(255,255,255,0.4)); transition: 0.2s; }
        .btn-spin-main:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(243, 156, 18, 0.4); }
        .btn-spin-main:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; }
        .btn-spin-main.is-spinning i { animation: rotateSpin 1s infinite linear; }

        /* --- POPUPS E ALERTAS --- */
        .mega-win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .mega-win-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .mw-title { font-size: 45px; font-weight: 900; color: var(--gold-light); text-transform: uppercase; text-shadow: 0 0 30px var(--gold-dark), 0 5px 10px #000; margin-bottom: 20px; animation: bounce 1s infinite alternate; text-align: center; line-height: 1; }
        .mw-value { font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 5px 20px var(--gold-dark); background: linear-gradient(to bottom, #fff, var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .system-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(231, 76, 60, 0.9); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .system-toast.show { opacity: 1; top: 100px; }

        /* --- ANIMAÇÕES --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slotSpin { 0% { transform: translateY(-30px); } 100% { transform: translateY(30px); } }
        @keyframes winPulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        @keyframes rotateSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('usuario_tracker_id')) { window.location.href = 'login.html'; }
    </script>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="sfxSpin" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2e718b525f.mp3?filename=slot-machine-spin-41272.mp3"></audio>
    <audio id="sfxStop" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=button-pressed-38129.mp3"></audio>
    <audio id="sfxWin" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_d14f4469f4.mp3?filename=coins-handling-38827.mp3"></audio>

    <div class="top-bar">
        <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="wallet-pill">
            <i class="fa-solid fa-wallet"></i>
            <span id="displaySaldo">R$ 0,00</span>
        </div>
        <div class="btn-back" onclick="toggleAudio()" id="audioBtn"><i class="fa-solid fa-volume-xmark"></i></div>
    </div>

    <div class="game-container">
        <div class="dragon-mascot">🐉</div>
        
        <div class="slot-machine">
            <div class="reels-container" id="reelsContainer">
                <div class="reel" id="reel1">
                    <div class="symbol-box">🧧</div><div class="symbol-box">🪙</div><div class="symbol-box">🏮</div>
                </div>
                <div class="reel" id="reel2">
                    <div class="symbol-box">🧨</div><div class="symbol-box">🐉</div><div class="symbol-box">🧧</div>
                </div>
                <div class="reel" id="reel3">
                    <div class="symbol-box">🪙</div><div class="symbol-box">🪢</div><div class="symbol-box">🏮</div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="bet-info-bar">
            <div class="bet-label">Aposta Atual</div>
            <div class="bet-value" id="displayAposta">R$ 0,40</div>
        </div>

        <div class="spin-controls">
            <div class="btn-side" id="btnTurbo" onclick="toggleTurbo()">
                <i class="fa-solid fa-bolt"></i>
                <span>Turbo</span>
            </div>

            <div class="btn-spin-wrapper">
                <button class="btn-bet-adjust" onclick="mudarAposta(-1)"><i class="fa-solid fa-minus"></i></button>
                
                <button class="btn-spin-main" id="btnGirar" onclick="iniciarGiro()">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                
                <button class="btn-bet-adjust" onclick="mudarAposta(1)"><i class="fa-solid fa-plus"></i></button>
            </div>

            <div class="btn-side" onclick="alert('Função Auto-Spin estará disponível na próxima atualização.')">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Auto</span>
            </div>
        </div>
    </div>

    <div class="mega-win-overlay" id="megaWinScreen">
        <div class="mw-title">MEGA<br>GANHO!</div>
        <div class="mw-value" id="megaWinValor">R$ 0,00</div>
    </div>

    <div class="system-toast" id="toastMsg">Saldo Insuficiente!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // VARIÁVEIS GLOBAIS DE ESTADO DO JOGO
        const idDispositivo = localStorage.getItem('usuario_tracker_id');
        let bancaAtual = 0;
        let modoJogador = 'normal'; // CHAVE MESTRA
        let isSpinning = false;
        let isTurbo = false;
        let audioLigado = false;

        // ESCALADA DE APOSTAS OFICIAL (Iniciando em R$ 0,40)
        const apostasPermitidas = [0.40, 0.80, 1.20, 2.00, 4.00, 8.00, 10.00, 20.00, 40.00, 50.00, 100.00];
        let indexAposta = 0;
        let apostaAtual = apostasPermitidas[indexAposta];

        // SÍMBOLOS DO JOGO (Dragão = Wild)
        const simbolos = ['🐉', '🧧', '🏮', '🪙', '🧨', '🪢'];

        // SINCRONIZAR FIREBASE EM TEMPO REAL
        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {};
            bancaAtual = parseFloat(dados.saldo || 0);
            modoJogador = dados.modo || 'normal';
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        });

        // FUNÇÕES DE ÁUDIO
        const bgMusic = document.getElementById('bgMusic');
        const sfxSpin = document.getElementById('sfxSpin');
        const sfxStop = document.getElementById('sfxStop');
        const sfxWin = document.getElementById('sfxWin');
        bgMusic.volume = 0.2; sfxSpin.volume = 0.5; sfxStop.volume = 0.8; sfxWin.volume = 0.8;

        window.toggleAudio = function() {
            audioLigado = !audioLigado;
            const btn = document.getElementById('audioBtn');
            if(audioLigado) {
                bgMusic.play().catch(()=>{});
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                btn.style.color = 'var(--green)';
            } else {
                bgMusic.pause();
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                btn.style.color = 'var(--gold-light)';
            }
        };

        window.toggleTurbo = function() {
            isTurbo = !isTurbo;
            const btn = document.getElementById('btnTurbo');
            if(isTurbo) btn.classList.add('active'); else btn.classList.remove('active');
        };

        window.mudarAposta = function(direcao) {
            if(isSpinning) return;
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex;
                apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==========================================
        // MOTOR DE GIRO E MATEMÁTICA (ADMIN HOOK)
        // ==========================================
        window.iniciarGiro = async function() {
            if(isSpinning) return;
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente. Deposite para jogar."); return; }

            isSpinning = true;
            const btnGirar = document.getElementById('btnGirar');
            btnGirar.disabled = true;
            btnGirar.classList.add('is-spinning');

            if(audioLigado) { sfxSpin.currentTime = 0; sfxSpin.play(); }

            // 1. DESCONTA A APOSTA NO FIREBASE (Custo da Rodada)
            let novoSaldo = bancaAtual - apostaAtual;
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), novoSaldo);
            get(ref(db, 'sistema/caixa_global')).then(snap => set(ref(db, 'sistema/caixa_global'), (parseFloat(snap.val() || 0) + apostaAtual)));

            // 2. PREPARA AS BOBINAS PARA GIRAR
            const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
            reels.forEach(reel => {
                reel.classList.add('spinning');
                // Tira o brilho de ganhos passados
                Array.from(reel.children).forEach(box => box.classList.remove('win-anim'));
            });

            // 3. DECIDE O RESULTADO POR TRÁS DOS PANOS (ADMIN vs NORMAL)
            let ganhou = false;
            let valorGanho = 0;
            let telaFinal = [[], [], []];

            if(modoJogador === 'influenciador') {
                // MODO LIVE ATIVADO PELO PAINEL: Chove dinheiro!
                ganhou = Math.random() < 0.85; // 85% de bater forrado
                if(ganhou) {
                    let multiplicador = Math.floor(Math.random() * (50 - 10 + 1)) + 10; // Paga de 10x a 50x
                    valorGanho = apostaAtual * multiplicador;
                    let simboloVencedor = simbolos[Math.floor(Math.random() * simbolos.length)];
                    telaFinal = [
                        [simboloVencedor, simboloVencedor, simboloVencedor],
                        [simboloVencedor, simboloVencedor, simboloVencedor],
                        [simboloVencedor, simboloVencedor, simboloVencedor]
                    ];
                }
            } else {
                // MODO NORMAL: Cassino lucrando
                ganhou = Math.random() < 0.12; // Apenas 12% de chance de ganhar algo
                if(ganhou) {
                    let multiplicador = (Math.random() * 2) + 0.5; // Paga micharia (0.5x a 2.5x)
                    valorGanho = apostaAtual * multiplicador;
                    let simboloVencedor = simbolos[Math.floor(Math.random() * simbolos.length)];
                    // Faz uma linha de vitória visual básica
                    telaFinal = [
                        [simbolos[0], simboloVencedor, simbolos[1]],
                        [simbolos[2], simboloVencedor, simbolos[3]],
                        [simbolos[4], simboloVencedor, simbolos[5]]
                    ];
                }
            }

            // Se for perca, preenche com símbolos totalmente aleatórios
            if(!ganhou) {
                for(let c=0; c<3; c++) {
                    for(let l=0; l<3; l++) {
                        telaFinal[c][l] = simbolos[Math.floor(Math.random() * simbolos.length)];
                    }
                }
                // Evita que a linha do meio fique igual por acidente
                if(telaFinal[0][1] === telaFinal[1][1] && telaFinal[1][1] === telaFinal[2][1]) {
                    telaFinal[2][1] = simbolos[0]; 
                }
            }

            // 4. ANIMAÇÃO DE PARADA COLUNA POR COLUNA
            let delayBase = isTurbo ? 300 : 800; // Turbo para rápido, normal demora
            
            for(let i = 0; i < 3; i++) {
                setTimeout(() => {
                    reels[i].classList.remove('spinning');
                    if(audioLigado) { sfxStop.currentTime = 0; sfxStop.play(); }
                    
                    // Aplica os símbolos decididos
                    const boxes = reels[i].querySelectorAll('.symbol-box');
                    boxes[0].innerText = telaFinal[i][0];
                    boxes[1].innerText = telaFinal[i][1];
                    boxes[2].innerText = telaFinal[i][2];

                    // Na última coluna, resolve o pagamento
                    if(i === 2) {
                        finalizarGiro(ganhou, valorGanho, novoSaldo);
                    }
                }, delayBase * (i + 1));
            }
        };

        // 5. ENCERRAMENTO E PAGAMENTO
        async function finalizarGiro(ganhou, valorGanho, saldoAtualizado) {
            const btnGirar = document.getElementById('btnGirar');
            btnGirar.classList.remove('is-spinning');
            
            if(ganhou && valorGanho > 0) {
                if(audioLigado) { sfxSpin.pause(); sfxWin.currentTime = 0; sfxWin.play(); }
                
                // Faz a tela piscar
                document.querySelectorAll('.symbol-box').forEach(box => box.classList.add('win-anim'));
                
                // Paga no Firebase
                let saldoAposVitoria = saldoAtualizado + valorGanho;
                await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoAposVitoria.toFixed(2)));

                // Mostra Mega Ganho se for pancada alta
                if(valorGanho >= (apostaAtual * 5)) {
                    const popup = document.getElementById('megaWinScreen');
                    document.getElementById('megaWinValor').innerText = "R$ " + valorGanho.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    popup.classList.add('show');
                    setTimeout(() => { popup.classList.remove('show'); liberarMaquina(btnGirar); }, 4000);
                } else {
                    setTimeout(() => liberarMaquina(btnGirar), 1500);
                }
            } else {
                liberarMaquina(btnGirar);
            }
        }

        function liberarMaquina(btn) {
            document.querySelectorAll('.symbol-box').forEach(box => box.classList.remove('win-anim'));
            isSpinning = false;
            btn.disabled = false;
        }

    </script>
</body>
</html>
