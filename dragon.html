<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Fortune Dragon | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* TRAVA DE ZOOM E SCROLL DO NAVEGADOR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        
        html { height: -webkit-fill-available; overscroll-behavior: none; }
        
        body { 
            background-color: #050000; 
            background-image: radial-gradient(circle at 50% 0%, #3a0000 0%, #050000 85%);
            color: #ffffff; 
            min-height: 100vh; min-height: 100dvh;
            overflow: hidden; display: flex; flex-direction: column;
            overscroll-behavior: none;
        }

        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0000; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            transition: opacity 0.3s ease;
        }
        #startScreen i { font-size: 70px; color: #f1c40f; margin-bottom: 20px; filter: drop-shadow(0 0 25px rgba(241, 196, 15, 0.5)); }
        #startScreen h2 { color: #f1c40f; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; font-size: 20px; }
        .btn-start { background: linear-gradient(180deg, #f1c40f, #b8860b); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; text-transform: uppercase; animation: startPulse 1s infinite alternate; margin-top: 20px; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4); font-size: 14px; }

        #mainUI {
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; width: 100%;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #mainUI.active { opacity: 1; pointer-events: auto; }

        /* HEADER LIMPO (Apenas voltar e áudio) */
        .header-bar {
            padding: 8px 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding-top: calc(8px + env(safe-area-inset-top)); z-index: 100;
        }
        .btn-back { color: #f1c40f; font-size: 20px; cursor: pointer; padding: 5px; }
        .top-actions { display: flex; gap: 15px; align-items: center; }
        .btn-top { color: #f1c40f; font-size: 18px; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }

        /* LOGO CENTRAL E MÁQUINA */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 5px; }
        
        .game-logo {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 12px; animation: float 3s ease-in-out infinite; text-align: center;
        }
        .game-logo .dragon-icon { font-size: 55px; filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.6)); line-height: 1; margin-bottom: 5px; }
        .game-logo .dragon-text { font-size: 20px; font-weight: 900; color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(241, 196, 15, 0.8); }

        .slot-machine {
            background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%);
            border: 3px solid #f1c40f; border-radius: 12px; padding: 6px;
            width: 100%; max-width: 340px; box-shadow: 0 8px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }

        .reels-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .reel { display: flex; flex-direction: column; gap: 5px; }
        
        .symbol-box {
            background: linear-gradient(180deg, #222 0%, #111 100%); border: 1px solid #333;
            border-radius: 6px; height: clamp(60px, 11vh, 85px); 
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(35px, 8vw, 45px); position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); transition: 0.1s;
        }
        
        .spinning .symbol-box { animation: slotSpin 0.1s infinite linear; filter: blur(2px); color: transparent; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .symbol-box.win-anim { background: radial-gradient(circle, rgba(241, 196, 15, 0.4), #111) !important; border-color: #f1c40f !important; animation: winPulse 0.5s infinite alternate; z-index: 5; box-shadow: 0 0 20px rgba(241, 196, 15, 0.6) !important; }

        .normal-win-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #000; border: 2px solid #f1c40f; border-radius: 12px;
            padding: 10px 25px; display: flex; flex-direction: column; align-items: center;
            z-index: 50; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8); pointer-events: none;
        }
        .normal-win-badge.show { transform: translate(-50%, -50%) scale(1); }
        .normal-win-badge span:first-child { color: #f1c40f; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        .normal-win-badge span:last-child { color: #fff; font-size: 20px; font-weight: 900; }

        /* FOOTER E CONTROLES */
        .footer-container {
            width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 20; position: relative;
        }

        .val-display-bar { width: 100%; max-width: 340px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; padding: 0 5px; }
        .val-column { display: flex; flex-direction: column; flex: 1; }
        .val-column.saldo { align-items: flex-start; }
        .val-column.aposta { align-items: flex-end; }
        .val-title { font-size: 9px; text-transform: uppercase; font-weight: 700; margin-bottom: 1px; letter-spacing: 0.5px; }
        .val-title.saldo { color: #fff; }
        .val-title.aposta { color: #b8860b; }
        .val-value { font-weight: 900; letter-spacing: -0.5px; }
        .val-value.saldo { font-size: 20px; color: #00e676; }
        .val-value.aposta { font-size: 15px; color: #aaa; }

        .spin-controls { width: 100%; max-width: 340px; display: flex; justify-content: space-around; align-items: center; }
        .btn-side { background: linear-gradient(180deg, #333 0%, #111 100%); border: 1px solid #444; color: #888; width: 50px; height: 50px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-side span { font-size: 8px; font-weight: 900; margin-top: 2px; text-transform: uppercase; }
        .btn-side.active { color: #f1c40f; border-color: #b8860b; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }

        .btn-spin-wrapper { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); padding: 4px; border-radius: 50px; border: 1px solid #222; }
        .btn-bet-adjust { background: transparent; border: none; color: #fff; font-size: 20px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .btn-bet-adjust:active { color: #f1c40f; transform: scale(0.8); }
        
        .btn-spin-main {
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid #000;
            background: radial-gradient(circle at 30% 30%, #f1c40f, #b8860b);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4), inset 0 -4px 10px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;
        }
        .btn-spin-main i { font-size: 30px; color: #111; transition: 0.2s; }
        .btn-spin-main .auto-count { font-size: 28px; font-weight: 900; color: #111; display: none; }
        .btn-spin-main.is-spinning i { animation: rotateSpin 0.8s infinite linear; }
        .btn-spin-main.auto-active i { display: none; }
        .btn-spin-main.auto-active .auto-count { display: block; }
        .btn-spin-main.auto-active { background: radial-gradient(circle at 30% 30%, #e74c3c, #900000); box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }

        .auto-spin-menu {
            position: absolute; bottom: 100%; right: 20px; background: #0a0a0a;
            border: 1px solid #b8860b; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; gap: 6px; transform: translateY(20px);
            opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 50; width: 85px; margin-bottom: 8px;
        }
        .auto-spin-menu.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .auto-btn-option { background: #222; border: 1px solid #333; color: #fff; padding: 8px 0; border-radius: 6px; font-weight: 900; text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .auto-btn-option:active { background: #b8860b; color: #000; }

        .mega-win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000f5;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; cursor: pointer;
        }
        .mega-win-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .mw-title { font-size: 40px; font-weight: 900; color: #f1c40f; text-transform: uppercase; text-shadow: 0 0 30px #b8860b, 0 5px 10px #000; margin-bottom: 20px; animation: bounce 1s infinite alternate; text-align: center; line-height: 1; }
        .mw-value { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 4px 20px #b8860b; }
        .mw-hint { color: #888; font-size: 10px; margin-top: 20px; text-transform: uppercase; animation: pulse 1s infinite; }

        .system-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 100px; }

        @keyframes startPulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes slotSpin { 0% { transform: translateY(-20px); } 100% { transform: translateY(20px); } }
        @keyframes winPulse { 0% { transform: scale(1); } 100% { transform: scale(1.04); } }
        @keyframes rotateSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="startScreen">
        <i class="fa-solid fa-dragon"></i>
        <h2>Fortune Dragon</h2>
        <div class="btn-start">Toque para Iniciar</div>
    </div>

    <div id="mainUI">
        <script>
            if (!localStorage.getItem('usuario_tracker_id')) { window.location.href = 'login.html'; }
        </script>

        <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        <audio id="sfxSpin" src="https://actions.google.com/sounds/v1/foley/spinning_wheel.ogg"></audio>
        <audio id="sfxStop" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=button-pressed-38129.mp3"></audio>
        <audio id="sfxWin" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_d14f4469f4.mp3?filename=coins-handling-38827.mp3"></audio>

        <div class="header-bar">
            <div class="btn-back" onclick="window.voltarParaLobby()"><i class="fa-solid fa-chevron-left"></i></div>
            
            <div class="top-actions">
                <div class="btn-top" onclick="toggleAudio()" id="audioBtn"><i class="fa-solid fa-volume-xmark"></i></div>
            </div>
        </div>

        <div class="game-area">
            <div class="game-logo">
                <div class="dragon-icon">🐉</div>
                <div class="dragon-text">Fortune Dragon</div>
            </div>

            <div class="slot-machine">
                <div id="normalWinBadge" class="normal-win-badge">
                    <span>GANHO!</span>
                    <span id="normalWinValue">R$ 0,00</span>
                </div>

                <div class="reels-container" id="reelsContainer">
                    <div class="reel" id="reel1">
                        <div class="symbol-box">🧧</div><div class="symbol-box">🪙</div><div class="symbol-box">🏮</div>
                    </div>
                    <div class="reel" id="reel2">
                        <div class="symbol-box">🧨</div><div class="symbol-box">🐉</div><div class="symbol-box">🧧</div>
                    </div>
                    <div class="reel" id="reel3">
                        <div class="symbol-box">🪙</div><div class="symbol-box">🪢</div><div class="symbol-box">🏮</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-container">
            <div class="val-display-bar">
                <div class="val-column saldo">
                    <div class="val-title saldo">SEU SALDO</div>
                    <div class="val-value saldo" id="displaySaldo">R$ 0,00</div>
                </div>
                <div class="val-column aposta">
                    <div class="val-title aposta">APOSTA</div>
                    <div class="val-value aposta" id="displayAposta">R$ 0,40</div>
                </div>
            </div>

            <div class="auto-spin-menu" id="menuAuto">
                <div style="color: #f1c40f; font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; margin-bottom: 5px;">Giros</div>
                <div class="auto-btn-option" onclick="ativarAuto(10)">10</div>
                <div class="auto-btn-option" onclick="ativarAuto(30)">30</div>
                <div class="auto-btn-option" onclick="ativarAuto(50)">50</div>
                <div class="auto-btn-option" onclick="ativarAuto(100)">100</div>
            </div>

            <div class="spin-controls">
                <div class="btn-side" id="btnTurbo" onclick="toggleTurbo()">
                    <i class="fa-solid fa-bolt"></i>
                    <span>Turbo</span>
                </div>

                <div class="btn-spin-wrapper">
                    <button class="btn-bet-adjust" onclick="mudarAposta(-1)"><i class="fa-solid fa-minus"></i></button>
                    
                    <button class="btn-spin-main" id="btnGirar" onclick="cliqueBotaoPrincipal()">
                        <i class="fa-solid fa-rotate-right"></i>
                        <span class="auto-count" id="autoCountDisplay">0</span>
                    </button>
                    
                    <button class="btn-bet-adjust" onclick="mudarAposta(1)"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div class="btn-side" id="btnAuto" onclick="toggleMenuAuto()">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>Auto</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mega-win-overlay" id="megaWinScreen" onclick="pularMegaGanho()">
        <div class="mw-title">MEGA<br>GANHO!</div>
        <div class="mw-value" id="megaWinValor">R$ 0,00</div>
        <div class="mw-hint">Toque para continuar</div>
    </div>

    <div class="system-toast" id="toastMsg">Rodada Cancelada. Saldo Devolvido!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const idDispositivo = localStorage.getItem('usuario_tracker_id');

        // VARIÁVEIS DE SISTEMA E ANTI-LOSS
        let bancaAtual = 0; let modoJogador = 'normal'; let isSpinning = false; let isTurbo = false; let audioLigado = false;
        let girosAutoRestantes = 0; let menuAutoAberto = false;
        
        let roletasGirandoCritico = false; 
        let saldoAntesDoGiro = 0;
        window.spinTimeouts = [];
        window.megaWinTimeout = null; 

        // O DRAGÃO É O CORINGA OFICIAL
        const CORINGA = '🐉';
        const simbolos = ['🐉', '🧧', '🏮', '🪙', '🧨', '🪢'];
        
        const paylines = [
            [[0,1], [1,1], [2,1]], // Meio
            [[0,0], [1,0], [2,0]], // Topo
            [[0,2], [1,2], [2,2]], // Fundo
            [[0,0], [1,1], [2,2]], // Diagonal \
            [[0,2], [1,1], [2,0]]  // Diagonal /
        ];

        // START SCREEN
        document.getElementById('startScreen').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => { 
                this.style.display = 'none'; 
                document.getElementById('mainUI').classList.add('active');
            }, 300);
            
            if(bgMusic) { bgMusic.play().catch(e=>{}); audioLigado = true; document.getElementById('audioBtn').innerHTML = '<i class="fa-solid fa-volume-high"></i>'; document.getElementById('audioBtn').style.color = '#00e676'; }
        });

        // ÁUDIO E SILENCIADOR TOTAL
        const bgMusic = document.getElementById('bgMusic');
        const sfxSpin = document.getElementById('sfxSpin'); 
        const sfxStop = document.getElementById('sfxStop'); 
        const sfxWin = document.getElementById('sfxWin');
        bgMusic.volume = 0.2; sfxSpin.volume = 0.5; sfxStop.volume = 0.8; sfxWin.volume = 0.8;

        const pausarTodoAudio = () => {
            if(bgMusic) bgMusic.pause();
            if(sfxSpin) sfxSpin.pause();
            if(sfxWin) sfxWin.pause();
        };

        window.toggleAudio = function() {
            audioLigado = !audioLigado; 
            const btn = document.getElementById('audioBtn');
            if(audioLigado) { 
                bgMusic.play().catch(()=>{}); 
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; 
                btn.style.color = '#00e676'; 
            } else { 
                // Pausa TUDO na mesma hora
                pausarTodoAudio();
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; 
                btn.style.color = '#f1c40f'; 
            }
        };

        window.voltarParaLobby = function() {
            pausarTodoAudio();
            cancelarRodadaDeEmergencia(); 
            if (window.parent && window.parent !== window) {
                window.parent.postMessage("fecharIframe", "*");
            } else {
                window.location.href = 'index.html';
            }
        };

        // PROTOCOLO DE REEMBOLSO (ANTI-LOSS)
        function cancelarRodadaDeEmergencia() {
            if (roletasGirandoCritico) {
                window.spinTimeouts.forEach(t => clearTimeout(t));
                window.spinTimeouts = [];
                set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoAntesDoGiro.toFixed(2)));
                
                roletasGirandoCritico = false; isSpinning = false; girosAutoRestantes = 0;
                atualizarBotaoAuto();
                document.getElementById('btnGirar').classList.remove('is-spinning');
                document.querySelectorAll('.symbol-box').forEach(b => b.parentElement.classList.remove('spinning'));
                mostrarToast("Rodada cancelada. Saldo devolvido!");
            }
        }

        // EVENTOS DE BLINDAGEM MOBILE (Minimizar app, fechar tela)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden || document.visibilityState === 'hidden') { 
                pausarTodoAudio();
                cancelarRodadaDeEmergencia(); 
            } 
            else if (audioLigado) { bgMusic.play().catch(e => {}); }
        });

        window.addEventListener('pagehide', function() {
            pausarTodoAudio();
            cancelarRodadaDeEmergencia(); 
        });
        window.addEventListener("beforeunload", function (e) { cancelarRodadaDeEmergencia(); });

        // CONTROLES DE APOSTA
        const apostasPermitidas = [0.40, 0.80, 1.20, 2.00, 4.00, 8.00, 10.00, 20.00, 40.00, 50.00, 100.00, 200.00, 250.00, 400.00, 500.00];
        let indexAposta = 0; let apostaAtual = apostasPermitidas[indexAposta];

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            bancaAtual = parseFloat(dados.saldo || 0); 
            modoJogador = dados.modo || 'normal';
            document.getElementById('displaySaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        });

        window.toggleTurbo = function() { isTurbo = !isTurbo; const btn = document.getElementById('btnTurbo'); if(isTurbo) btn.classList.add('active'); else btn.classList.remove('active'); };

        window.mudarAposta = function(direcao) {
            if(isSpinning || girosAutoRestantes > 0) return;
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.toggleMenuAuto = function() {
            if(isSpinning || girosAutoRestantes > 0) return;
            menuAutoAberto = !menuAutoAberto;
            if(menuAutoAberto) document.getElementById('menuAuto').classList.add('show'); else document.getElementById('menuAuto').classList.remove('show');
        };

        window.ativarAuto = function(qtd) {
            girosAutoRestantes = qtd; menuAutoAberto = false; document.getElementById('menuAuto').classList.remove('show');
            atualizarBotaoAuto(); iniciarGiro();
        };

        window.cliqueBotaoPrincipal = function() {
            if(girosAutoRestantes > 0) { girosAutoRestantes = 0; atualizarBotaoAuto(); } else if (!isSpinning) { iniciarGiro(); }
        };

        function atualizarBotaoAuto() {
            const btnMain = document.getElementById('btnGirar'); const countDisplay = document.getElementById('autoCountDisplay'); const btnAuto = document.getElementById('btnAuto');
            if(girosAutoRestantes > 0) { btnMain.classList.add('auto-active'); countDisplay.innerText = girosAutoRestantes; btnAuto.classList.add('active'); } 
            else { btnMain.classList.remove('auto-active'); btnAuto.classList.remove('active'); }
        }

        window.pularMegaGanho = function() {
            const popup = document.getElementById('megaWinScreen');
            if(popup.classList.contains('show')) {
                clearTimeout(window.megaWinTimeout);
                popup.classList.remove('show');
                isSpinning = false;
                if(girosAutoRestantes > 0) { girosAutoRestantes--; atualizarBotaoAuto(); if(girosAutoRestantes > 0) iniciarGiro(); } 
                else { iniciarGiro(); }
            }
        };

        window.liberarMaquinaGlob = function(tempo) {
            isSpinning = false;
            if(girosAutoRestantes > 0) {
                girosAutoRestantes--; atualizarBotaoAuto();
                if(girosAutoRestantes > 0) { setTimeout(() => { if(girosAutoRestantes > 0) iniciarGiro(); }, tempo || 1000); }
            }
        };

        // LÓGICA DO CORINGA REVISADA
        function verificaVitoriaLinha(s1, s2, s3) {
            const cartasSemCoringa = [s1, s2, s3].filter(s => s !== CORINGA);
            if (cartasSemCoringa.length === 0) return true; 
            return cartasSemCoringa.every(s => s === cartasSemCoringa[0]); 
        }

        // MOTOR DO CASSINO
        window.iniciarGiro = async function() {
            if(isSpinning) return;
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente. Deposite."); girosAutoRestantes = 0; atualizarBotaoAuto(); return; }

            isSpinning = true; 
            roletasGirandoCritico = true;
            saldoAntesDoGiro = bancaAtual;
            window.spinTimeouts = []; 
            
            const btnGirar = document.getElementById('btnGirar');
            if(girosAutoRestantes === 0) btnGirar.classList.add('is-spinning');

            if(audioLigado) { sfxSpin.currentTime = 0; sfxSpin.play(); }

            document.getElementById('normalWinBadge').classList.remove('show');
            document.querySelectorAll('.symbol-box').forEach(box => box.classList.remove('win-anim'));

            let novoSaldo = bancaAtual - apostaAtual;
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(novoSaldo.toFixed(2)));
            get(ref(db, 'sistema/caixa_global')).then(snap => set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) + apostaAtual).toFixed(2))));

            const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
            reels.forEach(reel => reel.classList.add('spinning'));

            let ganhou = false; let valorGanho = 0; let telaFinal = [[], [], []]; let linhasVencedorasInfo = [];

            if(modoJogador === 'influenciador') {
                if(window.adminPerdas === undefined) window.adminPerdas = 0;

                if(window.adminPerdas < 4 + Math.floor(Math.random() * 3)) {
                    ganhou = false; window.adminPerdas++;
                } else {
                    ganhou = true; window.adminPerdas = 0; 
                    let multiplicadorInteiro = Math.floor(Math.random() * (40 - 15 + 1)) + 15;
                    valorGanho = Math.round(apostaAtual * multiplicadorInteiro);
                    
                    let linhaWin = paylines[Math.floor(Math.random() * paylines.length)];
                    let simboloBase = simbolos[Math.floor(Math.random() * simbolos.length)];
                    let lixo = simbolos.filter(s => s !== simboloBase && s !== CORINGA);

                    for(let c=0; c<3; c++) { for(let l=0; l<3; l++) telaFinal[c][l] = lixo[Math.floor(Math.random() * lixo.length)]; }
                    linhaWin.forEach(pos => { telaFinal[pos[0]][pos[1]] = (simboloBase !== CORINGA && Math.random() < 0.4) ? CORINGA : simboloBase; });
                    linhasVencedorasInfo = [linhaWin];
                }
            } else {
                ganhou = Math.random() < 0.12; 
                if(ganhou) {
                    let multiplicadorInteiro = Math.floor(Math.random() * (5 - 1 + 1)) + 1;
                    valorGanho = Math.round(apostaAtual * multiplicadorInteiro);
                    
                    let linhaWin = paylines[Math.floor(Math.random() * paylines.length)];
                    let simboloBase = simbolos[Math.floor(Math.random() * simbolos.length)];
                    let lixo = simbolos.filter(s => s !== simboloBase && s !== CORINGA);

                    for(let c=0; c<3; c++) { for(let l=0; l<3; l++) telaFinal[c][l] = lixo[Math.floor(Math.random() * lixo.length)]; }
                    linhaWin.forEach(pos => { telaFinal[pos[0]][pos[1]] = (simboloBase !== CORINGA && Math.random() < 0.3) ? CORINGA : simboloBase; });
                    linhasVencedorasInfo = [linhaWin];
                }
            }

            // O BLOCO DE PERDA QUE EU TINHA APAGADO SEM QUERER (Isto resolve o bug do 'undefined')
            if(!ganhou) {
                for(let c=0; c<3; c++) { 
                    for(let l=0; l<3; l++) {
                        telaFinal[c][l] = simbolos[Math.floor(Math.random() * simbolos.length)]; 
                    }
                }
            }

            // QUEBRADOR DE FALSO POSITIVO BLINDADO (Resolve o bug dos Dois Dragões)
            let temFalsoPositivo = true;
            let tentativasSeguranca = 0;
            
            while(temFalsoPositivo && tentativasSeguranca < 30) {
                temFalsoPositivo = false;
                paylines.forEach(linha => {
                    if (ganhou && linhasVencedorasInfo.length > 0 && linha === linhasVencedorasInfo[0]) return;
                    
                    let s1 = telaFinal[linha[0][0]][linha[0][1]];
                    let s2 = telaFinal[linha[1][0]][linha[1][1]];
                    let s3 = telaFinal[linha[2][0]][linha[2][1]];
                    
                    if(verificaVitoriaLinha(s1, s2, s3)) {
                        temFalsoPositivo = true;
                        
                        let proibidos = [s1, s3, CORINGA];
                        let trocaSegura = simbolos.filter(s => !proibidos.includes(s));
                        
                        let posLivre = linha.find(pos => !(ganhou && linhasVencedorasInfo[0].some(w => w[0] === pos[0] && w[1] === pos[1])));
                        
                        if(posLivre) {
                            telaFinal[posLivre[0]][posLivre[1]] = trocaSegura[Math.floor(Math.random() * trocaSegura.length)];
                        }
                    }
                });
                tentativasSeguranca++;
            }

            let delayBase = isTurbo ? 100 : 500; 
            
            for(let i = 0; i < 3; i++) {
                let timer = setTimeout(() => {
                    reels[i].classList.remove('spinning');
                    if(audioLigado) { sfxStop.currentTime = 0; sfxStop.play(); }
                    
                    const boxes = reels[i].querySelectorAll('.symbol-box');
                    boxes[0].innerText = telaFinal[i][0]; boxes[1].innerText = telaFinal[i][1]; boxes[2].innerText = telaFinal[i][2];

                    if(i === 2) {
                        roletasGirandoCritico = false; 
                        finalizarGiro(ganhou, valorGanho, novoSaldo, linhasVencedorasInfo);
                    }
                }, delayBase * (i + 1));
                
                window.spinTimeouts.push(timer); 
            }
        };

        async function finalizarGiro(ganhou, valorGanho, saldoAtualizado, linhasWin) {
            const btnGirar = document.getElementById('btnGirar');
            btnGirar.classList.remove('is-spinning');
            let tempoParaProximo = isTurbo ? 400 : 1000;
            
            if(ganhou && valorGanho > 0) {
                if(audioLigado) { sfxSpin.pause(); sfxWin.currentTime = 0; sfxWin.play(); }
                
                const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
                linhasWin.forEach(linha => {
                    linha.forEach(pos => reels[pos[0]].querySelectorAll('.symbol-box')[pos[1]].classList.add('win-anim'));
                });
                
                let saldoAposVitoria = saldoAtualizado + valorGanho;
                await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoAposVitoria.toFixed(2)));

                let valorFormatado = "R$ " + valorGanho.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                if(valorGanho >= (apostaAtual * 10)) {
                    document.getElementById('megaWinValor').innerText = valorFormatado;
                    document.getElementById('megaWinScreen').classList.add('show');
                    
                    window.megaWinTimeout = setTimeout(() => { 
                        document.getElementById('megaWinScreen').classList.remove('show'); 
                        window.liberarMaquinaGlob(4500); 
                    }, 4000);
                } else {
                    document.getElementById('normalWinValue').innerText = valorFormatado;
                    document.getElementById('normalWinBadge').classList.add('show');
                    setTimeout(() => { document.getElementById('normalWinBadge').classList.remove('show'); window.liberarMaquinaGlob(2000); }, 1800);
                }
            } else {
                window.liberarMaquinaGlob(tempoParaProximo);
            }
        }
    </script>
</body>
</html>
