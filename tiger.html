<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotline Simulator - High Risk</title>
    <style>
        :root {
            --bg-main: #1c45a3;
            --bg-container: #173782;
            --bg-bottom: #143072;
            --red-main: #fc2148;
            --red-inner: #d11534;
            --black-main: #13244d;
            --black-inner: #1c3166;
            --fire-main: #ffae00;
            --text-light: #ffffff;
            --btn-blue: #0b66ff;
            --input-bg: #112d6a;
            --input-border: #1d46a8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            user-select: none;
            overflow: hidden;
        }

        #mobile-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: center;
            padding: 15px;
            align-items: center;
            position: relative;
        }

        .fun-mode {
            background: #ffa800;
            color: #fff;
            padding: 4px 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Game Area (Reel) */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .reel-container {
            background-color: var(--bg-container);
            width: 100%;
            height: 160px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .pointer-top, .pointer-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            z-index: 10;
        }

        .pointer-top {
            top: 0;
            border-top: 15px solid #fff;
        }

        .pointer-bottom {
            bottom: 0;
            border-bottom: 15px solid #fff;
        }

        .reel {
            display: flex;
            gap: 10px;
            padding-left: 50%; /* Alinha o início exatamente no meio */
            transition: transform 3s cubic-bezier(0.15, 0.8, 0.2, 1);
        }

        .slot {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .slot .inner-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .slot.red { background-color: var(--red-main); }
        .slot.red .inner-circle { background-color: var(--red-inner); }

        .slot.black { background-color: var(--black-main); }
        .slot.black .inner-circle { background-color: var(--black-inner); }

        .slot.fire { background: linear-gradient(135deg, #ffc800, #ff8c00); }
        .slot.fire::after { content: '🔥'; font-size: 24px; }

        /* Controls */
        .controls-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .high-risk-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--bg-container);
            padding: 8px 20px;
            border-radius: 20px;
            align-self: center;
            font-size: 14px;
            color: #b0c4f5;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .high-risk-toggle.active {
            border: 1px solid var(--red-main);
            color: #fff;
            box-shadow: 0 0 10px rgba(252, 33, 72, 0.3);
        }

        .toggle-switch {
            width: 34px;
            height: 18px;
            background: #fff;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #0b66ff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch.active::before {
            left: 18px;
            background: var(--red-main);
        }

        .bet-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .btn-action {
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn-action:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-refresh {
            background-color: var(--btn-blue);
            width: 60px;
            border-radius: 50%;
            font-size: 24px;
        }

        .btn-red { background-color: var(--red-main); flex-grow: 1; }
        .btn-fire { background: linear-gradient(180deg, #ffd000, #e68a00); flex-grow: 1; color: #000; }
        .btn-black { background-color: #091226; flex-grow: 1; }

        .btn-action span:nth-child(1) { font-size: 12px; }
        .btn-action span:nth-child(2) { font-size: 16px; }

        .bet-input-container {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bet-info {
            display: flex;
            flex-direction: column;
        }

        .bet-info label {
            font-size: 11px;
            color: #88a4e6;
        }

        .bet-info input {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            width: 80px;
            outline: none;
        }

        .bet-adjust {
            display: flex;
            gap: 8px;
        }

        .btn-adj {
            background: transparent;
            border: 1px solid #486edb;
            color: #88a4e6;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            background-color: var(--bg-bottom);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .game-name {
            background: var(--bg-container);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .balance-display {
            font-weight: bold;
        }

        /* Overlay para mensagens */
        #result-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 20;
        }
        .win-text { color: #4CAF50; }
        .lose-text { color: #F44336; }
    </style>
</head>
<body>

<div id="mobile-container">
    
    <div class="top-bar">
        <div class="fun-mode">VIP MODE</div>
    </div>

    <div class="game-area">
        <div class="reel-container" id="reel-container">
            <div class="pointer-top"></div>
            <div class="pointer-bottom"></div>
            <div class="reel" id="reel">
                </div>
            <div id="result-overlay"></div>
        </div>
    </div>

    <div class="controls-area">
        <div class="high-risk-toggle" id="risk-container">
            <span>🚀</span>
            <div class="toggle-switch" id="risk-toggle" onclick="toggleRisk()"></div>
            <span>High risk mode</span>
        </div>

        <div class="bet-buttons">
            <button class="btn-action btn-refresh" id="btn-refresh" onclick="resetReel()">↻</button>
            <button class="btn-action btn-red" id="btn-red" onclick="placeBet('red')">
                <span>RED</span>
                <span>X2</span>
            </button>
            <button class="btn-action btn-fire" id="btn-fire" onclick="placeBet('fire')">
                <span>🔥</span>
                <span id="fire-multiplier">X32</span>
            </button>
            <button class="btn-action btn-black" id="btn-black" onclick="placeBet('black')">
                <span>BLACK</span>
                <span>X2</span>
            </button>
        </div>

        <div class="bet-input-container">
            <div class="bet-info">
                <label>Bet USD</label>
                <input type="number" id="bet-amount" value="1.00" step="1.00" min="0.10">
            </div>
            <div class="bet-adjust">
                <button class="btn-adj" onclick="adjustBet(-1.00)">-</button>
                <button class="btn-adj" onclick="doubleBet()">📚</button>
                <button class="btn-adj" onclick="adjustBet(1.00)">+</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="game-name">HOTLINE ▼</div>
        <div class="balance-display" id="balance-display">0.00 USD</div>
    </div>

</div>

<script type="module">
    // 1. IMPORTAÇÕES FIREBASE (PADRÃO SORTECERTA)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
        databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
        projectId: "sortecerta-75b77"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const idDispositivo = localStorage.getItem('usuario_tracker_id');

    // Se não estiver logado, joga para o login
    if (!idDispositivo) {
        window.location.href = 'login.html';
    }

    // VARIÁVEIS DE ESTADO
    let bancaAtual = 0.00;
    let isSpinning = false;
    let highRiskMode = false;
    
    const betInput = document.getElementById('bet-amount');
    const balanceDisplay = document.getElementById('balance-display');
    const reel = document.getElementById('reel');
    const resultOverlay = document.getElementById('result-overlay');
    
    const btnRed = document.getElementById('btn-red');
    const btnFire = document.getElementById('btn-fire');
    const btnBlack = document.getElementById('btn-black');
    const btnRefresh = document.getElementById('btn-refresh');

    // LÊ O SALDO DO BANCO DE DADOS EM TEMPO REAL
    onValue(ref(db, 'usuarios/' + idDispositivo + '/saldo'), (snapshot) => {
        bancaAtual = parseFloat(snapshot.val() || 0);
        updateBalance();
    });

    function toggleButtons(disabled) {
        btnRed.disabled = disabled;
        btnFire.disabled = disabled;
        btnBlack.disabled = disabled;
        btnRefresh.disabled = disabled;
    }

    function initIdleReel() {
        reel.style.transition = 'none';
        reel.innerHTML = '';
        
        for(let i=0; i<20; i++) {
            const type = (i % 2 === 0) ? 'red' : 'black';
            const slot = document.createElement('div');
            slot.className = `slot ${type}`;
            slot.innerHTML = '<div class="inner-circle"></div>';
            reel.appendChild(slot);
        }
        
        reel.style.transform = `translateX(-25px)`; 
    }

    function updateBalance() {
        balanceDisplay.innerText = bancaAtual.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USD';
    }

    // EXPOR FUNÇÕES PARA O HTML (Como estamos num module)
    window.adjustBet = function(amount) {
        if (isSpinning) return;
        let currentBet = parseFloat(betInput.value);
        currentBet = Math.max(0.10, currentBet + amount);
        betInput.value = currentBet.toFixed(2);
    }

    window.doubleBet = function() {
        if (isSpinning) return;
        let currentBet = parseFloat(betInput.value);
        betInput.value = (currentBet * 2).toFixed(2);
    }

    window.toggleRisk = function() {
        if (isSpinning) return;
        highRiskMode = !highRiskMode;
        
        const toggle = document.getElementById('risk-toggle');
        const container = document.getElementById('risk-container');
        const fireMult = document.getElementById('fire-multiplier');
        
        if (highRiskMode) {
            toggle.classList.add('active');
            container.classList.add('active');
            fireMult.innerText = 'X1056'; 
        } else {
            toggle.classList.remove('active');
            container.classList.remove('active');
            fireMult.innerText = 'X32';
        }
    }

    window.placeBet = async function(playerChoice) {
        if (isSpinning) return;
        let bet = parseFloat(betInput.value);
        
        if (isNaN(bet) || bet <= 0) {
            alert("Aposta inválida.");
            return;
        }
        if (bet > bancaAtual) {
            alert("Saldo insuficiente.");
            return;
        }

        // BLOQUEIA E INICIA GIRO
        toggleButtons(true);
        isSpinning = true;
        resultOverlay.style.opacity = 0;

        // 1. DESCONTA APOSTA DO JOGADOR NO FIREBASE
        let saldoReduzido = bancaAtual - bet;
        await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(saldoReduzido.toFixed(2)));
        
        // 2. ADICIONA A APOSTA NO CAIXA DA CASA
        get(ref(db, 'sistema/caixa_global')).then(snap => {
            let caixaAtual = parseFloat(snap.val() || 0);
            set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual + bet).toFixed(2)));
        });

        // Probabilidades (RTP de 97%)
        let fireProb = highRiskMode ? 0.000918 : 0.03; 
        let colorProb = (1 - fireProb) / 2; 
        
        let multipliers = {
            red: 2,
            black: 2,
            fire: highRiskMode ? 1056 : 32
        };

        // Rolar o dado (RNG)
        let rand = Math.random();
        let result;
        
        if (rand < fireProb) {
            result = 'fire';
        } else if (rand < fireProb + colorProb) {
            result = 'red';
        } else {
            result = 'black';
        }

        spinReel(result, playerChoice, bet, multipliers[result]);
    }

    function spinReel(result, playerChoice, betAmount, multiplier) {
        reel.innerHTML = '';
        
        const TOTAL_SLOTS = 60; 
        const TARGET_INDEX = 50; 
        
        for(let i = 0; i < TOTAL_SLOTS; i++) {
            let type;
            if (i === TARGET_INDEX) {
                type = result; 
            } else {
                let randVis = Math.random();
                let visualFire = highRiskMode ? 0.001 : 0.03;
                if (randVis < visualFire) type = 'fire';
                else if (randVis < 0.5) type = 'red';
                else type = 'black';
            }

            const slot = document.createElement('div');
            slot.className = `slot ${type}`;
            if (type !== 'fire') {
                slot.innerHTML = '<div class="inner-circle"></div>';
            }
            reel.appendChild(slot);
        }

        reel.style.transition = 'none';
        reel.style.transform = `translateX(-25px)`; 
        reel.offsetHeight; 

        const moveDistance = -(TARGET_INDEX * 60 + 25);

        setTimeout(() => {
            reel.style.transition = 'transform 3.5s cubic-bezier(0.1, 0.9, 0.2, 1)';
            reel.style.transform = `translateX(${moveDistance}px)`;
        }, 50);

        setTimeout(async () => {
            isSpinning = false;
            toggleButtons(false);
            
            if (result === playerChoice) {
                const winAmount = betAmount * multiplier;
                
                // 3. SE GANHOU, CREDITA O JOGADOR NO FIREBASE
                let novoSaldo = bancaAtual + winAmount;
                await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(novoSaldo.toFixed(2)));
                
                // 4. E DEDUZ DO CAIXA GLOBAL DA CASA
                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    let caixaAtual = parseFloat(snap.val() || 0);
                    set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - winAmount).toFixed(2)));
                });
                
                resultOverlay.innerText = `+${winAmount.toFixed(2)}`;
                resultOverlay.className = 'win-text';
                resultOverlay.style.opacity = 1;
            } else {
                resultOverlay.innerText = `MISS`;
                resultOverlay.className = 'lose-text';
                resultOverlay.style.opacity = 1;
            }
        }, 3600); 
    }

    window.resetReel = function() {
        if (isSpinning) return;
        resultOverlay.style.opacity = 0;
        initIdleReel();
    }

    // Inicialização da tela
    initIdleReel();
</script>

</body>
</html>
