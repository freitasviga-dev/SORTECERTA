<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Jogo Oficial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* =========================================
           CONFIGURAÇÕES BASE E ANTI-ZOOM
           ========================================= */
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; touch-action: pan-y; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050000;
            background-image: radial-gradient(circle at 50% 10%, #3a0000 0%, #050000 100%);
            color: #fff; display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; min-height: 100vh; overflow-y: auto; padding: 10px;
        }

        /* =========================================
           MOLDURA DO JOGO (MOBILE APP UI)
           ========================================= */
        .app-container {
            width: 100%; max-width: 420px;
            background: linear-gradient(180deg, #590000 0%, #1a0000 100%);
            border: 2px solid #ffcc00; border-radius: 20px; padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 0 15px rgba(255, 204, 0, 0.15);
            position: relative;
        }

        /* HEADER E SALDO */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-back { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #ffcc00; padding: 6px 12px; border-radius: 8px; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .wallet-box { background: rgba(0, 0, 0, 0.8); border: 2px solid #ffcc00; border-radius: 50px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .wallet-box:active { transform: scale(0.95); }
        .wallet-val { color: #00e676; font-weight: 900; font-size: 15px; }
        .wallet-add { background: linear-gradient(180deg, #ffcc00, #d35400); color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* PAINEL DE AVISOS */
        .status-panel {
            background: rgba(0, 0, 0, 0.6); border: 1px solid #ffcc00; border-radius: 10px;
            padding: 8px; text-align: center; margin-bottom: 15px; min-height: 35px;
            display: flex; align-items: center; justify-content: center;
        }
        .status-text { color: #ffcc00; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5); transition: 0.2s; }

        /* DISPLAY DE GANHOS */
        .win-display {
            background: #000; border: 2px solid #ffcc00; border-radius: 12px; padding: 10px;
            text-align: center; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.2);
        }
        .win-display span { font-size: 10px; color: #aaa; letter-spacing: 1px; font-weight: bold; }
        .win-display h1 { color: #ffcc00; font-size: 28px; font-weight: 900; margin-top: 2px; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }

        /* MÁQUINA DE SLOTS */
        .slot-machine {
            background: #220000; border: 3px solid #660000; border-radius: 16px; padding: 10px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); margin-bottom: 15px;
        }
        .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .slot-item {
            background: linear-gradient(145deg, #ffffff, #d4d4d4); height: 85px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 45px; position: relative;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.5); border: 1px solid #fff; transition: filter 0.1s;
        }
        .slot-item.ganhador { animation: brilhoVitoria 0.4s alternate infinite; border: 3px solid #ffcc00; z-index: 5; box-shadow: 0 0 15px #ffcc00; }
        .wild-badge { position: absolute; bottom: 2px; background: linear-gradient(90deg, #ffcc00, #e67e22); color: #000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 6px; border: 1px solid #fff; }

        /* BARRA DE CONTROLES INFERIORES */
        .controls-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 16px; border: 1px solid #4a0000;
        }
        .action-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555; background: linear-gradient(180deg, #333, #111);
            color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 0 #000; transition: 0.1s;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .action-btn.active-turbo { border-color: #ffcc00; background: linear-gradient(180deg, #f39c12, #d35400); color: #000; box-shadow: 0 4px 0 #8e44ad; }
        .action-btn.active-auto { border-color: #3498db; background: linear-gradient(180deg, #2980b9, #2c3e50); color: #fff; box-shadow: 0 4px 0 #1a252f; }

        .bet-selector { display: flex; align-items: center; background: #000; border-radius: 30px; padding: 4px; border: 1px solid #330000; }
        .bet-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: linear-gradient(180deg, #ffcc00, #d35400); color: #000; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bet-btn:active { transform: scale(0.9); }
        .bet-amount { min-width: 80px; text-align: center; font-size: 16px; font-weight: 900; color: #ffcc00; }

        /* BOTÃO GIRAR */
        .spin-btn {
            width: 100%; background: linear-gradient(180deg, #00b37e 0%, #00875f 100%);
            border: none; color: #fff; padding: 16px; font-size: 24px; font-weight: 900;
            border-radius: 14px; cursor: pointer; box-shadow: 0 6px 0 #005239, 0 10px 15px rgba(0,0,0,0.5);
            text-shadow: 1px 2px 2px rgba(0,0,0,0.4); transition: 0.1s; position: relative;
        }
        .spin-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 #005239; }
        .spin-btn:disabled { background: linear-gradient(180deg, #555, #333); box-shadow: 0 6px 0 #111; color: #888; cursor: not-allowed; }

        .auto-badge { position: absolute; top: -10px; right: -5px; background: #e74c3c; color: #fff; font-size: 12px; font-weight: bold; width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; display: none; align-items: center; justify-content: center; animation: pulsar 1s infinite; }

        /* TELA DE SUPER GANHO */
        .mega-win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92);
            z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px);
        }
        .mega-win-box h2 { font-size: 40px; color: #ffcc00; font-weight: 900; text-shadow: 0 0 20px #e67e22; animation: pulsar 0.5s infinite alternate; margin-bottom: 5px; }
        .mega-win-box h3 { font-size: 55px; color: #00b37e; font-weight: 900; text-shadow: 0 0 20px rgba(0, 179, 126, 0.5); }

        /* ANIMAÇÕES */
        @keyframes brilhoVitoria { 0% { transform: scale(1); filter: brightness(1); } 100% { transform: scale(1.05); filter: brightness(1.3); } }
        @keyframes pulsar { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        @keyframes rainCoin { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- HEADER -->
        <div class="header-top">
            <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Início</a>
            <div class="wallet-box" onclick="window.location.href='saldo.html'">
                <span class="wallet-val" id="txtSaldo">R$ 0,00</span>
                <div class="wallet-add"><i class="fa-solid fa-plus"></i></div>
            </div>
        </div>

        <div class="status-panel">
            <span class="status-text" id="displayMensagem">BOA SORTE! 🍀</span>
        </div>

        <!-- MÁQUINA -->
        <div class="slot-machine">
            <div class="slot-grid">
                <div class="slot-item" id="s0">🍊</div><div class="slot-item" id="s1">🍀</div><div class="slot-item" id="s2">🍊</div>
                <div class="slot-item" id="s3">🧧</div><div class="slot-item" id="s4">🐯<span class="wild-badge">WILD</span></div><div class="slot-item" id="s5">🧧</div>
                <div class="slot-item" id="s6">🍊</div><div class="slot-item" id="s7">💰</div><div class="slot-item" id="s8">🍊</div>
            </div>
        </div>

        <div class="win-display">
            <span>GANHO DA RODADA</span>
            <h1 id="txtGanhoTotal">R$ 0,00</h1>
        </div>

        <!-- CONTROLES -->
        <div class="controls-bar">
            <button class="action-btn" id="btnTurbo" onclick="toggleTurbo()"><i class="fa-solid fa-bolt"></i></button>
            <div class="bet-selector">
                <button class="bet-btn" onclick="ajustarAposta(-1)">-</button>
                <div class="bet-amount" id="txtAposta">R$ 0,40</div>
                <button class="bet-btn" onclick="ajustarAposta(1)">+</button>
            </div>
            <button class="action-btn" id="btnAuto" onclick="iniciarAuto()"><i class="fa-solid fa-rotate"></i></button>
        </div>

        <!-- SPINNER -->
        <button class="spin-btn" id="btnDisparar" onclick="executarRodada()">
            GIRAR
            <div class="auto-badge" id="badgeAuto">0</div>
        </button>

        <div style="font-size: 9px; color: #444; margin-top: 10px; text-align: center;" id="lblIdDispositivo">ID: Conectando...</div>
    </div>

    <!-- MEGA WIN -->
    <div class="mega-win-overlay" id="telaBonus">
        <div class="mega-win-box">
            <h2>GANHO ÉPICO!</h2>
            <h3 id="valorPremioFantastico">R$ 0,00</h3>
        </div>
    </div>

    <!-- SISTEMA E FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio",
            authDomain: "sortecerta-75b77.firebaseapp.com",
            databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com",
            projectId: "sortecerta-75b77"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // AUTENTICAÇÃO E ID
        let idDispositivo = localStorage.getItem('usuario_tracker_id');
        if (!idDispositivo) {
            idDispositivo = 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('usuario_tracker_id', idDispositivo);
        }
        document.getElementById('lblIdDispositivo').innerText = "ID: " + idDispositivo;
        
        // VARIÁVEIS DO JOGO E ADMIN
        let bancaAtual = 0.00; 
        let valorDoGiro = 0.40;
        let firebaseConectado = false;
        
        window.caixaDaCasa = 0.00; 
        window.margemLucro = 0.30; 
        window.isTurbo = false;
        window.girosAutoRestantes = 0;
        window.emGiro = false;
        window.estadoSequencia = 0; 
        window.valorPremioForcado = 0;
        window.girosAtaqueRestantes = 0;
        window.modoJogo = "normal";

        const tabelaApostas = [0.40, 0.80, 1.20, 2.00, 4.00, 10.00, 20.00, 50.00, 100.00, 250.00];
        const dicionarioPremios = { '🐯': 50, '💰': 20, '🧧': 10, '🍀': 5, '🍊': 2 };
        const listaSimbolosBase = ['🐯', '💰', '💰', '🧧', '🧧', '🧧', '🧧', '🍀', '🍀', '🍀', '🍀', '🍀', '🍀', '🍊', '🍊', '🍊', '🍊', '🍊', '🍊', '🍊', '🍊', '🍊'];
        const combinacoesLinhas = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
        
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();

        // INICIALIZA CONEXÃO
        conectarFirebaseSincronizado();

        function conectarFirebaseSincronizado() {
            // Conta do Jogador
            onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    if (!window.emGiro) bancaAtual = parseFloat(dados.saldo || 0);
                    if (window.estadoSequencia !== 3) window.modoJogo = String(dados.modo || "normal").toLowerCase();
                    
                    let ganhoForcadoLido = parseFloat(String(dados.forcarGanho || "0").replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                    if (ganhoForcadoLido > 0 && window.estadoSequencia === 0) {
                        window.valorPremioForcado = ganhoForcadoLido;
                        window.estadoSequencia = 1;
                        window.girosAtaqueRestantes = Math.floor(Math.random() * 3) + 2; 
                        set(ref(db, 'usuarios/' + idDispositivo + '/forcarGanho'), 0);
                    }
                } else {
                    bancaAtual = 0.00;
                    if (!window.emGiro) set(ref(db, 'usuarios/' + idDispositivo), { saldo: bancaAtual, modo: "normal", forcarGanho: 0 });
                }
                firebaseConectado = true;
                atualizarTelas();
            });

            // Caixa Global (RTP Pool)
            onValue(ref(db, 'sistema/caixa_global'), (snapshot) => {
                window.caixaDaCasa = parseFloat(snapshot.val() || 0);
            });
        }

        // CONTROLES DE UI
        function notificarDisplay(texto) { 
            const display = document.getElementById('displayMensagem'); 
            display.innerText = texto; display.style.transform = "scale(1.1)"; 
            setTimeout(() => display.style.transform = "scale(1)", 200);
        }

        window.ajustarAposta = function(direcao) {
            if(window.emGiro) return;
            let i = tabelaApostas.findIndex(v => v >= valorDoGiro);
            i = (i === -1) ? 0 : i + direcao;
            if(i < 0) return notificarDisplay("MÍNIMO: R$ 0,40");
            if(i >= tabelaApostas.length) return notificarDisplay("MÁXIMO: R$ 250,00");
            valorDoGiro = tabelaApostas[i];
            atualizarTelas(); notificarDisplay(`BET: R$ ${valorDoGiro.toFixed(2)}`);
        }

        window.toggleTurbo = function() {
            if(window.emGiro) return;
            window.isTurbo = !window.isTurbo;
            document.getElementById('btnTurbo').classList.toggle('active-turbo');
            notificarDisplay(window.isTurbo ? "⚡ TURBO ATIVADO" : "MODO NORMAL");
        }

        window.iniciarAuto = function() {
            if(window.emGiro) {
                window.girosAutoRestantes = 0; atualizarBadgeAuto();
                return notificarDisplay("AUTO CANCELADO");
            }
            let qtd = parseInt(prompt("Giros Automáticos:", "10"));
            if(!isNaN(qtd) && qtd > 0) {
                window.girosAutoRestantes = qtd; atualizarBadgeAuto();
                notificarDisplay(`🔄 AUTO: ${qtd}`); window.executarRodada();
            }
        }

        function atualizarBadgeAuto() {
            const badge = document.getElementById('badgeAuto');
            const btnAuto = document.getElementById('btnAuto');
            if(window.girosAutoRestantes > 0) { badge.style.display = 'flex'; badge.innerText = window.girosAutoRestantes; btnAuto.classList.add('active-auto'); } 
            else { badge.style.display = 'none'; btnAuto.classList.remove('active-auto'); }
        }

        // MOTOR DO GIRO
        window.executarRodada = function() {
            if (!firebaseConectado) return;
            if (bancaAtual < valorDoGiro) { 
                notificarDisplay("SALDO INSUFICIENTE"); window.girosAutoRestantes = 0; atualizarBadgeAuto(); return; 
            }

            if (ctxAudio.state === 'suspended') ctxAudio.resume();
            window.emGiro = true;
            
            // DEDUÇÃO E ALIMENTAÇÃO DO CAIXA GLOBAL
            bancaAtual -= valorDoGiro;
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            set(ref(db, 'sistema/caixa_global'), parseFloat((window.caixaDaCasa + valorDoGiro).toFixed(2)));
            
            atualizarTelas();
            document.getElementById('btnDisparar').disabled = true;
            document.getElementById('txtGanhoTotal').innerText = "R$ 0,00";

            for(let i=0; i<9; i++) { let s = document.getElementById(`s${i}`); s.classList.remove('ganhador'); s.style.filter = "blur(3px)"; }

            let passagens = 0; let vel = window.isTurbo ? 35 : 80;
            const loop = setInterval(() => {
                tocarSomGiro();
                for(let i=0; i<9; i++) renderizarSlot(i, listaSimbolosBase[Math.floor(Math.random() * listaSimbolosBase.length)]);
                passagens++;
                if(passagens > 12) {
                    clearInterval(loop);
                    for(let i=0; i<9; i++) document.getElementById(`s${i}`).style.filter = "none";
                    processarResultadoFinal();
                }
            }, vel);
        }

        // MATEMÁTICA E RTP
        function gerarMatrizAleatoria() { let m = []; for(let i=0; i<9; i++) m.push(listaSimbolosBase[Math.floor(Math.random() * listaSimbolosBase.length)]); return m; }
        function gerarMatrizPerdedora() {
            let m, info, s=0; do { m = gerarMatrizAleatoria(); info = calcularGanhosDaMatriz(m); s++; } while (info.ganho > 0 && s < 100);
            return info.ganho > 0 ? ['🍊','💰','🍀','💰','🍊','🧧','🍀','🧧','🍊'] : m;
        }

        function calcularGanhosDaMatriz(matriz) {
            let ganho = 0, linhas = [];
            combinacoesLinhas.forEach(linha => {
                const [a, b, c] = linha; let mA = matriz[a], mB = matriz[b], mC = matriz[c];
                let matchNormal = (mA === mB && mB === mC); let matchWild = false;
                if (mA === '🐯' || mB === '🐯' || mC === '🐯') {
                    let f = [mA, mB, mC].filter(x => x !== '🐯');
                    if (f.length <= 1 || (f.length === 2 && f[0] === f[1])) matchWild = true;
                }
                if (matchNormal || matchWild) {
                    let ref = (mA !== '🐯') ? mA : ((mB !== '🐯') ? mB : mC) || '🐯'; 
                    ganho += (valorDoGiro * (dicionarioPremios[ref] / 10)); linhas.push(linha);
                }
            });
            let todosIguais = matriz.every(e => e === matriz[0]);
            if(todosIguais && ganho > 0) ganho *= 10;
            return { ganho, linhas, todosIguais };
        }

        function processarResultadoFinal() {
            let resultadoMatriz = [], ganhoFinal = 0, linhasVencedoras = [], flagMegaGanho = false;

            if (window.estadoSequencia === 1) { 
                resultadoMatriz = gerarMatrizPerdedora(); window.girosAtaqueRestantes--;
                if(window.girosAtaqueRestantes <= 0) window.estadoSequencia = 2;
            } 
            else if (window.estadoSequencia === 2) { 
                resultadoMatriz = ['🍊','🍀','🍊','🐯','🐯','🐯','💰','🍊','💰']; 
                ganhoFinal = window.valorPremioForcado; linhasVencedoras = [[3,4,5]];
                if (ganhoFinal >= 50) flagMegaGanho = true;
                window.estadoSequencia = 3; set(ref(db, 'usuarios/' + idDispositivo + '/modo'), 'agressivo'); 
            } 
            else if (window.estadoSequencia === 3 || window.modoJogo === 'agressivo') { 
                if (Math.random() < 0.3) { ganhoFinal = valorDoGiro * 0.8; resultadoMatriz = ['🍊','🍊','🍊','🧧','🧧','🧧','🍀','🍀','🍀']; linhasVencedoras = [[0,1,2]]; } 
                else { resultadoMatriz = gerarMatrizPerdedora(); }
                if (bancaAtual <= 0.50) window.estadoSequencia = 0; 
            } 
            else {
                // RTP AUDIT
                let maxT = 20, tAtual = 0, infoM;
                do {
                    resultadoMatriz = gerarMatrizAleatoria(); infoM = calcularGanhosDaMatriz(resultadoMatriz);
                    if (infoM.ganho > 0) {
                        let verbaLivre = window.caixaDaCasa * (1 - window.margemLucro);
                        if (infoM.ganho > verbaLivre || (window.modoJogo === 'desfarcado' && infoM.ganho > (valorDoGiro * 4))) { tAtual++; continue; }
                    }
                    break; 
                } while (tAtual < maxT);

                if (tAtual >= maxT) { resultadoMatriz = gerarMatrizPerdedora(); infoM = { ganho: 0, linhas: [], todosIguais: false }; }
                ganhoFinal = infoM.ganho; linhasVencedoras = infoM.linhas; flagMegaGanho = (infoM.todosIguais && infoM.ganho > 0);
            }

            // DESCONTA DO CAIXA GLOBAL SE HOUVER VITÓRIA
            if (ganhoFinal > 0) {
                let novoCofre = Math.max(0, window.caixaDaCasa - ganhoFinal);
                set(ref(db, 'sistema/caixa_global'), parseFloat(novoCofre.toFixed(2)));
            }

            // PINTAR TELA
            for (let i = 0; i < 9; i++) renderizarSlot(i, resultadoMatriz[i]);
            linhasVencedoras.forEach(l => { document.getElementById(`s${l[0]}`).classList.add('ganhador'); document.getElementById(`s${l[1]}`).classList.add('ganhador'); document.getElementById(`s${l[2]}`).classList.add('ganhador'); });

            if (flagMegaGanho && ganhoFinal > 0) { tocarSomGanho(); dispararAnimacaoFantastica(ganhoFinal); } 
            else { finalizarRodadaProcesso(ganhoFinal); }
        }

        // FINALIZAÇÃO
        function finalizarRodadaProcesso(ganho) {
            if (ganho > 0) { bancaAtual += ganho; tocarSomGanho(); notificarDisplay(`GANHOU R$ ${ganho.toFixed(2)}`); } 
            else { notificarDisplay("NÃO FOI DESTA VEZ"); }

            document.getElementById('txtGanhoTotal').innerText = "R$ " + ganho.toFixed(2).replace('.', ',');
            set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), parseFloat(bancaAtual.toFixed(2)));
            atualizarTelas();
            
            if(window.girosAutoRestantes > 0) {
                window.girosAutoRestantes--; atualizarBadgeAuto();
                setTimeout(() => { if(window.girosAutoRestantes > 0) window.executarRodada(); else { window.emGiro = false; document.getElementById('btnDisparar').disabled = false; } }, window.isTurbo ? 400 : 1000);
            } else { document.getElementById('btnDisparar').disabled = false; window.emGiro = false; }
        }

        // ANIMAÇÃO DE CHUVA
        window.dispararAnimacaoFantastica = function(valor) {
            const tela = document.getElementById('telaBonus');
            tela.style.display = 'flex'; document.getElementById('valorPremioFantastico').innerText = "R$ " + valor.toFixed(2);
            for (let i = 0; i < 40; i++) {
                let coin = document.createElement('div'); coin.innerHTML = '🪙'; coin.style.position = 'absolute';
                coin.style.left = Math.random() * 100 + '%'; coin.style.top = '-10%'; coin.style.fontSize = (Math.random() * 20 + 20) + 'px';
                coin.style.animation = `rainCoin ${Math.random() * 1.5 + 1}s linear forwards`; coin.style.zIndex = '10000';
                tela.appendChild(coin); setTimeout(() => coin.remove(), 2500);
            }
            setTimeout(() => { tela.style.display = 'none'; finalizarRodadaProcesso(valor); }, 3000);
        }

        // UTILITÁRIOS
        function renderizarSlot(id, simbolo) { const item = document.getElementById(`s${id}`); if (simbolo === '🐯') item.innerHTML = `🐯<span class="wild-badge">WILD</span>`; else item.innerHTML = simbolo; }
        function atualizarTelas() { document.getElementById('txtSaldo').innerText = "R$ " + bancaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); document.getElementById('txtAposta').innerText = "R$ " + valorDoGiro.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
        function tocarSomGiro() { try { let o = ctxAudio.createOscillator(), g = ctxAudio.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(140, ctxAudio.currentTime); g.gain.setValueAtTime(0.05, ctxAudio.currentTime); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + 0.08); } catch(e){} }
        function tocarSomGanho() { try { let o = ctxAudio.createOscillator(), g = ctxAudio.createGain(); o.type = 'square'; o.frequency.setValueAtTime(580, ctxAudio.currentTime); g.gain.setValueAtTime(0.1, ctxAudio.currentTime); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + 0.3); } catch(e){} }
    </script>
</body>
