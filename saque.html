<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SorteCerta - Retirada Financeira</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #18181b;
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --green: #2ecc71;
            --green-dark: #27ae60;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

        /* --- HEADER BANCÁRIO --- */
        .header {
            position: sticky; top: 0; width: 100%; background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 15px;
            padding-top: calc(15px + env(safe-area-inset-top)); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 20px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .btn-back:active { background: rgba(255,255,255,0.1); color: #fff; }
        .page-title { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .verified-badge { background: rgba(46, 204, 113, 0.1); color: var(--green); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 10px; border: 1px solid rgba(46, 204, 113, 0.3); display: flex; align-items: center; gap: 4px; text-transform: uppercase; }

        .container { flex: 1; max-width: 600px; margin: 0 auto; padding: 20px 15px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

        /* --- CARD DE RESUMO DE SALDO --- */
        .balance-summary { background: linear-gradient(135deg, #1f1f23 0%, #121214 100%); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bs-left { display: flex; flex-direction: column; gap: 4px; }
        .bs-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .bs-value { font-size: 28px; font-weight: 900; color: #fff; display: flex; align-items: baseline; gap: 4px; }
        .bs-currency { font-size: 16px; color: var(--green); }
        
        .btn-max { background: rgba(241, 196, 15, 0.1); border: 1px solid rgba(241, 196, 15, 0.4); color: var(--gold); padding: 10px 15px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-max:active { background: var(--gold); color: #000; transform: scale(0.95); }

        /* --- ÁREA DE SAQUE (FORMULÁRIO) --- */
        .withdraw-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .sh-icon { background: rgba(241, 196, 15, 0.1); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 18px; }
        .sh-text h3 { font-size: 16px; color: #fff; font-weight: 700; }
        .sh-text p { font-size: 11px; color: var(--text-muted); }

        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 12px; color: #ccc; margin-bottom: 8px; display: block; font-weight: 600; }
        
        .select-custom {
            width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 16px;
            border-radius: 12px; font-size: 14px; outline: none; appearance: none; cursor: pointer; font-weight: 500;
        }
        
        .input-custom {
            width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 16px;
            border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; font-weight: 500;
        }
        .input-custom::placeholder { color: #666; font-weight: 400; }
        .input-custom:focus, .select-custom:focus { border-color: var(--green); background: rgba(46, 204, 113, 0.05); }

        .value-wrapper { position: relative; display: flex; align-items: center; }
        .val-prefix { position: absolute; left: 16px; color: var(--green); font-weight: 900; font-size: 20px; }
        .input-money { padding-left: 55px; font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .security-badges { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .s-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #777; font-weight: 600; text-transform: uppercase; }
        .s-badge i { color: #555; font-size: 14px; }

        .btn-submit {
            width: 100%; background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%);
            color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 16px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 0 #145a32, 0 15px 25px rgba(46, 204, 113, 0.3); transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:active { transform: translateY(8px); box-shadow: 0 0 0 #145a32; }

        .footer-info { text-align: center; font-size: 11px; color: var(--text-muted); line-height: 1.5; padding: 0 10px; margin-top: 10px; }
        .footer-info strong { color: #fff; }

    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('usuario_tracker_id')) {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="page-title">Caixa SorteCerta</div>
        <div class="verified-badge"><i class="fa-solid fa-shield-check"></i> Seguro</div>
    </header>

    <div class="container">
        
        <div class="balance-summary">
            <div class="bs-left">
                <span class="bs-label">Saldo Disponível para Saque</span>
                <div class="bs-value"><span class="bs-currency">R$</span> <span id="displaySaldoTopo">0,00</span></div>
            </div>
            <button class="btn-max" onclick="sacarTudo()">Usar Máximo</button>
        </div>

        <div class="withdraw-card">
            <div class="section-header">
                <div class="sh-icon"><i class="fa-brands fa-pix"></i></div>
                <div class="sh-text">
                    <h3>Retirada via PIX</h3>
                    <p>Transferência imediata sem taxas.</p>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Valor do Saque</label>
                <div class="value-wrapper">
                    <span class="val-prefix">R$</span>
                    <input type="number" id="valorSaque" class="input-custom input-money" placeholder="0.00" step="10.00">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Tipo de Chave PIX</label>
                <select class="select-custom" id="tipoChave">
                    <option value="CPF/CNPJ">CPF
