<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Goal VIP | SorteCerta Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        
        body { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, #1e3c72 0%, #0a1930 100%);
            color: #ffffff; display: flex; flex-direction: column; overflow: hidden;
        }

        .btn-3d { transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease; cursor: pointer; }
        .btn-3d:active { transform: translateY(4px) !important; box-shadow: none !important; margin-top: 4px; }

        /* HEADER */
        .header-bar { height: 50px; flex-shrink: 0; padding: 0 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-back { color: #fff; font-size: 20px; padding: 5px; opacity: 0.8; }
        .logo-text { font-size: 15px; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.6); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .logo-text i { color: #f1c40f; font-size: 13px; }
        .btn-top { color: #fff; font-size: 18px; padding: 5px; opacity: 0.8; }

        /* GAME AREA RESPONSIVA */
        .game-area { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; width: 100%; max-width: 450px; margin: 0 auto; }
        
        .board-header { width: 100%; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.25); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .board-select { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-bottom: 3px solid #000; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; outline: none; appearance: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .next-multiplier { background: linear-gradient(135deg, #f1c40f, #b8860b); color: #000; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 900; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4), inset 0 2px 2px rgba(255,255,255,0.4); transition: 0.3s; display: flex; align-items: center; gap: 5px; }

        /* GRID GOAL */
        .grid-container { width: 100%; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); box-shadow: inset 0 5px 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.4); overflow-x: auto; scrollbar-width: none; flex-shrink: 1; }
        .grid-container::-webkit-scrollbar { display: none; }
        .grid { display: grid; gap: 8px; }

        /* TILES 3D PROFUNDIDADE */
        .tile {
            background: linear-gradient(180deg, #1e458a 0%, #112a5e 100%); border-radius: 10px; position: relative;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.15), inset 0 -4px 0 rgba(0,0,0,0.4), 0 5px 8px rgba(0,0,0,0.5);
            border-bottom: 4px solid #081533; display: flex; justify-content: center; align-items: center; 
            transition: all 0.15s ease; opacity: 0.4; pointer-events: none; aspect-ratio: 1/1;
        }
        
        .tile.active-col {
            opacity: 1; pointer-events: auto; cursor: pointer;
            border-color: #b8860b; 
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), inset 0 -4px 0 rgba(0,0,0,0.4), 0 0 15px rgba(241, 196, 15, 0.6);
            animation: pulseTile 1.5s infinite;
        }
        @keyframes pulseTile { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }

        .tile.active-col:active { transform: translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); border-bottom-width: 0px; }

        .tile.opened {
            background: #0b1a3a; box-shadow: inset 0 4px 10px rgba(0,0,0,0.7); 
            transform: translateY(4px); border-bottom-width: 0px; cursor: default; opacity: 1; animation: none; pointer-events: none;
        }
        
        .tile.safe { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile.safe::before { content: '⚽'; font-size: min(6vw, 28px); filter: drop-shadow(0 0 15px rgba(0, 230, 118, 0.8)); }
        
        .tile.bomb { background: radial-gradient(circle, #e74c3c, #961d12); box-shadow: inset 0 4px 10px rgba(0,0,0,0.8); animation: shake 0.4s ease-in-out; opacity: 1;}
        .tile.bomb::before { content: '💣'; font-size: min(6vw, 30px); filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); }
        
        .tile.bomb-reveal { opacity: 0.6; background: #5c1818; box-shadow: inset 0 4px 10px rgba(0,0,0,0.8); animation: none; transform: translateY(4px); border-bottom-width: 0px; }
        .tile.bomb-reveal::before { content: '💣'; font-size: min(5vw, 24px); opacity: 0.9; }

        /* PAINEL DE CONTROLE COMPACTO E FIXO */
        .controls-wrapper { flex-shrink: 0; width: 100%; background: #071226; border-top: 2px solid #143570; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .action-row { display: flex; gap: 10px; }
        .btn-secondary { flex: 1; background: linear-gradient(180deg, #1c2b4a, #0d162b); color: #ccc; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 4px 0 rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); border-bottom: none; }
        .btn-secondary.auto-active { color: #000; background: linear-gradient(180deg, #f1c40f, #b8860b); box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 4px 0 #7a5805; border: none; }

        .bet-input-row { display: flex; background: rgba(0,0,0,0.5); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .bet-label { font-size: 10px; color: #888; font-weight: 800; padding-left: 15px; text-transform: uppercase; pointer-events: none; letter-spacing: 1px; }
        .bet-display { font-size: 15px; font-weight: 900; color: #fff; text-align: center; flex: 1; cursor: pointer; padding: 4px 0; border-radius: 10px; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bet-display:active { background: rgba(255,255,255,0.1); }
        .bet-adjust { background: linear-gradient(180deg, #1c3a76, #0d214a); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 14px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 0 #071229; cursor: pointer; transition: 0.1s; }
        .bet-adjust:active { transform: translateY(4px); box-shadow: none; }

        .bet-button { width: 100%; background: linear-gradient(180deg, #00e676, #00b359) !important; border: none; border-radius: 12px; padding: 15px; color: #000 !important; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 5px 0 #006633, 0 8px 15px rgba(0, 230, 118, 0.4) !important; display: flex; justify-content: center; align-items: center; gap: 10px; text-shadow: none !important; transition: all 0.1s; }
        .bet-button:active:not(.disabled) { transform: translateY(5px); box-shadow: none !important; }
        .bet-button.cashout { background: linear-gradient(180deg, #f1c40f, #d35400) !important; box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 5px 0 #8a3a00, 0 8px 15px rgba(243, 156, 18, 0.4) !important; color: #fff !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5) !important; }
        .bet-button.disabled { background: linear-gradient(180deg, #444, #222) !important; box-shadow: 0 5px 0 #111 !important; color: #888 !important; pointer-events: none; }

        .footer-info { display: flex; justify-content: space-between; align-items: center; padding: 0 2px; }
        .game-name { font-size: 10px; color: #888; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-info { font-size: 13px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .balance-info i { color: #00e676; font-size: 11px; }

        .auto-spin-menu { position: absolute; bottom: 135px; right: 15px; background: #0a0a0a; border: 1px solid #b8860b; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 6px; transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 50; width: 110px; }
        .auto-spin-menu.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .auto-btn-option { background: linear-gradient(180deg, #222, #111); border: 1px solid #333; color: #fff; padding: 8px 0; border-radius: 8px; font-weight: 900; text-align: center; cursor: pointer; font-size: 13px; text-transform: uppercase; box-shadow: 0 2px 0 #000; }
        .auto-btn-option:active { background: linear-gradient(180deg, #f1c40f, #b8860b); color: #000; box-shadow: none; transform: translateY(2px); border-color: transparent; }

        .win-toast { position: fixed; top: 80px; left: 50%; transform: translate(-50%, -20px) scale(0.9); background: linear-gradient(135deg, #00e676, #00b359); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; font-size: 18px; box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5), inset 0 2px 5px rgba(255,255,255,0.5); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; border: 2px solid #fff; }
        .win-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .win-toast span { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6); margin-bottom: 2px; letter-spacing: 1px; }

        .system-toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #ff5252; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .system-toast.show { opacity: 1; top: 90px; }

        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a14; z-index: 9999999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.3s ease; }
        #startScreen h2 { color: #f1c40f; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 25px; font-size: 26px; text-shadow: 0 0 20px rgba(241,196,15,0.5); display: flex; align-items: center; gap: 10px; }
        .btn-start { background: linear-gradient(180deg, #00e676, #00b359); color: #000; padding: 15px 40px; border-radius: 30px; font-weight: 900; text-transform: uppercase; box-shadow: inset 0 2px 2px rgba(255,255,255,0.5), 0 8px 20px rgba(0, 230, 118, 0.4); font-size: 14px; letter-spacing: 1px; }

        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }
    </style>
</head>

    <script type="module">
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) { window.location.reload(true); }
        });

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE OFUSCADO
        const _0x1a2b=["\x41\x49\x7a\x61\x53\x79\x42\x4f\x50\x37\x54\x66\x48\x6a\x41\x32\x6a\x6a\x77\x4a\x76\x57\x61\x62\x37\x32\x5a\x6b\x30\x6a\x66\x77\x35\x55\x39\x6f\x48\x69\x6f","\x68\x74\x74\x70\x73\x3a\x2f\x2f\x73\x6f\x72\x74\x65\x63\x65\x72\x74\x61\x2d\x37\x35\x62\x37\x37\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d","\x73\x6f\x72\x74\x65\x63\x65\x72\x74\x61\x2d\x37\x35\x62\x37\x37"];
        const app = initializeApp({ apiKey: _0x1a2b[0], databaseURL: _0x1a2b[1], projectId: _0x1a2b[2] });
        const db = getDatabase(app);

        const idDispositivo = localStorage.getItem('usuario_tracker_id');
        if (!idDispositivo) { window.location.href = 'login.html'; }

        // VARIÁVEIS GLOBAIS E RTP ISOLADO
        const CONFIG_RTP = 0.97; // RTP fácil de ajustar (97%)
        let bancaAtual = 0; 
        let modoJogador = 'normal'; 
        let audioLigado = false;
        let isGaming = false;
        
        let isAutoModeActive = false;
        let girosAutoRestantes = 0;
        let autoTimeoutId = null;

        const BOARDS = { 'small': { rows: 3, cols: 4 }, 'medium': { rows: 4, cols: 7 }, 'big': { rows: 5, cols: 10 } };
        let currentRowCount = 3; let currentColCount = 4;
        let currentActiveCol = 0; 
        let bombsPositions = []; 
        let currentMultiplier = 1.00;

        const apostasPermitidas = [1.00, 2.00, 5.00, 10.00, 20.00, 50.00, 100.00, 200.00, 500.00];
        let indexAposta = 0; let apostaAtual = apostasPermitidas[indexAposta];

        // 🎵 MOTOR DE ÁUDIO NATIVO
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const tocarSom = (tipo) => {
            if(!audioLigado) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);

            if (tipo === 'sfxClick') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.05);
                gainNode.gain.setValueAtTime(0, t); gainNode.gain.linearRampToValueAtTime(0.2, t + 0.01); gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                osc.start(t); osc.stop(t + 0.05);
            } else if (tipo === 'sfxGem') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, t); osc.frequency.setValueAtTime(1300, t + 0.08);
                gainNode.gain.setValueAtTime(0, t); gainNode.gain.linearRampToValueAtTime(0.3, t + 0.02); gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if (tipo === 'sfxBomb') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.4);
                gainNode.gain.setValueAtTime(0, t); gainNode.gain.linearRampToValueAtTime(0.4, t + 0.02); gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
            } else if (tipo === 'sfxWin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, t); osc.frequency.setValueAtTime(659.25, t + 0.1); 
                osc.frequency.setValueAtTime(783.99, t + 0.2); osc.frequency.setValueAtTime(1046.50, t + 0.3); 
                gainNode.gain.setValueAtTime(0, t); gainNode.gain.linearRampToValueAtTime(0.3, t + 0.05); gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
                osc.start(t); osc.stop(t + 0.6);
            }
        };

        function mostrarToast(msg) {
            const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('startScreen').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => { this.style.display = 'none'; }, 300);
            audioLigado = true;
            document.getElementById('btnAudio').innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            document.getElementById('btnAudio').style.color = '#fff';

            let docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen().catch(e => {}); }
            else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen().catch(e => {}); }

            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            tocarSom('sfxClick');
        });

        document.getElementById('btnBack').addEventListener('click', voltarParaLobby);
        document.getElementById('btnAudio').addEventListener('click', toggleAudio);
        document.getElementById('btnMinus').addEventListener('click', () => mudarAposta(-1));
        document.getElementById('btnPlus').addEventListener('click', () => mudarAposta(1));
        document.getElementById('board-size').addEventListener('change', () => { tocarSom('sfxClick'); window.resetGameUI(); });
        document.getElementById('btnAction').addEventListener('click', cliqueBotaoApostar);
        document.getElementById('btnRandom').addEventListener('click', selectRandomTile);
        
        document.getElementById('btnAuto').addEventListener('click', toggleMenuAuto);
        document.querySelectorAll('.auto-btn-option').forEach(btn => {
            btn.addEventListener('click', function() { tocarSom('sfxClick'); iniciarAutoJogo(parseInt(this.dataset.spins)); });
        });

        window.abrirInputAposta = function() {
            if(isGaming || isAutoModeActive) return;
            let novoValor = prompt("Digite o valor da aposta (Máx: R$ 500,00):", apostaAtual);
            if(novoValor !== null) {
                let parsed = parseFloat(novoValor.replace(',', '.'));
                if(!isNaN(parsed) && parsed >= 0.10) {
                    apostaAtual = Math.min(parsed, 500.00);
                    document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    tocarSom('sfxClick');
                } else { mostrarToast("Valor inválido."); }
            }
        };

        function toggleAudio() {
            audioLigado = !audioLigado; 
            const btn = document.getElementById('btnAudio');
            if(audioLigado) { 
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>'; btn.style.color = '#fff'; tocarSom('sfxClick');
            } else { 
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>'; btn.style.color = '#888'; 
            }
        }

        function voltarParaLobby() {
            tocarSom('sfxClick'); pararAutoJogo(); lidarComSaidaAbrupta();
            if (window.parent && window.parent !== window) { window.parent.postMessage("fecharIframe", "*"); } 
            else { window.location.href = 'index.html'; }
        }

        function lidarComSaidaAbrupta() {
            if (isGaming) {
                isGaming = false;
                let valorRetorno = currentActiveCol > 0 ? (apostaAtual * currentMultiplier) : apostaAtual;
                set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((bancaAtual + valorRetorno).toFixed(2)));
                
                if (modoJogador !== 'admin' && modoJogador !== 'live') {
                    get(ref(db, 'sistema/caixa_global')).then(snap => {
                        let caixaAtual = parseFloat(snap.val() || 0);
                        set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - valorRetorno).toFixed(2)));
                    });
                }
            }
        }

        window.addEventListener('pagehide', () => { lidarComSaidaAbrupta(); pararAutoJogo(); });
        document.addEventListener('visibilitychange', function() { if (document.hidden) { lidarComSaidaAbrupta(); pararAutoJogo(); } });

        function updateSaldoDisplay(valor) { document.getElementById('displaySaldo').innerText = "R$ " + valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            bancaAtual = parseFloat(dados.saldo || 0); 
            modoJogador = dados.modo || 'normal'; 
            if(!isGaming) updateSaldoDisplay(bancaAtual);
        });

        function mudarAposta(direcao) {
            if(isGaming || isAutoModeActive) return;
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) {
                indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta];
                document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                tocarSom('sfxClick');
            }
        }

        // AUTO JOGO
        function toggleMenuAuto() {
            if(isGaming || isAutoModeActive) { tocarSom('sfxClick'); pararAutoJogo(); return; }
            tocarSom('sfxClick'); document.getElementById('menuAuto').classList.toggle('show');
        }

        function iniciarAutoJogo(qtd) {
            document.getElementById('menuAuto').classList.remove('show');
            girosAutoRestantes = qtd; isAutoModeActive = true;
            document.getElementById('btnAuto').classList.add('auto-active');
            processarAutoJogo();
        }

        function pararAutoJogo() {
            isAutoModeActive = false; girosAutoRestantes = 0;
            document.getElementById('btnAuto').classList.remove('auto-active');
            document.getElementById('btnAuto').innerHTML = '<i class="fa-solid fa-rotate"></i> Auto Jogo';
            clearTimeout(autoTimeoutId);
            
            const btn = document.getElementById('btnAction');
            btn.classList.remove('disabled'); 
            
            if (!isGaming) {
                btn.classList.remove('cashout'); btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            } else {
                if(currentActiveCol > 0) {
                    btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual * currentMultiplier).toFixed(2).replace('.',',')})`;
                }
            }
        }

        function processarAutoJogo() {
            if (!isAutoModeActive) return;
            if (girosAutoRestantes <= 0) { pararAutoJogo(); return; }
            document.getElementById('btnAuto').innerHTML = `<i class="fa-solid fa-rotate"></i> AUTO (${girosAutoRestantes})`;

            if (!isGaming) {
                if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); pararAutoJogo(); return; }
                const apostaIniciada = iniciarApostaBackend();
                if (apostaIniciada) { autoTimeoutId = setTimeout(fazerJogadaAuto, 1000); } else { pararAutoJogo(); }
            }
        }

        function fazerJogadaAuto() {
            if (!isGaming || !isAutoModeActive) return;
            const activeTiles = Array.from(document.querySelectorAll('.tile')).filter(t => parseInt(t.dataset.col) === currentActiveCol);
            
            if (activeTiles.length > 0) {
                const rndRow = Math.floor(Math.random() * currentRowCount);
                const tile = activeTiles.find(t => parseInt(t.dataset.row) === rndRow);
                
                if (tile) {
                    handleTileClick(rndRow, currentActiveCol, tile);
                    if (isGaming) { autoTimeoutId = setTimeout(fazerJogadaAuto, 800); } 
                    else { girosAutoRestantes--; autoTimeoutId = setTimeout(processarAutoJogo, 2500); }
                }
            }
        }

        // OFUSCAÇÃO MATEMÁTICA E MULTIPLICADOR (RTP Isolado)
        function _0xMath(rows, steps) {
            if (steps === 0) return 1.00;
            const probSafe = (rows - 1) / rows;
            const cumulativeProb = Math.pow(probSafe, steps);
            return parseFloat(((1 / cumulativeProb) * CONFIG_RTP).toFixed(2));
        }

        function atualizarMultiplicadorPreview(steps = 1) {
            document.getElementById('nextMultDisplay').innerText = `${_0xMath(currentRowCount, steps).toFixed(2)}x`;
        }

        function updateActiveColumnUI() {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => {
                const c = parseInt(tile.dataset.col);
                if (isGaming && c === currentActiveCol) { tile.classList.add('active-col'); } 
                else { tile.classList.remove('active-col'); }
            });
        }

        window.resetGameUI = function() {
            if(isGaming) return;
            const sizeConfig = BOARDS[document.getElementById('board-size').value];
            currentRowCount = sizeConfig.rows; currentColCount = sizeConfig.cols;
            
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${currentColCount}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${currentRowCount}, 1fr)`;
            grid.innerHTML = '';

            for (let r = 0; r < currentRowCount; r++) {
                for (let c = 0; c < currentColCount; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile'; tile.dataset.row = r; tile.dataset.col = c;
                    tile.onclick = () => handleTileClick(r, c, tile);
                    grid.appendChild(tile);
                }
            }
            currentMultiplier = 1.00;
            atualizarMultiplicadorPreview(1); // CORREÇÃO MULTIPLICADOR RESET
            const btn = document.getElementById('btnAction');
            btn.classList.remove('cashout'); btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
        }

        function cliqueBotaoApostar() {
            if(isAutoModeActive) return;
            tocarSom('sfxClick');
            if (isGaming) {
                if (currentActiveCol === 0) return;
                cashOut();
            } else {
                iniciarApostaBackend();
            }
        }

        function iniciarApostaBackend() {
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); return false; }

            isGaming = true; currentActiveCol = 0; currentMultiplier = 1.00;
            document.getElementById('board-size').disabled = true;
            document.getElementById('btnMinus').style.opacity = '0.5'; document.getElementById('btnPlus').style.opacity = '0.5';
            const btnRnd = document.getElementById('btnRandom'); btnRnd.style.opacity = '1'; btnRnd.style.pointerEvents = 'auto';

            const btn = document.getElementById('btnAction');
            btn.classList.remove('disabled'); 
            btn.classList.add('cashout'); 
            btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual).toFixed(2).replace('.',',')})`;

            updateSaldoDisplay(bancaAtual - apostaAtual);
            
            set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat((bancaAtual - apostaAtual).toFixed(2)));
            
            // TRAVA ADMIN E ROLLOVER
            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                get(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual')).then(snap => {
                    set(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual'), parseFloat((snap.val() || 0)) + apostaAtual);
                });
                
                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) + apostaAtual).toFixed(2)));
                });
            }

            bombsPositions = [];
            for (let c = 0; c < currentColCount; c++) { bombsPositions.push(Math.floor(Math.random() * currentRowCount)); }

            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => { tile.className = 'tile'; tile.innerHTML = ''; });

            updateActiveColumnUI(); 
            atualizarMultiplicadorPreview(1); // FIXO: 1º PASSO
            return true;
        }

        function selectRandomTile() {
            if (!isGaming || isAutoModeActive) return; tocarSom('sfxClick');
            const activeTiles = Array.from(document.querySelectorAll('.tile')).filter(t => parseInt(t.dataset.col) === currentActiveCol);
            if (activeTiles.length > 0) {
                const rndRow = Math.floor(Math.random() * currentRowCount);
                const tile = activeTiles.find(t => parseInt(t.dataset.row) === rndRow);
                if (tile) handleTileClick(rndRow, currentActiveCol, tile);
            }
        }

        function handleTileClick(r, c, tileElement) {
            if (!isGaming || c !== currentActiveCol) return;

            if (modoJogador === 'influenciador' && bombsPositions[c] === r) {
                let linhasLivres = [];
                for(let i = 0; i < currentRowCount; i++) { if(i !== r) linhasLivres.push(i); }
                bombsPositions[c] = linhasLivres[Math.floor(Math.random() * linhasLivres.length)];
            }

            tileElement.classList.add('opened');

            if (bombsPositions[c] === r) {
                isGaming = false;
                tocarSom('sfxBomb'); tileElement.classList.add('bomb'); 
                endGame(false);
            } else {
                tocarSom('sfxGem'); tileElement.classList.add('safe');
                currentActiveCol++;
                currentMultiplier = _0xMath(currentRowCount, currentActiveCol);
                
                if (currentActiveCol >= currentColCount) {
                    isGaming = false;
                    cashOut(true); 
                } else {
                    const btn = document.getElementById('btnAction');
                    btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual * currentMultiplier).toFixed(2).replace('.',',')})`;
                    updateActiveColumnUI(); 
                    atualizarMultiplicadorPreview(currentActiveCol + 1); // ATUALIZA PRÓXIMO
                }
            }
        }

        async function cashOut(isGoal = false) {
            isGaming = false; 
            const lucro = apostaAtual * currentMultiplier;
            const novoSaldo = bancaAtual + lucro;
            
            updateSaldoDisplay(novoSaldo);
            await set(ref(db, `usuarios/${idDispositivo}/saldo`), parseFloat(novoSaldo.toFixed(2)));
            
            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                get(ref(db, 'sistema/caixa_global')).then(snap => {
                    let caixaAtual = parseFloat(snap.val() || 0);
                    set(ref(db, 'sistema/caixa_global'), parseFloat((caixaAtual - lucro).toFixed(2)));
                });
            }

            tocarSom('sfxWin');
            const toast = document.getElementById('winToast');
            document.getElementById('winTitle').innerText = isGoal ? "GOOOOOAL!" : "LUCRO TOTAL DA RODADA";
            document.getElementById('winAmount').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);

            endGame(true, true);
        }

        function endGame(won, cashedOut = false) {
            document.getElementById('board-size').disabled = false;
            document.getElementById('btnMinus').style.opacity = '1'; document.getElementById('btnPlus').style.opacity = '1';
            const btnRnd = document.getElementById('btnRandom'); btnRnd.style.opacity = '0.5'; btnRnd.style.pointerEvents = 'none';

            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => {
                tile.classList.remove('active-col');
                const r = parseInt(tile.dataset.row); const c = parseInt(tile.dataset.col);
                if (bombsPositions[c] === r && !tile.classList.contains('bomb')) {
                    tile.classList.add('opened', 'bomb-reveal');
                }
            });

            // CORREÇÃO DO MULTIPLICADOR AO FINALIZAR (Sempre volta para o passo 1)
            atualizarMultiplicadorPreview(1);

            const btn = document.getElementById('btnAction');
            if(!isAutoModeActive) {
                btn.classList.remove('cashout', 'disabled'); 
                btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
            } else {
                btn.classList.add('disabled');
            }
        }

        window.resetGameUI();
    </script>
</body>
</html>
