<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassino Goal Simulator</title>
    <style>
        :root {
            --bg-top: #5e9731;
            --bg-bottom: #396d19;
            --panel-bg: #274d11;
            --tile-bg: #b0c995;
            --tile-hover: #cbe6ac;
            --accent-gold: #f4b63f;
            --text-light: #ffffff;
            --btn-green: #487e22;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            user-select: none;
        }

        #mobile-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            align-items: center;
        }

        .board-select {
            background: var(--panel-bg);
            padding: 5px 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .board-select select {
            background: transparent;
            color: white;
            border: none;
            outline: none;
            font-weight: bold;
            cursor: pointer;
        }

        .multiplier-badge {
            background: var(--accent-gold);
            color: #000;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Grid */
        .grid-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 6px;
            width: 100%;
            max-width: 350px;
        }

        .tile {
            aspect-ratio: 1;
            background-color: var(--tile-bg);
            border-radius: 4px;
            box-shadow: 0 3px 0 #89a36a;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            /* Inativo por padrão */
            opacity: 0.5; 
            pointer-events: none;
        }

        /* Coluna ativa onde o jogador pode clicar */
        .tile.active-col {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 4px 0 #f4b63f; /* Destaque na coluna atual */
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .tile.active-col:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 transparent;
        }

        .tile.revealed-safe {
            background-color: #1e3b0d;
            box-shadow: none;
            cursor: default;
            transform: none;
            opacity: 1;
            animation: none;
        }

        .tile.revealed-mine {
            background-color: #e74c3c;
            box-shadow: none;
            cursor: default;
            transform: none;
            opacity: 1;
            animation: none;
        }

        /* Bottom Controls */
        .controls {
            background: var(--panel-bg);
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .row-options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }

        .btn-random {
            background: var(--btn-green);
            color: white;
            border: 1px solid #6b9c3f;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.5;
        }

        .auto-play {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #ccc;
        }

        .main-action {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-refresh {
            background: #2a5214;
            border: 2px solid #1a360a;
            color: #4da6ff;
            width: 50px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        .btn-play {
            flex-grow: 1;
            background: var(--btn-green);
            color: white;
            border: 2px solid #1a360a;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.2);
        }

        .btn-play.cashout {
            background: var(--accent-gold);
            color: #000;
        }

        .bet-control {
            display: flex;
            background: #183309;
            border-radius: 25px;
            padding: 5px;
            align-items: center;
            justify-content: space-between;
        }

        .bet-info {
            display: flex;
            flex-direction: column;
            padding-left: 15px;
        }

        .bet-info label {
            font-size: 10px;
            color: #888;
        }

        .bet-info input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
            outline: none;
        }

        .bet-buttons {
            display: flex;
            gap: 5px;
        }

        .bet-btn {
            background: transparent;
            color: #8ba870;
            border: 1px solid #8ba870;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="mobile-container">
    
    <div class="top-bar">
        <div class="board-select">
            <span>Tamanho:</span>
            <select id="board-size" onchange="resetGameUI()">
                <option value="small" selected>Pequeno (3x4)</option>
                <option value="medium">Médio (4x7)</option>
                <option value="big">Grande (5x10)</option>
            </select>
        </div>
        <div class="multiplier-badge" id="next-multiplier">Próximo: 1.45x</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid">
            </div>
    </div>

    <div class="controls">
        <div class="row-options">
            <button class="btn-random" onclick="selectRandomTile()" disabled id="random-btn">ALEATÓRIO</button>
            <div class="auto-play">
                <span>🔄 Auto jogo</span>
            </div>
        </div>

        <div class="main-action">
            <button class="btn-refresh" onclick="resetGameUI()">↻</button>
            <button class="btn-play" id="play-btn" onclick="togglePlay()">▶ APOSTA</button>
        </div>

        <div class="bet-control">
            <div class="bet-info">
                <label>Aposta BRL</label>
                <input type="number" id="bet-amount" value="1.00" step="0.10" min="0.10" onchange="resetGameUI()">
            </div>
            <div class="bet-buttons">
                <button class="bet-btn" onclick="adjustBet(-0.5)">-</button>
                <button class="bet-btn" onclick="adjustBet(0.5)">+</button>
            </div>
        </div>
    </div>

</div>

<script>
    // Configurações dos tabuleiros do Goal
    const BOARDS = {
        'small': { rows: 3, cols: 4 },
        'medium': { rows: 4, cols: 7 },
        'big': { rows: 5, cols: 10 }
    };

    // TABELA OFICIAL DE MULTIPLICADORES (Matemática SorteCerta/Spribe)
    const GOAL_MULTIPLIERS = {
        'small': [1.45, 2.18, 3.27, 4.91],
        'medium': [1.29, 1.72, 2.29, 3.06, 4.08, 5.45, 7.26],
        'big': [1.21, 1.51, 1.89, 2.36, 2.96, 3.70, 4.62, 5.78, 7.22, 9.03]
    };

    let isPlaying = false;
    let currentRowCount = 3;
    let currentColCount = 4;
    let currentActiveCol = 0; // O jogador avança coluna por coluna (esquerda para direita)
    let bombsPositions = [];  // Guarda a LINHA da bomba para cada COLUNA
    let currentMultiplier = 1.00;
    let betAmount = 1.00;

    const gridElement = document.getElementById('grid');
    const playBtn = document.getElementById('play-btn');
    const multiplierBadge = document.getElementById('next-multiplier');
    const boardSelect = document.getElementById('board-size');
    const betInput = document.getElementById('bet-amount');
    const randomBtn = document.getElementById('random-btn');

    function createGrid() {
        const sizeConfig = BOARDS[boardSelect.value];
        currentRowCount = sizeConfig.rows;
        currentColCount = sizeConfig.cols;

        // Configura o CSS Grid para o número de colunas exato
        gridElement.style.gridTemplateColumns = `repeat(${currentColCount}, 1fr)`;
        gridElement.innerHTML = '';

        for (let r = 0; r < currentRowCount; r++) {
            for (let c = 0; c < currentColCount; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.row = r;
                tile.dataset.col = c;
                tile.onclick = () => handleTileClick(r, c, tile);
                gridElement.appendChild(tile);
            }
        }
    }

    function adjustBet(amount) {
        if (isPlaying) return;
        let currentBet = parseFloat(betInput.value);
        currentBet = Math.max(0.10, currentBet + amount);
        betInput.value = currentBet.toFixed(2);
    }

    // NOVA FUNÇÃO DE MATEMÁTICA (Usando a tabela oficial)
    function calculateMultiplier(stepsCleared) {
        if (stepsCleared === 0) return 1.00;
        const mode = boardSelect.value;
        const mults = GOAL_MULTIPLIERS[mode];
        
        if (stepsCleared <= mults.length) {
            return mults[stepsCleared - 1];
        }
        return mults[mults.length - 1];
    }

    // ATUALIZAÇÃO DA FUNÇÃO DO VISOR DE MULTIPLICADOR
    function updateMultiplierDisplay() {
        const mode = boardSelect.value;
        
        if (!isPlaying) {
            multiplierBadge.innerText = `Próximo: ${GOAL_MULTIPLIERS[mode][0].toFixed(2)}x`;
            return;
        }
        
        if (currentActiveCol < currentColCount) {
            const nextMult = GOAL_MULTIPLIERS[mode][currentActiveCol];
            multiplierBadge.innerText = `Próximo: ${nextMult.toFixed(2)}x`;
        } else {
            multiplierBadge.innerText = `GOAL!`;
        }
    }

    function updateActiveColumnUI() {
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(tile => {
            const c = parseInt(tile.dataset.col);
            if (isPlaying && c === currentActiveCol) {
                tile.classList.add('active-col');
            } else {
                tile.classList.remove('active-col');
            }
        });
    }

    function togglePlay() {
        if (!isPlaying) {
            startGame();
        } else {
            cashOut();
        }
    }

    function startGame() {
        betAmount = parseFloat(betInput.value);
        if (isNaN(betAmount) || betAmount <= 0) {
            alert("Insira um valor de aposta válido.");
            return;
        }

        boardSelect.disabled = true;
        betInput.disabled = true;
        randomBtn.disabled = false;
        randomBtn.style.opacity = '1';

        isPlaying = true;
        currentActiveCol = 0;
        currentMultiplier = 1.00;
        bombsPositions = [];

        // Plantar uma bomba por coluna (escolhe uma linha aleatória para cada coluna)
        for (let c = 0; c < currentColCount; c++) {
            bombsPositions.push(Math.floor(Math.random() * currentRowCount));
        }

        // Resetar visual do grid
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(tile => {
            tile.className = 'tile';
            tile.innerHTML = '';
        });

        updateActiveColumnUI();
        updateMultiplierDisplay();
        
        playBtn.innerText = "ESCOLHA UM BLOCO";
        playBtn.classList.remove('cashout');
    }

    function selectRandomTile() {
        if (!isPlaying) return;
        
        // Busca os tiles da coluna atual que ainda não foram clicados
        const activeTiles = Array.from(document.querySelectorAll('.tile')).filter(tile => 
            parseInt(tile.dataset.col) === currentActiveCol
        );

        if (activeTiles.length > 0) {
            const randomRowIndex = Math.floor(Math.random() * currentRowCount);
            const tileToClick = activeTiles.find(t => parseInt(t.dataset.row) === randomRowIndex);
            if (tileToClick) {
                handleTileClick(randomRowIndex, currentActiveCol, tileToClick);
            }
        }
    }

    function handleTileClick(r, c, tileElement) {
        if (!isPlaying || c !== currentActiveCol) return;

        if (bombsPositions[c] === r) {
            // Clicou numa bomba
            tileElement.classList.add('revealed-mine');
            tileElement.innerHTML = '💣';
            endGame(false);
        } else {
            // Passo Seguro
            tileElement.classList.add('revealed-safe');
            tileElement.innerHTML = '⚽';
            
            currentActiveCol++; // Avança uma coluna
            currentMultiplier = calculateMultiplier(currentActiveCol);
            
            if (currentActiveCol >= currentColCount) {
                // Chegou ao fim do campo (Goal!)
                cashOut(true);
            } else {
                // Pode continuar jogando ou sacar
                const currentWin = betAmount * currentMultiplier;
                playBtn.innerText = "SACAR R$ " + currentWin.toFixed(2);
                playBtn.classList.add('cashout');
                
                updateActiveColumnUI();
                updateMultiplierDisplay();
            }
        }
    }

    function cashOut(isGoal = false) {
        const winAmount = betAmount * currentMultiplier;
        if (isGoal) {
            alert(`GOOOAL! Você atravessou o campo e ganhou R$ ${winAmount.toFixed(2)}!`);
        } else {
            alert(`Você recuou e sacou R$ ${winAmount.toFixed(2)}.`);
        }
        endGame(true, true);
    }

    function endGame(won, cashedOut = false) {
        isPlaying = false;
        boardSelect.disabled = false;
        betInput.disabled = false;
        randomBtn.disabled = true;
        randomBtn.style.opacity = '0.5';

        // Revelar as bombas escondidas no tabuleiro
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(tile => {
            tile.classList.remove('active-col'); // Tira as animações
            const r = parseInt(tile.dataset.row);
            const c = parseInt(tile.dataset.col);
            
            // Se nessa posição estava a bomba, revela ela
            if (bombsPositions[c] === r && !tile.classList.contains('revealed-mine')) {
                tile.innerHTML = '💣';
                tile.style.opacity = '0.3'; // Mostrar que era bomba mas não explodiu
            }
        });

        playBtn.classList.remove('cashout');
        playBtn.innerText = "▶ APOSTA";
        
        if (!won && !cashedOut) {
            multiplierBadge.innerText = "Explodiu!";
        }
    }

    function resetGameUI() {
        if(isPlaying) return;
        currentMultiplier = 1.00;
        createGrid();
        updateMultiplierDisplay();
        playBtn.classList.remove('cashout');
        playBtn.innerText = "▶ APOSTA";
    }

    // Inicialização
    createGrid();
    updateMultiplierDisplay();
</script>

</body>
</html>
