                if (modoJogador !== 'admin' && modoJogador !== 'live') {
                    let snap = await get(ref(db, 'sistema/caixa_global'));
                    await set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) - apostaReal).toFixed(2)));
                }
            } else if (isGaming && currentActiveCol > 0) { isGaming = false; }
        }

        window.addEventListener('pagehide', () => { lidarComSaidaAbrupta(); pararAutoJogo(); });
        document.addEventListener('visibilitychange', function() { if (document.hidden) { lidarComSaidaAbrupta(); pararAutoJogo(); } });

        function updateSaldoDisplay(valor) { document.getElementById('displaySaldo').innerText = "R$ " + valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

        onValue(ref(db, 'usuarios/' + idDispositivo), (snapshot) => {
            const dados = snapshot.val() || {}; 
            if(!isGaming) {
                bancaAtual = parseFloat(dados.saldo || 0); 
                saldoRealAtual = parseFloat(dados.saldo_real !== undefined ? dados.saldo_real : bancaAtual);
                modoJogador = dados.modo || 'normal';
                updateSaldoDisplay(bancaAtual);
            }
        });
        onValue(ref(db, 'sistema/caixa_global'), (snapshot) => { caixaDaCasa = parseFloat(snapshot.val() || 0); });

        function mudarAposta(direcao) {
            if(isGaming || isAutoModeActive) return;
            let novoIndex = indexAposta + direcao;
            if(novoIndex >= 0 && novoIndex < apostasPermitidas.length) { indexAposta = novoIndex; apostaAtual = apostasPermitidas[indexAposta]; document.getElementById('displayAposta').innerText = "R$ " + apostaAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); tocarSom('sfxClick'); }
        }

        // AUTO JOGO 
        document.getElementById('btnAuto').addEventListener('click', () => { document.getElementById('menuAuto').classList.toggle('show'); tocarSom('sfxClick'); });
        document.querySelectorAll('.auto-btn-option').forEach(btn => { btn.addEventListener('click', function() { document.getElementById('menuAuto').classList.remove('show'); girosAutoRestantes = parseInt(this.dataset.spins); isAutoModeActive = true; document.getElementById('btnAuto').classList.add('auto-active'); processarAutoJogo(); }); });

        function pararAutoJogo() { isAutoModeActive = false; girosAutoRestantes = 0; document.getElementById('btnAuto').classList.remove('auto-active'); document.getElementById('btnAuto').innerHTML = '<i class="fa-solid fa-rotate"></i> Auto Jogo'; clearTimeout(autoTimeoutId); if (!isGaming) { const btn = document.getElementById('btnAction'); btn.classList.remove('disabled', 'cashout'); btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`; } }

        async function processarAutoJogo() {
            if (!isAutoModeActive) return; if (girosAutoRestantes <= 0) { pararAutoJogo(); return; }
            document.getElementById('btnAuto').innerHTML = `<i class="fa-solid fa-rotate"></i> AUTO (${girosAutoRestantes})`;
            if (!isGaming) { if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); pararAutoJogo(); return; } const ok = await iniciarApostaBackend(); if (ok) { autoTimeoutId = setTimeout(fazerJogadaAuto, 1000); } else { pararAutoJogo(); } }
        }

        function fazerJogadaAuto() {
            if (!isGaming || !isAutoModeActive) return;
            const activeTiles = Array.from(document.querySelectorAll('.tile')).filter(t => parseInt(t.dataset.col) === currentActiveCol);
            if (activeTiles.length > 0) {
                const rndRow = Math.floor(Math.random() * currentRowCount); const tile = activeTiles.find(t => parseInt(t.dataset.row) === rndRow);
                if (tile) { handleTileClick(rndRow, currentActiveCol, tile); if (isGaming) { autoTimeoutId = setTimeout(fazerJogadaAuto, 800); } else { girosAutoRestantes--; autoTimeoutId = setTimeout(processarAutoJogo, 2500); } }
            }
        }

        function _0xMath(rows, steps) { if (steps === 0) return 1.00; return parseFloat((Math.pow(rows / (rows - 1), steps) * CONFIG_RTP).toFixed(2)); }
        function atualizarMultiplicadorPreview(steps = 1) { document.getElementById('nextMultDisplay').innerText = `${_0xMath(currentRowCount, steps).toFixed(2)}x`; }

        function updateActiveColumnUI() { document.querySelectorAll('.tile').forEach(tile => { if (isGaming && parseInt(tile.dataset.col) === currentActiveCol) { tile.classList.add('active-col'); } else { tile.classList.remove('active-col'); } }); }

        window.resetGameUI = function() {
            if(isGaming) return;
            const sizeConfig = BOARDS[document.getElementById('board-size').value];
            currentRowCount = sizeConfig.rows; currentColCount = sizeConfig.cols;
            const grid = document.getElementById('grid'); grid.style.gridTemplateColumns = `repeat(${currentColCount}, 1fr)`; grid.style.gridTemplateRows = `repeat(${currentRowCount}, 1fr)`; grid.innerHTML = '';
            for (let r = 0; r < currentRowCount; r++) { for (let c = 0; c < currentColCount; c++) { const tile = document.createElement('div'); tile.className = 'tile'; tile.dataset.row = r; tile.dataset.col = c; tile.onclick = () => handleTileClick(r, c, tile); grid.appendChild(tile); } }
            currentMultiplier = 1.00; atualizarMultiplicadorPreview(1);
            document.getElementById('btnAction').classList.remove('cashout'); document.getElementById('btnAction').innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`;
        }

        async function cliqueBotaoApostar() { if(isAutoModeActive) return; tocarSom('sfxClick'); if (isGaming) { if (currentActiveCol === 0) return; cashOut(); } else { await iniciarApostaBackend(); } }

        async function iniciarApostaBackend() {
            if(bancaAtual < apostaAtual) { mostrarToast("Saldo insuficiente."); return false; }
            proporcaoRealNaMesa = bancaAtual > 0 ? (saldoRealAtual / bancaAtual) : 1.0;
            if(proporcaoRealNaMesa > 1.0) proporcaoRealNaMesa = 1.0;
            let apostaReal = apostaAtual * proporcaoRealNaMesa;

            isGaming = true; currentActiveCol = 0; currentMultiplier = 1.00;
            document.getElementById('board-size').disabled = true;
            document.getElementById('btnMinus').style.opacity = '0.5'; document.getElementById('btnPlus').style.opacity = '0.5';

            const btn = document.getElementById('btnAction'); btn.classList.add('cashout'); btn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual).toFixed(2).replace('.',',')})`;

            bancaAtual -= apostaAtual; saldoRealAtual -= apostaReal; updateSaldoDisplay(bancaAtual);
            await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });

            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                get(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual')).then(snap => { set(ref(db, 'usuarios/' + idDispositivo + '/rollover_atual'), parseFloat((snap.val() || 0)) + apostaAtual); });
                let snapC = await get(ref(db, 'sistema/caixa_global'));
                await set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snapC.val() || 0) + apostaReal).toFixed(2)));
            }

            bombsPositions = []; for (let c = 0; c < currentColCount; c++) { bombsPositions.push(Math.floor(Math.random() * currentRowCount)); }
            document.querySelectorAll('.tile').forEach(tile => { tile.className = 'tile'; tile.innerHTML = ''; });
            updateActiveColumnUI(); atualizarMultiplicadorPreview(1);
            return true;
        }

        async function handleTileClick(r, c, tileElement) {
            if (!isGaming || c !== currentActiveCol) return;
            let isBomb = bombsPositions[c] === r;

            if (modoJogador === 'influenciador' && isBomb) {
                let livres = []; for(let i = 0; i < currentRowCount; i++) { if(i !== r) livres.push(i); }
                bombsPositions[c] = livres[Math.floor(Math.random() * livres.length)]; isBomb = false;
            }

            // ANTI-QUEBRA
            if (!isBomb && modoJogador !== 'admin' && modoJogador !== 'live') {
                let futureMultiplier = _0xMath(currentRowCount, currentActiveCol + 1);
                let potentialWinReal = (apostaAtual * futureMultiplier) * proporcaoRealNaMesa;
                if (potentialWinReal > caixaDaCasa) { bombsPositions[c] = r; isBomb = true; }
            }

            tileElement.classList.add('opened');

            if (isBomb) {
                isGaming = false; tocarSom('sfxBomb'); tileElement.classList.add('bomb'); endGame(false);
            } else {
                tocarSom('sfxGem'); tileElement.classList.add('safe');
                currentActiveCol++; currentMultiplier = _0xMath(currentRowCount, currentActiveCol);
                
                if (currentActiveCol >= currentColCount) { isGaming = false; await cashOut(true); } 
                else {
                    document.getElementById('btnAction').innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> SACAR (R$ ${(apostaAtual * currentMultiplier).toFixed(2).replace('.',',')})`;
                    updateActiveColumnUI(); atualizarMultiplicadorPreview(currentActiveCol + 1);
                }
            }
        }

        async function cashOut(isGoal = false) {
            isGaming = false; const lucro = apostaAtual * currentMultiplier; const lucroReal = lucro * proporcaoRealNaMesa;
            bancaAtual += lucro; saldoRealAtual += lucroReal;

            let snapshot = await get(ref(db, `usuarios/${idDispositivo}`));
            let u = snapshot.val() || {};
            let metaRo = parseFloat(u.rollover_meta || 0); let atualRo = parseFloat(u.rollover_atual || 0);
            if (metaRo > 0 && atualRo >= metaRo) { saldoRealAtual = bancaAtual; }

            await update(ref(db, `usuarios/${idDispositivo}`), { saldo: parseFloat(bancaAtual.toFixed(2)), saldo_real: parseFloat(saldoRealAtual.toFixed(2)) });
            
            if (modoJogador !== 'admin' && modoJogador !== 'live') {
                let snap = await get(ref(db, 'sistema/caixa_global'));
                await set(ref(db, 'sistema/caixa_global'), parseFloat((parseFloat(snap.val() || 0) - lucroReal).toFixed(2)));
            }

            tocarSom('sfxWin');
            const toast = document.getElementById('winToast');
            document.getElementById('winTitle').innerText = isGoal ? "GOOOOOAL!" : "LUCRO TOTAL DA RODADA";
            document.getElementById('winAmount').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
            endGame(true, true);
        }

        function endGame(won, cashedOut = false) {
            document.getElementById('board-size').disabled = false;
            document.getElementById('btnMinus').style.opacity = '1'; document.getElementById('btnPlus').style.opacity = '1';
            document.querySelectorAll('.tile').forEach(tile => {
                tile.classList.remove('active-col'); const r = parseInt(tile.dataset.row); const c = parseInt(tile.dataset.col);
                if (bombsPositions[c] === r && !tile.classList.contains('bomb')) { tile.classList.add('opened', 'bomb-reveal'); }
            });
            atualizarMultiplicadorPreview(1);
            const btn = document.getElementById('btnAction');
            if(!isAutoModeActive) { btn.className = 'bet-button btn-3d'; btn.innerHTML = `<i class="fa-solid fa-play"></i> APOSTAR`; } else { btn.classList.add('disabled'); }
            updateSaldoDisplay(bancaAtual);
        }

        window.resetGameUI();
    </script>
</body>
</html>
