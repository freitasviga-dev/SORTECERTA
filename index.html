<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: manipulation; }
        body { background: radial-gradient(circle, #2c0202 0%, #0f0101 100%); color: #fff; min-height: 100vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        .btn-saldo { width: 100%; max-width: 420px; background: #ffcc00; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 50px; margin-bottom: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #997300; text-transform: uppercase; }
        .btn-saldo:active { transform: translateY(4px); box-shadow: 0 1px 0 #997300; }

        .container-jogo { width: 100%; max-width: 420px; background: linear-gradient(180deg, #8b0000 0%, #b81414 50%, #4a0000 100%); border: 4px solid #ffcc00; border-radius: 24px; padding: 20px; text-align: center; position: relative; }
        
        .grade-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #220000; padding: 12px; border-radius: 16px; border: 3px solid #660000; margin-bottom: 15px; position: relative; }
        .slot { background: #fff; height: 90px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); }
        
        #overlayGanho { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #ffcc00; z-index: 10; border-radius: 20px; }

        .controles { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 16px; }
        .btn-acao { background: #333; color: #ffcc00; border: 2px solid #ffcc00; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .btn-acao:active { transform: scale(0.9); }
        .btn-disparar { flex-grow: 1; height: 60px; background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%); border: none; color: white; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #1e7e43; }
        .btn-disparar:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <button class="btn-saldo" onclick="window.location.href='saldo.html'">ADICIONAR SALDO</button>

    <div class="container-jogo">
        <div class="grade-slots">
            <div id="overlayGanho">R$ 0,00</div>
            <div class="slot" id="s0">🐯</div><div class="slot" id="s1">💰</div><div class="slot" id="s2">🧧</div>
            <div class="slot" id="s3">🍀</div><div class="slot" id="s4">🐯</div><div class="slot" id="s5">💰</div>
            <div class="slot" id="s6">🍊</div><div class="slot" id="s7">🍀</div><div class="slot" id="s8">🧧</div>
        </div>
        <div class="controles">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                <button class="btn-acao" onclick="ajustarAposta(-1)">-</button>
                <div id="txtAposta" style="font-size:20px; font-weight:bold;">R$ 0,40</div>
                <button class="btn-acao" onclick="ajustarAposta(1)">+</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-acao" id="btnTurbo" onclick="toggleTurbo()">⚡</button>
                <button class="btn-disparar" id="btnDisparar" onclick="girar()">GIRAR</button>
                <button class="btn-acao" onclick="abrirGirosAuto()">🔄</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // CONFIGURAÇÃO FIREBASE (SUBSTITUA PELOS SEUS DADOS)
        const db = getDatabase(initializeApp({ /* DADOS AQUI */ }));
        
        let aposta = 0.40, turbo = false;

        window.toggleTurbo = () => { turbo = !turbo; document.getElementById('btnTurbo').style.background = turbo ? '#2ecc71' : '#333'; };
        
        window.ajustarAposta = (d) => {
            let nova = aposta + (d * 0.40);
            if(nova < 0.40) return alert("BET MÍNIMA");
            if(nova > 250) return alert("BET MÁXIMA");
            aposta = nova;
            document.getElementById('txtAposta').innerText = "R$ " + aposta.toFixed(2);
        };

        window.abrirGirosAuto = () => { let qtd = prompt("Quantos giros?"); if(qtd) alert("Iniciando " + qtd + " giros."); };

        window.girar = () => {
            document.getElementById('btnDisparar').disabled = true;
            let count = 0;
            let loop = setInterval(() => {
                for(let i=0; i<9; i++) document.getElementById('s'+i).innerText = ['🐯','💰','🧧','🍀','🍊'][Math.floor(Math.random()*5)];
                if(count++ > 15) { clearInterval(loop); finalizar(); }
            }, turbo ? 30 : 100);
        };

        function finalizar() {
            let ganho = Math.random() > 0.8 ? aposta * 5 : 0;
            if(ganho > 0) {
                const o = document.getElementById('overlayGanho');
                o.innerText = "R$ " + ganho.toFixed(2);
                o.style.display = 'flex';
                setTimeout(() => o.style.display = 'none', 1500);
            }
            document.getElementById('btnDisparar').disabled = false;
        }
    </script>
</body>
</html>
