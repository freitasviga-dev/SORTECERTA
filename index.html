<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; touch-action: manipulation; }
        body { background: radial-gradient(circle, #2c0202 0%, #0f0101 100%); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; padding: 20px 10px; }

        .btn-adicionar-saldo { width: 100%; max-width: 420px; background: #ffcc00; color: #000; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 50px; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 0 #997300; text-transform: uppercase; transition: 0.2s; }
        .btn-adicionar-saldo:active { transform: translateY(3px); box-shadow: 0 1px 0 #997300; }

        .container-jogo { width: 100%; max-width: 420px; background: linear-gradient(180deg, #8b0000 0%, #b81414 50%, #4a0000 100%); border: 4px solid #ffcc00; border-radius: 24px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; }
        .topo-id-container { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 50px; margin-bottom: 15px; border: 1px solid rgba(255,204,0,0.3); }
        .topo-id { font-size: 11px; color: #ffcc00; font-weight: bold; }
        .btn-copiar { background: #ffcc00; border: none; color: #000; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; cursor: pointer; }

        .grade-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #220000; padding: 12px; border-radius: 16px; border: 3px solid #660000; margin-bottom: 15px; }
        .slot { background: linear-gradient(145deg, #ffffff, #dddddd); height: 95px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 42px; position: relative; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); }
        .slot.ganhador { animation: piscarVitoria 0.4s ease alternate infinite; border: 3px solid #ffcc00; }
        .label-wild { position: absolute; bottom: 2px; background: #ffcc00; color: #000; font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 4px; }

        .controles-inferiores { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 16px; border: 1px solid #8b0000; }
        .btn-ajuste { background: #ffcc00; border: none; color: #000; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #997300; }
        .btn-disparar { width: 100%; background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%); border: none; color: white; padding: 14px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 0 #1e7e43; }
        .btn-disparar:disabled { background: #555 !important; opacity: 0.6; }

        @keyframes piscarVitoria { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <button class="btn-adicionar-saldo" onclick="window.location.href='saldo.html'">ADICIONAR SALDO</button>

    <div class="container-jogo">
        <div class="topo-id-container">
            <div class="topo-id">ID: <span id="lblIdDispositivo">CONECTANDO...</span></div>
            <button class="btn-copiar" id="btnCopiarId" onclick="copiarIdDispositivo()">Copiar</button>
        </div>
        
        <div class="grade-slots">
            <div class="slot" id="s0">🍊</div><div class="slot" id="s1">🍀</div><div class="slot" id="s2">🍊</div>
            <div class="slot" id="s3">🧧</div><div class="slot" id="s4">🐯<span class="label-wild">WILD</span></div><div class="slot" id="s5">🧧</div>
            <div class="slot" id="s6">🍊</div><div class="slot" id="s7">💰</div><div class="slot" id="s8">🍊</div>
        </div>

        <div class="controles-inferiores">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <button class="btn-ajuste" onclick="ajustarGiroBotoes(-1)">-</button>
                <div style="text-align:center;">
                    <div style="font-size:11px; color:#ccc;">APOSTA TOTAL</div>
                    <h2 id="txtAposta" style="color:#ffcc00; font-size:22px;">R$ 0,40</h2>
                </div>
                <button class="btn-ajuste" onclick="ajustarGiroBotoes(1)">+</button>
            </div>
            <button class="btn-disparar" id="btnDisparar" onclick="executarRodada()" disabled>CONECTANDO</button>
            <div style="margin-top:12px; color:#ccc;">Saldo: <strong id="txtSaldo" style="color:#2ecc71;">R$ 0,00</strong></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio", authDomain: "sortecerta-75b77.firebaseapp.com", databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com", projectId: "sortecerta-75b77", storageBucket: "sortecerta-75b77.firebasestorage.app", messagingSenderId: "989209096967", appId: "1:989209096967:web:e58c112de75fb813068ba2" };
        const db = getDatabase(initializeApp(firebaseConfig));
        
        let idDispositivo = localStorage.getItem('usuario_tracker_id') || ('TIGER-' + Math.floor(100000 + Math.random() * 900000));
        localStorage.setItem('usuario_tracker_id', idDispositivo);
        document.getElementById('lblIdDispositivo').innerText = idDispositivo;

        let bancaAtual = 0.00, valorDoGiro = 0.40;
        onValue(ref(db, 'usuarios/' + idDispositivo + '/saldo'), (s) => { bancaAtual = parseFloat(s.val() || 0); document.getElementById('txtSaldo').innerText = "R$ " + bancaAtual.toFixed(2); document.getElementById('btnDisparar').disabled = false; document.getElementById('btnDisparar').innerText = "GIRAR"; });

        window.ajustarGiroBotoes = (dir) => { valorDoGiro = Math.max(0.40, valorDoGiro + (dir * 0.40)); document.getElementById('txtAposta').innerText = "R$ " + valorDoGiro.toFixed(2); };
        window.copiarIdDispositivo = () => { navigator.clipboard.writeText(idDispositivo); alert("ID copiado!"); };
        window.executarRodada = () => {
            document.getElementById('btnDisparar').disabled = true;
            let i = 0, loop = setInterval(() => {
                for(let j=0; j<9; j++) document.getElementById('s'+j).innerText = ['🐯','💰','🧧','🍀','🍊'][Math.floor(Math.random()*5)];
                if(i++ > 15) { clearInterval(loop); bancaAtual -= valorDoGiro; set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), bancaAtual); document.getElementById('btnDisparar').disabled = false; }
            }, 80);
        };
    </script>
</body>
</html>
