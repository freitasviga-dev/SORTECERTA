<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Tiger - Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; touch-action: manipulation; }
        body { background: radial-gradient(circle, #2c0202 0%, #0f0101 100%); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 10px; }
        .container-jogo { width: 100%; max-width: 420px; background: linear-gradient(180deg, #8b0000 0%, #b81414 50%, #4a0000 100%); border: 4px solid #ffcc00; border-radius: 24px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; }
        .topo-id-container { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 50px; margin-bottom: 20px; border: 1px solid rgba(255, 204, 0, 0.3); }
        .topo-id { font-size: 11px; color: #ffcc00; font-weight: bold; }
        .grade-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #220000; padding: 12px; border-radius: 16px; border: 3px solid #660000; margin-bottom: 20px; }
        .slot { background: linear-gradient(145deg, #ffffff, #dddddd); height: 95px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 42px; position: relative; transition: all 0.3s ease; }
        .slot.brilhante { box-shadow: 0 0 20px 5px #ffcc00 !important; border: 3px solid #fff !important; transform: scale(1.05); }
        .valor-ganho-slot { position: absolute; top: -20px; left: 0; width: 100%; color: #ffcc00; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .label-wild { position: absolute; bottom: 2px; background: #ffcc00; color: #000; font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 4px; }
        .controles-inferiores { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 16px; margin-top: 10px; }
        .btn-disparar { width: 100%; background: #2ecc71; border: none; color: white; padding: 14px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .btn-disparar:disabled { background: #555; }
        .exibicao-saldo-rodape { margin-top: 15px; font-size: 16px; color: #ccc; }
    </style>
</head>
<body>

    <div class="container-jogo">
        <div class="topo-id-container">
            <div class="topo-id">ID: <span id="lblIdDispositivo">---</span></div>
        </div>

        <div class="grade-slots" id="grade">
            <div class="slot" id="s0">🍊</div><div class="slot" id="s1">🍀</div><div class="slot" id="s2">🍊</div>
            <div class="slot" id="s3">🧧</div><div class="slot" id="s4">🐯<span class="label-wild">WILD</span></div><div class="slot" id="s5">🧧</div>
            <div class="slot" id="s6">🍊</div><div class="slot" id="s7">💰</div><div class="slot" id="s8">🍊</div>
        </div>

        <div class="controles-inferiores">
            <button class="btn-disparar" id="btnDisparar" onclick="executarRodada()">GIRAR</button>
            <div class="exibicao-saldo-rodape">Saldo: <strong id="txtSaldo">R$ 0,00</strong></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBOP7TfHjA2jjwJvWab72Zk0jfw5U9oHio", authDomain: "sortecerta-75b77.firebaseapp.com", databaseURL: "https://sortecerta-75b77-default-rtdb.firebaseio.com", projectId: "sortecerta-75b77", storageBucket: "sortecerta-75b77.firebasestorage.app", messagingSenderId: "989209096967", appId: "1:989209096967:web:e58c112de75fb813068ba2" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let idDispositivo = localStorage.getItem('usuario_tracker_id') || 'TIGER-' + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('usuario_tracker_id', idDispositivo);
        document.getElementById('lblIdDispositivo').innerText = idDispositivo;

        let bancaAtual = 0.00;
        let valorDoGiro = 0.40;
        const listaSimbolos = ['🐯', '💰', '🧧', '🍀', '🍊'];
        const combinacoes = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        onValue(ref(db, 'usuarios/' + idDispositivo + '/saldo'), (snap) => {
            bancaAtual = snap.val() || 0;
            document.getElementById('txtSaldo').innerText = "R$ " + bancaAtual.toFixed(2);
        });

        window.executarRodada = () => {
            // Limpa ganhos anteriores e brilhos
            document.querySelectorAll('.valor-ganho-slot').forEach(e => e.remove());
            document.querySelectorAll('.slot').forEach(e => e.classList.remove('brilhante'));

            document.getElementById('btnDisparar').disabled = true;
            let count = 0;
            const loop = setInterval(() => {
                for(let i=0; i<9; i++) renderizarSlot(i, listaSimbolos[Math.floor(Math.random() * listaSimbolos.length)]);
                if(++count > 10) { clearInterval(loop); finalizarRodada(); }
            }, 60);
        };

        function finalizarRodada() {
            let res = Array.from({length: 9}, () => listaSimbolos[Math.floor(Math.random() * listaSimbolos.length)]);
            res.forEach((s, i) => renderizarSlot(i, s));

            let ganhou = false;
            let ganhoTotal = 0;

            combinacoes.forEach(linha => {
                if (res[linha[0]] === res[linha[1]] && res[linha[1]] === res[linha[2]]) {
                    let valor = valorDoGiro * 2;
                    ganhoTotal += valor;
                    linha.forEach(pos => {
                        let el = document.getElementById(`s${pos}`);
                        el.classList.add('brilhante');
                        if(!el.querySelector('.valor-ganho-slot')) {
                            el.innerHTML += `<div class="valor-ganho-slot">+R$${valor.toFixed(2)}</div>`;
                        }
                    });
                    ganhou = true;
                }
            });

            if(ganhou) {
                bancaAtual += ganhoTotal;
                set(ref(db, 'usuarios/' + idDispositivo + '/saldo'), bancaAtual);
            }
            document.getElementById('btnDisparar').disabled = false;
        }

        function renderizarSlot(id, s) {
            document.getElementById(`s${id}`).innerHTML = s === '🐯' ? `🐯<span class="label-wild">WILD</span>` : s;
        }
    </script>
</body>
</html>
